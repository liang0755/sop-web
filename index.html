  const group = sel.dataset.group;
  const opts = ((cloudData.formConfig && cloudData.formConfig.customerTags) || {})[group] || [];
  const st = csTagColorStyle(sel.value, opts);
  if (st) {
    sel.style.background = st.split(';')[0].split(':')[1];
    sel.style.color = st.split(';')[1].split(':')[1];
    sel.style.borderColor = st.split(';')[2].split(':')[1];
    sel.style.fontWeight = '600';
  } else {
    sel.style.background = '';
    sel.style.color = '';
    sel.style.borderColor = '';
    sel.style.fontWeight = '';
  }
}

function renderCustomerSummary() {
  const year = document.getElementById('csYear').value;
  const months = csMonths; // 数组，空=全部月份
  const dept = document.getElementById('csTeam').value || '';
  const person = document.getElementById('csSales').value || '';
  const cfg = (cloudData.formConfig && cloudData.formConfig.customerTags) || { customerSource: [], category: [], customerProfile: [] };
  const canEdit = hasPermission('salesDetail');
  const userMap = buildUserStatusMap();
  const filtered = cloudData.salesRecords.filter(r => {
    const dm = r.docMonth || '';
    if (!dm.startsWith(year)) return false;
    const mm = dm.slice(5);
    if (months.length && !months.includes(mm)) return false;
    if (dept && (r.team || '') !== dept) return false;
    if (person && (r.salesperson || '') !== person) return false;
    return true;
  });
  const groups = {};
  filtered.forEach(r => {
    const key = (r.docMonth || '') + '|' + (r.salesperson || '') + '|' + (r.customer || '');
    if (!groups[key]) groups[key] = { docMonth: r.docMonth || '', salesperson: r.salesperson || '', customer: r.customer || '', team: r.team || '', amount: 0, customerSource: '', category: '', customerProfile: '' };
    const g = groups[key];
    g.amount += toNum(r.amount);
    if (!g.customerSource && r.customerSource) g.customerSource = r.customerSource;
    if (!g.category && r.category) g.category = r.category;
    if (!g.customerProfile && r.customerProfile) g.customerProfile = r.customerProfile;
  });
  const rows = Object.keys(groups).map(k => groups[k]).sort((a, b) => (a.docMonth + a.salesperson + a.customer).localeCompare(b.docMonth + b.salesperson + b.customer));
  csAllRows = rows;
  // 分页
  const totalRows = rows.length;
  const totalPages = Math.max(1, Math.ceil(totalRows / csPageSize));
  if (csPage > totalPages) csPage = totalPages;
  if (csPage < 1) csPage = 1;
  const startIdx = (csPage - 1) * csPageSize;
  const pageRows = rows.slice(startIdx, startIdx + csPageSize);
  csPageRows = pageRows;
  const allSelOnPage = pageRows.length > 0 && pageRows.every(g => csSelectedKeys.has(g.docMonth + '|' + g.salesperson + '|' + g.customer));
  const tagSelect = (group, aggKey, curVal) => {
    const opts = (cfg[group] || []);
    const encKey = encodeURIComponent(aggKey);
    const styleBase = "width:100%;min-width:90px;padding:4px 8px;height:auto;font-size:13px";
    // 只认可表单配置内的值；真实数据值不再自动回填，也不在选项列表里出现
    const effectiveVal = curVal && opts.includes(curVal) ? curVal : '';
    const styleColor = effectiveVal ? csTagColorStyle(effectiveVal, opts) : '';
    let h = `<select class="form-control cs-tag-select" data-group="${group}" style="${styleBase}${styleColor ? ';' + styleColor : ''}" ${canEdit ? '' : 'disabled'} onchange="saveCustomerTag('${group}','${encKey}',encodeURIComponent(this.value));csPaintTag(this)"><option value="">未设置</option>`;
    opts.forEach(o => {
      const selected = (effectiveVal === o) ? 'selected' : '';
      h += `<option value="${esc(o)}" ${selected}>${esc(o)}</option>`;
    });
    h += '</select>';
    return h;
  };
  const wrap = document.getElementById('csTableWrap');
  if (!totalRows) { wrap.innerHTML = '<div style="padding:30px;text-align:center;color:var(--gray-400)">无匹配数据，请调整查询条件</div>'; updateCsBatchBar(0); return; }
  const rowsHtml = pageRows.map((g, idx) => {
    const aggKey = g.docMonth + '|' + g.salesperson + '|' + g.customer;
    const checked = csSelectedKeys.has(aggKey) ? 'checked' : '';
    return `<tr>
      <td style="text-align:center"><input type="checkbox" class="cs-check" data-idx="${idx}" ${checked} onchange="csToggleSelect(${idx}, this.checked)"></td>
      <td>${esc(g.docMonth)}</td>
      <td>${esc(g.salesperson)}${userStatusBadge(g.salesperson, userMap)}</td>
      <td>${esc(g.customer) || '-'}</td>
      <td class="num">${fmtSalesMoney(g.amount)}</td>
      <td><span class="badge badge-team">${esc(g.team) || '-'}</span></td>
      <td>${tagSelect('customerSource', aggKey, g.customerSource)}</td>
      <td>${tagSelect('category', aggKey, g.category)}</td>
      <td>${tagSelect('customerProfile', aggKey, g.customerProfile)}</td>
    </tr>`;
  }).join('');
  const pager = `
    <div class="pager">
      <button class="btn btn-outline btn-sm" onclick="csGotoPage(${csPage - 1})" ${csPage <= 1 ? 'disabled' : ''}>上一页</button>
      <span class="pager-info">第 ${csPage} / ${totalPages} 页 · 共 ${totalRows} 条（已选 ${csSelectedKeys.size} 组）</span>
      <button class="btn btn-outline btn-sm" onclick="csGotoPage(${csPage + 1})" ${csPage >= totalPages ? 'disabled' : ''}>下一页</button>
      <select class="form-control" style="width:auto;display:inline-block;margin-left:8px" onchange="csSetPageSize(this.value)">
        ${[20, 50, 100].map(s => `<option value="${s}" ${s === csPageSize ? 'selected' : ''}>${s} 条/页</option>`).join('')}
      </select>
    </div>`;
  const headCheck = `<th style="text-align:center;width:40px"><input type="checkbox" id="csHeadCheck" ${allSelOnPage?'checked':''} onchange="csToggleAll(this.checked)"></th>`;
  wrap.innerHTML = `<table><thead><tr>${headCheck}<th>年/月</th><th>销售员</th><th>客户</th><th class="num">折后总金额</th><th>销售员所属门店</th><th>客户来源</th><th>品类</th><th>客户画像</th></tr></thead><tbody>${rowsHtml}</tbody></table>${pager}`;
  updateCsBatchBar(totalRows);
}

async function saveCustomerTag(group, encKey, encVal) {
  if (!hasPermission('salesDetail')) { showToast('无编辑权限', 'error'); renderCustomerSummary(); return; }
  const key = decodeURIComponent(encKey);
  const val = decodeURIComponent(encVal);
  const parts = key.split('|');
  if (parts.length < 3) return;
  const [dm, sp, cust] = parts;
  let n = 0, fail = 0;
  for (const r of cloudData.salesRecords) {
    if (r.docMonth === dm && r.salesperson === sp && (r.customer || '') === cust) {
      r[group] = val;
      if (r.id) {
        try { await apiUpdate('salesRecords', r.id, { [group]: val }); n++; }
        catch (e) { fail++; console.warn('saveCustomerTag 写入失败:', r.id, e); }
      } else fail++;
    }
  }
  saveReportsCache();
  if (salesBoardTab === 'source') renderSalesBoardSource();
  if (salesBoardTab === 'profile') renderSalesBoardProfile();
  if (fail) showToast('已保存 ' + n + ' 条，' + fail + ' 条缺少存储键未写入', 'error', 2500);
  else showToast('已保存（' + n + ' 条明细）', 'success', 1500);
}

function lyMonth(mm) { const p = String(mm).split('-'); return (parseInt(p[0], 10) - 1) + '-' + p[1]; }

// ===== 客户汇总：分页 / 勾选 / 批量设置 / 导出 =====
function csRefilter() { csPage = 1; csSelectedKeys.clear(); renderCustomerSummary(); }
function csGotoPage(p) { csPage = p; renderCustomerSummary(); }
function csSetPageSize(v) { csPageSize = parseInt(v, 10) || 20; csPage = 1; renderCustomerSummary(); }
function csKeyOf(g) { return g.docMonth + '|' + g.salesperson + '|' + (g.customer || ''); }

function csToggleSelect(idx, checked) {
  const g = csPageRows[idx];
  if (!g) return;
  const key = csKeyOf(g);
  if (checked) csSelectedKeys.add(key); else csSelectedKeys.delete(key);
  const head = document.getElementById('csHeadCheck');
  if (head) head.checked = csPageRows.length > 0 && csPageRows.every(x => csSelectedKeys.has(csKeyOf(x)));
  updateCsBatchBar(csAllRows.length);
}

function csToggleAll(checked) {
  csPageRows.forEach(g => { const k = csKeyOf(g); if (checked) csSelectedKeys.add(k); else csSelectedKeys.delete(k); });
  renderCustomerSummary();
}

function csClearSelection() { csSelectedKeys.clear(); renderCustomerSummary(); }

function updateCsBatchBar(totalRows) {
  const bar = document.getElementById('csBatchBar');
  if (!bar) return;
  const n = csSelectedKeys.size;
  if (!n) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  bar.innerHTML = `<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <span>已选 <b>${n}</b> 组客户</span>
    <button class="btn btn-primary btn-sm" onclick="openCsBatchTagModal()">🏷️ 批量设置标签</button>
    <button class="btn btn-outline btn-sm" onclick="csClearSelection()">取消选择</button>
  </div>`;
}

function openCsBatchTagModal() {
  if (!hasPermission('salesDetail')) { showToast('无编辑权限', 'error'); return; }
  if (!csSelectedKeys.size) { showToast('请先勾选客户', 'error'); return; }
  const cfg = (cloudData.formConfig && cloudData.formConfig.customerTags) || { customerSource: [], category: [], customerProfile: [] };
  const optHtml = (group) => ['<option value="">不修改</option>', '<option value="__clear__">⨉ 清空</option>'].concat((cfg[group] || []).map(o => `<option value="${esc(o)}">${esc(o)}</option>`)).join('');
  const html = `<div class="import-note" style="margin-bottom:12px">🏷️ 对选中的 <b>${csSelectedKeys.size}</b> 组客户设置标签（留「不修改」保持原值，「清空」置空）。设置将应用到该客户对应的全部明细记录。</div>
    <div class="form-group"><label>客户来源</label><select class="form-control" id="csbSource">${optHtml('customerSource')}</select></div>
    <div class="form-group"><label>品类</label><select class="form-control" id="csbCategory">${optHtml('category')}</select></div>
    <div class="form-group"><label>客户画像</label><select class="form-control" id="csbProfile">${optHtml('customerProfile')}</select></div>
    <div class="modal-footer"><button type="button" class="btn btn-outline" onclick="closeModal()">取消</button><button type="button" class="btn btn-primary" onclick="applyCsBatchTags()">确定设置</button></div>`;
  showModal('批量设置客户标签', html);
}

async function applyCsBatchTags() {
  const source = document.getElementById('csbSource').value;
  const category = document.getElementById('csbCategory').value;
  const profile = document.getElementById('csbProfile').value;
  if (!source && !category && !profile) { showToast('请至少选择一个要设置的字段', 'error'); return; }
  if (!confirm('确定将所选 ' + csSelectedKeys.size + ' 组客户的标签设置应用到全部明细？')) return;
  let total = 0;
  try {
    for (const key of [...csSelectedKeys]) {
      const parts = key.split('|');
      if (parts.length < 3) continue;
      const [dm, sp, cust] = parts;
      const patch = {};
      if (source) patch.customerSource = (source === '__clear__' ? '' : source);
      if (category) patch.category = (category === '__clear__' ? '' : category);
      if (profile) patch.customerProfile = (profile === '__clear__' ? '' : profile);
      for (const r of cloudData.salesRecords) {
        if (r.docMonth === dm && r.salesperson === sp && (r.customer || '') === cust) {
          if (source) r.customerSource = (source === '__clear__' ? '' : source);
          if (category) r.category = (category === '__clear__' ? '' : category);
          if (profile) r.customerProfile = (profile === '__clear__' ? '' : profile);
          if (r.id) { await apiUpdate('salesRecords', r.id, patch); total++; }
        }
      }
    }
    saveReportsCache();
    closeModal();
    csSelectedKeys.clear();
    renderCustomerSummary();
    if (salesBoardTab === 'source') renderSalesBoardSource();
    if (salesBoardTab === 'profile') renderSalesBoardProfile();
    showToast('已批量设置（' + total + ' 条明细）', 'success');
  } catch (e) { showToast('批量设置失败：' + e.message, 'error', 4000); }
}

function csExportCustomerSummary() {
  if (!csAllRows.length) { showToast('当前无数据可导出', 'error'); return; }
  if (typeof XLSX === 'undefined') { showToast('表格组件未加载，请刷新页面', 'error'); return; }
  const headers = ['年/月', '销售员', '客户', '折后总金额', '销售员所属门店', '客户来源', '品类', '客户画像'];
  const aoa = [headers];
  csAllRows.forEach(g => { aoa.push([g.docMonth, g.salesperson, g.customer, g.amount, g.team, g.customerSource, g.category, g.customerProfile]); });
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '客户汇总');
  const year = document.getElementById('csYear').value;
  const monthLabel = csMonths.length ? ('_' + csMonths.map(m => (parseInt(m, 10)) + '月').join('')) : '';
  const fname = '客户汇总_' + year + monthLabel + '.xlsx';
  XLSX.writeFile(wb, fname);
  showToast('已导出 ' + csAllRows.length + ' 条（筛选结果）', 'success');
}

function sbSortBy(col, tid) {
  const cur = sbSortState[tid] || {};
  if (cur.col === col) { cur.dir = cur.dir === 'asc' ? 'desc' : 'asc'; }
  else { cur.col = col; cur.dir = 'desc'; }
  sbSortState[tid] = cur;
  renderSalesBoards();
}

function renderSalesBoardTable(tid, key) {
  const st = sbSortState[tid] || {};
  const sbSortCol = st.col || null;
  const sbSortDir = st.dir || 'desc';
  const months = sbMonthList();
  const map = {};
  cloudData.salesRecords.forEach(r => {
    const dm = r.docMonth || '';
    if (!months.includes(dm)) return;
    const k = r[key] || '(未分类)';
    if (!map[k]) map[k] = {};
    map[k][dm] = (map[k][dm] || 0) + toNum(r.amount);
  });
  let rowsArr = Object.keys(map).map(k => {
    const row = { k };
    let t = 0;
    months.forEach(m => { row[m] = map[k][m] || 0; t += row[m]; });
    row.t = t;
    return row;
  });
  if (sbSortCol) {
    rowsArr.sort((a, b) => {
      const va = sbSortCol === 'total' ? a.t : (a[sbSortCol] || 0);
      const vb = sbSortCol === 'total' ? b.t : (b[sbSortCol] || 0);
      return sbSortDir === 'asc' ? va - vb : vb - va;
    });
  } else {
    rowsArr.sort((a, b) => b.t - a.t);
  }
  const userMap = key === 'salesperson' ? buildUserStatusMap() : null;
  const sbYearVal = document.getElementById('sbYear') ? document.getElementById('sbYear').value : '';
  const teamTargets = (key === 'team' && cloudData.formConfig.teamTargets && cloudData.formConfig.teamTargets[sbYearVal]) || {};
  let h = '<thead><tr><th>' + (key === 'salesperson' ? '销售员' : '团队/门店') + '</th>';
  months.forEach(m => {
    const ind = sbSortCol === m ? (sbSortDir === 'asc' ? '▲' : '▼') : '↕';
    const act = sbSortCol === m ? ' active' : '';
    h += `<th class="num sort-th${act}" onclick="sbSortBy('${m}', '${tid}')">${m.slice(5)}月<span class="sort-ind${act}">${ind}</span></th>`;
  });
  const totInd = sbSortCol === 'total' ? (sbSortDir === 'asc' ? '▲' : '▼') : '↕';
  const totAct = sbSortCol === 'total' ? ' active' : '';
  h += `<th class="num sort-th${totAct}" onclick="sbSortBy('total', '${tid}')">合计<span class="sort-ind${totAct}">${totInd}</span></th></tr></thead><tbody>`;
  const colTot = {};
  rowsArr.forEach(row => {
    const label = key === 'team' ? `<span class="badge badge-team">${esc(row.k)}</span>` : (esc(row.k) + userStatusBadge(row.k, userMap));
    h += `<tr><td>${label}</td>`;
    months.forEach(m => {
      const v = map[row.k][m] || 0;
      colTot[m] = (colTot[m] || 0) + v;
      let cell = `<td class="num">${fmtSalesMoney(v)}`;
      if (key === 'team') {
        const lyv = (sbLastYearTeamMap[row.k] && sbLastYearTeamMap[row.k][lyMonth(m)]) ? sbLastYearTeamMap[row.k][lyMonth(m)] : 0;
        if (lyv > 0) {
          const g = (v - lyv) / lyv * 100;
          cell += `<div class="${g >= 0 ? 'yoy-pos' : 'yoy-neg'}" style="white-space:nowrap">${g >= 0 ? '+' : ''}${g.toFixed(1)}% 同比</div>`;
        } else {
          cell += `<div class="yoy-none" style="white-space:nowrap">— 同比</div>`;
        }
        const tgt = (teamTargets[row.k] && teamTargets[row.k][m.slice(5)]) || 0;
        if (tgt > 0) {
          const rate = v / tgt * 100;
          cell += `<div style="font-size:11px;margin-top:2px;font-weight:600;color:${rate >= 100 ? 'var(--danger)' : 'var(--gray-500)'}">完成 ${rate.toFixed(1)}%</div>`;
        } else {
          cell += `<div class="yoy-none">目标未设</div>`;
        }
      }
      cell += `</td>`;
      h += cell;
    });
    if (key === 'team') {
      let rowTgt = 0;
      months.forEach(m => { rowTgt += (teamTargets[row.k] && teamTargets[row.k][m.slice(5)]) || 0; });
      let totCell = fmtSalesMoney(row.t);
      if (rowTgt > 0) {
        const rr = row.t / rowTgt * 100;
        totCell += `<div style="font-size:11px;margin-top:2px;font-weight:600;color:${rr >= 100 ? 'var(--danger)' : 'var(--gray-500)'}">目标 ${fmtSalesMoney(rowTgt)} · 完成 ${rr.toFixed(1)}%</div>`;
      } else {
        totCell += `<div class="yoy-none">目标未设</div>`;
      }
      h += `<td class="num">${totCell}</td></tr>`;
    } else {
      h += `<td class="num">${fmtSalesMoney(row.t)}</td></tr>`;
    }
  });
  h += '</tbody><tfoot><tr class="total-row"><td>合计</td>';
  let gt = 0, gTgt = 0;
  if (key === 'team') { rowsArr.forEach(row => months.forEach(m => { gTgt += (teamTargets[row.k] && teamTargets[row.k][m.slice(5)]) || 0; })); }
  months.forEach(m => { gt += (colTot[m] || 0); h += `<td class="num">${fmtSalesMoney(colTot[m] || 0)}</td>`; });
  let gtCell = fmtSalesMoney(gt);
  if (key === 'team' && gTgt > 0) {
    const gr = gt / gTgt * 100;
    gtCell += `<div style="font-size:11px;margin-top:2px;font-weight:600;color:${gr >= 100 ? 'var(--danger)' : 'var(--gray-500)'}">目标 ${fmtSalesMoney(gTgt)} · 完成 ${gr.toFixed(1)}%</div>`;
  }
  h += `<td class="num">${gtCell}</td></tr></tfoot>`;
  document.getElementById(tid).innerHTML = h;
}

// ===== 团队月目标：设置 / 导入 / 导出 =====
function sbAllTeams(year) {
  const set = new Set();
  cloudData.salesRecords.forEach(r => { if ((r.docMonth || '').slice(0, 4) === year) set.add(r.team || '(未分类)'); });
  const tg = (cloudData.formConfig.teamTargets && cloudData.formConfig.teamTargets[year]) || {};
  Object.keys(tg).forEach(t => set.add(t));
  return [...set].sort((a, b) => a.localeCompare(b, 'zh-CN'));
}

function renderTeamTargetEditor(year) {
  sbTargetDraftYear = year;
  const saved = (cloudData.formConfig.teamTargets && cloudData.formConfig.teamTargets[year]) || {};
  sbTargetDraft = JSON.parse(JSON.stringify(saved));
  const teams = sbAllTeams(year);
  sbTargetTeams = teams;
  const lbl = document.getElementById('tgtYearLbl'); if (lbl) lbl.textContent = year;
  const mm = i => String(i).padStart(2, '0');
  let h = '<thead><tr><th>团队/门店</th>';
  for (let i = 1; i <= 12; i++) h += `<th class="num">${i}月</th>`;
  h += '<th class="num">全年目标</th></tr></thead><tbody>';
  if (!teams.length) {
    h += `<tr><td colspan="14" style="text-align:center;color:var(--gray-400);padding:20px">当前年度暂无团队数据，可先「导入报表」设置目标。</td></tr>`;
  }
  teams.forEach((t, idx) => {
    h += `<tr><td><span class="badge badge-team">${esc(t)}</span></td>`;
    let rt = 0;
    for (let i = 1; i <= 12; i++) {
      const v = (sbTargetDraft[t] && sbTargetDraft[t][mm(i)]) || 0; rt += v;
      h += `<td class="num"><input type="number" class="form-control form-control-sm" style="width:92px;text-align:right;font-size:12px;padding:2px 4px" value="${v || ''}" placeholder="0" onchange="setTeamTargetDraft(${idx},'${mm(i)}',this.value)"></td>`;
    }
    h += `<td class="num" style="font-weight:600"><span id="tgtRowTot_${idx}">${fmtSalesMoney(rt)}</span></td></tr>`;
  });
  h += '</tbody><tfoot><tr class="total-row"><td>合计</td>';
  let gt = 0;
  for (let i = 1; i <= 12; i++) {
    let ct = 0; teams.forEach(t => { ct += (sbTargetDraft[t] && sbTargetDraft[t][mm(i)]) || 0; }); gt += ct;
    h += `<td class="num"><span id="tgtColTot_${mm(i)}">${fmtSalesMoney(ct)}</span></td>`;
  }
  h += `<td class="num"><span id="tgtGrandTot">${fmtSalesMoney(gt)}</span></td></tr></tfoot>`;
  const tbl = document.getElementById('tgtTable'); if (tbl) tbl.innerHTML = h;
}

function setTeamTargetDraft(idx, mm, val) {
  const team = sbTargetTeams[idx]; if (team == null) return;
  const n = parseFloat(String(val).replace(/,/g, '')) || 0;
  if (!sbTargetDraft[team]) sbTargetDraft[team] = {};
  sbTargetDraft[team][mm] = n;
  let rt = 0; for (let i = 1; i <= 12; i++) rt += (sbTargetDraft[team][String(i).padStart(2, '0')]) || 0;
  const rtEl = document.getElementById('tgtRowTot_' + idx); if (rtEl) rtEl.textContent = fmtSalesMoney(rt);
  let ct = 0; sbTargetTeams.forEach(t => { ct += (sbTargetDraft[t] && sbTargetDraft[t][mm]) || 0; });
  const ctEl = document.getElementById('tgtColTot_' + mm); if (ctEl) ctEl.textContent = fmtSalesMoney(ct);
  let gt = 0; sbTargetTeams.forEach(t => { for (let i = 1; i <= 12; i++) gt += (sbTargetDraft[t] && sbTargetDraft[t][String(i).padStart(2, '0')]) || 0; });
  const gEl = document.getElementById('tgtGrandTot'); if (gEl) gEl.textContent = fmtSalesMoney(gt);
}

function toggleTeamTargetPanel() {
  sbTargetPanelOpen = !sbTargetPanelOpen;
  const b = document.getElementById('tgtPanelBody'); if (b) b.style.display = sbTargetPanelOpen ? 'block' : 'none';
  const btn = document.getElementById('tgtToggleBtn'); if (btn) btn.textContent = sbTargetPanelOpen ? '▲ 收起' : '▼ 展开编辑';

function renderSalesBoardTableEff(tid, key) {
  const st = sbSortState[tid] || {};
  const sbSortCol = st.col || null;
  const sbSortDir = st.dir || 'desc';
  const months = sbMonthList();
  const map = {};
  cloudData.salesRecords.forEach(r => {
    const dm = r.docMonth || '';
    if (!months.includes(dm)) return;
    const k = r[key] || '(未分类)';
    if (!map[k]) map[k] = {};
    map[k][dm] = (map[k][dm] || 0) + toNum(r.amount);
  });
  const year = document.getElementById('sbYear') ? document.getElementById('sbYear').value : '';
  const headcount = (key === 'team' && cloudData.formConfig.teamHeadcount && cloudData.formConfig.teamHeadcount[year]) || {};
  let rowsArr = Object.keys(map).map(k => {
    const row = { k };
    let t = 0, hc = 0, sN = 0, sV = 0;
    months.forEach(m => { row[m] = map[k][m] || 0; const hcm = (headcount[k] && headcount[k][m.slice(5)]) || 0; t += row[m]; hc += hcm; if (hcm > 0) { sN++; sV += row[m]; } });
    row.t = t; row.hc = hc; row.staffedN = sN; row.staffedV = sV; row.eff = (hc > 0) ? (t / hc) : 0;
    return row;
  });
  if (sbSortCol) {
    rowsArr.sort((a, b) => {
      const va = sbSortCol === 'total' ? a.t : (sbSortCol === 'total-eff' ? a.eff : (a[sbSortCol] || 0));
      const vb = sbSortCol === 'total' ? b.t : (sbSortCol === 'total-eff' ? b.eff : (b[sbSortCol] || 0));
      return sbSortDir === 'asc' ? va - vb : vb - va;
    });
  } else {
    rowsArr.sort((a, b) => b.t - a.t);
  }
  let h = '<thead><tr><th>团队/门店</th>';
  months.forEach(m => {
    const ind = sbSortCol === m ? (sbSortDir === 'asc' ? '▲' : '▼') : '↕';
    const act = sbSortCol === m ? ' active' : '';
    h += `<th class="num sort-th${act}" onclick="sbSortBy('${m}', '${tid}')">${m.slice(5)}月<span class="sort-ind${act}">${ind}</span></th>`;
  });
  h += '<th class="num">合计</th></tr></thead><tbody>';
  const colTot = {}, colHc = {};
  rowsArr.forEach(row => {
    h += `<tr><td><span class="badge badge-team">${esc(row.k)}</span></td>`;
    months.forEach(m => {
      const v = map[row.k][m] || 0;
      const hc = (headcount[row.k] && headcount[row.k][m.slice(5)]) || 0;
      const eff = hc > 0 ? (v / hc) : 0;
      colTot[m] = (colTot[m] || 0) + v; colHc[m] = (colHc[m] || 0) + hc;
      let cell = `<td class="num" style="white-space:nowrap">${fmtSalesMoney(v)}`;
      cell += `<div style="font-size:11px;margin-top:2px;color:var(--gray-500);white-space:nowrap">人数 ${hc || '—'}</div>`;
      cell += `<div style="font-size:11px;font-weight:600;white-space:nowrap">人效 ${hc > 0 ? fmtSalesMoney(eff) : '—'}</div>`;
      cell += `</td>`;
      h += cell;
    });
    const avgHc = row.staffedN > 0 ? (row.hc / row.staffedN) : 0;
    const avgEff = row.hc > 0 ? (row.staffedV / row.hc) : 0;
    h += `<td class="num" style="white-space:nowrap"><div style="font-size:11px;color:var(--gray-500)">平均月人数 ${row.staffedN > 0 ? avgHc.toFixed(1) : '—'}</div><div style="font-size:11px;font-weight:600">平均月人效 ${row.hc > 0 ? fmtSalesMoney(avgEff) : '—'}</div></td>`;
    h += '</tr>';
  });
  h += '</tbody><tfoot><tr class="total-row"><td>合计</td>';
  let gHc = 0, gV = 0, gSN = 0;
  months.forEach(m => {
    const cm = colHc[m] || 0, vm = colTot[m] || 0;
    gHc += cm;
    if (cm > 0) { gSN++; gV += vm; }
    const me = (cm > 0) ? (vm / cm) : 0;

  });

// 自动评定级别：根据滚动业绩对照评级标准（升级业绩分档 + 降级业绩保底）
function autoGrade(amount, levels) {
  if (!levels || !levels.length) return '';
  const sorted = [...levels].sort((a, b) => (a.promote || 0) - (b.promote || 0));
  let best = sorted[0];
  sorted.forEach(lv => { if (amount >= (lv.promote || 0)) best = lv; });
  const idx = sorted.indexOf(best);
  if (idx > 0 && amount < (best.demote || 0)) best = sorted[idx - 1];
  return best.name;
}
// 职级在「按 promote 阈值排序」后的名次（与评级标准配置顺序无关，手动改职级也能正确比较升降）
function gradeRankIndex(name, levels) {
  if (!levels || !levels.length) return 0;
  const sorted = [...levels].sort((a, b) => (a.promote || 0) - (b.promote || 0));
  const idx = sorted.findIndex(l => l.name === name);
  return idx >= 0 ? idx : 0;
}

  const cfg = (cloudData.formConfig && cloudData.formConfig.m0GradeConfig) || [];
  if (!grade) return '持平';
  const curIdx = cfg.findIndex(l => l && l.name === grade);
  if (curIdx < 0) return '持平';
  let prev = '';
  if (m > 1) {
    const prevRec = (cloudData.m0Records && cloudData.m0Records[m0Key(year, m0, m - 1)]) || {};
    prev = prevRec.grade || '';
  }
  if (!prev) return '持平';
  const prevIdx = cfg.findIndex(l => l && l.name === prev);
  if (prevIdx < 0) return '持平';
  if (curIdx > prevIdx) return '升级';
  if (curIdx < prevIdx) return '降级';
  return '持平';
}

function buildAllSalesBase(year) {
  const base = {}; const spSet = new Set();
  (cloudData.salesRecords || []).forEach(r => {
    const dm = r.docMonth || '';
    if (dm.slice(0, 4) !== year) return;
    const sp = (r.salesperson || '').trim();
    if (!sp) return;
    const m = parseInt(dm.slice(5, 7), 10);
    if (!(m >= 1 && m <= 12)) return;
    if (!base[sp]) base[sp] = {};

function m0GroupAmount(base, g, m) {
  const names = [g.m0].concat(g.members || []);
  const seen = {}; let s = 0;
  names.forEach(n => {
    if (!n) return;
    if (seen[n]) return; seen[n] = 1;
    s += (base[n] && base[n][m]) || 0;
  });
  return s;
}

function perfKey(year, sp, m) { return year + '_' + String(sp).replace(/[.#$\[\]/]/g, '_') + '_' + m; }
function mgrKey(year, mgr, m) { return year + '_' + String(mgr).replace(/[.#$\[\]/]/g, '_') + '_' + m; }

function normalizePerfConfig(cfg) {
  if (!cfg || typeof cfg !== 'object') return { items: [], bonus: [], totalCapAt100: true, totalCap: 100 };
  if (Array.isArray(cfg.items)) {
    if (cfg.totalCapAt100 === undefined) cfg.totalCapAt100 = true;
    if (cfg.totalCap === undefined) cfg.totalCap = 100;
    if (!Array.isArray(cfg.bonus)) cfg.bonus = [];
    return cfg;
  }
  // 旧结构（weights/targets/bonusList）迁移到新结构（items/bonus）
  const w = cfg.weights || {}, t = cfg.targets || {};
  const items = [
    { key: 'demo', name: '演示考核', type: 'auto-demo', enabled: true, weight: w.demo || 0, standard: t.demo || 0, text: '完成自拓演示', capAt100: true },
    { key: 'effective', name: '有效建联', type: 'manual', enabled: true, weight: w.effective || 0, standard: t.effective || 0, text: '有效建联', capAt100: true },
    { key: 'channel', name: '渠道', type: 'manual', enabled: true, weight: w.channel || 0, standard: t.channel || 0, text: '渠道拓展', capAt100: true },
    { key: 'newMedia', name: '新媒体', type: 'manual', enabled: true, weight: w.newMedia || 0, standard: t.newMedia || 0, text: '新媒体运营', capAt100: true }
  ];
  const bonus = (cfg.bonusList || []).map(b => ({ key: b.key, name: b.name, points: b.points, text: '', enabled: true, capAt100: false }));
  cfg.items = items;
  cfg.bonus = bonus;
  if (cfg.totalCapAt100 === undefined) cfg.totalCapAt100 = true;
  delete cfg.weights; delete cfg.targets; delete cfg.bonusList;
  return cfg;
}

function getPerfConfig() {
  return normalizePerfConfig((cloudData.formConfig && cloudData.formConfig.performanceConfig) || JSON.parse(JSON.stringify(DEFAULT_FORM_CONFIG.performanceConfig)));
}

function getPerfBase(level) {
  const map = (cloudData.formConfig && cloudData.formConfig.performanceBase) || {};
  return map[level] || 0;
}

function buildSalesBaseForYear(year) {
  const base = {};
  (cloudData.salesRecords || []).forEach(r => {
    const dm = r.docMonth || '';
    if (dm.slice(0, 4) !== String(year)) return;
    const sp = (r.salesperson || '').trim();
    if (!sp) return;
    const m = parseInt(dm.slice(5, 7), 10);
    if (!(m >= 1 && m <= 12)) return;
    if (!base[sp]) base[sp] = {};
    base[sp][m] = (base[sp][m] || 0) + toNum(r.amount);
  });
  return base;
}

function getSalesLevel(year, sp, m, baseMap) {
  const bm = baseMap || buildSalesBaseForYear(year);
  const b = bm[sp] || {};
  let roll = 0;
  for (let k = Math.max(1, m - 2); k <= m; k++) roll += (b[k] || 0);
  const levels = (cloudData.formConfig && cloudData.formConfig.gradeConfig) || [];
  const rec = (cloudData.gradeRecords && cloudData.gradeRecords[gradeKey(year, sp, m)]) || {};
  return rec.grade || autoGrade(roll, levels);
}

function getSalesTeam(sp) {
  const u = (cloudData.users || []).find(x => x.name === sp);
  if (u && u.department) return u.department;
  const teams = (cloudData.salesRecords || []).filter(r => (r.salesperson || '').trim() === sp).map(r => r.team).filter(Boolean);
  return teams[0] || '';
}

function countSelfDemo(year, month, sp) {
  // 取值来源：拜访统计-个人拜访类型统计-签到事件归类汇总（自拓演示归类）
  // 匹配归类名「同时」包含「自拓」与「演示」的归类（即「自拓演示」，排除「线索演示」等）
  const cats = (cloudData.formConfig.signinCategories || []).filter(c => c.name && c.name.indexOf('自拓') >= 0 && c.name.indexOf('演示') >= 0);
  const events = new Set();
  cats.forEach(c => (c.events || []).forEach(e => events.add(e)));
  // 兜底：若未配置归类，则取签到事件中名称含「自拓」或「演示」的项
  if (!events.size) {
    (cloudData.formConfig.signinEvents || []).forEach(e => {
      if (e && (e.indexOf('自拓') >= 0 || e.indexOf('演示') >= 0)) events.add(e);
    });
  }
  if (!events.size) return 0;
  let count = 0;
  const ym = String(year) + String(month).padStart(2, '0');
  (cloudData.visitRecords || []).forEach(r => {
    const emp = (r.employee || r.salesperson || '').trim();   // 拜访记录员工字段为 employee
    if (emp !== (sp || '').trim()) return;
    const vd = (r.contactTime || '').replace(/\D/g, '').slice(0, 6);  // 拜访记录用 contactTime（兼容 - 与 / 分隔）
    if (vd !== ym) return;
    if (events.has(r.signinEvent)) count++;
  });
  return count;
}

function getPerfRecord(year, sp, m) {
  const cfg = getPerfConfig();
  const k = perfKey(year, sp, m);
  const stored = (cloudData.performanceRecords && cloudData.performanceRecords[k]) || {};
  const defaults = { workingDays: 30, comment: '', finalScore: null };
  (cfg.items || []).forEach(it => {
    // 注意：standard_<ik> 不在此预填默认值——若预填，manualSet/manualStd 判断会恒为真，
    // 导致"要求"列与评分永远不按在职天数折算（详见 perfProrationRatio / computePerfScore）。
    // 未手动覆盖时由 it.standard 兜底（在 perfRowDisplay / computePerfScore 内按 ratio 折算）。
    defaults['actual_' + it.key] = 0;
    defaults['manual_' + it.key] = false;
    defaults['text_' + it.key] = it.text || '';
  });
  (cfg.bonus || []).forEach(b => { defaults['bonus_' + b.key] = 0; });
  return Object.assign({}, defaults, stored);
}

// 取某考核项的实际完成值：auto-demo 类型默认取自拓演示汇总；auto-team 类型默认取当月团队业绩总和；两者均支持手动覆盖
function getPerfItemActual(item, rec, year, sp, month) {
  if (item.type === 'auto-demo') {
    if (rec['manual_' + item.key]) return parseFloat(rec['actual_' + item.key]) || 0;
    return countSelfDemo(year, month, sp);
  }
  if (item.type === 'auto-team') {
    if (rec['manual_' + item.key]) return parseFloat(rec['actual_' + item.key]) || 0;
    return teamPerfSum(year, sp, month);
  }
  return parseFloat(rec['actual_' + item.key]) || 0;
}
// 管理者团队（取该人员所属团队/门店，与团队月目标、团队业绩统计同一口径）
function teamTargetFor(year, sp, month) {
  const team = getSalesTeam(sp);
  if (!team) return 0;
  const mm = String(month).padStart(2, '0');
  return (((cloudData.formConfig.teamTargets || {})[year] || {})[team] || {})[mm] || 0;
}
// 当月团队业绩总和（该团队所有销售员在指定年月的业绩金额合计）
function teamPerfSum(year, sp, month) {
  const team = getSalesTeam(sp);
  if (!team) return 0;
  const ym = String(year) + '-' + String(month).padStart(2, '0');
  let s = 0;
  (cloudData.salesRecords || []).forEach(r => {
    if ((r.team || '').trim() !== team) return;
    if ((r.docMonth || '') !== ym) return;
    s += toNum(r.amount);
  });
  return s;
}
// 管理绩效配置迁移：将已有的手动「业绩」考核项升级为自动(团队目标/团队业绩)类型，仅执行一次
function migrateMgrPerfConfig() {
  const cfg = cloudData.formConfig && cloudData.formConfig.mgrPerformanceConfig;
  if (!cfg || !Array.isArray(cfg.items)) return;
  if (cfg.migratedAutoTeam) return;
  if (cfg.items.some(it => it.type === 'auto-team')) { cfg.migratedAutoTeam = true; return; }
  const target = cfg.items.find(it => (it.name || '').indexOf('业绩') >= 0 && it.type === 'manual');
  if (target) {
    target.type = 'auto-team';
    if (!target.weight) target.weight = 70;
    target.standard = 0;
    target.text = target.text || '团队业绩目标完成';
    cfg.migratedAutoTeam = true;
  }
}

// 绩效评分颜色：<60 红；60-90 黄；>=90 绿
function scoreColor(v) {
  if (v < 60) return '#dc2626';
  if (v < 90) return '#d97706';
  return '#16a34a';
}

// 最终评分：若手动设置了 finalScore 则用其值，否则用公式计算
function getFinalScore(rec, cfg, year, sp, month) {
  if (rec.finalScore !== undefined && rec.finalScore !== null && rec.finalScore !== '' && !isNaN(parseFloat(rec.finalScore))) {
    return parseFloat(rec.finalScore);
  }
  return computePerfScore(rec, cfg, year, sp, month).score;
}

// 在职天数折算比：仅当月在岗不足 30 天才折算（目标与评分同向折算，避免月中入职被整月目标惩罚）
function perfProrationRatio(rec) {
  const wd = parseInt(rec && rec.workingDays, 10);
  if (isNaN(wd) || wd >= 30) return 1;
  return wd / 30;
}

function computePerfScore(rec, cfg, year, sp, month) {
  const cfgN = normalizePerfConfig(cfg);
  const itemScores = {};
  let total = 0;
  (cfgN.items || []).filter(it => it.enabled).forEach(it => {
    const standard = parseFloat(rec['standard_' + it.key]);
    const manualSet = !isNaN(standard) && standard !== 0;
    const stdFull = manualSet ? standard : (it.type === 'auto-team' ? teamTargetFor(year, sp, month) : (it.standard || 0));
    // 目标按在职天数折算（仅不足 30 天且未手动设定目标时），避免月中入职被整月目标惩罚
    const std = manualSet ? stdFull : stdFull * perfProrationRatio(rec);
    const actual = getPerfItemActual(it, rec, year, sp, month);
    let raw = std ? (actual / std) * 100 : 0;
    const itemCap = (it.cap !== undefined && it.cap !== null && it.cap !== '' && Number(it.cap) > 0) ? Number(it.cap) : (it.capAt100 ? 100 : 0);
    if (itemCap > 0) raw = Math.min(itemCap, raw);
    const weighted = raw * (it.weight || 0) / 100;
    itemScores[it.key] = { actual, standard: std, raw, weighted };
    total += weighted;
  });
  const bonusScores = {};
  let bonus = 0;
  (cfgN.bonus || []).filter(b => b.enabled).forEach(b => {
    const cnt = parseFloat(rec['bonus_' + b.key]) || 0;
    let pts = cnt * (b.points || 0);
    const bonusCap = (b.cap !== undefined && b.cap !== null && b.cap !== '' && Number(b.cap) > 0) ? Number(b.cap) : (b.capAt100 ? 100 : 0);
    if (bonusCap > 0) pts = Math.min(bonusCap, pts);
    bonusScores[b.key] = { cnt, pts };
    bonus += pts;
  });
  let score = total + bonus;
  if (cfgN.totalCapAt100) score = Math.min((cfgN.totalCap || 100), score);
  return { itemScores, bonusScores, total, bonus, score };
}

function savePerfByKey(key, patch) {
  if (!cloudData.performanceRecords) cloudData.performanceRecords = {};
  cloudData.performanceRecords[key] = Object.assign({}, cloudData.performanceRecords[key] || {}, patch);
  if (perfTab === 'single') refreshPerfSingle();
  apiUpdate('performanceRecords', key, cloudData.performanceRecords[key]).catch(e => showToast('保存绩效数据失败: ' + e.message, 'error'));
}

// 批量设置单月绩效看板某考核项的「要求(考核标准)」：对所有在职销售一次性统一设值，跳过已冻结快照的行
function batchSetPerfStandard(ik) {
  const cfg = getPerfConfig();
  const it = (cfg.items || []).find(x => x.key === ik);
  const itemName = it ? it.name : ik;
  const year = perfYear;
  const month = perfSingleMonth;
  const v = prompt('将所有在职销售「' + itemName + '」的要求(考核标准)统一设置为：', '');
  if (v === null) return;
  const num = parseFloat(v);
  if (isNaN(num)) { showToast('请输入有效数字', 'error'); return; }
  const statusMap = buildUserStatusMap();
  const records = cloudData.salesRecords || [];
  const spSet = new Set();
  records.forEach(r => { const dm = r.docMonth || ''; if (dm.slice(0, 4) !== year) return; const sp = (r.salesperson || '').trim(); if (!sp) return; if (statusMap[sp] !== '在职') return; spSet.add(sp); });
  if (!cloudData.performanceRecords) cloudData.performanceRecords = {};
  let n = 0, skipped = 0;
  [...spSet].filter(perfFilterSp).forEach(sp => {
    if (perfViewSnapshot && getPerfSnapshot(year, sp, month)) { skipped++; return; }
    const k = perfKey(year, sp, month);
    cloudData.performanceRecords[k] = Object.assign({}, cloudData.performanceRecords[k] || {}, { ['standard_' + ik]: num });
    apiUpdate('performanceRecords', k, cloudData.performanceRecords[k]).catch(function () {});
    n++;
  });
  refreshPerfSingle();
  showToast('已为 ' + n + ' 名销售批量设置「' + itemName + '」要求为 ' + num + (skipped ? '（跳过 ' + skipped + ' 名已冻结快照）' : ''), 'success');
}

// ===== 最终保存快照（冻结，独立于表单配置修改）=====
function getPerfSnapshot(year, sp, month) {
  if (!cloudData.performanceSnapshots) return null;
  return cloudData.performanceSnapshots[perfKey(year, sp, month)] || null;
}

// 构建单行「显示数据」：实时计算 或 冻结快照
function perfRowDisplay(year, sp, month, cfg, baseMap, snap) {
  if (snap) {
    const items = (cfg.items || []).filter(it => it.enabled).map(it => {
      const si = snap.items[it.key] || {};
      return { it, actual: si.actual || 0, standard: (si.standard !== undefined ? si.standard : (it.standard || 0)), score: si.score || 0, text: si.text || '', frozen: true, isAuto: it.type === 'auto-demo' };
    });
    const bonus = (cfg.bonus || []).filter(b => b.enabled).map(b => ({ b, cnt: (snap.bonus[b.key] || {}).cnt || 0, frozen: true }));
    return { level: snap.level || '', base: snap.base || 0, workingDays: snap.workingDays || 30, comment: snap.comment || '', finalScore: snap.finalScore, computedScore: snap.computedScore, items, bonus, frozen: true };
  }
  const rec = getPerfRecord(year, sp, month);
  const scores = computePerfScore(rec, cfg, year, sp, month);
  const level = getSalesLevel(year, sp, month, baseMap);
  const base = getPerfBase(level) * (rec.workingDays || 30) / 30;
  const items = (cfg.items || []).filter(it => it.enabled).map(it => {
    const ik = it.key;
    const isAuto = it.type === 'auto-demo';
    const manual = rec['manual_' + ik];
    const actual = isAuto ? (manual ? (parseFloat(rec['actual_' + ik]) || 0) : countSelfDemo(year, month, sp)) : (parseFloat(rec['actual_' + ik]) || 0);
    const manualStd = (rec['standard_' + ik] !== undefined && rec['standard_' + ik] !== '');
    const stdRaw = manualStd ? rec['standard_' + ik] : (it.standard || 0);
    const std = manualStd ? stdRaw : stdRaw * perfProrationRatio(rec);
    const txt = (rec['text_' + ik] !== undefined && rec['text_' + ik] !== '') ? rec['text_' + ik] : (it.text || '');
    return { it, actual, standard: std, score: (scores.itemScores[ik] || {}).raw || 0, text: txt, frozen: false, isAuto, manual };
  });
  const bonus = (cfg.bonus || []).filter(b => b.enabled).map(b => ({ b, cnt: parseFloat(rec['bonus_' + b.key]) || 0, frozen: false }));
  return { level, base, workingDays: rec.workingDays || 30, comment: rec.comment || '', finalScore: getFinalScore(rec, cfg, year, sp, month), computedScore: scores.score, items, bonus, frozen: false };
}

function savePerfSnapshot() {
  const year = document.getElementById('perfYear') ? document.getElementById('perfYear').value : perfYear;
  const month = document.getElementById('perfMonth') ? parseInt(document.getElementById('perfMonth').value, 10) : perfSingleMonth;
  if (!confirm('确定将「' + year + ' 年 ' + month + ' 月」所有在职销售的绩效数据【最终保存】？\n保存后将生成本月快照（冻结），不受后续表单配置修改影响，可再次保存覆盖。')) return;
  const statusMap = buildUserStatusMap();
  const records = cloudData.salesRecords || [];
  const cfg = getPerfConfig();
  const baseMap = buildSalesBaseForYear(year);
  const spSet = new Set();
  records.forEach(r => {
    const dm = r.docMonth || '';
    if (dm.slice(0, 4) !== year) return;
    const sp = (r.salesperson || '').trim();
    if (!sp) return;
    if (statusMap[sp] !== '在职') return;
    spSet.add(sp);
  });
  if (!cloudData.performanceSnapshots) cloudData.performanceSnapshots = {};
  let n = 0;
  [...spSet].sort((a, b) => a.localeCompare(b, 'zh')).forEach(sp => {
    const rec = getPerfRecord(year, sp, month);
    const scores = computePerfScore(rec, cfg, year, sp, month);
    const level = getSalesLevel(year, sp, month, baseMap);
    const base = getPerfBase(level) * (rec.workingDays || 30) / 30;
    const snap = {
      year: String(year), sp, month,
      level: level || '',
      finalScore: getFinalScore(rec, cfg, year, sp, month),
      computedScore: scores.score,
      workingDays: rec.workingDays || 30,
      comment: rec.comment || '',
      base: base,
      items: {}, bonus: {},
      snapshotAt: new Date().toISOString(),
      snapshotBy: (currentUser && currentUser.name) || ''
    };
    (cfg.items || []).filter(it => it.enabled).forEach(it => {
      const ik = it.key;
      const actual = getPerfItemActual(it, rec, year, sp, month);
      const manualStd = (rec['standard_' + ik] !== undefined && rec['standard_' + ik] !== '');
      const stdRaw = manualStd ? rec['standard_' + ik] : (it.standard || 0);
      const std = manualStd ? stdRaw : stdRaw * perfProrationRatio(rec);
      const raw = (scores.itemScores[ik] || {}).raw || 0;
      snap.items[ik] = { name: it.name, actual, standard: std, score: raw, text: (rec['text_' + ik] || it.text || '') };
    });
    (cfg.bonus || []).filter(b => b.enabled).forEach(b => {
      snap.bonus[b.key] = { name: b.name, cnt: parseFloat(rec['bonus_' + b.key]) || 0 };
    });
    const k = perfKey(year, sp, month);
    cloudData.performanceSnapshots[k] = snap;
    apiUpdate('performanceSnapshots', k, snap).catch(e => showToast('保存快照失败: ' + e.message, 'error'));
    n++;
  });
  showToast('已最终保存 ' + n + ' 名销售的绩效快照（' + year + ' 年 ' + month + ' 月）', 'success');
  if (perfViewSnapshot) refreshPerfSingle();
}

function perfTeamOptions(year) {
  const teams = new Set();
  (cloudData.salesRecords || []).forEach(r => {
    if ((r.docMonth || '').slice(0, 4) !== year) return;
    const sp = (r.salesperson || '').trim();
    if (!sp) return;
    const t = r.team || getSalesTeam(sp);
    if (t) teams.add(t);
  });
  (cloudData.users || []).forEach(u => { if (u.department) teams.add(u.department); });
  return [...teams].sort((a, b) => a.localeCompare(b, 'zh')).map(t => `<option value="${esc(t)}" ${t === perfTeamFilter ? 'selected' : ''}>${esc(t)}</option>`).join('');
}
function perfTeamFilterChange(val) { perfTeamFilter = val; perfRefresh(); }
function perfSortChange(val) { perfSortBy = val; perfRefresh(); }
function perfPassTeamFilter(sp) {
  if (!perfTeamFilter) return true;
  return (getSalesTeam(sp) || '') === perfTeamFilter;
}

  return (!perfSpFilter.length || perfSpFilter.indexOf(sp) >= 0) && perfPassTeamFilter(sp);

function refreshPerfMatrix() {

  perfYear = year;
  if (perfMonthFrom > perfMonthTo) perfMonthFrom = perfMonthTo;

    h += `<tr><td>${esc(row.sp)}${userStatusBadge(row.sp, statusMap)}</td><td>${esc(row.team) || '-'}</td>`;
    months.forEach(m => {
      const level = getSalesLevel(year, row.sp, m, baseMap);
      const rec = getPerfRecord(year, row.sp, m);
      const score = getFinalScore(rec, cfg, year, row.sp, m);
      h += `<td class="num" style="text-align:center"><div>${level || '—'}</div><div style="color:${scoreColor(score)};font-weight:700">${score.toFixed(2)}</div></td>`;

  h += '</tbody>';
  const tbl = document.getElementById('perfTable');
  if (tbl) tbl.innerHTML = h;
}

// ================= M0 绩效看板（参考绩效看板矩阵 / 销售单月绩效看板）=================
function m0SpActiveList() {
  const groups = (cloudData.formConfig.m0Config && cloudData.formConfig.m0Config.groups) || [];
  const set = [];
  groups.forEach(g => { const m0 = (g && g.m0 || '').trim(); if (m0 && set.indexOf(m0) < 0) set.push(m0); });
  return set;
}
function getM0PerfConfig() {
  return normalizePerfConfig((cloudData.formConfig && cloudData.formConfig.m0PerformanceConfig) || JSON.parse(JSON.stringify(DEFAULT_FORM_CONFIG.m0PerformanceConfig)));
}
function getM0PerfRecord(year, m0, m) {
  const cfg = getM0PerfConfig();
  const k = m0Key(year, m0, m);
  const stored = (cloudData.m0PerformanceRecords && cloudData.m0PerformanceRecords[k]) || {};
  const defaults = { workingDays: 30, comment: '', finalScore: null };
  (cfg.items || []).forEach(it => {
    defaults['actual_' + it.key] = 0;
    defaults['manual_' + it.key] = false;
    defaults['text_' + it.key] = it.text || '';
  });
  (cfg.bonus || []).forEach(b => { defaults['bonus_' + b.key] = 0; });
  return Object.assign({}, defaults, stored);
}
function getM0PerfSnapshot(year, m0, month) {
  if (!cloudData.m0PerformanceSnapshots) return null;
  return cloudData.m0PerformanceSnapshots[m0Key(year, m0, month)] || null;
}
function m0PerfRowDisplay(year, m0, month, cfg, snap) {
  if (snap) {
    const items = (cfg.items || []).filter(it => it.enabled).map(it => {
      const si = snap.items[it.key] || {};
      return { it, actual: si.actual || 0, standard: (si.standard !== undefined ? si.standard : (it.standard || 0)), score: si.score || 0, text: si.text || '', frozen: true, isAuto: (it.type === 'auto-demo' || it.type === 'auto-team') };
    });
    const bonus = (cfg.bonus || []).filter(b => b.enabled).map(b => ({ b, cnt: (snap.bonus[b.key] || {}).cnt || 0, frozen: true }));
    return { level: snap.level || '', base: snap.base || 0, workingDays: snap.workingDays || 30, comment: snap.comment || '', finalScore: snap.finalScore, computedScore: snap.computedScore, items, bonus, frozen: true };
  }
  const rec = getM0PerfRecord(year, m0, month);
  const scores = computePerfScore(rec, cfg, year, m0, month);
  const gradeRec = (cloudData.m0Records && cloudData.m0Records[m0Key(year, m0, month)]) || {};
  const level = gradeRec.grade || '';
  const base = getPerfBase(level) * (rec.workingDays || 30) / 30;
  const items = (cfg.items || []).filter(it => it.enabled).map(it => {
    const ik = it.key;
    const manual = rec['manual_' + ik];
    const actual = parseFloat(rec['actual_' + ik]) || 0;
    const manualStd = (rec['standard_' + ik] !== undefined && rec['standard_' + ik] !== '');
    const stdRaw = manualStd ? rec['standard_' + ik] : (it.standard || 0);
    const std = manualStd ? stdRaw : stdRaw * perfProrationRatio(rec);
    const txt = (rec['text_' + ik] !== undefined && rec['text_' + ik] !== '') ? rec['text_' + ik] : (it.text || '');
    return { it, actual, standard: std, score: (scores.itemScores[ik] || {}).raw || 0, text: txt, frozen: false, isAuto: false, manual };
  });
  const bonus = (cfg.bonus || []).filter(b => b.enabled).map(b => ({ b, cnt: parseFloat(rec['bonus_' + b.key]) || 0, frozen: false }));
  return { level, base, workingDays: rec.workingDays || 30, comment: rec.comment || '', finalScore: getFinalScore(rec, cfg, year, m0, month), computedScore: scores.score, items, bonus, frozen: false };
}
function saveM0PerfByKey(key, patch) {
  if (!cloudData.m0PerformanceRecords) cloudData.m0PerformanceRecords = {};
  cloudData.m0PerformanceRecords[key] = Object.assign({}, cloudData.m0PerformanceRecords[key] || {}, patch);
  if (m0PerfTab === 'single') refreshM0PerfSingle();
  apiUpdate('m0PerformanceRecords', key, cloudData.m0PerformanceRecords[key]).catch(e => showToast('保存 M0 绩效数据失败: ' + e.message, 'error'));
}
function saveM0PerfSnapshot() {
  const year = document.getElementById('m0PerfYear') ? document.getElementById('m0PerfYear').value : m0PerfYear;
  const month = document.getElementById('m0PerfMonth') ? parseInt(document.getElementById('m0PerfMonth').value, 10) : m0PerfSingleMonth;
  if (!confirm('确定将「' + year + ' 年 ' + month + ' 月」所有 M0 人员的绩效数据【最终保存】？\n保存后将生成本月快照（冻结），不受后续表单配置修改影响，可再次保存覆盖。')) return;
  const cfg = getM0PerfConfig();
  if (!cloudData.m0PerformanceSnapshots) cloudData.m0PerformanceSnapshots = {};
  let n = 0;
  m0SpActiveList().sort((a, b) => a.localeCompare(b, 'zh')).forEach(m0 => {
    const rec = getM0PerfRecord(year, m0, month);
    const scores = computePerfScore(rec, cfg, year, m0, month);
    const gradeRec = (cloudData.m0Records && cloudData.m0Records[m0Key(year, m0, month)]) || {};
    const level = gradeRec.grade || '';
    const base = getPerfBase(level) * (rec.workingDays || 30) / 30;
    const snap = {
      year: String(year), m0, month,
      level: level || '',
      finalScore: getFinalScore(rec, cfg, year, m0, month),
      computedScore: scores.score,
      workingDays: rec.workingDays || 30,
      comment: rec.comment || '',
      base: base,
      items: {}, bonus: {},
      snapshotAt: new Date().toISOString(),
      snapshotBy: (currentUser && currentUser.name) || ''
    };
    (cfg.items || []).filter(it => it.enabled).forEach(it => {
      const ik = it.key;
      const actual = parseFloat(rec['actual_' + ik]) || 0;
      const manualStd = (rec['standard_' + ik] !== undefined && rec['standard_' + ik] !== '');
      const stdRaw = manualStd ? rec['standard_' + ik] : (it.standard || 0);
      const std = manualStd ? stdRaw : stdRaw * perfProrationRatio(rec);
      const raw = (scores.itemScores[ik] || {}).raw || 0;
      snap.items[ik] = { name: it.name, actual, standard: std, score: raw, text: (rec['text_' + ik] || it.text || '') };
    });
    (cfg.bonus || []).filter(b => b.enabled).forEach(b => {
      snap.bonus[b.key] = { name: b.name, cnt: parseFloat(rec['bonus_' + b.key]) || 0 };
    });
    const k = m0Key(year, m0, month);
    cloudData.m0PerformanceSnapshots[k] = snap;
    apiUpdate('m0PerformanceSnapshots', k, snap).catch(e => showToast('保存 M0 快照失败: ' + e.message, 'error'));
    n++;
  });
  showToast('已最终保存 ' + n + ' 名 M0 人员的绩效快照（' + year + ' 年 ' + month + ' 月）', 'success');
  if (m0PerfViewSnapshot) refreshM0PerfSingle();
}

function m0PerfRefresh() {
  if (m0PerfTab === 'single') refreshM0PerfSingle();
  else refreshM0PerfMatrix();
}
function refreshM0PerfMatrix() {
  const year = document.getElementById('m0PerfYear') ? document.getElementById('m0PerfYear').value : m0PerfYear;
  m0PerfYear = year;
  if (m0PerfMonthFrom > m0PerfMonthTo) m0PerfMonthFrom = m0PerfMonthTo;
  const statusMap = buildUserStatusMap();
  const m0List = m0SpActiveList();
  const months = [];
  for (let m = m0PerfMonthFrom; m <= m0PerfMonthTo; m++) months.push(m);
  const cfg = getM0PerfConfig();
  const lastM = months.length ? months[months.length - 1] : m0PerfMonthTo;
  const rows = m0List.filter(m0PerfFilterSp).map(m0 => {
    const rec = getM0PerfRecord(year, m0, lastM);
    const gradeRec = (cloudData.m0Records && cloudData.m0Records[m0Key(year, m0, lastM)]) || {};
    return { m0, team: getSalesTeam(m0) || '', lastScore: getFinalScore(rec, cfg, year, m0, lastM) };
  });
  if (m0PerfSortBy === 'team') rows.sort((a, b) => (a.team || '').localeCompare(b.team || '', 'zh') || a.m0.localeCompare(b.m0, 'zh'));
  else if (m0PerfSortBy === 'score') rows.sort((a, b) => b.lastScore - a.lastScore || a.m0.localeCompare(b.m0, 'zh'));
  else rows.sort((a, b) => a.m0.localeCompare(b.m0, 'zh'));

  let h = '<thead><tr><th>M0人员</th><th>团队</th>';
  months.forEach(m => { h += `<th class="num">${m}月</th>`; });
  h += '</tr></thead><tbody>';
  rows.forEach(row => {
    h += `<tr><td>${esc(row.m0)}${userStatusBadge(row.m0, statusMap)}</td><td>${esc(row.team) || '-'}</td>`;
    months.forEach(m => {
      const gradeRec = (cloudData.m0Records && cloudData.m0Records[m0Key(year, row.m0, m)]) || {};
      const level = gradeRec.grade || '—';
      const rec = getM0PerfRecord(year, row.m0, m);
      const score = getFinalScore(rec, cfg, year, row.m0, m);
      h += `<td class="num" style="text-align:center"><div>${level || '—'}</div><div style="color:${scoreColor(score)};font-weight:700">${score.toFixed(2)}</div></td>`;
    });
    h += '</tr>';
  });
  if (!rows.length) h += `<tr><td colspan="${months.length + 2}" style="text-align:center;color:var(--gray-400);padding:24px">本年度暂无 M0 人员的绩效数据（请先在「销售评级看板 → M0 计算范围」配置 M0 分组）</td></tr>`;
  h += '</tbody>';
  const tbl = document.getElementById('m0PerfTable');
  if (tbl) tbl.innerHTML = h;
}
function refreshM0PerfSingle() {
  const year = document.getElementById('m0PerfYear') ? document.getElementById('m0PerfYear').value : m0PerfYear;
  m0PerfYear = year;
  const month = document.getElementById('m0PerfMonth') ? parseInt(document.getElementById('m0PerfMonth').value, 10) : m0PerfSingleMonth;
  m0PerfSingleMonth = month;
  const statusMap = buildUserStatusMap();
  const m0List = m0SpActiveList();
  const cfg = getM0PerfConfig();
  const items = (cfg.items || []).filter(it => it.enabled);
  const bonusList = (cfg.bonus || []).filter(b => b.enabled);
  const rows = m0List.filter(m0PerfFilterSp).map(m0 => {
    const rec = getM0PerfRecord(year, m0, month);
    return { m0, team: getSalesTeam(m0) || '', score: getFinalScore(rec, cfg, year, m0, month) };
  });
  if (m0PerfSortBy === 'team') rows.sort((a, b) => (a.team || '').localeCompare(b.team || '', 'zh') || a.m0.localeCompare(b.m0, 'zh'));
  else if (m0PerfSortBy === 'score') rows.sort((a, b) => b.score - a.score || a.m0.localeCompare(b.m0, 'zh'));
  else rows.sort((a, b) => a.m0.localeCompare(b.m0, 'zh'));

  let h = '<thead><tr>';
  h += '<th rowspan="2" class="perf-freeze" style="position:sticky;left:0;z-index:3;background:#fff;text-align:left;width:120px;white-space:nowrap">M0人员</th>';
  h += '<th rowspan="2" class="perf-freeze" style="position:sticky;left:120px;z-index:3;background:#fff;text-align:left;width:140px;white-space:nowrap;box-shadow:2px 0 0 0 var(--gray-200)">团队</th>';
  items.forEach(it => {
    h += `<th colspan="3" style="text-align:center;background:#FAEEDA">${esc(it.name)}（${it.weight || 0}%）</th>`;
  });
  if (bonusList.length) h += `<th colspan="${bonusList.length}" style="text-align:center;background:#EAF3DE">加分项</th>`;
  h += '<th rowspan="2" style="text-align:center;width:70px">当月在职天数</th>';
  h += '<th rowspan="2" style="text-align:center;width:80px">当月M0职级</th>';
  h += '<th rowspan="2" style="text-align:center;min-width:150px">总评</th>';
  h += '<th rowspan="2" style="text-align:center;width:100px">绩效评分</th>';
  h += '<th rowspan="2" style="text-align:center;width:80px">绩效基数</th>';
  h += '<th rowspan="2" style="text-align:center;width:90px">绩效奖金</th>';
  h += '</tr><tr>';
  items.forEach(it => {
    h += '<th style="background:#FAEEDA">要求</th>';
    h += `<th style="background:#FAEEDA">${it.type === 'auto-demo' || it.type === 'auto-team' ? '完成(自动)' : '完成'}</th>`;
    h += '<th style="background:#FAEEDA">得分</th>';
  });
  bonusList.forEach(b => { h += `<th style="background:#EAF3DE;white-space:pre-wrap">${esc(b.name)}</th>`; });
  h += '</tr></thead><tbody>';

  rows.forEach(row => {
    const d = m0PerfRowDisplay(year, row.m0, month, cfg, m0PerfViewSnapshot ? getM0PerfSnapshot(year, row.m0, month) : null);
    const k = m0Key(year, row.m0, month);
    const rec0 = cloudData.m0PerformanceRecords[k] || {};
    const isManualScore = (rec0.finalScore !== undefined && rec0.finalScore !== null && rec0.finalScore !== '');
    h += `<tr>`;
    h += `<td class="perf-freeze" style="position:sticky;left:0;z-index:2;background:#fff;white-space:nowrap;width:120px">${esc(row.m0)}${userStatusBadge(row.m0, statusMap)}</td>`;
    h += `<td class="perf-freeze" style="position:sticky;left:120px;z-index:2;background:#fff;white-space:nowrap;width:140px;box-shadow:2px 0 0 0 var(--gray-200)">${esc(row.team)}</td>`;
    d.items.forEach(x => {
      const it = x.it, ik = it.key;
      const stdCell = d.frozen
        ? `<div style="font-size:11px;margin-bottom:2px">${esc(x.text || '')}</div><div style="font-size:11px">要求 ${x.standard}</div>`
        : `<div style="font-size:11px;margin-bottom:2px"><input type="text" class="form-control form-control-sm" value="${esc(x.text || '')}" onchange="saveM0PerfByKey('${k}', {'text_${ik}':this.value})" style="width:96px;font-size:11px" placeholder="描述"></div><input type="number" class="form-control form-control-sm" value="${x.standard}" onchange="saveM0PerfByKey('${k}', {'standard_${ik}':parseFloat(this.value)||0})" style="width:70px">`;
      const actCell = d.frozen
        ? `<div style="font-size:11px">${x.actual}</div>`
        : `<input type="number" class="form-control form-control-sm" value="${x.actual}" onchange="saveM0PerfByKey('${k}', {'actual_${ik}':parseFloat(this.value)||0})" style="width:70px">`;
      h += `<td style="background:#FFF8EE">${stdCell}</td>`;
      h += `<td style="background:#FFF8EE">${actCell}</td>`;
      h += `<td style="text-align:center;font-weight:600">${Number(x.score).toFixed(2)}</td>`;
    });
    d.bonus.forEach(x => {
      if (d.frozen) {
        h += `<td style="text-align:center">${x.cnt}</td>`;
      } else {
        const bk = 'bonus_' + x.b.key;
        h += `<td><input type="number" class="form-control form-control-sm" value="${x.cnt}" onchange="saveM0PerfByKey('${k}', {'${bk}':parseFloat(this.value)||0})" style="width:60px"></td>`;
      }
    });
    if (d.frozen) {
      h += `<td style="text-align:center">${d.workingDays}</td>`;
    } else {
      h += `<td><input type="number" class="form-control form-control-sm" value="${d.workingDays}" onchange="saveM0PerfByKey('${k}', {workingDays:parseInt(this.value,10)||30})" style="width:70px"></td>`;
    }
    h += `<td style="text-align:center">${d.level || '—'}</td>`;
    if (d.frozen) {
      h += `<td style="white-space:pre-wrap">${esc(d.comment || '')}</td>`;
    } else {
      h += `<td><textarea class="form-control form-control-sm" rows="2" style="resize:vertical;min-height:40px;font-size:12px;width:100%" onchange="saveM0PerfByKey('${k}', {comment:this.value})" placeholder="评语">${esc(d.comment || '')}</textarea></td>`;
    }
    if (d.frozen) {
      h += `<td style="text-align:center;color:${scoreColor(d.finalScore)};font-weight:700">${Number(d.finalScore).toFixed(2)}</td>`;
    } else {
      const resetBtn = isManualScore ? `<button class="btn btn-xs btn-outline" title="重置为公式自动值" onclick="saveM0PerfByKey('${k}', {finalScore:null})">↺</button>` : `<span style="font-size:10px;color:var(--gray-400)">自动</span>`;
      h += `<td style="text-align:center">${resetBtn}<input type="number" class="form-control form-control-sm" value="${Number(d.finalScore).toFixed(2)}" onchange="saveM0PerfByKey('${k}', {finalScore:this.value===''||this.value===null?null:parseFloat(this.value)})" style="width:90px;margin-top:2px;color:${scoreColor(d.finalScore)};font-weight:700"></td>`;
    }
    h += `<td style="text-align:center">${fmtSalesMoney(d.base)}</td>`;
    const bonusMoney = (d.base || 0) * (d.finalScore || 0) / 100;
    h += `<td style="text-align:center;font-weight:700">${fmtSalesMoney(bonusMoney)}</td>`;
    h += `</tr>`;
  });
  const colCount = 8 + items.length * 3 + bonusList.length;
  if (!rows.length) h += `<tr><td colspan="${colCount}" style="text-align:center;color:var(--gray-400);padding:24px">该月暂无 M0 人员（请先在「销售评级看板 → M0 计算范围」配置 M0 分组）</td></tr>`;
  h += '</tbody>';
  const tbl = document.getElementById('m0PerfTable');
  if (tbl) tbl.innerHTML = h;
}
function exportM0PerfSingleXlsx() {
  if (typeof XLSX === 'undefined') { showToast('表格组件未加载，请刷新页面后重试', 'error'); return; }
  const year = document.getElementById('m0PerfYear') ? document.getElementById('m0PerfYear').value : m0PerfYear;
  const month = document.getElementById('m0PerfMonth') ? parseInt(document.getElementById('m0PerfMonth').value, 10) : m0PerfSingleMonth;
  const m0List = m0SpActiveList();
  const cfg = getM0PerfConfig();
  const items = (cfg.items || []).filter(it => it.enabled);
  const bonusList = (cfg.bonus || []).filter(b => b.enabled);
  const rows = m0List.filter(m0PerfFilterSp).map(m0 => {
    const rec = getM0PerfRecord(year, m0, month);
    return { m0, team: getSalesTeam(m0) || '', score: getFinalScore(rec, cfg, year, m0, month) };
  });
  if (m0PerfSortBy === 'team') rows.sort((a, b) => (a.team || '').localeCompare(b.team || '', 'zh') || a.m0.localeCompare(b.m0, 'zh'));
  else if (m0PerfSortBy === 'score') rows.sort((a, b) => b.score - a.score || a.m0.localeCompare(b.m0, 'zh'));
  else rows.sort((a, b) => a.m0.localeCompare(b.m0, 'zh'));
  const header = ['M0人员', '团队'];
  items.forEach(it => { header.push(it.name + '(要求)', it.name + '(完成)', it.name + '(得分)'); });
  bonusList.forEach(b => header.push(b.name));
  header.push('当月在职天数', '当月M0职级', '总评', '绩效评分', '绩效基数', '绩效奖金');
  const aoa = [header];
  rows.forEach(row => {
    const d = m0PerfRowDisplay(year, row.m0, month, cfg, m0PerfViewSnapshot ? getM0PerfSnapshot(year, row.m0, month) : null);
    const line = [row.m0, row.team];
    d.items.forEach(x => { line.push(x.standard, x.actual, Number(x.score).toFixed(2)); });
    d.bonus.forEach(x => line.push(x.cnt));
    const bonusMoney = (d.base || 0) * (d.finalScore || 0) / 100;
    line.push(d.workingDays, d.level || '—', d.comment || '', Number(d.finalScore).toFixed(2), fmtSalesMoney(d.base), fmtSalesMoney(bonusMoney));
    aoa.push(line);
  });
  if (aoa.length <= 1) { showToast('当前无可导出的 M0 数据', 'warning'); return; }
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'M0单月绩效');
  XLSX.writeFile(wb, `M0单月绩效看板_${year}年${month}月.xlsx`);
  showToast('已导出 Excel（' + (aoa.length - 1) + ' 行）', 'success');
}
function m0PerfSpLabel() {
  if (!m0PerfSpFilter.length) return '全部 M0 人员';
  const lbl = '已选 ' + m0PerfSpFilter.length + ' 名';
  return m0PerfSpFilter.length <= 3 ? lbl + '：' + m0PerfSpFilter.join('、') : lbl;
}
function toggleM0PerfSpPanel(force) {
  const p = document.getElementById('m0PerfSpPanel');
  if (!p) return;
  if (typeof force === 'boolean') p.style.display = force ? 'block' : 'none';
  else p.style.display = p.style.display === 'block' ? 'none' : 'block';
  if (p.style.display === 'block') { renderM0PerfSpPanel(); const s = document.getElementById('m0PerfSpSearch'); if (s) s.value = ''; }
}
function renderM0PerfSpPanel() {
  const list = m0SpActiveList();
  const q = (document.getElementById('m0PerfSpSearch') ? document.getElementById('m0PerfSpSearch').value : '').trim();
  const box = document.getElementById('m0PerfSpList');
  if (!box) return;
  const filtered = q ? list.filter(n => n.indexOf(q) >= 0) : list;
  if (!filtered.length) { box.innerHTML = '<div style="padding:8px;color:var(--gray-400);font-size:12px">无匹配 M0 人员</div>'; return; }
  box.innerHTML = filtered.map(n => {
    const chk = m0PerfSpFilter.indexOf(n) >= 0 ? 'checked' : '';
    return `<label style="display:flex;align-items:center;gap:8px;padding:4px;font-size:13px;cursor:pointer;border-radius:4px" onmouseover="this.style.background='var(--gray-50)'" onmouseout="this.style.background='transparent'"><input type="checkbox" ${chk} onchange='m0PerfSpToggle(${JSON.stringify(n)})'> ${esc(n)}</label>`;
  }).join('');
}
function m0PerfSpToggle(name) {
  const i = m0PerfSpFilter.indexOf(name);
  if (i >= 0) m0PerfSpFilter.splice(i, 1); else m0PerfSpFilter.push(name);
  const btn = document.getElementById('m0PerfSpBtn'); if (btn) btn.textContent = m0PerfSpLabel();
  m0PerfRefresh();
}
function m0PerfSpSelectAll() {
  m0PerfSpFilter = m0SpActiveList().slice();
  renderM0PerfSpPanel();
  const btn = document.getElementById('m0PerfSpBtn'); if (btn) btn.textContent = m0PerfSpLabel();

function mgrSpActiveList() {
  const statusMap = buildUserStatusMap();
  return (cloudData.users || [])
    .filter(u => u.role === 'manager' && statusMap[u.name] === '在职')
    .map(u => u.name)
    .sort((a, b) => a.localeCompare(b, 'zh'));
}
function getMgrPerfRecord(year, mgr, m) {
  const cfg = getMgrPerfConfig();
  const k = mgrKey(year, mgr, m);
  const stored = (cloudData.mgrPerformanceRecords && cloudData.mgrPerformanceRecords[k]) || {};
  const defaults = { workingDays: 30, comment: '', finalScore: null };
  (cfg.items || []).forEach(it => {
    defaults['actual_' + it.key] = 0;
    defaults['manual_' + it.key] = false;
    defaults['text_' + it.key] = it.text || '';
  });
  (cfg.bonus || []).forEach(b => { defaults['bonus_' + b.key] = 0; });
  return Object.assign({}, defaults, stored);
}
function getMgrPerfSnapshot(year, mgr, month) {
  if (!cloudData.mgrPerformanceSnapshots) return null;
  return cloudData.mgrPerformanceSnapshots[mgrKey(year, mgr, month)] || null;
}
function getMgrPerfBase() {
  const v = (cloudData.formConfig && cloudData.formConfig.mgrPerformanceBase);
  if (v === undefined || v === null || v === '' || isNaN(parseFloat(v))) return (DEFAULT_FORM_CONFIG.mgrPerformanceBase || 5000);
  return parseFloat(v);
}
function mgrPerfRowDisplay(year, mgr, month, cfg, snap) {
  if (snap) {
    const items = (cfg.items || []).filter(it => it.enabled).map(it => {
      const si = snap.items[it.key] || {};
      return { it, actual: si.actual || 0, standard: (si.standard !== undefined ? si.standard : (it.standard || 0)), score: si.score || 0, text: si.text || '', frozen: true, isAuto: (it.type === 'auto-demo' || it.type === 'auto-team') };
    });
    const bonus = (cfg.bonus || []).filter(b => b.enabled).map(b => ({ b, cnt: (snap.bonus[b.key] || {}).cnt || 0, frozen: true }));
    return { base: snap.base || 0, workingDays: snap.workingDays || 30, comment: snap.comment || '', finalScore: snap.finalScore, computedScore: snap.computedScore, items, bonus, frozen: true };
  }
  const rec = getMgrPerfRecord(year, mgr, month);
  const scores = computePerfScore(rec, cfg, year, mgr, month);
  const base = getMgrPerfBase() * (rec.workingDays || 30) / 30;
  const items = (cfg.items || []).filter(it => it.enabled).map(it => {
    const ik = it.key;
    const manual = rec['manual_' + ik];
    const actual = (it.type === 'auto-team' || it.type === 'auto-demo') ? getPerfItemActual(it, rec, year, mgr, month) : (parseFloat(rec['actual_' + ik]) || 0);
    const manualStd = (rec['standard_' + ik] !== undefined && rec['standard_' + ik] !== '');
    const stdRaw = manualStd ? rec['standard_' + ik] : (it.type === 'auto-team' ? teamTargetFor(year, mgr, month) : (it.standard || 0));
    const std = manualStd ? stdRaw : stdRaw * perfProrationRatio(rec);
    const txt = (rec['text_' + ik] !== undefined && rec['text_' + ik] !== '') ? rec['text_' + ik] : (it.text || '');
    return { it, actual, standard: std, score: (scores.itemScores[ik] || {}).raw || 0, text: txt, frozen: false, isAuto: (it.type === 'auto-demo' || it.type === 'auto-team'), manual };
  });
  const bonus = (cfg.bonus || []).filter(b => b.enabled).map(b => ({ b, cnt: parseFloat(rec['bonus_' + b.key]) || 0, frozen: false }));
  return { base, workingDays: rec.workingDays || 30, comment: rec.comment || '', finalScore: getFinalScore(rec, cfg, year, mgr, month), computedScore: scores.score, items, bonus, frozen: false };
}
function saveMgrPerfByKey(key, patch) {

function saveMgrPerfSnapshot() {
  const year = document.getElementById('mgrPerfYear') ? document.getElementById('mgrPerfYear').value : mgrPerfYear;
  const month = document.getElementById('mgrPerfMonth') ? parseInt(document.getElementById('mgrPerfMonth').value, 10) : mgrPerfSingleMonth;
  if (!confirm('确定将「' + year + ' 年 ' + month + ' 月」所有管理者的绩效数据【最终保存】？\n保存后将生成本月快照（冻结），不受后续表单配置修改影响，可再次保存覆盖。')) return;
  const cfg = getMgrPerfConfig();
  if (!cloudData.mgrPerformanceSnapshots) cloudData.mgrPerformanceSnapshots = {};
  let n = 0;
  mgrSpActiveList().sort((a, b) => a.localeCompare(b, 'zh')).forEach(mgr => {
    const rec = getMgrPerfRecord(year, mgr, month);
    const scores = computePerfScore(rec, cfg, year, mgr, month);
    const base = getMgrPerfBase() * (rec.workingDays || 30) / 30;
    const snap = {
      year: String(year), mgr, month,
      finalScore: getFinalScore(rec, cfg, year, mgr, month),
      computedScore: scores.score,
      workingDays: rec.workingDays || 30,
      comment: rec.comment || '',
      base: base,
      items: {}, bonus: {},
      snapshotAt: new Date().toISOString(),
      snapshotBy: (currentUser && currentUser.name) || ''
    };
    (cfg.items || []).filter(it => it.enabled).forEach(it => {
      const ik = it.key;
      const actual = (it.type === 'auto-team' || it.type === 'auto-demo') ? getPerfItemActual(it, rec, year, mgr, month) : (parseFloat(rec['actual_' + ik]) || 0);
      const manualStd = (rec['standard_' + ik] !== undefined && rec['standard_' + ik] !== '');
      const stdRaw = manualStd ? rec['standard_' + ik] : (it.type === 'auto-team' ? teamTargetFor(year, mgr, month) : (it.standard || 0));
      const std = manualStd ? stdRaw : stdRaw * perfProrationRatio(rec);
      const raw = (scores.itemScores[ik] || {}).raw || 0;
      snap.items[ik] = { name: it.name, actual, standard: std, score: raw, text: (rec['text_' + ik] || it.text || '') };
    });

      snap.bonus[b.key] = { name: b.name, cnt: parseFloat(rec['bonus_' + b.key]) || 0 };
    });
    const k = mgrKey(year, mgr, month);
    cloudData.mgrPerformanceSnapshots[k] = snap;
    apiUpdate('mgrPerformanceSnapshots', k, snap).catch(e => showToast('保存管理绩效快照失败: ' + e.message, 'error'));
    n++;
  });
  showToast('已最终保存 ' + n + ' 名管理者的绩效快照（' + year + ' 年 ' + month + ' 月）', 'success');
  if (mgrPerfViewSnapshot) refreshMgrPerfSingle();
}

  for (let m = mgrPerfMonthFrom; m <= mgrPerfMonthTo; m++) months.push(m);

  const lastM = months.length ? months[months.length - 1] : mgrPerfMonthTo;

    return { mgr, team: getSalesTeam(mgr) || '', lastScore: getFinalScore(rec, cfg, year, mgr, lastM) };

function exportMgrPerfSingleXlsx() {

  const bonusList = (cfg.bonus || []).filter(b => b.enabled);
  const rows = mgrList.filter(mgrPerfFilterSp).map(mgr => {
    const rec = getMgrPerfRecord(year, mgr, month);
    return { mgr, team: getSalesTeam(mgr) || '', score: getFinalScore(rec, cfg, year, mgr, month) };
  });
  if (mgrPerfSortBy === 'team') rows.sort((a, b) => (a.team || '').localeCompare(b.team || '', 'zh') || a.mgr.localeCompare(b.mgr, 'zh'));
  else if (mgrPerfSortBy === 'score') rows.sort((a, b) => b.score - a.score || a.mgr.localeCompare(b.mgr, 'zh'));
  else rows.sort((a, b) => a.mgr.localeCompare(b.mgr, 'zh'));
  const header = ['管理者', '团队'];
  items.forEach(it => { header.push(it.name + '(要求)', it.name + '(完成)', it.name + '(得分)'); });

  header.push('当月在职天数', '总评', '绩效评分', '绩效基数', '绩效奖金');
  const aoa = [header];
  rows.forEach(row => {
    const d = mgrPerfRowDisplay(year, row.mgr, month, cfg, mgrPerfViewSnapshot ? getMgrPerfSnapshot(year, row.mgr, month) : null);
    const line = [row.mgr, row.team];
    d.items.forEach(x => { line.push(x.standard, x.actual, Number(x.score).toFixed(2)); });
    d.bonus.forEach(x => line.push(x.cnt));
    const bonusMoney = (d.base || 0) * (d.finalScore || 0) / 100;

  XLSX.writeFile(wb, `管理单月绩效看板_${year}年${month}月.xlsx`);
  showToast('已导出 Excel（' + (aoa.length - 1) + ' 行）', 'success');
}
function mgrPerfSpLabel() {

function toggleMgrPerfSpPanel(force) {

  else p.style.display = p.style.display === 'block' ? 'none' : 'block';

function openMgrPerfBatchStandard() {
  if (mgrPerfViewSnapshot) { showToast('快照查看模式下不可批量编辑，请先点「返回实时」', 'warning'); return; }
  const cfg = getMgrPerfConfig();
  const items = (cfg.items || []).filter(it => it.enabled);
  if (!items.length) { showToast('当前无启用的考核项', 'warning'); return; }

    ${rowsHtml}
    <div class="modal-footer">

      <button class="btn btn-primary" onclick="applyMgrPerfBatchStandard()">应用到全部</button>
    </div>`, false);

function applyMgrPerfBatchStandard() {
  const cfg = getMgrPerfConfig();
  const items = (cfg.items || []).filter(it => it.enabled);
  const year = mgrPerfYear, month = mgrPerfSingleMonth;
  const patch = {};
  items.forEach(it => {
    const el = document.getElementById('mgrpbStd_' + it.key);
    if (!el) return;
    const v = el.value;
    if (v === '' || v === null) return;
    patch['standard_' + it.key] = parseFloat(v) || 0;
  });
  if (!Object.keys(patch).length) { showToast('未填写任何要求值', 'warning'); closeModal(); return; }
  const targets = mgrSpActiveList().filter(mgrPerfFilterSp);
  if (!targets.length) { showToast('当前筛选范围内无管理者', 'warning'); closeModal(); return; }
  if (!cloudData.mgrPerformanceRecords) cloudData.mgrPerformanceRecords = {};
  targets.forEach(mgr => {
    const k = mgrKey(year, mgr, month);
    cloudData.mgrPerformanceRecords[k] = Object.assign({}, cloudData.mgrPerformanceRecords[k] || {}, patch);
    apiUpdate('mgrPerformanceRecords', k, cloudData.mgrPerformanceRecords[k]).catch(e => showToast('保存失败: ' + e.message, 'error'));
  });
  closeModal();
  refreshMgrPerfSingle();
  showToast('已批量设置 ' + targets.length + ' 名管理者的考核要求', 'success');
}

  });
  // NOTE: 报表数据不再于启动时无条件拉取（那时 currentUser 尚为 null 会触发全量下载）。
  // 改为登录后（doLogin / 自动登录）再按角色加载，成员仅取自己数据，并用本地缓存秒开。

  // Show login form IMMEDIATELY — don't wait for Firebase
  const loadingEl = document.getElementById('loginLoading');
  if (loadingEl) loadingEl.style.display = 'none';
  const formBox = document.getElementById('loginFormBox');
  if (formBox) formBox.style.display = '';
  document.getElementById('loginView').classList.remove('hidden');

  // Check for saved session (auto-login)
  const saved = localStorage.getItem(SESSION_KEY);
  if (saved) {
    currentUser = JSON.parse(saved);
    // Wait for users data to verify saved session
    if (_usersDataPromise) { try { await _usersDataPromise; } catch(e){} }
    const user = cloudData.users.find(u => u.id === currentUser.id && u.active);
    if (user) {
      currentUser = {id:user.id,username:user.username,name:user.name,department:user.department,role:user.role};
      localStorage.setItem(SESSION_KEY, JSON.stringify(currentUser));
      // Wait for config data before showing dashboard
      if (_coreDataPromise) { try { await _coreDataPromise; } catch(e){} }
      // 按角色权限加载管理类记录（员工几乎零开销）
      await loadRoleScopedData();
      // Wait for report data (cache hit → instant; otherwise spinner) before showing dashboard
      if (!reportsLoaded) {
        if (loadingEl) {
          loadingEl.innerHTML = '<div style="font-size:36px;margin-bottom:14px;animation:spin 1.5s linear infinite;display:inline-block">⏳</div><div id="loadingStepText" style="font-size:15px;font-weight:600;margin-bottom:16px;color:#fff">正在加载报表数据...</div><div style="width:260px;height:6px;background:rgba(255,255,255,.15);border-radius:3px;margin:0 auto 10px;overflow:hidden"><div id="loadingProgress" style="width:0%;height:100%;background:linear-gradient(90deg,#3b82f6,#06b6d4);border-radius:3px;transition:width .3s ease"></div></div><div id="loadingCountdown" style="font-size:12px;color:rgba(255,255,255,.55)">正在准备...</div>';
          loadingEl.style.display = '';
        }
        if (formBox) formBox.style.display = 'none';
        await loadReportData();
        if (loadingEl) loadingEl.style.display = 'none';
        if (formBox) formBox.style.display = '';
      }
      document.getElementById('loginView').classList.add('hidden');
      document.getElementById('appLayout').classList.remove('hidden');
      document.getElementById('sidebarName').textContent = currentUser.name;
      document.getElementById('sidebarDept').textContent = currentUser.department;
      document.getElementById('sidebarAvatar').textContent = currentUser.name.charAt(0);
      document.getElementById('userWelcome').textContent = `👋 欢迎，${currentUser.name}`;
      updateNavVisibility();
      navTo('dashboard');
      return;
    }
  }
})();
</script>
</body>
</html>
