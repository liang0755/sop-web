function switchVisitStatsTab(tab, el) {
  visitStatsTab = tab;
  document.querySelectorAll('.visit-stats-tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  loadVisitStats();
}

function setVisitDateRange(type, btn) {
  const now = new Date();
  let start, end;
  const todayStr = localYMD(now);
  if (type === 'yesterday') {
    const y = new Date(now); y.setDate(y.getDate() - 1);
    start = end = localYMD(y);
  } else if (type === 'thisWeek') {
    const day = now.getDay() || 7;
    const monday = new Date(now); monday.setDate(monday.getDate() - day + 1);
    start = localYMD(monday); end = todayStr;
  } else if (type === 'lastWeek') {
    const day = now.getDay() || 7;
    const monday = new Date(now); monday.setDate(monday.getDate() - day + 1 - 7);
    const sunday = new Date(monday); sunday.setDate(sunday.getDate() + 6);
    start = localYMD(monday); end = localYMD(sunday);
  } else if (type === 'thisMonth') {
    start = localYMD(new Date(now.getFullYear(), now.getMonth(), 1)); end = todayStr;
  } else if (type === 'thisYear') {
    start = localYMD(new Date(now.getFullYear(), 0, 1)); end = todayStr;
  }
  if (start) document.getElementById('visitStatsStart').value = start;
  if (end) document.getElementById('visitStatsEnd').value = end;
  if (btn) {
    document.querySelectorAll('#visitDateBtns button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  loadVisitStats();
}

function loadVisitStats() {
  const s = document.getElementById('visitStatsStart')?.value || '';
  const e = document.getElementById('visitStatsEnd')?.value || '';
  let records = cloudData.visitRecords.filter(r => {
    const d = normContactTime(r.contactTime).split(' ')[0];
    return (!s || d >= s) && (!e || d <= e);
  });
  const c = document.getElementById('visitStatsResults');
  if (!records.length) {
    c.innerHTML = '<div class="empty-state"><div class="icon">📭</div>暂无拜访数据</div>';
    return;
  }
  const vc = getVisitConfig();
  const allResults = vc.visitResults || [];
  const totalVisits = records.length;
  const totalResulted = records.filter(r => r.visitResult).length;
  const colors = ['#2563eb','#16a34a','#f59e0b','#dc2626','#7c3aed','#0891b2','#db2777','#4f46e5'];
  // ===== 全部汇总 =====
  let summaryCards = `<div style="text-align:center;padding:14px;background:var(--gray-50);border-radius:8px"><div style="font-size:24px;font-weight:700;color:var(--primary)">${totalVisits}</div><div style="font-size:12px;color:var(--gray-500)">总拜访数</div></div>`;
  summaryCards += `<div style="text-align:center;padding:14px;background:var(--gray-50);border-radius:8px"><div style="font-size:24px;font-weight:700;color:var(--success)">${totalResulted}</div><div style="font-size:12px;color:var(--gray-500)">已标记结果</div></div>`;
  allResults.forEach((result, idx) => {
    const count = records.filter(r => r.visitResult === result).length;
    const pct = totalVisits > 0 ? (count / totalVisits * 100).toFixed(1) : '0';
    const color = colors[idx % colors.length];
    summaryCards += `<div style="text-align:center;padding:14px;background:var(--gray-50);border-radius:8px"><div style="font-size:24px;font-weight:700;color:${color}">${count}</div><div style="font-size:12px;color:var(--gray-500)">${result} (${pct}%)</div></div>`;
  });
  const unmarked = totalVisits - totalResulted;
  summaryCards += `<div style="text-align:center;padding:14px;background:var(--gray-50);border-radius:8px"><div style="font-size:24px;font-weight:700;color:var(--gray-400)">${unmarked}</div><div style="font-size:12px;color:var(--gray-500)">未标记</div></div>`;
  let summaryHtml = `<div class="card" style="margin-bottom:16px"><div class="card-header"><h4>📋 全部汇总（${s || '全部'} 至 ${e || '全部'}）</h4></div><div class="card-body"><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px">${summaryCards}</div></div></div>`;
  // ===== 按部门→拜访结果分组（矩阵表：行=拜访结果，列=部门，最后一列=汇总） =====
  const deptGroups = {};
  records.forEach(r => {
    const dept = canonDept(r.department || '未分组');
    if (!deptGroups[dept]) deptGroups[dept] = [];
    deptGroups[dept].push(r);
  });
  const depts = Object.keys(deptGroups).sort();
  const resultLabels = [...allResults, '未标记'];
  const countMap = {};
  resultLabels.forEach(res => { countMap[res] = {}; depts.forEach(dept => { countMap[res][dept] = 0; }); });
  records.forEach(r => {
    const dept = canonDept(r.department || '未分组');
    const res = r.visitResult || '未标记';
    if (countMap[res] && countMap[res][dept] !== undefined) countMap[res][dept]++;
  });
  const deptTotals = {};
  depts.forEach(dept => { deptTotals[dept] = deptGroups[dept].length; });
  const resultTotals = {};
  resultLabels.forEach(res => {
    resultTotals[res] = depts.reduce((sum, dept) => sum + countMap[res][dept], 0);
  });
  const grandTotal = records.length;
  const dColors = ['#2563eb','#16a34a','#f59e0b','#dc2626','#7c3aed','#0891b2','#db2777','#4f46e5'];
  // 矩阵表主体
  const matrixRows = resultLabels.filter(res => resultTotals[res] > 0).map(res => {
    const kColor = res === '未标记' ? 'var(--gray-400)' : (colors[allResults.indexOf(res) % colors.length] || 'var(--primary)');
    const deptCells = depts.map((dept, idx) => {
      const val = countMap[res][dept];
      const color = dColors[idx % dColors.length];
      return `<td style="text-align:center;${val ? 'font-weight:600;color:' + color : 'color:var(--gray-300)'}">${val || '-'}</td>`;
    }).join('');
    return `<tr>
      <td style="min-width:140px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${kColor};margin-right:6px"></span><strong>${res}</strong></td>
      ${deptCells}
      <td style="text-align:center;font-weight:700;background:var(--gray-50)">${resultTotals[res]}</td>
    </tr>`;
  }).join('');
  const totalRow = `<tr style="font-weight:700;background:var(--gray-100);border-top:2px solid var(--gray-300)">
    <td>汇总</td>
    ${depts.map(dept => `<td style="text-align:center">${deptTotals[dept]}</td>`).join('')}
    <td style="text-align:center;background:var(--primary-light);color:var(--primary)">${grandTotal}</td>
  </tr>`;
  const groupHtml = `<div class="card" style="margin-bottom:16px;overflow:hidden">
    <div class="card-header" style="background:var(--gray-50)">
      <h4 style="font-size:15px;margin:0">🏢 各团队拜访卡点汇总</h4>
    </div>
    <div class="card-body" style="padding:16px">
      <div class="table-wrap">
        <table style="font-size:13px;min-width:${220 + depts.length * 110}px">
          <thead>
            <tr>
              <th style="min-width:140px">拜访结果</th>
              ${depts.map(dept => `<th style="text-align:center;min-width:110px">${dept}</th>`).join('')}
              <th style="text-align:center;min-width:80px">汇总</th>
            </tr>
          </thead>
          <tbody>
            ${matrixRows}
            ${totalRow}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
  if (visitStatsTab === 'person') {
    c.innerHTML = renderPersonVisitStats(records, s, e);
  } else if (visitStatsTab === 'teamType') {
    c.innerHTML = renderTeamTypeVisitStats(records, s, e);
  } else {
    // 捕获导出数据（拜访结果 × 部门矩阵）
    const tcHeaders = ['拜访结果', ...depts, '汇总'];
    const tcRows = [];
    resultLabels.filter(res => resultTotals[res] > 0).forEach(res => {
      tcRows.push([res, ...depts.map(dept => countMap[res][dept]), resultTotals[res]]);
    });
    tcRows.push(['汇总', ...depts.map(dept => deptTotals[dept]), grandTotal]);
    window.__teamCardExport = { s, e, headers: tcHeaders, rows: tcRows };
    const exportBar = `<div style="text-align:right;margin-bottom:12px"><button class="btn btn-sm btn-outline" onclick="exportTeamCardCsv()">⬇️ 导出筛选结果</button></div>`;
    c.innerHTML = exportBar + summaryHtml + groupHtml;
  }
}

// 读取签到事件归类配置（可配置，存于 formConfig.signinCategories）
function getSigninCategories() {
  const fc = cloudData.formConfig || DEFAULT_FORM_CONFIG;
  return (fc.signinCategories && fc.signinCategories.length) ? fc.signinCategories : (DEFAULT_FORM_CONFIG.signinCategories || []);
}
// 读取签到事件固定选项（用于拜访数据手动修改下拉框），可配置，存于 formConfig.signinEvents
function getSigninEvents() {
  const fc = cloudData.formConfig || DEFAULT_FORM_CONFIG;
  const list = (fc.signinEvents && fc.signinEvents.length) ? fc.signinEvents : (DEFAULT_FORM_CONFIG.signinEvents || []);
  return list.map(x => (x || '').trim()).filter(Boolean);
}

// 拜访类型统计：每张表（按签到事件 / 按归类）独立维护排序键与方向（持久化 localStorage）
let visitTableSort = {
  person_events: { key:'__total__', dir:'desc' },
  person_cats:   { key:'__total__', dir:'desc' },
  team_events:   { key:'__total__', dir:'desc' },
  team_cats:     { key:'__total__', dir:'desc' }
};
try { const _vs = JSON.parse(localStorage.getItem('sop_visitTableSort') || 'null'); if (_vs) visitTableSort = Object.assign(visitTableSort, _vs); } catch (e) {}
function setVisitSort(mode, kind, key, dir) {
  const sk = mode + '_' + kind; // kind: 'events' | 'cats'
  if (!visitTableSort[sk]) visitTableSort[sk] = { key:'__total__', dir:'desc' };
  visitTableSort[sk].key = key;
  visitTableSort[sk].dir = dir;
  try { localStorage.setItem('sop_visitTableSort', JSON.stringify(visitTableSort)); } catch (e) {}
  loadVisitStats();
}

// ===== 拜访统计导出工具 =====
function escCsv(v){ v = v==null ? '' : String(v); return /[",\n\r]/.test(v) ? '"' + v.replace(/"/g,'""') + '"' : v; }
function downloadCsv(filename, headers, rows){
  const csv = '﻿' + [headers, ...rows].map(r => r.map(escCsv).join(',')).join('\r\n');
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast('已导出：' + filename, 'success');
}
function visitExportFilename(tabLabel, tableLabel, s, e){
  const cond = (s && e) ? (s + '至' + e) : '全部区间';
  return '拜访统计_' + tabLabel + '_' + tableLabel + '_' + cond + '.csv';
}
function exportVisitTable(mode, kind){
  const data = window.__visitExport;
  if (!data || data.mode !== mode) { showToast('请先渲染该表格再导出', 'warning'); return; }
  const t = data[kind];
  if (!t) return;
  const tabLabel = mode === 'person' ? '个人拜访类型统计' : '团队拜访类型统计';
  downloadCsv(visitExportFilename(tabLabel, t.label, data.s, data.e), t.headers, t.rows);
}
function exportTeamCardCsv(){
  const d = window.__teamCardExport;
  if (!d) { showToast('请先渲染团队拜访卡点统计再导出', 'warning'); return; }
  downloadCsv(visitExportFilename('团队拜访卡点统计', '部门×拜访结果', d.s, d.e), d.headers, d.rows);
}

function computeSigninEvents() {
  const categories = getSigninCategories();
  const evSet = new Set();
  categories.forEach(cat => (cat.events || []).forEach(ev => { if (ev && ev.trim()) evSet.add(ev.trim()); }));
  cloudData.visitRecords.forEach(r => { const ev = (r.signinEvent || '').trim(); if (ev) evSet.add(ev); });
  const catOrder = {}; categories.forEach((c, i) => { catOrder[c.name] = i; });
  const eventToCat = {};
  categories.forEach(cat => (cat.events || []).forEach(ev => { if (ev) eventToCat[ev.trim()] = cat.name; }));
  const all = [...evSet];
  return all.slice().sort((a, b) => {
    const ca = catOrder[eventToCat[a]] !== undefined ? catOrder[eventToCat[a]] : 999;
    const cb = catOrder[eventToCat[b]] !== undefined ? catOrder[eventToCat[b]] : 999;
    if (ca !== cb) return ca - cb;
    return a.localeCompare(b, 'zh');
  });
}

// 个人 / 团队 拜访类型统计入口（复用同一渲染核心）
function renderPersonVisitStats(records, s, e) { return renderGroupedVisitStats(records, s, e, 'person'); }
function renderTeamTypeVisitStats(records, s, e) { return renderGroupedVisitStats(records, s, e, 'team'); }

// 拜访类型统计通用渲染：mode='person' 按人员分组；mode='team' 按团队/部门分组
// 表格形式 —— 主体竖排（行）、签到事件横排（列），同结构再出一张按归类的汇总表
// 两张表各自维护独立的排序状态（visitTableSort[mode+'_events'] / [mode+'_cats']）
function renderGroupedVisitStats(records, s, e, mode) {
  const isTeam = mode === 'team';
  const unitLabel = isTeam ? '团队 / 部门' : '人员 / 部门';
  const unitName = isTeam ? '团队' : '人员';
  const categories = getSigninCategories();
  const catColorMap = { '自拓演示': '#16a34a', '线索演示': '#2563eb', '其他': '#f59e0b', '未归类': '#9ca3af' };
  const eventToCat = {};
  categories.forEach(cat => (cat.events || []).forEach(ev => { if (ev) eventToCat[ev.trim()] = cat.name; }));
  // 事件列（按归类默认排序，列顺序固定；排序针对行）
  const events = computeSigninEvents();
  // 按 人员 / 团队 分组
  const byEmp = {};
  records.forEach(r => {
    const emp = isTeam ? canonDept(r.department || '未分组') : (r.employee || '未知');
    if (!byEmp[emp]) byEmp[emp] = { records: [], dept: isTeam ? '' : (r.department || '') };
    byEmp[emp].records.push(r);
  });
  const emps = Object.keys(byEmp).sort();
  if (!emps.length) return '<div class="empty-state"><div class="icon">📭</div>暂无拜访数据</div>';

  // ===== 矩阵：员工 × 签到事件 =====
  const matrix = {};
  emps.forEach(emp => {
    const m = {}; events.forEach(ev => m[ev] = 0);
    byEmp[emp].records.forEach(r => { const ev = (r.signinEvent || '').trim(); if (ev && m[ev] !== undefined) m[ev]++; });
    matrix[emp] = m;
  });
  const colTotals = {}; events.forEach(ev => colTotals[ev] = 0);
  const rowTotals = {};
  emps.forEach(emp => {
    let t = 0; events.forEach(ev => { t += matrix[emp][ev]; colTotals[ev] += matrix[emp][ev]; });
    rowTotals[emp] = t;
  });
  const grandTotal = emps.reduce((acc, emp) => acc + rowTotals[emp], 0);

  // ===== 矩阵：员工 × 归类 =====
  const usedCats = new Set();
  emps.forEach(emp => byEmp[emp].records.forEach(r => {
    const ev = (r.signinEvent || '').trim();
    const cat = ev ? (eventToCat[ev] || '未归类') : '未归类';
    usedCats.add(cat);
  }));
  const catNames = [...new Set([...categories.map(c => c.name), ...usedCats])];
  const catMatrix = {};
  emps.forEach(emp => {
    const m = {}; catNames.forEach(c => m[c] = 0);
    byEmp[emp].records.forEach(r => {
      const ev = (r.signinEvent || '').trim();
      const cat = ev ? (eventToCat[ev] || '未归类') : '未归类';
      m[cat] = (m[cat] || 0) + 1;
    });
    catMatrix[emp] = m;
  });
  const catTotals = {}; catNames.forEach(c => catTotals[c] = 0);
  const catRowTotals = {};
  emps.forEach(emp => {
    let t = 0; catNames.forEach(c => { t += catMatrix[emp][c] || 0; catTotals[c] += catMatrix[emp][c] || 0; });
    catRowTotals[emp] = t;
  });
  const catGrand = emps.reduce((a, emp) => a + catRowTotals[emp], 0);

  // ===== 各自独立的排序状态 =====
  const st1 = visitTableSort[mode + '_events'] || { key:'__total__', dir:'desc' };
  const st2 = visitTableSort[mode + '_cats'] || { key:'__total__', dir:'desc' };
  const sortVal1 = (emp) => { if (st1.key === '__total__') return rowTotals[emp] || 0; return matrix[emp][st1.key] || 0; };
  const sortVal2 = (emp) => { if (st2.key === '__total__') return catRowTotals[emp] || 0; return catMatrix[emp][st2.key] || 0; };
  const display1 = [...emps].sort((a, b) => st1.dir === 'desc' ? (sortVal1(b) - sortVal1(a)) : (sortVal1(a) - sortVal1(b)));
  const display2 = [...emps].sort((a, b) => st2.dir === 'desc' ? (sortVal2(b) - sortVal2(a)) : (sortVal2(a) - sortVal2(b)));

  // ===== 表1：按签到事件（主体竖排 × 事件横排）=====
  const thCells = events.map(ev => {
    const cat = eventToCat[ev];
    const color = cat ? (catColorMap[cat] || '#6366f1') : '#6366f1';
    const evJson = JSON.stringify(ev);
    const active = st1.key === ev;
    return `<th style="text-align:center;white-space:nowrap;font-size:12px;padding:8px 10px">
      <div>${ev}</div>
      <div style="font-size:10px;color:${color};font-weight:400;margin-bottom:2px">${cat || '—'}</div>
      <div style="display:flex;justify-content:center;gap:2px">
        <button onclick='setVisitSort("${mode}","events",${evJson},"asc")' title="按此列升序" style="border:1px solid #e5e7eb;background:#fff;border-radius:4px;cursor:pointer;font-size:10px;line-height:1.4;padding:1px 5px;color:${active && st1.dir === 'asc' ? '#16a34a' : '#6b7280'}">▲</button>
        <button onclick='setVisitSort("${mode}","events",${evJson},"desc")' title="按此列降序" style="border:1px solid #e5e7eb;background:#fff;border-radius:4px;cursor:pointer;font-size:10px;line-height:1.4;padding:1px 5px;color:${active && st1.dir === 'desc' ? '#dc2626' : '#6b7280'}">▼</button>
      </div>
    </th>`;
  }).join('');
  const bodyRows1 = display1.map(emp => {
    const cells = events.map(ev => `<td style="text-align:center;padding:6px 8px">${matrix[emp][ev] || ''}</td>`).join('');
    const label = byEmp[emp].dept ? `${emp}<br><span style="font-size:11px;color:var(--gray-500);font-weight:400">${byEmp[emp].dept}</span>` : emp;
    return `<tr>
      <td style="white-space:nowrap;font-weight:600;padding:8px 10px">${label}</td>
      ${cells}
      <td style="text-align:center;font-weight:700;background:var(--gray-50);padding:6px 8px">${rowTotals[emp]}</td>
    </tr>`;
  }).join('');
  const totalRow1 = `<tr style="font-weight:700;background:var(--gray-50)">
    <td style="padding:8px 10px">合计</td>
    ${events.map(ev => `<td style="text-align:center;padding:6px 8px">${colTotals[ev]}</td>`).join('')}
    <td style="text-align:center;padding:6px 8px">${grandTotal}</td>
  </tr>`;
  const table1 = `<div class="card" style="margin-bottom:20px;overflow:hidden">
    <div class="card-header" style="padding:12px 16px;background:var(--gray-50);display:flex;align-items:center;justify-content:space-between;gap:10px">
      <h4 style="margin:0;font-size:15px">📌 按签到事件统计（${unitName}竖排 × 事件横排）</h4>
      <button class="btn btn-sm btn-outline" onclick="exportVisitTable('${mode}','events')">⬇️ 导出</button>
    </div>
    <div class="card-body" style="padding:16px">
      <div class="table-wrap"><table style="font-size:13px;min-width:100%;border-collapse:collapse">
        <thead><tr style="background:var(--gray-50)">
          <th style="text-align:left;padding:8px 10px">${unitLabel}</th>${thCells}<th style="text-align:center;white-space:nowrap;padding:8px 10px">合计
            <div style="display:flex;justify-content:center;gap:2px;margin-top:2px">
              <button onclick='setVisitSort("${mode}","events","__total__","asc")' title="按合计升序" style="border:1px solid #e5e7eb;background:#fff;border-radius:4px;cursor:pointer;font-size:10px;line-height:1.4;padding:1px 5px;color:${st1.key==='__total__'&&st1.dir==='asc'?'#16a34a':'#6b7280'}">▲</button>
              <button onclick='setVisitSort("${mode}","events","__total__","desc")' title="按合计降序" style="border:1px solid #e5e7eb;background:#fff;border-radius:4px;cursor:pointer;font-size:10px;line-height:1.4;padding:1px 5px;color:${st1.key==='__total__'&&st1.dir==='desc'?'#dc2626':'#6b7280'}">▼</button>
            </div>
          </th>
        </tr></thead>
        <tbody>${bodyRows1}${totalRow1}</tbody>
      </table></div>
    </div></div>`;

  // ===== 表2：按归类（主体竖排 × 归类横排）=====
  const catTh = catNames.map(c => {
    const cJson = JSON.stringify(c);
    const active = st2.key === c;
    return `<th style="text-align:center;white-space:nowrap;padding:8px 10px;color:${catColorMap[c] || '#6366f1'}">${c}
      <div style="display:flex;justify-content:center;gap:2px;margin-top:2px">
        <button onclick='setVisitSort("${mode}","cats",${cJson},"asc")' title="按此列升序" style="border:1px solid #e5e7eb;background:#fff;border-radius:4px;cursor:pointer;font-size:10px;line-height:1.4;padding:1px 5px;color:${active && st2.dir === 'asc' ? '#16a34a' : '#6b7280'}">▲</button>
        <button onclick='setVisitSort("${mode}","cats",${cJson},"desc")' title="按此列降序" style="border:1px solid #e5e7eb;background:#fff;border-radius:4px;cursor:pointer;font-size:10px;line-height:1.4;padding:1px 5px;color:${active && st2.dir === 'desc' ? '#dc2626' : '#6b7280'}">▼</button>
      </div>
    </th>`;
  }).join('');
  const catBody2 = display2.map(emp => {
    const cells = catNames.map(c => {
      const v = catMatrix[emp][c] || 0;
      const color = catColorMap[c] || '#6366f1';
      return `<td style="text-align:center;padding:6px 8px${v ? ';color:' + color + ';font-weight:600' : ''}">${v || ''}</td>`;
    }).join('');
    return `<tr>
      <td style="white-space:nowrap;font-weight:600;padding:8px 10px">${emp}</td>
      ${cells}
      <td style="text-align:center;font-weight:700;background:var(--gray-50);padding:6px 8px">${catRowTotals[emp]}</td>
    </tr>`;
  }).join('');
  const catTotalRow2 = `<tr style="font-weight:700;background:var(--gray-50)">
    <td style="padding:8px 10px">合计</td>
    ${catNames.map(c => `<td style="text-align:center;padding:6px 8px">${catTotals[c]}</td>`).join('')}
    <td style="text-align:center;padding:6px 8px">${catGrand}</td>
  </tr>`;
  const table2 = `<div class="card" style="margin-bottom:20px;overflow:hidden">
    <div class="card-header" style="padding:12px 16px;background:var(--gray-50);display:flex;align-items:center;justify-content:space-between;gap:10px">
      <h4 style="margin:0;font-size:15px">🗂️ 签到事件归类汇总（${unitName}竖排 × 归类横排）</h4>
      <button class="btn btn-sm btn-outline" onclick="exportVisitTable('${mode}','cats')">⬇️ 导出</button>
    </div>
    <div class="card-body" style="padding:16px">
      <div class="table-wrap"><table style="font-size:13px;min-width:100%;border-collapse:collapse">
        <thead><tr style="background:var(--gray-50)">
          <th style="text-align:left;padding:8px 10px">${unitName}</th>${catTh}<th style="text-align:center;white-space:nowrap;padding:8px 10px">合计
            <div style="display:flex;justify-content:center;gap:2px;margin-top:2px">
              <button onclick='setVisitSort("${mode}","cats","__total__","asc")' title="按合计升序" style="border:1px solid #e5e7eb;background:#fff;border-radius:4px;cursor:pointer;font-size:10px;line-height:1.4;padding:1px 5px;color:${st2.key==='__total__'&&st2.dir==='asc'?'#16a34a':'#6b7280'}">▲</button>
              <button onclick='setVisitSort("${mode}","cats","__total__","desc")' title="按合计降序" style="border:1px solid #e5e7eb;background:#fff;border-radius:4px;cursor:pointer;font-size:10px;line-height:1.4;padding:1px 5px;color:${st2.key==='__total__'&&st2.dir==='desc'?'#dc2626':'#6b7280'}">▼</button>
            </div>
          </th>
        </tr></thead>
        <tbody>${catBody2}${catTotalRow2}</tbody>
      </table></div>
    </div></div>`;

  // 捕获导出数据（含当前筛选区间 + 当前排序后的行顺序）
  window.__visitExport = {
    mode, s, e,
    events: {
      label: '按签到事件',
      headers: [unitLabel, ...events, '合计'],
      rows: display1.map(emp => [ byEmp[emp].dept ? `${emp}（${byEmp[emp].dept}）` : emp, ...events.map(ev => matrix[emp][ev] || ''), rowTotals[emp] ])
    },
    cats: {
      label: '按归类汇总',
      headers: [unitName, ...catNames, '合计'],
      rows: display2.map(emp => [ emp, ...catNames.map(c => catMatrix[emp][c] || ''), catRowTotals[emp] ])
    }
  };

  const introTitle = isTeam ? `团队拜访类型统计（按团队/部门，共 ${emps.length} 个）` : `个人拜访类型统计（按人员，共 ${emps.length} 人）`;
  const intro = `<div style="font-size:13px;color:var(--gray-500);margin-bottom:12px">${introTitle} · ${s || '全部'} 至 ${e || '全部'}<span style="margin-left:8px;color:var(--gray-400)">提示：点击事件列 / 归类列 / 合计列的 ▲▼，可按该列数值对${unitName}行升/降序排列（两张表独立排序，自动保存，当前排序列高亮）</span></div>`;
  return intro + table1 + table2;
}

// ============ Modal ============
function showModal(title,content,wide){document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal${wide?' modal-wide':''}"><h3>${title}</h3>${content}</div></div>`}
function closeModal(){document.getElementById('modalContainer').innerHTML=''}
function showImportOverlay(title) {
  let el = document.getElementById('importOverlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'importOverlay';
    el.className = 'import-overlay';
    el.innerHTML = '<div class="box"><div class="spin">⏳</div><div class="txt" id="importOverlayTxt"></div><div class="sub" id="importOverlaySub"></div></div>';
    document.body.appendChild(el);
  }
  updateImportOverlay(title, '');
  el.style.display = 'flex';
}
function updateImportOverlay(txt, sub) {
  const t = document.getElementById('importOverlayTxt'); const s = document.getElementById('importOverlaySub');
  if (t) t.textContent = txt; if (s) s.textContent = sub || '';
}
function hideImportOverlay() { const el = document.getElementById('importOverlay'); if (el) el.style.display = 'none'; }
function showToast(msg, type='success', duration=2500) {
  const container = document.getElementById('toastContainer');
  if (!container) return;
  const icons = {success:'✅', error:'❌', info:'ℹ️', warning:'⚠️'};
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.innerHTML = `<span>${icons[type]||'✅'}</span><span>${msg}</span>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('hiding');
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

// ============ Utils ============
// 本地时区日期 YYYY-MM-DD（修复 GMT+8 凌晨用 toISOString() 得到 UTC 日期差一天的问题）
function localYMD(d){ d = d || new Date(); const off = d.getTimezoneOffset()*60000; return new Date(d.getTime()-off).toISOString().split('T')[0]; }
// 快捷日期范围：用于拜访数据筛选栏（今天/昨天/本周/上周/本月/上月/今年），以周一为周起始
function getQuickDateRange(type){
  const now = new Date();
  const today = localYMD(now);
  const ymd = (d) => localYMD(d);
  if (type === 'today') return { start: today, end: today };
  if (type === 'yesterday') { const d = new Date(now.getTime()-86400000); const y = ymd(d); return { start: y, end: y }; }
  const year = now.getFullYear();
  const month = now.getMonth();
  if (type === 'thisMonth') { const start = ymd(new Date(year, month, 1)); const end = ymd(new Date(year, month+1, 0)); return { start, end }; }
  if (type === 'lastMonth') { const start = ymd(new Date(year, month-1, 1)); const end = ymd(new Date(year, month, 0)); return { start, end }; }
  if (type === 'thisYear') { const start = ymd(new Date(year, 0, 1)); const end = ymd(new Date(year, 11, 31)); return { start, end }; }
  const day = now.getDay(); // 0=Sun,1=Mon,...,6=Sat
  const mondayOffset = day === 0 ? -6 : 1 - day;
  const monday = new Date(year, month, now.getDate() + mondayOffset);
  if (type === 'thisWeek') { const sunday = new Date(monday.getTime()+6*86400000); return { start: ymd(monday), end: ymd(sunday) }; }
  if (type === 'lastWeek') { const lastMonday = new Date(monday.getTime()-7*86400000); const lastSunday = new Date(monday.getTime()-1*86400000); return { start: ymd(lastMonday), end: ymd(lastSunday) }; }
  return { start: '', end: '' };
}
function applyVisitQuickDateFilter(sel){
  const type = sel?.value;
  if (!type) return;
  const range = getQuickDateRange(type);
  const startInput = document.getElementById('visitFStart');
  const endInput = document.getElementById('visitFEnd');
  if (startInput) startInput.value = range.start;
  if (endInput) endInput.value = range.end;
  resetVisitPage();
}
// 联系时间规范化：把 CSV 的 `2026/07/10 15:56` / `2026.07.10` / `2026年07月10日` 等统一成 `2026-07-10 15:56`
// 解决斜杠格式导致日期筛选/排序/统计判断错误的问题（部分 CSV 直接以斜杠导出）
function normContactTime(s){
  if(!s) return '';
  const parts=String(s).trim().split(/[\sT]/);
  let datePart=parts[0]||'';
  const timePart=parts[1]||'';
  // 先把中文/斜杠/点/混合分隔统一成 -（如 2026/07/10 或 2026年07月10日 或 2026.7.2）
  datePart=datePart.replace(/[^\d]/g,'-').replace(/-+/g,'-').replace(/^-+|-+$/g,'');
  // 按年/月/日拆分并补零：年 4 位，月/日 2 位
  const dp = datePart.split('-').filter(Boolean).map((v,i) => v.padStart(i===0?4:2,'0'));
  if(dp.length>=3) datePart = `${dp[0]}-${dp[1]}-${dp[2]}`;
  return (datePart+(timePart?' '+timePart:'')).trim();
}
function getWeekStart(){const n=new Date(),d=n.getDay()||7;const m=new Date(n);m.setDate(n.getDate()-d+1);return localYMD(m)}
function getWeekEnd(s){if(!s)return'';const d=new Date(s);d.setDate(d.getDate()+6);return localYMD(d)}
function getLastWeekStart(){const n=new Date(),d=n.getDay()||7;const m=new Date(n);m.setDate(n.getDate()-d-6);return localYMD(m)}

// Group missing users by department and render compact HTML
function renderMissingGrouped(missingUsers) {
  if (!missingUsers || missingUsers.length === 0) return '';
  // Group by department
  const groups = {};
  missingUsers.forEach(u => {
    const dept = u.department || '未分组';
    if (!groups[dept]) groups[dept] = [];
    groups[dept].push(u.name);
  });
  // Sort departments alphabetically
  const sortedDepts = Object.keys(groups).sort();
  return sortedDepts.map(dept => {
    const names = groups[dept];
    return `<div class="missing-group" style="margin-bottom:10px;display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap">
      <span style="font-weight:700;font-size:13px;color:var(--gray-700);background:var(--gray-100);padding:4px 10px;border-radius:6px;white-space:nowrap;flex-shrink:0">📍 ${dept}</span>
      <div class="missing-names" style="display:flex;flex-wrap:wrap;gap:6px">
        ${names.map(n => `<span class="missing-name" style="font-size:13px;font-weight:600;color:var(--danger);background:var(--danger-light);border:1px solid #fecaca;padding:3px 10px;border-radius:14px;white-space:nowrap">⚠️ ${n}</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}

// ============ Loading Progress ============
let loadingTimer = null;
const LOADING_STEPS = [
  { text: '正在连接服务器...', at: 0 },
  { text: '正在加载用户数据...', at: 30 },
  { text: '即将完成...', at: 80 }
];

function startLoadingCountdown(estSeconds) {
  if (loadingTimer) { clearInterval(loadingTimer); loadingTimer = null; }
  const startTime = Date.now();
  const progressEl = document.getElementById('loadingProgress');
  const countdownEl = document.getElementById('loadingCountdown');
  const stepEl = document.getElementById('loadingStepText');
  loadingTimer = setInterval(() => {
    const elapsed = (Date.now() - startTime) / 1000;
    const progress = Math.min(90, (elapsed / estSeconds) * 90);
    if (progressEl) progressEl.style.width = progress.toFixed(1) + '%';
    const step = LOADING_STEPS.filter(s => progress >= s.at).pop();
    if (step && stepEl) stepEl.textContent = step.text;
    const remaining = Math.max(0, Math.ceil(estSeconds - elapsed));
    if (countdownEl) countdownEl.textContent = remaining > 0 ? '预计还需 ' + remaining + ' 秒' : '即将完成...';
  }, 100);
}

function finishLoadingCountdown() {
  if (loadingTimer) { clearInterval(loadingTimer); loadingTimer = null; }
  const progressEl = document.getElementById('loadingProgress');
  const countdownEl = document.getElementById('loadingCountdown');
  const stepEl = document.getElementById('loadingStepText');
  if (progressEl) progressEl.style.width = '100%';
  if (stepEl) stepEl.textContent = '加载完成！';
  if (countdownEl) countdownEl.textContent = '';
}

function salesMonthOf(d) {
  if (!d) return '';
  const s = (d instanceof Date) ? d.toISOString() : String(d).trim();

  if (m) return m[1] + '-' + String(parseInt(m[2], 10)).padStart(2, '0');
  return '';
}

async function importSalesFile(file) {
  if (typeof XLSX === 'undefined') { showToast('表格解析库未加载，请刷新页面后重试', 'error', 4000); return; }
  try {
    showImportOverlay('正在解析表格…');
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array', cellDates: true });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
    if (!rows.length) { showToast('文件无数据', 'error'); return; }
    const headers = Object.keys(rows[0]);
    if (!headers.includes('销售员所属门店')) {
      showToast('表头校验失败：缺少必需列「销售员所属门店」', 'error', 5000);
      return;
    }
    const get = (r, name) => (r[name] == null ? '' : r[name]);
    const existingKeys = new Set(cloudData.salesRecords.map(e => e.docNo).filter(Boolean));
    const batchKeys = new Set();
    let total = rows.length, kept = 0, filtered = 0, dup = 0;
    const corrected = { 'KA 一部（江浙沪区域）': 0, 'KA 二部（广东区域）': 0, 'KA 三部（全国区域）': 0 };
    const toAdd = [];
    for (const r of rows) {
      const storeRaw = String(get(r, '销售员所属门店') || '').trim();
      if (!storeRaw.startsWith('KA-')) { filtered++; continue; }
      const team = SALES_STORE_CORRECTION[storeRaw] || storeRaw;
      corrected[team] = (corrected[team] || 0) + 1;
      const docNo = String(get(r, '单据编号') || '').trim();
      const key = docNo || (String(get(r, '销售员') || '') + '|' + String(get(r, '单据日期') || '') + '|' + String(get(r, '商品名称') || ''));
      if ((docNo && existingKeys.has(docNo)) || batchKeys.has(key)) { dup++; continue; }
      batchKeys.add(key);
      const docDate = String(get(r, '单据日期') || '');
      const rec = {
        id: genId(),
        salesperson: String(get(r, '销售员') || '').trim(),
        storeRaw: storeRaw,
        team: team,
        docDate: docDate,
        docMonth: salesMonthOf(docDate),
        amount: toNum(get(r, '折后金额')),
        grossProfit: toNum(get(r, '毛利润')),
        productName: String(get(r, '商品名称') || '').trim(),
        docNo: docNo,
        docType: String(get(r, '单据类别') || '').trim(),
        status: String(get(r, '状态') || '').trim(),
        customer: String(get(r, '客户') || '').trim(),
        // 客户来源/品类/客户画像：不允许自动填充，留空由用户在「客户汇总数据」手动选择配置项
        customerSource: '',
        category: '',
        customerProfile: '',
        raw: r,
        createdAt: new Date().toISOString()
      };
      toAdd.push(rec);
      kept++;
    }
    if (toAdd.length) {
      for (let i = 0; i < toAdd.length; i++) {
        await apiCreate('salesRecords', toAdd[i]);
        updateImportOverlay('正在写入业绩数据…', `第 ${i + 1} / ${toAdd.length} 条`);
      }
      cloudData.salesRecords = cloudData.salesRecords.concat(toAdd);
      saveReportsCache();
    }
    hideImportOverlay();
    salesDetailPage = 1;
    showModal('导入完成', `<div class="import-note">
      <div>📄 文件共 <b>${total}</b> 行</div>
      <div>🔽 过滤非 KA 部门整行：<span class="no">${filtered}</span> 行</div>
      <div>✅ 保留 KA 部门：<span class="ok">${kept}</span> 行</div>
      <div>⚠️ 跳过重复：<span class="no">${dup}</span> 行</div>
      <div>🔄 门店校正：一部 ×${corrected['KA 一部（江浙沪区域）'] || 0} / 二部 ×${corrected['KA 二部（广东区域）'] || 0} / 三部 ×${corrected['KA 三部（全国区域）'] || 0}</div>
    </div><div class="modal-footer"><button class="btn btn-primary" onclick="closeModal()">确定</button></div>`);
    renderSalesDetail();
  } catch (e) {
    hideImportOverlay();
    showToast('导入失败：' + e.message, 'error', 5000);
  }
}

async function saveSalesRecord(e, id) {
  e.preventDefault();
  const docDate = document.getElementById('sDocDate').value;
  const team = document.getElementById('sTeam').value;
  const rec = {
    salesperson: document.getElementById('sSalesperson').value.trim(),
    storeRaw: team,
    team: team,
    docDate: docDate,
    docMonth: salesMonthOf(docDate),
    amount: toNum(document.getElementById('sAmount').value),
    grossProfit: toNum(document.getElementById('sGross').value),
    productName: document.getElementById('sProduct').value.trim(),
    docNo: document.getElementById('sDocNo').value.trim(),
    docType: document.getElementById('sDocType').value.trim(),
    status: document.getElementById('sStatus').value.trim(),
    customer: document.getElementById('sCustomer').value.trim()
  };
  try {
    if (id) {
      rec.id = id;
      await apiUpdate('salesRecords', id, rec);
      const i = cloudData.salesRecords.findIndex(x => x.id === id);
      if (i >= 0) cloudData.salesRecords[i] = { ...cloudData.salesRecords[i], ...rec };
    } else {
      rec.id = genId();
      rec.createdAt = new Date().toISOString();
      await apiCreate('salesRecords', rec);
      cloudData.salesRecords.push(rec);
    }
    saveReportsCache();
    closeModal();
    renderSalesDetail();
    showToast('保存成功', 'success');
  } catch (err) { showToast('保存失败: ' + err.message, 'error'); }
  return false;
}

async function deleteSalesRecord(id) {
  if (!confirm('确定删除该业绩记录？')) return;
  try {
    await apiDelete('salesRecords', id);
    cloudData.salesRecords = cloudData.salesRecords.filter(x => x.id !== id);
    saveReportsCache();
    renderSalesDetail();
    showToast('已删除', 'success');
  } catch (e) { showToast('删除失败: ' + e.message, 'error'); }
}

async function renderSalesDetail() {
  const canEdit = hasPermission('salesDetail');
  const f = salesDetailFilters;
  // 筛选
  const base = cloudData.salesRecords.filter(r => {
    const d = (r.docDate || '');
    if (f.start && d && d < f.start) return false;
    if (f.end && d && d > f.end) return false;
    if (f.team && (r.team || '') !== f.team) return false;
    if (f.salesperson && (r.salesperson || '') !== f.salesperson) return false;
    if (f.customer) { const c = (r.customer || '').toLowerCase(); if (!c.includes(f.customer.toLowerCase())) return false; }
    return true;
  });
  const all = base.slice().sort((a, b) => (b.docDate || '').localeCompare(a.docDate || ''));
  // 按年份聚合业绩汇总（降序：最新年在上）
  const byYear = {};
  all.forEach(r => {
    const y = (r.docMonth || '').slice(0, 4);
    if (!y) return;
    (byYear[y] = byYear[y] || []).push(r);
  });
  const yearBlocks = Object.keys(byYear).sort((a, b) => b.localeCompare(a)).map(y => {
    const recsY = byYear[y];
    const amtY = recsY.reduce((s, r) => s + toNum(r.amount), 0);
    const custY = new Set(recsY.map(r => r.customer).filter(Boolean)).size;
    const avgY = custY ? amtY / custY : 0;
    const tm = {};
    recsY.forEach(r => { const t = r.team || '未分配'; tm[t] = (tm[t] || 0) + toNum(r.amount); });
    const pills = Object.keys(tm).map(t => `<div class="team-pill"><div class="t">${esc(t)}</div><div class="a">${fmtSalesMoney(tm[t])}</div></div>`).join('');
    return `
      <div class="year-summary-row">
        <div class="year-label">${esc(y)}</div>
        <div class="year-stats">
          <div class="stat-box primary"><div class="v">${fmtSalesMoney(amtY)}</div><div class="l">总业绩</div></div>
          <div class="stat-box"><div class="v">${custY}</div><div class="l">客户数</div></div>
          <div class="stat-box"><div class="v">${fmtSalesMoney(avgY)}</div><div class="l">客单价</div></div>
        </div>
        <div class="year-teams">
          <div class="ts-title" style="margin:0 0 6px">各部门业绩</div>

    <div class="modal-footer"><button type="button" class="btn btn-outline" onclick="closeModal()">取消</button><button type="submit" class="btn btn-primary">应用到 ${ids.length} 条</button></div>
  </form>`);
}
async function submitBatchEditSales(e) {
  e.preventDefault();
  const ids = [...selectedSalesIds];
  if (!ids.length) { showToast('请先勾选记录', 'warning'); return false; }
  const patch = {};
  const sp = document.getElementById('bSalesperson').value.trim();
  const tm = document.getElementById('bTeam').value;
  const dd = document.getElementById('bDocDate').value;
  const am = document.getElementById('bAmount').value;
  const gp = document.getElementById('bGross').value;
  const dt = document.getElementById('bDocType').value.trim();
  const st = document.getElementById('bStatus').value.trim();
  const cu = document.getElementById('bCustomer').value.trim();
  if (sp) patch.salesperson = sp;
  if (tm) { patch.team = tm; patch.storeRaw = tm; }
  if (dd) { patch.docDate = dd; patch.docMonth = salesMonthOf(dd); }
  if (am !== '') patch.amount = toNum(am);
  if (gp !== '') patch.grossProfit = toNum(gp);
  if (dt) patch.docType = dt;
  if (st) patch.status = st;
  if (cu) patch.customer = cu;
  if (!Object.keys(patch).length) { showToast('没有填写任何要修改的字段', 'warning'); return false; }
  showToast('正在批量更新 ' + ids.length + ' 条...', 'info');
  try {
    for (const id of ids) {
      const rec = cloudData.salesRecords.find(r => r.id === id);
      if (!rec) continue;
      await apiUpdate('salesRecords', id, patch);
      Object.assign(rec, patch);
    }
    saveReportsCache();
    closeModal();
    clearSalesSelection();
    renderSalesDetail();
    showToast('已批量更新 ' + ids.length + ' 条', 'success');
  } catch (err) { showToast('批量更新失败: ' + err.message, 'error'); }
  return false;
}
async function batchDeleteSales() {
  const ids = [...selectedSalesIds];
  if (!ids.length) { showToast('请先勾选记录', 'warning'); return; }
  if (!confirm('确认删除选中的 ' + ids.length + ' 条业绩记录？此操作不可撤销。')) return;
  try {
    for (const id of ids) { try { await apiDelete('salesRecords', id); } catch (e) { console.warn('Delete failed:', id, e.message); } }
    cloudData.salesRecords = cloudData.salesRecords.filter(r => !selectedSalesIds.has(r.id));
    selectedSalesIds.clear();
    saveReportsCache();
    renderSalesDetail();
    showToast('已删除 ' + ids.length + ' 条', 'success');
  } catch (e) { showToast('删除失败: ' + e.message, 'error'); }
}

function aggregateSourceSummary(year) {
  const filtered = cloudData.salesRecords.filter(r => (r.docMonth || '').startsWith(year));
  // 第一步：按客户汇总数据维度聚合（年月 × 销售员 × 客户）
  const groups = {};
  filtered.forEach(r => {
    const key = (r.docMonth || '') + '|' + (r.salesperson || '') + '|' + (r.customer || '');
    if (!groups[key]) groups[key] = { docMonth: r.docMonth || '', customer: r.customer || '', customerSource: r.customerSource || '', amount: 0 };
    const g = groups[key];
    g.amount += toNum(r.amount);
    if (!g.customerSource && r.customerSource) g.customerSource = r.customerSource;
  });
  // 第二步：按客户来源 + 月份聚合（单数=去重客户数）
  // 只认可表单配置中的来源选项；非配置值（如导入残留的"生意通/销货宝"）归入「(未设置)」
  const cfgSrc = (cloudData.formConfig && cloudData.formConfig.customerTags && cloudData.formConfig.customerTags.customerSource) || [];
  const srcMap = {};
  Object.values(groups).forEach(g => {
    let src = g.customerSource || '(未设置)';
    if (src !== '(未设置)' && !cfgSrc.includes(src)) src = '(未设置)';
    const mm = g.docMonth.slice(5);
    if (!srcMap[src]) srcMap[src] = {};
    if (!srcMap[src][mm]) srcMap[src][mm] = { countSet: new Set(), amount: 0 };
    srcMap[src][mm].countSet.add(g.customer);
    srcMap[src][mm].amount += g.amount;
  });
  return srcMap;
}

function renderSourceSummaryTable(year) {
  const wrap = document.getElementById('srcTableWrap');
  const srcMap = aggregateSourceSummary(year);

function aggregateProfileSummary(year) {
  const filtered = cloudData.salesRecords.filter(r => (r.docMonth || '').startsWith(year));
  // 第一步：按客户汇总数据维度聚合（年月 × 销售员 × 客户）
  const groups = {};
  filtered.forEach(r => {
    const key = (r.docMonth || '') + '|' + (r.salesperson || '') + '|' + (r.customer || '');
    if (!groups[key]) groups[key] = { docMonth: r.docMonth || '', customer: r.customer || '', customerProfile: r.customerProfile || '', amount: 0 };
    const g = groups[key];
    g.amount += toNum(r.amount);
    if (!g.customerProfile && r.customerProfile) g.customerProfile = r.customerProfile;
  });
  // 第二步：按客户画像 + 月份聚合（单数=去重客户数）
  // 只认可表单配置中的画像选项；非配置值归入「(未设置)」
  const cfgProfile = (cloudData.formConfig && cloudData.formConfig.customerTags && cloudData.formConfig.customerTags.customerProfile) || [];
  const profileMap = {};
  Object.values(groups).forEach(g => {
    let prof = g.customerProfile || '(未设置)';
    if (prof !== '(未设置)' && !cfgProfile.includes(prof)) prof = '(未设置)';
    const mm = g.docMonth.slice(5);
    if (!profileMap[prof]) profileMap[prof] = {};
    if (!profileMap[prof][mm]) profileMap[prof][mm] = { countSet: new Set(), amount: 0 };
    profileMap[prof][mm].countSet.add(g.customer);
    profileMap[prof][mm].amount += g.amount;
  });
  return profileMap;
}

function csTagColorStyle(val, opts) {
  if (!val) return '';
  const i = opts.indexOf(val);
  const palette = [
    ['#E3F2FD', '#0D47A1'], ['#E8F5E9', '#1B5E20'], ['#FFF3E0', '#E65100'],
    ['#FCE4EC', '#880E4F'], ['#F3E5F5', '#4A148C'], ['#E0F7FA', '#006064'],
    ['#FFF9C4', '#F57F17'], ['#EDE7F6', '#311B92'], ['#FFEBEE', '#B71C1C'],
    ['#E8EAF6', '#1A237E'], ['#F1F8E9', '#33691E'], ['#FBE9E7', '#BF360C']
  ];
  const c = palette[((i % palette.length) + palette.length) % palette.length];
  return `background:${c[0]};color:${c[1]};border-color:${c[0]};font-weight:600`;
}
function csPaintTag(sel) {
  const group = sel.dataset.group;
  const opts = ((cloudData.formConfig && cloudData.formConfig.customerTags) || {})[group] || [];
  const st = csTagColorStyle(sel.value, opts);
  if (st) {
    sel.style.background = st.split(';')[0].split(':')[1];
    sel.style.color = st.split(';')[1].split(':')[1];
    sel.style.borderColor = st.split(';')[2].split(':')[1];
    sel.style.fontWeight = '600';
  } else {
    sel.style.background = '';
    sel.style.color = '';
    sel.style.borderColor = '';
    sel.style.fontWeight = '';
  }
}

    const dm = r.docMonth || '';

    if (dept && (r.team || '') !== dept) return false;
    if (person && (r.salesperson || '') !== person) return false;

  });
  const groups = {};
  filtered.forEach(r => {

    if (!g.customerSource && r.customerSource) g.customerSource = r.customerSource;

  });
  const rows = Object.keys(groups).map(k => groups[k]).sort((a, b) => (a.docMonth + a.salesperson + a.customer).localeCompare(b.docMonth + b.salesperson + b.customer));
  csAllRows = rows;
  // 分页
  const totalRows = rows.length;
  const totalPages = Math.max(1, Math.ceil(totalRows / csPageSize));
  if (csPage > totalPages) csPage = totalPages;
  if (csPage < 1) csPage = 1;
  const startIdx = (csPage - 1) * csPageSize;
  const pageRows = rows.slice(startIdx, startIdx + csPageSize);
  csPageRows = pageRows;
  const allSelOnPage = pageRows.length > 0 && pageRows.every(g => csSelectedKeys.has(g.docMonth + '|' + g.salesperson + '|' + g.customer));
  const tagSelect = (group, aggKey, curVal) => {
    const opts = (cfg[group] || []);
    const encKey = encodeURIComponent(aggKey);
    const styleBase = "width:100%;min-width:90px;padding:4px 8px;height:auto;font-size:13px";
    // 只认可表单配置内的值；真实数据值不再自动回填，也不在选项列表里出现
    const effectiveVal = curVal && opts.includes(curVal) ? curVal : '';
    const styleColor = effectiveVal ? csTagColorStyle(effectiveVal, opts) : '';
    let h = `<select class="form-control cs-tag-select" data-group="${group}" style="${styleBase}${styleColor ? ';' + styleColor : ''}" ${canEdit ? '' : 'disabled'} onchange="saveCustomerTag('${group}','${encKey}',encodeURIComponent(this.value));csPaintTag(this)"><option value="">未设置</option>`;
    opts.forEach(o => {
      const selected = (effectiveVal === o) ? 'selected' : '';
      h += `<option value="${esc(o)}" ${selected}>${esc(o)}</option>`;
    });
    h += '</select>';
    return h;
  };
  const wrap = document.getElementById('csTableWrap');
  if (!totalRows) { wrap.innerHTML = '<div style="padding:30px;text-align:center;color:var(--gray-400)">无匹配数据，请调整查询条件</div>'; updateCsBatchBar(0); return; }
  const rowsHtml = pageRows.map((g, idx) => {
    const aggKey = g.docMonth + '|' + g.salesperson + '|' + g.customer;
    const checked = csSelectedKeys.has(aggKey) ? 'checked' : '';
    return `<tr>
      <td style="text-align:center"><input type="checkbox" class="cs-check" data-idx="${idx}" ${checked} onchange="csToggleSelect(${idx}, this.checked)"></td>
      <td>${esc(g.docMonth)}</td>
      <td>${esc(g.salesperson)}${userStatusBadge(g.salesperson, userMap)}</td>
      <td>${esc(g.customer) || '-'}</td>
      <td class="num">${fmtSalesMoney(g.amount)}</td>
      <td><span class="badge badge-team">${esc(g.team) || '-'}</span></td>
      <td>${tagSelect('customerSource', aggKey, g.customerSource)}</td>
      <td>${tagSelect('category', aggKey, g.category)}</td>
      <td>${tagSelect('customerProfile', aggKey, g.customerProfile)}</td>
    </tr>`;
  }).join('');
  const pager = `
    <div class="pager">
      <button class="btn btn-outline btn-sm" onclick="csGotoPage(${csPage - 1})" ${csPage <= 1 ? 'disabled' : ''}>上一页</button>
      <span class="pager-info">第 ${csPage} / ${totalPages} 页 · 共 ${totalRows} 条（已选 ${csSelectedKeys.size} 组）</span>
      <button class="btn btn-outline btn-sm" onclick="csGotoPage(${csPage + 1})" ${csPage >= totalPages ? 'disabled' : ''}>下一页</button>
      <select class="form-control" style="width:auto;display:inline-block;margin-left:8px" onchange="csSetPageSize(this.value)">
        ${[20, 50, 100].map(s => `<option value="${s}" ${s === csPageSize ? 'selected' : ''}>${s} 条/页</option>`).join('')}
      </select>
    </div>`;
  const headCheck = `<th style="text-align:center;width:40px"><input type="checkbox" id="csHeadCheck" ${allSelOnPage?'checked':''} onchange="csToggleAll(this.checked)"></th>`;
  wrap.innerHTML = `<table><thead><tr>${headCheck}<th>年/月</th><th>销售员</th><th>客户</th><th class="num">折后总金额</th><th>销售员所属门店</th><th>客户来源</th><th>品类</th><th>客户画像</th></tr></thead><tbody>${rowsHtml}</tbody></table>${pager}`;
  updateCsBatchBar(totalRows);
}

async function saveCustomerTag(group, encKey, encVal) {
  if (!hasPermission('salesDetail')) { showToast('无编辑权限', 'error'); renderCustomerSummary(); return; }
  const key = decodeURIComponent(encKey);
  const val = decodeURIComponent(encVal);
  const parts = key.split('|');
  if (parts.length < 3) return;
  const [dm, sp, cust] = parts;
  let n = 0, fail = 0;
  for (const r of cloudData.salesRecords) {
    if (r.docMonth === dm && r.salesperson === sp && (r.customer || '') === cust) {
      r[group] = val;
      if (r.id) {
        try { await apiUpdate('salesRecords', r.id, { [group]: val }); n++; }
        catch (e) { fail++; console.warn('saveCustomerTag 写入失败:', r.id, e); }
      } else fail++;
    }
  }
  saveReportsCache();
  if (salesBoardTab === 'source') renderSalesBoardSource();
  if (salesBoardTab === 'profile') renderSalesBoardProfile();
  if (fail) showToast('已保存 ' + n + ' 条，' + fail + ' 条缺少存储键未写入', 'error', 2500);
  else showToast('已保存（' + n + ' 条明细）', 'success', 1500);
}

function lyMonth(mm) { const p = String(mm).split('-'); return (parseInt(p[0], 10) - 1) + '-' + p[1]; }

// ===== 客户汇总：分页 / 勾选 / 批量设置 / 导出 =====
function csRefilter() { csPage = 1; csSelectedKeys.clear(); renderCustomerSummary(); }
function csGotoPage(p) { csPage = p; renderCustomerSummary(); }
function csSetPageSize(v) { csPageSize = parseInt(v, 10) || 20; csPage = 1; renderCustomerSummary(); }
function csKeyOf(g) { return g.docMonth + '|' + g.salesperson + '|' + (g.customer || ''); }

function csToggleSelect(idx, checked) {
  const g = csPageRows[idx];
  if (!g) return;
  const key = csKeyOf(g);
  if (checked) csSelectedKeys.add(key); else csSelectedKeys.delete(key);
  const head = document.getElementById('csHeadCheck');
  if (head) head.checked = csPageRows.length > 0 && csPageRows.every(x => csSelectedKeys.has(csKeyOf(x)));
  updateCsBatchBar(csAllRows.length);
}

function csToggleAll(checked) {
  csPageRows.forEach(g => { const k = csKeyOf(g); if (checked) csSelectedKeys.add(k); else csSelectedKeys.delete(k); });
  renderCustomerSummary();
}

function csClearSelection() { csSelectedKeys.clear(); renderCustomerSummary(); }

function updateCsBatchBar(totalRows) {
  const bar = document.getElementById('csBatchBar');
  if (!bar) return;
  const n = csSelectedKeys.size;
  if (!n) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  bar.innerHTML = `<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <span>已选 <b>${n}</b> 组客户</span>
    <button class="btn btn-primary btn-sm" onclick="openCsBatchTagModal()">🏷️ 批量设置标签</button>
    <button class="btn btn-outline btn-sm" onclick="csClearSelection()">取消选择</button>
  </div>`;
}

function openCsBatchTagModal() {
  if (!hasPermission('salesDetail')) { showToast('无编辑权限', 'error'); return; }
  if (!csSelectedKeys.size) { showToast('请先勾选客户', 'error'); return; }
  const cfg = (cloudData.formConfig && cloudData.formConfig.customerTags) || { customerSource: [], category: [], customerProfile: [] };
  const optHtml = (group) => ['<option value="">不修改</option>', '<option value="__clear__">⨉ 清空</option>'].concat((cfg[group] || []).map(o => `<option value="${esc(o)}">${esc(o)}</option>`)).join('');
  const html = `<div class="import-note" style="margin-bottom:12px">🏷️ 对选中的 <b>${csSelectedKeys.size}</b> 组客户设置标签（留「不修改」保持原值，「清空」置空）。设置将应用到该客户对应的全部明细记录。</div>
    <div class="form-group"><label>客户来源</label><select class="form-control" id="csbSource">${optHtml('customerSource')}</select></div>
    <div class="form-group"><label>品类</label><select class="form-control" id="csbCategory">${optHtml('category')}</select></div>
    <div class="form-group"><label>客户画像</label><select class="form-control" id="csbProfile">${optHtml('customerProfile')}</select></div>
    <div class="modal-footer"><button type="button" class="btn btn-outline" onclick="closeModal()">取消</button><button type="button" class="btn btn-primary" onclick="applyCsBatchTags()">确定设置</button></div>`;
  showModal('批量设置客户标签', html);
}

async function applyCsBatchTags() {
  const source = document.getElementById('csbSource').value;
  const category = document.getElementById('csbCategory').value;
  const profile = document.getElementById('csbProfile').value;
  if (!source && !category && !profile) { showToast('请至少选择一个要设置的字段', 'error'); return; }
  if (!confirm('确定将所选 ' + csSelectedKeys.size + ' 组客户的标签设置应用到全部明细？')) return;
  let total = 0;
  try {
    for (const key of [...csSelectedKeys]) {
      const parts = key.split('|');
      if (parts.length < 3) continue;
      const [dm, sp, cust] = parts;
      const patch = {};
      if (source) patch.customerSource = (source === '__clear__' ? '' : source);
      if (category) patch.category = (category === '__clear__' ? '' : category);
      if (profile) patch.customerProfile = (profile === '__clear__' ? '' : profile);
      for (const r of cloudData.salesRecords) {
        if (r.docMonth === dm && r.salesperson === sp && (r.customer || '') === cust) {
          if (source) r.customerSource = (source === '__clear__' ? '' : source);
          if (category) r.category = (category === '__clear__' ? '' : category);
          if (profile) r.customerProfile = (profile === '__clear__' ? '' : profile);
          if (r.id) { await apiUpdate('salesRecords', r.id, patch); total++; }
        }
      }
    }
    saveReportsCache();
    closeModal();
    csSelectedKeys.clear();
    renderCustomerSummary();
    if (salesBoardTab === 'source') renderSalesBoardSource();
    if (salesBoardTab === 'profile') renderSalesBoardProfile();
    showToast('已批量设置（' + total + ' 条明细）', 'success');
  } catch (e) { showToast('批量设置失败：' + e.message, 'error', 4000); }
}

function csExportCustomerSummary() {
  if (!csAllRows.length) { showToast('当前无数据可导出', 'error'); return; }
  if (typeof XLSX === 'undefined') { showToast('表格组件未加载，请刷新页面', 'error'); return; }
  const headers = ['年/月', '销售员', '客户', '折后总金额', '销售员所属门店', '客户来源', '品类', '客户画像'];
  const aoa = [headers];
  csAllRows.forEach(g => { aoa.push([g.docMonth, g.salesperson, g.customer, g.amount, g.team, g.customerSource, g.category, g.customerProfile]); });
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '客户汇总');
  const year = document.getElementById('csYear').value;
  const monthLabel = csMonths.length ? ('_' + csMonths.map(m => (parseInt(m, 10)) + '月').join('')) : '';
  const fname = '客户汇总_' + year + monthLabel + '.xlsx';
  XLSX.writeFile(wb, fname);
  showToast('已导出 ' + csAllRows.length + ' 条（筛选结果）', 'success');
}

function sbSortBy(col) {
  if (sbSortCol === col) { sbSortDir = sbSortDir === 'asc' ? 'desc' : 'asc'; }
  else { sbSortCol = col; sbSortDir = 'desc'; }
  renderSalesBoards();
}

function renderSalesBoardTable(tid, key) {
  const months = sbMonthList();
  const map = {};
  cloudData.salesRecords.forEach(r => {
    const dm = r.docMonth || '';
    if (!months.includes(dm)) return;
    const k = r[key] || '(未分类)';
    if (!map[k]) map[k] = {};
    map[k][dm] = (map[k][dm] || 0) + toNum(r.amount);
  });
  let rowsArr = Object.keys(map).map(k => {
    const row = { k };
    let t = 0;
    months.forEach(m => { row[m] = map[k][m] || 0; t += row[m]; });
    row.t = t;
    return row;
  });
  if (sbSortCol) {
    rowsArr.sort((a, b) => {
      const va = sbSortCol === 'total' ? a.t : (a[sbSortCol] || 0);
      const vb = sbSortCol === 'total' ? b.t : (b[sbSortCol] || 0);
      return sbSortDir === 'asc' ? va - vb : vb - va;
    });
  } else {
    rowsArr.sort((a, b) => b.t - a.t);
  }
  const userMap = key === 'salesperson' ? buildUserStatusMap() : null;
  let h = '<thead><tr><th>' + (key === 'salesperson' ? '销售员' : '团队/门店') + '</th>';
  months.forEach(m => {
    const ind = sbSortCol === m ? (sbSortDir === 'asc' ? '▲' : '▼') : '↕';
    const act = sbSortCol === m ? ' active' : '';
    h += `<th class="num sort-th${act}" onclick="sbSortBy('${m}')">${m.slice(5)}月<span class="sort-ind${act}">${ind}</span></th>`;
  });
  const totInd = sbSortCol === 'total' ? (sbSortDir === 'asc' ? '▲' : '▼') : '↕';
  const totAct = sbSortCol === 'total' ? ' active' : '';
  h += `<th class="num sort-th${totAct}" onclick="sbSortBy('total')">合计<span class="sort-ind${totAct}">${totInd}</span></th></tr></thead><tbody>`;
  const colTot = {};
  rowsArr.forEach(row => {
    const label = key === 'team' ? `<span class="badge badge-team">${esc(row.k)}</span>` : (esc(row.k) + userStatusBadge(row.k, userMap));
    h += `<tr><td>${label}</td>`;
    months.forEach(m => {
      const v = map[row.k][m] || 0;
      colTot[m] = (colTot[m] || 0) + v;
      let cell = `<td class="num">${fmtSalesMoney(v)}`;
      if (key === 'team') {
        const lyv = (sbLastYearTeamMap[row.k] && sbLastYearTeamMap[row.k][lyMonth(m)]) ? sbLastYearTeamMap[row.k][lyMonth(m)] : 0;
        if (lyv > 0) {
          const g = (v - lyv) / lyv * 100;
          cell += `<div class="${g >= 0 ? 'yoy-pos' : 'yoy-neg'}">${g >= 0 ? '+' : ''}${g.toFixed(1)}% 同比</div>`;
        } else {
          cell += `<div class="yoy-none">— 同比</div>`;
        }
      }
      cell += `</td>`;
      h += cell;
    });
    h += `<td class="num">${fmtSalesMoney(row.t)}</td></tr>`;
  });
  h += '</tbody><tfoot><tr class="total-row"><td>合计</td>';
  let gt = 0;
  months.forEach(m => { gt += (colTot[m] || 0); h += `<td class="num">${fmtSalesMoney(colTot[m] || 0)}</td>`; });
  h += `<td class="num">${fmtSalesMoney(gt)}</td></tr></tfoot>`;
  document.getElementById(tid).innerHTML = h;
}

(async function init() {
  // Start loading background image IMMEDIATELY (has nothing to do with Firebase)
  const bgImg = new Image();
  bgImg.onload = function() {
    const lw = document.getElementById('loginView');
    if (lw) lw.classList.add('bg-loaded');
  };
  bgImg.src = 'login-bg.jpg';

  // Phase 0: Start loading users in background (NON-BLOCKING)
  _usersDataPromise = loadUsersOnly();
  // Phase 1: Start loading config data in background (NON-BLOCKING)
  _coreDataPromise = _usersDataPromise.then(() => loadCoreData()).then(() => {
    applyBrandConfig();
  });
  // NOTE: 报表数据不再于启动时无条件拉取（那时 currentUser 尚为 null 会触发全量下载）。
  // 改为登录后（doLogin / 自动登录）再按角色加载，成员仅取自己数据，并用本地缓存秒开。

  // Show login form IMMEDIATELY — don't wait for Firebase
  const loadingEl = document.getElementById('loginLoading');
  if (loadingEl) loadingEl.style.display = 'none';
  const formBox = document.getElementById('loginFormBox');
  if (formBox) formBox.style.display = '';
  document.getElementById('loginView').classList.remove('hidden');

  // Check for saved session (auto-login)
  const saved = localStorage.getItem(SESSION_KEY);
  if (saved) {
    currentUser = JSON.parse(saved);
    // Wait for users data to verify saved session
    if (_usersDataPromise) { try { await _usersDataPromise; } catch(e){} }
    const user = cloudData.users.find(u => u.id === currentUser.id && u.active);
    if (user) {
      currentUser = {id:user.id,username:user.username,name:user.name,department:user.department,role:user.role};
      localStorage.setItem(SESSION_KEY, JSON.stringify(currentUser));
      // Wait for config data before showing dashboard
      if (_coreDataPromise) { try { await _coreDataPromise; } catch(e){} }
      // Wait for report data (cache hit → instant; otherwise spinner) before showing dashboard
      if (!reportsLoaded) {
        if (loadingEl) {
          loadingEl.innerHTML = '<div style="font-size:36px;margin-bottom:14px;animation:spin 1.5s linear infinite;display:inline-block">⏳</div><div id="loadingStepText" style="font-size:15px;font-weight:600;margin-bottom:16px;color:#fff">正在加载报表数据...</div><div style="width:260px;height:6px;background:rgba(255,255,255,.15);border-radius:3px;margin:0 auto 10px;overflow:hidden"><div id="loadingProgress" style="width:0%;height:100%;background:linear-gradient(90deg,#3b82f6,#06b6d4);border-radius:3px;transition:width .3s ease"></div></div><div id="loadingCountdown" style="font-size:12px;color:rgba(255,255,255,.55)">正在准备...</div>';
          loadingEl.style.display = '';
        }
        if (formBox) formBox.style.display = 'none';
        await loadReportData();
        if (loadingEl) loadingEl.style.display = 'none';
        if (formBox) formBox.style.display = '';
      }
      document.getElementById('loginView').classList.add('hidden');
      document.getElementById('appLayout').classList.remove('hidden');
      document.getElementById('sidebarName').textContent = currentUser.name;
      document.getElementById('sidebarDept').textContent = currentUser.department;
      document.getElementById('sidebarAvatar').textContent = currentUser.name.charAt(0);
      document.getElementById('userWelcome').textContent = `👋 欢迎，${currentUser.name}`;
      updateNavVisibility();
      navTo('dashboard');
      return;
    }
  }
})();
</script>
