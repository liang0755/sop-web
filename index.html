  Chart.defaults.font.family = '-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Microsoft YaHei",sans-serif';
  Chart.defaults.font.size = 12;
  Chart.defaults.color = '#6b7280';

  if (summaryTab === 'totals') {
    // Chart 1: Channel comparison bar chart
    const chCanvas = document.getElementById('sumChartChannel');
    if (chCanvas) {
      const chData = summaryData.byChannel.filter(c => c.count > 0);
      if (chData.length > 0) {
        _summaryCharts.channel = new Chart(chCanvas, {
          type: 'bar',
          data: {
            labels: chData.map(c => c.channel),

              {label:'有效建联', data:chData.map(c=>c.effectiveContacts), backgroundColor:'#16a34a', borderRadius:4},
              {label:'AB意向', data:chData.map(c=>c.abIntent), backgroundColor:'#f59e0b', borderRadius:4},

            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 8 } } },
            scales: { x: { stacked: false, grid: { display: false } }, y: { beginAtZero: true, grid: { color: '#f3f4f6' } } }
          }
        });
      }
    }

    // Chart 2: Submission trend line chart
    const trendCanvas = document.getElementById('sumChartTrend');

          type: 'line',

            labels: sortedDates.map(d => d.substring(5)),

              pointBackgroundColor: '#2563eb'
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },

          }
        });
      }
    }
  } else {
    // Comparison chart for byPerson/byDepartment/byChannel tabs

    if (!cmpCanvas) return;
    let data, labelKey;
    if (summaryTab === 'byPerson') { data = summaryData.byPerson; labelKey = 'name'; }
    else if (summaryTab === 'byDepartment') { data = summaryData.byDepartment; labelKey = 'department'; }
    else { data = summaryData.byChannel; labelKey = 'channel'; }
    data = data.filter(d => d.count > 0);
    if (data.length === 0) return;
    const labels = data.map(d => d[labelKey] || d.name || d.department || d.channel);

    _summaryCharts.compare = new Chart(cmpCanvas, {

function exportSummaryCSV() {
  if (!summaryData) { alert('请先查询汇总数据'); return; }
  const type = document.getElementById('sumType').value;
  const s = document.getElementById('sumStart').value;
  const e = document.getElementById('sumEnd').value;
  const typeLabel = type === 'daily' ? '日报' : '周报';
  const f = v => v > 0 ? v.toLocaleString() : '0';
  const fm = v => v > 0 ? v.toLocaleString() : '0';
  // CSV 转义：值包含逗号/引号/换行时用双引号包裹，内部双引号转义为两个双引号
  const esc = v => {
    if (v === null || v === undefined) return '';
    const str = String(v);
    if (str.includes(',') || str.includes('"') || str.includes('\n') || str.includes('\r')) {
      return '"' + str.replace(/"/g, '""') + '"';
    }
    return str;
  };
  const rows = [];

  if (summaryTab === 'totals') {
    const t = summaryData.totals;
    rows.push(['指标','数值'].join(','));
    rows.push(['报告总数', summaryData.count].map(esc).join(','));
    rows.push(['新增精准线索', f(t.newLeads)].map(esc).join(','));
    rows.push(['有效建联数', f(t.effectiveContacts)].map(esc).join(','));
    rows.push(['AB意向数', f(t.abIntent)].map(esc).join(','));
    rows.push(['成交客户数', f(t.closedCustomers)].map(esc).join(','));
    rows.push(['成交金额', fm(t.dealAmount)].map(esc).join(','));
    rows.push(['建联转AB率', t.contactToAbRate].map(esc).join(','));
    rows.push(['目标金额', fm(t.targetAmount)].map(esc).join(','));
    rows.push(['完成率', t.completionRate].map(esc).join(','));
  } else if (summaryTab === 'byDepartment') {
    // 按部门→渠道分组导出：每个部门一个小节，列出该部门各渠道明细 + 小计
    const deptChannels = {};
    const deptSummary = {};
    summaryData.byDepartment.forEach(d => { deptSummary[d.department || '未分组'] = d; });
    const channelOrder = (summaryData.byChannel || []).map(c => c.channel);
    (summaryData.reports || []).forEach(r => {
      if (summaryFilters.person && r.name !== summaryFilters.person) return;
      if (summaryFilters.dept && r.department !== summaryFilters.dept) return;
      const dept = r.department || '未分组';
      if (!deptChannels[dept]) deptChannels[dept] = {};
      (r.channels || []).forEach(ch => {
        if (summaryFilters.channel && ch.channel !== summaryFilters.channel) return;
        const cn = ch.channel;
        if (!deptChannels[dept][cn]) deptChannels[dept][cn] = {channel:cn, newLeads:0, effectiveContacts:0, abIntent:0, closedCustomers:0, dealAmount:0, targetAmount:0, count:0};
        const x = deptChannels[dept][cn];
        x.newLeads += parseFloat(ch.newLeads) || 0;
        x.effectiveContacts += parseFloat(ch.effectiveContacts) || 0;
        x.abIntent += parseFloat(ch.abIntent) || 0;
        x.closedCustomers += parseFloat(ch.closedCustomers) || 0;
        x.dealAmount += parseFloat(ch.dealAmount) || 0;
        x.targetAmount += parseFloat(ch.targetAmount) || 0;
        x.count++;
      });
    });
    const cr = o => { o.contactToAbRate = o.effectiveContacts>0 ? (o.abIntent/o.effectiveContacts*100).toFixed(2)+'%' : '0%'; o.completionRate = o.targetAmount>0 ? (o.dealAmount/o.targetAmount*100).toFixed(2)+'%' : '0%'; };
    const chHeaders = ['渠道','报告数','新增线索','有效建联','AB意向','成交客户','成交金额','建联转AB率','目标金额','完成率'];
    Object.keys(deptChannels).sort().forEach(dept => {
      const chMap = deptChannels[dept];
      const ds = deptSummary[dept] || {};
      Object.values(chMap).forEach(cr);
      const seen = new Set();
      const orderedRows = [];
      channelOrder.forEach(cn => { if (chMap[cn]) { seen.add(cn); orderedRows.push(chMap[cn]); } });
      Object.values(chMap).forEach(c => { if (!seen.has(c.channel)) orderedRows.push(c); });
      rows.push('');
      rows.push(['【' + dept + '】（' + orderedRows.length + '个渠道）'].map(esc).join(','));
      rows.push(chHeaders.join(','));
      orderedRows.forEach(c => {
        rows.push([c.channel, c.count, f(c.newLeads), f(c.effectiveContacts), f(c.abIntent), f(c.closedCustomers), fm(c.dealAmount), c.contactToAbRate, fm(c.targetAmount), c.completionRate].map(esc).join(','));
      });
      rows.push(['小计', ds.count||0, f(ds.newLeads), f(ds.effectiveContacts), f(ds.abIntent), f(ds.closedCustomers), fm(ds.dealAmount), ds.contactToAbRate, fm(ds.targetAmount), ds.completionRate].map(esc).join(','));
    });
  } else {
    let data, titleCol, headers;
    if (summaryTab === 'byPerson') {
      data = summaryData.byPerson; titleCol = '姓名';
      headers = ['姓名','部门','报告数','新增线索','有效建联','AB意向','成交客户','成交金额','建联转AB率','目标金额','完成率'];
    } else {
      data = summaryData.byChannel; titleCol = '渠道';
      headers = ['渠道','报告数','新增线索','有效建联','AB意向','成交客户','成交金额','建联转AB率','目标金额','完成率'];
    }
    rows.push(headers.join(','));
    data.forEach(d => {
      const nm = d.name || d.department || d.channel;
      const sub = summaryTab === 'byPerson' ? (d.department || '') : '';
      const row = summaryTab === 'byPerson'
        ? [nm, sub, d.count||0, f(d.newLeads), f(d.effectiveContacts), f(d.abIntent), f(d.closedCustomers), fm(d.dealAmount), d.contactToAbRate, fm(d.targetAmount), d.completionRate]
        : [nm, d.count||0, f(d.newLeads), f(d.effectiveContacts), f(d.abIntent), f(d.closedCustomers), fm(d.dealAmount), d.contactToAbRate, fm(d.targetAmount), d.completionRate];
      rows.push(row.map(esc).join(','));
    });
  }

  // Add filter info at top
  const deptLabel = summaryFilters.dept || '全部部门';
  const personLabel = summaryFilters.person || '全部人员';
  const channelLabel = summaryFilters.channel || '全部渠道';
  const filterInfo = [
    '# ' + typeLabel + '汇总数据导出',
    '# 查询区间: ' + (s||'全部') + ' 至 ' + (e||'全部'),
    '# 汇总维度: ' + (summaryTab==='byPerson'?'按人员':summaryTab==='byDepartment'?'按部门':summaryTab==='byChannel'?'按渠道':'总计'),
    '# 筛选部门: ' + deptLabel,
    '# 筛选人员: ' + personLabel,
    '# 筛选渠道: ' + channelLabel,
    '# 导出时间: ' + new Date().toLocaleString('zh-CN'),
    ''
  ];
  const csv = '\uFEFF' + filterInfo.join('\n') + rows.join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const tabLabel = summaryTab==='byPerson'?'按人员':summaryTab==='byDepartment'?'按部门':summaryTab==='byChannel'?'按渠道':'总计';
  let nameParts = [typeLabel + '汇总_' + tabLabel];
  if (s || e) nameParts.push((s||'') + '至' + (e||''));
  if (summaryFilters.dept) nameParts.push(summaryFilters.dept);
  if (summaryFilters.person) nameParts.push(summaryFilters.person);
  if (summaryFilters.channel) nameParts.push(summaryFilters.channel);
  nameParts.push(new Date().toISOString().split('T')[0]);
  a.download = nameParts.join('_') + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function getDepartments() {
  return cloudData.departments && cloudData.departments.length > 0
    ? cloudData.departments
    : [...new Set(cloudData.users.map(u => u.department).filter(d => d))].sort();
}

// ===== 部门名归一化（修复 "KA二部" 与 "KA 二部" 空格不一致导致匹配失败）=====
// 比较时去掉所有空白；存储时尽量映射回主数据里的规范（带空格）部门名
function normDeptKey(d) { return (d || '').replace(/\s/g, ''); }
function getDeptCanonicalMap() {
  const map = {};
  getDepartments().forEach(d => { if (d) map[normDeptKey(d)] = d; });
  return map;
}
function canonDept(d) {
  if (!d) return d;
  const map = getDeptCanonicalMap();
  const key = normDeptKey(d);
  return map[key] || d;
}

async function addUser(e) {
  e.preventDefault();
  const name = document.getElementById('newUserName').value.trim();
  const isBasic = document.getElementById('newUserIsBasic').checked;
  const hireDate = document.getElementById('newUserHireDate').value || '';
  const leaveDate = document.getElementById('newUserLeaveDate').value || '';
  if (!name) { alert('请输入姓名'); return false; }
  let department = document.getElementById('newUserDept').value;
  if (department === '__custom__') {
    department = document.getElementById('newUserDeptCustom').value.trim();
  }
  if (!department) { alert('请选择或输入部门'); return false; }
  let user;
  if (isBasic) {
    // 基础用户：无登录账号，仅用于数据统计
    user = {id:genId(),username:'',password:'',name,department,role:'member',active:true,isBasic:true,hireDate,leaveDate,createdAt:new Date().toISOString()};
  } else {
    const username = document.getElementById('newUserUsername').value.trim();
    const password = document.getElementById('newUserPassword').value;
    if (!username) { alert('请输入用户名'); return false; }
    if (!password) { alert('请输入密码'); return false; }
    const role = document.getElementById('newUserRole').value;
    if (cloudData.users.find(u => u.username === username)) { alert('用户名已存在'); return false; }
    const hp = await hashPassword(password);
    user = {id:genId(),username,password:hp,name,department,role,active:true,isBasic:false,hireDate,leaveDate,createdAt:new Date().toISOString()};
  }
  try { await apiCreate('users', user); cloudData.users.push(user); }
  catch(err) { showToast('创建失败: ' + err.message, 'error', 4000); return false; }
  // Auto-add new department to list if not exists
  if (!cloudData.departments.includes(department)) {
    cloudData.departments.push(department);
    cloudData.departments.sort();
    saveDepartments();
  }
  showToast('成员添加成功！', 'success');
  closeModal(); renderUserManagement();
  return false;
}

function handleImportFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'csv') {
    const reader = new FileReader();
    reader.onload = function(e) {
      let text = e.target.result;
      // Remove BOM
      if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
      document.getElementById('importTextArea').value = text.trim();
      document.getElementById('importAlert').innerHTML = '<div class="alert alert-success">✅ 文件已读取，请检查内容后点击"开始导入"</div>';
    };
    reader.readAsText(file, 'UTF-8');
  } else if (ext === 'xlsx' || ext === 'xls') {
    // Excel: use SheetJS if available, otherwise prompt to use CSV
    if (typeof XLSX === 'undefined') {
      // Dynamically load SheetJS
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
      script.onload = function() { parseExcelFile(file); };
      script.onerror = function() {
        document.getElementById('importAlert').innerHTML = '<div class="alert alert-danger">❌ Excel解析库加载失败，请将文件另存为CSV格式后重试</div>';
      };
      document.head.appendChild(script);
    } else {
      parseExcelFile(file);
    }
  } else {
    document.getElementById('importAlert').innerHTML = '<div class="alert alert-danger">❌ 不支持的文件格式，请使用CSV或Excel文件</div>';
  }
}

function parseExcelFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const csv = XLSX.utils.sheet_to_csv(ws, {FS:','});
      document.getElementById('importTextArea').value = csv.trim();
      document.getElementById('importAlert').innerHTML = '<div class="alert alert-success">✅ Excel文件已解析，请检查内容后点击"开始导入"</div>';
    } catch(err) {
      document.getElementById('importAlert').innerHTML = '<div class="alert alert-danger">❌ Excel解析失败: ' + err.message + '</div>';
    }
  };
  reader.readAsArrayBuffer(file);
}

async function doImportUsers() {
  const text = document.getElementById('importTextArea').value.trim();
  const alertEl = document.getElementById('importAlert');
  if (!text) { alertEl.innerHTML = '<div class="alert alert-danger">❌ 请粘贴数据或选择文件</div>'; return; }

  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length === 0) { alertEl.innerHTML = '<div class="alert alert-danger">❌ 没有有效数据</div>'; return; }

  // Parse lines
  const records = [];
  let skippedHeader = false;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    // Split by comma or tab
    const parts = line.split(/[,\t]/).map(p => p.trim().replace(/^"|"$/g, ''));
    // Skip header row
    if (i === 0 && (parts[0] === '账号' || parts[0].toLowerCase() === 'username' || parts[0] === '用户名')) {
      skippedHeader = true;
      continue;
    }
    if (parts.length < 3) { records.push({line:i+1, error:'列数不足（至少需要：账号,密码,姓名）'}); continue; }
    const username = parts[0];
    const password = parts[1];
    const name = parts[2];
    const department = parts[3] || '';
    if (!username) { records.push({line:i+1, error:'账号为空'}); continue; }
    if (!password) { records.push({line:i+1, error:'密码为空', username}); continue; }
    if (password.length < 6) { records.push({line:i+1, error:'密码不足6位', username}); continue; }
    if (!name) { records.push({line:i+1, error:'姓名为空', username}); continue; }
    records.push({line:i+1, username, password, name, department});
  }

  const validRecords = records.filter(r => !r.error);
  const errorRecords = records.filter(r => r.error);

  // Check duplicates within import and existing users
  const seenUsernames = new Set();
  const existingUsernames = new Set(cloudData.users.map(u => u.username));
  const toCreate = [];
  const skippedDup = [];
  validRecords.forEach(r => {
    if (existingUsernames.has(r.username) || seenUsernames.has(r.username)) {
      skippedDup.push(r);
    } else {
      seenUsernames.add(r.username);
      toCreate.push(r);
    }
  });

  if (toCreate.length === 0) {
    let msg = '❌ 没有可导入的有效记录';
    if (skippedDup.length) msg += `\n重复跳过：${skippedDup.length}条`;
    if (errorRecords.length) msg += `\n格式错误：${errorRecords.length}条`;
    alertEl.innerHTML = `<div class="alert alert-danger">${msg.replace(/\n/g,'<br>')}</div>`;
    return;
  }

  // Show progress
  alertEl.innerHTML = `<div class="alert alert-info">⏳ 正在导入 ${toCreate.length} 条记录...</div>`;

  // Batch create
  const results = {success: 0, failed: []};
  for (let i = 0; i < toCreate.length; i++) {
    const r = toCreate[i];
    try {
      const hp = await hashPassword(r.password);
      const user = {
        id: genId(), username: r.username, password: hp,
        name: r.name, department: r.department,
        role: 'member', active: true,
        createdAt: new Date().toISOString()
      };
      await apiCreate('users', user);
      cloudData.users.push(user);
      results.success++;
    } catch(err) {
      results.failed.push({line: r.line, username: r.username, error: err.message});
    }
  }

  // Auto-add any new departments from import
  let newDepts = [];
  toCreate.forEach(r => {
    if (r.department && !cloudData.departments.includes(r.department) && !newDepts.includes(r.department)) {
      newDepts.push(r.department);
    }
  });
  if (newDepts.length > 0) {
    cloudData.departments.push(...newDepts);
    cloudData.departments.sort();
    await saveDepartments();
  }

  // Show result
  let resultHtml = `<div class="alert alert-success">✅ 成功导入 ${results.success} 名成员</div>`;
  if (skippedDup.length > 0) {
    resultHtml += `<div class="alert alert-warning">⚠️ 重复跳过 ${skippedDup.length} 条：${skippedDup.map(r=>r.username).join(', ')}</div>`;
  }
  if (errorRecords.length > 0) {
    resultHtml += `<div class="alert alert-warning">⚠️ 格式错误跳过 ${errorRecords.length} 条：<br>${errorRecords.map(r=>`第${r.line}行: ${r.error}${r.username?'（'+r.username+'）':''}`).join('<br>')}</div>`;
  }
  if (results.failed.length > 0) {
    resultHtml += `<div class="alert alert-danger">❌ 导入失败 ${results.failed.length} 条：<br>${results.failed.map(r=>`第${r.line}行 ${r.username}: ${r.error}`).join('<br>')}</div>`;
  }
  resultHtml += `<div style="text-align:center;margin-top:16px"><button class="btn btn-primary" onclick="closeModal();renderUserManagement()">完成</button></div>`;
  alertEl.innerHTML = resultHtml;
}

async function updateUser(e, id) {
  e.preventDefault();
  const user = cloudData.users.find(u => u.id === id);
  if (!user) return false;
  user.name = document.getElementById('editName').value.trim();
  const isBasic = document.getElementById('editUserIsBasic')?.checked;
  let department = document.getElementById('editDept').value;
  if (department === '__custom__') {
    department = document.getElementById('editDeptCustom').value.trim();
  }
  if (!department) { alert('请选择或输入部门'); return false; }
  user.department = department;
  user.hireDate = document.getElementById('editHireDate').value || '';
  user.leaveDate = document.getElementById('editLeaveDate').value || '';
  if (user.username === 'admin') {
    // admin 账号不可改为基础用户，仅更新基础信息
  } else if (isBasic) {
    // 转为/保持基础用户：清空登录信息
    user.isBasic = true;
    user.username = '';
    user.password = '';
    user.role = 'member';
  } else {
    // 普通登录账号
    const username = document.getElementById('editUsername').value.trim();
    if (!username) { alert('请输入用户名（或勾选"基础用户"）'); return false; }
    if (cloudData.users.find(u => u.id !== id && u.username === username)) { alert('用户名已存在'); return false; }
    user.isBasic = false;
    user.username = username;
    user.role = document.getElementById('editRole').value;
    const newPwd = document.getElementById('editPassword').value;
    if (newPwd) { user.password = await hashPassword(newPwd); }
    else if (!user.password) { user.password = await hashPassword('123456'); }
  }
  // Auto-add new department to list if not exists
  if (!cloudData.departments.includes(department)) {
    cloudData.departments.push(department);
    cloudData.departments.sort();
    saveDepartments();
  }
  try { await apiUpdate('users', user.id, user); }
  catch(err) { showToast('保存失败: ' + err.message, 'error', 4000); return false; }
  showToast('用户信息已更新！', 'success');
  closeModal(); renderUserManagement();
  return false;
}

async function toggleUser(id, active) {
  const user = cloudData.users.find(u => u.id === id);
  if (!user) return;
  user.active = active;
  try { await apiUpdate('users', user.id, user); renderUserManagement(); showToast(`用户已${active?'启用':'禁用'}`, 'info'); }
  catch(err) { showToast('操作失败: ' + err.message, 'error', 4000); }
}

async function deleteUser(id) {
  const user = cloudData.users.find(u => u.id === id);
  if (!user) return;
  if (!confirm(`确定删除用户 ${user.name}（${user.username}）吗？此操作不可撤销。`)) return;
  try {
    await apiDelete('users', user.id);
    cloudData.users = cloudData.users.filter(u => u.id !== id);
    renderUserManagement();
    showToast(`用户 ${user.name} 已删除`, 'success');
  } catch(err) { showToast('删除失败: ' + err.message, 'error', 4000); }
}

// ===== 用户批量状态修改 =====
async function batchSetUserStatus(isOnboard) {
  if (!selectedUserIds.size) return;
  if (!confirm(`确定将选中的 ${selectedUserIds.size} 名用户标记为「${isOnboard ? '入职（在职）' : '离职'}」吗？`)) return;
  const today = new Date().toISOString().slice(0, 10);
  let done = 0;
  for (const id of [...selectedUserIds]) {
    const u = cloudData.users.find(x => x.id === id);
    if (!u) continue;
    if (isOnboard) { u.leaveDate = ''; u.active = true; }
    else { u.leaveDate = today; }
    try { await apiUpdate('users', u.id, u); done++; }
    catch (e) { showToast('更新失败: ' + e.message, 'error', 4000); }
  }
  selectedUserIds.clear();
  renderUserManagement();
  showToast(`已更新 ${done} 名用户为${isOnboard ? '入职（在职）' : '离职'}`, 'success');
}

// ============ CSV Export ============
function exportCSV(type) {
  const s = document.getElementById('fStart')?.value || '';
  const e = document.getElementById('fEnd')?.value || '';
  const fDept = document.getElementById('fDept')?.value || '';
  const fPerson = document.getElementById('fPerson')?.value || '';
  let reports = type==='daily'?[...cloudData.dailyReports]:[...cloudData.weeklyReports];
  if (s) reports = reports.filter(r => (type==='daily'?r.reportDate:r.weekStart) >= s);
  if (e) reports = reports.filter(r => (type==='daily'?r.reportDate:r.weekStart) <= e);
  if (fDept) reports = reports.filter(r => r.department === fDept);
  if (fPerson) reports = reports.filter(r => r.name === fPerson);
  const headers = ['姓名','部门',type==='weekly'?'周开始':'日期',type==='weekly'?'周结束':'','渠道','参考标准','新增精准线索数','有效建联数','AB意向数','成交客户数','成交金额','建联转AB率','目标金额','完成率','问题/提升动作'];
  // CSV 转义：值含逗号/引号/换行时用双引号包裹
  const esc = v => {
    if (v === null || v === undefined) return '';
    const str = String(v);
    if (str.includes(',') || str.includes('"') || str.includes('\n') || str.includes('\r')) {
      return '"' + str.replace(/"/g, '""') + '"';
    }
    return str;
  };
  const rows = [headers.join(',')];
  reports.forEach(r => {
    (r.channels||[]).forEach(ch => {
      const ec=parseFloat(ch.effectiveContacts)||0,ab=parseFloat(ch.abIntent)||0,da=parseFloat(ch.dealAmount)||0,ta=parseFloat(ch.targetAmount)||0;
      const ctr=ch.effectiveContacts===''||ch.effectiveContacts==='/'?'/':(ec>0?(ab/ec*100).toFixed(1)+'%':'/');
      const cpr=ch.targetAmount===''||ch.targetAmount==='/'?'/':(ta>0?(da/ta*100).toFixed(1)+'%':'/');
      const df=type==='weekly'?r.weekStart:r.reportDate;
      const ef=type==='weekly'?r.weekEnd:'';
      rows.push([r.name,r.department,df,ef,ch.channel,ch.reference||'',ch.newLeads||'',ch.effectiveContacts||'',ch.abIntent||'',ch.closedCustomers||'',ch.dealAmount||'',ctr,ch.targetAmount||'',cpr,(ch.issues||'').replace(/,/g,'，').replace(/\n/g,' ')].map(esc).join(','));
    });
  });
  const csv = '\uFEFF' + rows.join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  let nameParts = [type==='weekly'?'周报':'日报' + '数据'];
  if (s || e) nameParts.push((s||'') + '至' + (e||''));
  if (fDept) nameParts.push(fDept);
  if (fPerson) nameParts.push(fPerson);
  nameParts.push(new Date().toISOString().split('T')[0]);
  a.download = nameParts.join('_') + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function handleLogoUpload(fileInput, inputId, previewId) {
  const file = fileInput.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) {
    alert('图片不能超过 2MB，请压缩后再上传');
    fileInput.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      // Crop to 2:1 aspect ratio (width:height), max width 256px
      const targetW = 256;
      const targetH = 128;
      const srcRatio = img.width / img.height;
      const dstRatio = targetW / targetH;
      let sx = 0, sy = 0, sw = img.width, sh = img.height;
      if (srcRatio > dstRatio) {
        // Source is wider, crop sides
        sw = img.height * dstRatio;
        sx = (img.width - sw) / 2;
      } else {
        // Source is taller, crop top/bottom
        sh = img.width / dstRatio;
        sy = (img.height - sh) / 2;
      }
      const canvas = document.createElement('canvas');
      canvas.width = targetW;
      canvas.height = targetH;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, targetW, targetH);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      document.getElementById(inputId).value = dataUrl;
      // Show preview
      const previewEl = document.getElementById(previewId);
      if (previewEl) {
        previewEl.innerHTML = '<div style="display:flex;align-items:center;gap:8px"><img src="' + dataUrl + '" style="width:80px;height:40px;border-radius:6px;object-fit:cover;border:1px solid var(--gray-200)"><span style="font-size:12px;color:var(--success)">✅ 图片已加载（2:1比例），点击"保存品牌配置"生效</span></div>';
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  fileInput.value = '';
}

function buildAIContext() {
  const userMap = {};
  cloudData.users.forEach(u => { userMap[u.id] = u; });
  const fc = cloudData.formConfig || DEFAULT_FORM_CONFIG;
  const fieldLabels = {};
  FIELD_DEFS.forEach(f => { fieldLabels[f.key] = f.label; });

  // Channel name maps
  const dChMap = {}, wChMap = {};
  (fc.daily || []).forEach(c => dChMap[c.id] = c.name);
  (fc.weekly || []).forEach(c => wChMap[c.id] = c.name);

  // Compile daily reports (channels is an array in Firebase)
  const dailyData = cloudData.dailyReports.map(r => {
    const u = userMap[r.userId] || {};
    const channels = {};
    (r.channels || []).forEach(ch => {
      const chName = ch.channel || '未知渠道';
      const fd = {};
      Object.entries(ch).forEach(([k, v]) => {
        if (k === 'channel' || k === 'reference') return;
        if (v !== '' && v !== null && v !== undefined) fd[fieldLabels[k] || k] = v;
      });
      if (Object.keys(fd).length > 0) channels[chName] = fd;
    });
    return { user: u.name || r.name || '未知', department: u.department || r.department || '', date: r.reportDate, channels };
  }).sort((a, b) => (a.date || '').localeCompare(b.date || ''));

  // Compile weekly reports (channels is an array in Firebase)
  const weeklyData = cloudData.weeklyReports.map(r => {
    const u = userMap[r.userId] || {};
    const channels = {};
    (r.channels || []).forEach(ch => {
      const chName = ch.channel || '未知渠道';
      const fd = {};
      Object.entries(ch).forEach(([k, v]) => {
        if (k === 'channel' || k === 'reference') return;
        if (v !== '' && v !== null && v !== undefined) fd[fieldLabels[k] || k] = v;
      });
      if (Object.keys(fd).length > 0) channels[chName] = fd;
    });
    return { user: u.name || r.name || '未知', department: u.department || r.department || '', weekStart: r.weekStart, weekEnd: r.weekEnd, channels };
  }).sort((a, b) => (a.weekStart || '').localeCompare(b.weekStart || ''));

  // Compile visit records (拜访数据)
  const visitData = (cloudData.visitRecords || []).map(r => ({
    contactTime: r.contactTime || '',
    employee: r.employee || '',
    department: r.department || '',
    customer: r.customer || '',
    contactPerson: r.contactPerson || '',
    phone: r.phone || '',
    signinEvent: r.signinEvent || '',
    signinAddress: r.signinAddress || '',
    visitResult: r.visitResult || '',
    blockerNote: r.blockerNote || '',
    remark: r.remark || ''
  })).sort((a, b) => (a.contactTime || '').localeCompare(b.contactTime || ''));

  // Visit data aggregations (让 AI 一眼拿到拜访关键指标，避免被前面的日报/周报数据淹没)
  const visitByResult = {}, visitByEvent = {}, visitByEmp = {}, visitByDept = {}, visitByMonth = {};
  visitData.forEach(v => {
    const res = v.visitResult || '未填写结果';
    visitByResult[res] = (visitByResult[res] || 0) + 1;
    const ev = v.signinEvent || '未填写事件';
    visitByEvent[ev] = (visitByEvent[ev] || 0) + 1;
    const emp = v.employee || '未知';
    visitByEmp[emp] = (visitByEmp[emp] || 0) + 1;
    const dep = v.department || '未知';
    visitByDept[dep] = (visitByDept[dep] || 0) + 1;
    const m = (v.contactTime || '').slice(0, 7);
    if (m) visitByMonth[m] = (visitByMonth[m] || 0) + 1;
  });
  const visitSummary = {
    total: visitData.length,
    byResult: visitByResult,
    bySigninEvent: visitByEvent,
    byEmployee: visitByEmp,
    byDepartment: visitByDept,
    byMonth: visitByMonth
  };

  // Compile sales records (业绩数据) — 排除 raw 原始整行，避免上下文臃肿
  const salesData = (cloudData.salesRecords || []).map(r => ({
    salesperson: r.salesperson || '',
    team: r.team || '',
    docDate: r.docDate || '',
    docMonth: r.docMonth || '',
    amount: toNum(r.amount),
    grossProfit: toNum(r.grossProfit),
    productName: r.productName || '',
    docNo: r.docNo || '',
    docType: r.docType || '',
    status: r.status || '',
    customer: r.customer || ''
  })).sort((a, b) => (a.docDate || '').localeCompare(b.docDate || ''));

  // Sales aggregations (让 AI 一眼拿到业绩关键指标)
  const salesBySalesperson = {}, salesByTeam = {}, salesByMonth = {}, salesByDocType = {};
  let salesTotalAmount = 0, salesTotalGross = 0;
  salesData.forEach(s => {
    const amt = toNum(s.amount), gp = toNum(s.grossProfit);
    salesTotalAmount += amt; salesTotalGross += gp;
    const sp = s.salesperson || '未知';
    if (!salesBySalesperson[sp]) salesBySalesperson[sp] = { amount: 0, grossProfit: 0, count: 0 };
    salesBySalesperson[sp].amount += amt; salesBySalesperson[sp].grossProfit += gp; salesBySalesperson[sp].count += 1;
    const tm = s.team || '未知团队';
    if (!salesByTeam[tm]) salesByTeam[tm] = { amount: 0, grossProfit: 0, count: 0 };
    salesByTeam[tm].amount += amt; salesByTeam[tm].grossProfit += gp; salesByTeam[tm].count += 1;
    const mo = s.docMonth || '未知月份';
    if (!salesByMonth[mo]) salesByMonth[mo] = { amount: 0, grossProfit: 0, count: 0 };
    salesByMonth[mo].amount += amt; salesByMonth[mo].grossProfit += gp; salesByMonth[mo].count += 1;
    const dt = s.docType || '未知类别';
    if (!salesByDocType[dt]) salesByDocType[dt] = 0;
    salesByDocType[dt] += 1;
  });
  const salesSummary = {
    total: salesData.length,
    totalAmount: Math.round(salesTotalAmount * 100) / 100,
    totalGrossProfit: Math.round(salesTotalGross * 100) / 100,
    bySalesperson: salesBySalesperson,
    byTeam: salesByTeam,
    byMonth: salesByMonth,
    byDocType: salesByDocType
  };

  const activeUsers = cloudData.users.filter(u => u.active);
  const context = {
    systemDate: new Date().toLocaleDateString('zh-CN'),
    overview: {
      totalUsers: activeUsers.length,
      departments: cloudData.departments,
      dailyReportCount: cloudData.dailyReports.length,
      weeklyReportCount: cloudData.weeklyReports.length,
      dailyDateRange: dailyData.length > 0 ? {earliest: dailyData[0].date, latest: dailyData[dailyData.length-1].date} : null,
      weeklyDateRange: weeklyData.length > 0 ? {earliest: weeklyData[0].weekStart, latest: weeklyData[weeklyData.length-1].weekStart} : null,
      visitRecordCount: visitData.length,
      visitDateRange: visitData.length > 0 ? {earliest: visitData[0].contactTime, latest: visitData[visitData.length-1].contactTime} : null,
      salesRecordCount: salesData.length,
      salesDateRange: salesData.length > 0 ? {earliest: salesData[0].docDate, latest: salesData[salesData.length-1].docDate} : null
    },
    users: activeUsers.map(u => ({name: u.name, department: u.department, role: u.role})),
    dailyChannels: (fc.daily || []).map(c => ({name: c.name, reference: c.reference})),
    weeklyChannels: (fc.weekly || []).map(c => ({name: c.name, reference: c.reference})),
    dailyReports: dailyData,
    weeklyReports: weeklyData,
    visitRecords: visitData,
    visitSummary: visitSummary,
    visitResultOptions: (cloudData.visitConfig && cloudData.visitConfig.visitResults) || [],
    signinEventOptions: (cloudData.formConfig && cloudData.formConfig.signinEvents) || [],
    salesRecords: salesData,
    salesSummary: salesSummary,
    salesTeamOptions: SALES_KA_TEAMS
  };
  return JSON.stringify(context, null, 2);
}

async function callAI(messages) {
  const config = getAIConfig();
  if (!config.apiKey) throw new Error('尚未配置API Key，请先在上方"AI模型配置"中设置');
  const url = config.apiUrl.replace(/\/+$/, '') + '/chat/completions';
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + config.apiKey
    },
    body: JSON.stringify({
      model: config.model,
      messages: messages,
      max_tokens: 4096,
      temperature: 0.7,
      stream: false
    })
  });
  if (!res.ok) {
    let errText = '';
    try { errText = await res.text(); } catch(e) {}
    if (res.status === 401) throw new Error('API Key无效或已过期，请检查配置');
    if (res.status === 429) throw new Error('API调用频率超限，请稍后再试');
    throw new Error('API错误(' + res.status + '): ' + errText.substring(0, 300));
  }
  const data = await res.json();
  if (!data.choices || !data.choices[0]) throw new Error('AI返回数据格式异常');
  return data.choices[0].message.content;
}

function escapeAIHTML(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderAIMarkdown(text) {
  let html = escapeAIHTML(text);
  // Code blocks
  html = html.replace(/```([\s\S]*?)```/g, (m, c) => '<pre style="background:var(--gray-100);padding:10px;border-radius:6px;overflow-x:auto;font-size:12px;margin:8px 0"><code>' + c.trim() + '</code></pre>');
  // Tables
  html = html.replace(/((?:^\|.+\|$\n?)+)/gm, (m, table) => {
    const lines = table.trim().split('\n');
    if (lines.length < 2) return m;
    const parseRow = (line) => line.split('|').map(c => c.trim()).filter(c => c !== '');
    // Check if second line is separator
    let header = parseRow(lines[0]);
    let bodyLines = lines.slice(1);
    if (lines[1] && /^\|[\s:-]+\|/.test(lines[1])) bodyLines = lines.slice(2);
    let result = '<div class="ai-table-wrap"><div class="ai-table-toolbar"><span class="ai-table-label">📊 表格数据</span><button class="btn btn-outline btn-sm" onclick="downloadAITable(this,\'csv\')">📥 CSV</button><button class="btn btn-outline btn-sm" onclick="downloadAITable(this,\'xlsx\')">📥 Excel</button></div><table><thead><tr>' + header.map(h => '<th>' + h + '</th>').join('') + '</tr></thead><tbody>';
    bodyLines.forEach(line => {
      const cells = parseRow(line);
      result += '<tr>' + cells.map(c => '<td>' + c + '</td>').join('') + '</tr>';
    });
    result += '</tbody></table></div>';
    return result;
  });
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Line breaks
  html = html.replace(/\n/g, '<br>');
  return html;
}

function downloadAITable(btn, format) {
  const wrap = btn.closest('.ai-table-wrap');
  if (!wrap) return;
  const table = wrap.querySelector('table');
  if (!table) return;
  // Parse table data
  const headers = [];
  table.querySelectorAll('thead th').forEach(th => headers.push(th.textContent.trim()));
  const rows = [];
  table.querySelectorAll('tbody tr').forEach(tr => {
    const row = [];
    tr.querySelectorAll('td').forEach(td => row.push(td.textContent.trim()));
    rows.push(row);
  });
  const ts = new Date().toISOString().split('T')[0];
  if (format === 'csv') {
    const lines = [headers.join(',')];
    rows.forEach(row => {
      lines.push(row.map(c => {
        if (c.includes(',') || c.includes('"') || c.includes('\n')) return '"' + c.replace(/"/g, '""') + '"';
        return c;
      }).join(','));
    });
    const blob = new Blob(['\uFEFF' + lines.join('\n')], {type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'AI表格_' + ts + '.csv'; a.click();
    URL.revokeObjectURL(url);
  } else if (format === 'xlsx') {
    if (window.XLSX) {
      const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'AI表格');
      XLSX.writeFile(wb, 'AI表格_' + ts + '.xlsx');
    } else {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
      s.onload = () => {
        const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'AI表格');
        XLSX.writeFile(wb, 'AI表格_' + ts + '.xlsx');
      };
      document.head.appendChild(s);
    }
  }
}

function initAIChat() {
  aiChatHistory = [];
  const msgArea = document.getElementById('aiChatMessages');
  if (!msgArea) return;
  const cfg = getAIConfig();
  if (!cfg.apiKey) {

function fillAIInput(text) {
  const input = document.getElementById('aiChatInput');
  if (input) { input.value = text; input.focus(); }
}

function appendAIMessage(role, content, images) {
  const msgArea = document.getElementById('aiChatMessages');
  if (!msgArea) return;
  const div = document.createElement('div');
  div.className = 'ai-msg ' + role;
  if (role === 'assistant') {
    div.innerHTML = renderAIMarkdown(content);
  } else if (role === 'user') {
    div.textContent = content;
    if (images && images.length > 0) {
      const imgDiv = document.createElement('div');
      imgDiv.className = 'ai-msg-images';
      imgDiv.innerHTML = images.map(src => '<img src="' + src + '" onclick="window.open(this.src)" loading="lazy">').join('');
      div.appendChild(imgDiv);
    }
  } else {
    div.textContent = content;
  }
  msgArea.appendChild(div);
  msgArea.scrollTop = msgArea.scrollHeight;
}

function handleAIImageUpload(event) {
  const files = event.target.files;
  if (!files || files.length === 0) return;
  Array.from(files).forEach(file => {
    if (!file.type.startsWith('image/')) return;
    if (file.size > 10 * 1024 * 1024) {
      appendAIMessage('system', '⚠️ 图片 "' + file.name + '" 超过10MB，请压缩后上传');
      return;
    }
    const reader = new FileReader();
    reader.onload = function(e) {
      aiPendingImages.push(e.target.result);
      renderAIImagePreviews();
    };
    reader.readAsDataURL(file);
  });
  event.target.value = '';
}

function removeAIImage(index) {
  aiPendingImages.splice(index, 1);
  renderAIImagePreviews();
}

function renderAIImagePreviews() {
  const container = document.getElementById('aiInputImages');
  if (!container) return;
  if (aiPendingImages.length === 0) {
    container.style.display = 'none';
    container.innerHTML = '';
    return;
  }
  container.style.display = 'flex';
  container.innerHTML = aiPendingImages.map((img, i) =>
    '<div class="ai-image-thumb"><img src="' + img + '"><div class="remove" onclick="removeAIImage(' + i + ')">✕</div></div>'
  ).join('');
}

async function sendAIMessage() {
  if (aiChatLoading) return;
  const input = document.getElementById('aiChatInput');
  if (!input) return;
  const text = input.value.trim();
  const images = [...aiPendingImages];
  if (!text && images.length === 0) return;
  const cfg = getAIConfig();
  if (!cfg.apiKey) {
    appendAIMessage('system', '⚠️ 请先在上方"AI模型配置"中设置API Key');
    return;
  }

  // Show user message (with images if any)
  appendAIMessage('user', text || '(图片)', images);
  input.value = '';
  aiPendingImages = [];
  renderAIImagePreviews();

  // Show typing indicator
  const msgArea = document.getElementById('aiChatMessages');
  const typingDiv = document.createElement('div');
  typingDiv.className = 'ai-msg typing';
  typingDiv.id = 'aiTypingIndicator';
  typingDiv.textContent = '🤔 AI正在分析数据...';
  msgArea.appendChild(typingDiv);
  msgArea.scrollTop = msgArea.scrollHeight;

  aiChatLoading = true;
  const sendBtn = document.querySelector('.ai-chat-input-bar .ai-send-btn');
  if (sendBtn) { sendBtn.disabled = true; sendBtn.dataset.original = '1'; }

  try {
    // Build messages: system (fresh data) + history + new user message
    const systemMsg = {role: 'system', content: buildAISystemMessage()};
    const historyMsgs = aiChatHistory.map(m => ({role: m.role, content: m.content}));
    // Build user message with optional images (OpenAI vision format)
    let userMsg;
    if (images.length > 0) {
      const content = [{type: 'text', text: text || '请分析这张图片'}];
      images.forEach(img => content.push({type: 'image_url', image_url: {url: img}}));
      userMsg = {role: 'user', content: content};
    } else {
      userMsg = {role: 'user', content: text};
    }
    const allMsgs = [systemMsg, ...historyMsgs, userMsg];

    const response = await callAI(allMsgs);

    // Remove typing indicator
    const ti = document.getElementById('aiTypingIndicator');
    if (ti) ti.remove();

    // Show AI response
    appendAIMessage('assistant', response);

    // Save to history (text only for context)
    aiChatHistory.push({role: 'user', content: text || '(图片)'});
    aiChatHistory.push({role: 'assistant', content: response});

    // Keep history to last 20 messages to avoid token overflow
    if (aiChatHistory.length > 20) aiChatHistory = aiChatHistory.slice(-20);
  } catch(err) {
    const ti = document.getElementById('aiTypingIndicator');
    if (ti) ti.remove();
    let errMsg = err.message || '未知错误';
    if (errMsg.includes('Failed to fetch') || errMsg.includes('NetworkError')) {
      errMsg = '网络请求失败，可能是CORS跨域限制或网络不通。请尝试：\n1. 检查API地址是否正确\n2. 确认该API支持浏览器跨域访问（CORS）\n3. 如使用OpenAI，需确保网络能访问api.openai.com';
    }
    if (errMsg.includes('image') || errMsg.includes('vision') || errMsg.includes('multimodal')) {
      errMsg += '\n\n💡 提示：当前模型可能不支持图片识别，请在"设置→AI模型配置"中切换支持视觉的模型（如 gpt-4o、qwen-vl-plus 等）';
    }
    appendAIMessage('system', '❌ ' + errMsg);
  } finally {
    aiChatLoading = false;
    if (sendBtn) { sendBtn.disabled = false; sendBtn.textContent = '📤 发送'; }
  }
}

async function changePwd(e) {
  e.preventDefault();
  const o=document.getElementById('oldPwd').value,n=document.getElementById('newPwd').value,c=document.getElementById('confirmPwd').value;
  const a=document.getElementById('settingsAlert');
  if(n!==c){a.innerHTML='<div class="alert alert-danger">❌ 两次输入的新密码不一致</div>';return false}
  if(n.length<6){a.innerHTML='<div class="alert alert-danger">❌ 密码至少6位</div>';return false}
  const ho=await hashPassword(o);
  const user=cloudData.users.find(u=>u.id===currentUser.id);
  if(!user||user.password!==ho){a.innerHTML='<div class="alert alert-danger">❌ 原密码错误</div>';return false}
  user.password=await hashPassword(n);
  try { await apiUpdate('users', user.id, user); } catch(e) { showToast('保存失败: ' + e.message, 'error', 4000); a.innerHTML='<div class="alert alert-danger">❌ 保存失败: '+e.message+'</div>'; return false; }

  a.innerHTML='';
  document.getElementById('oldPwd').value='';document.getElementById('newPwd').value='';document.getElementById('confirmPwd').value='';
  return false;
}

function updateConfigChannel(idx, field, value) {
  const channels = cloudData.formConfig[configTab];
  if (channels[idx]) channels[idx][field] = value;
}

function updateFieldRule(chIdx, fieldKey, ruleType, value) {
  const channels = cloudData.formConfig[configTab];
  const ch = channels[chIdx];
  if (!ch) return;
  if (!ch.fieldRules) ch.fieldRules = {};
  if (!ch.fieldRules[fieldKey]) ch.fieldRules[fieldKey] = {required:false, disabled:false, hint:'', hidden:false};
  ch.fieldRules[fieldKey][ruleType] = value;
}

async function saveFormConfig() {
  const alertEl = document.getElementById('configAlert');
  const btn = event?.target;
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 保存中...'; }
  try {
    await fetch(FB_BASE + '/formConfig.json', {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(cloudData.formConfig)
    });
    // Also save visit config
    await fetch(FB_BASE + '/visitConfig.json', {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(cloudData.visitConfig || DEFAULT_VISIT_CONFIG)
    });
    showToast('配置已保存并生效！', 'success');
    syncOpenReports();
    if (alertEl) alertEl.innerHTML = '';

    showToast('保存失败: ' + e.message, 'error', 4000);

    if (btn) { btn.disabled = false; btn.textContent = '💾 保存配置'; }

}

// Lazy-load visit records for managers who didn't get them during initial load

    const res = await fetch(FB_BASE + '/visitRecords.json');
    cloudData.visitRecords = res.ok ? hydrateVisitRecords(await res.json()) : [];

function renderVisitTable() {
  const s = document.getElementById('visitFStart')?.value || '';
  const e = document.getElementById('visitFEnd')?.value || '';
  const fDept = document.getElementById('visitFDept')?.value || '';
  const fPerson = document.getElementById('visitFPerson')?.value || '';
  const fResult = document.getElementById('visitFResult')?.value || '';
  // 同步每页条数（来自筛选栏下拉）
  const psSel = document.getElementById('visitPageSize');
  if (psSel) visitPageSize = parseInt(psSel.value, 10) || 30;
  let records = [...cloudData.visitRecords];
  if (s) records = records.filter(r => normContactTime(r.contactTime).split(' ')[0] >= s);
  if (e) records = records.filter(r => normContactTime(r.contactTime).split(' ')[0] <= e);
  if (fDept) records = records.filter(r => normDeptKey(r.department) === normDeptKey(fDept));
  if (fPerson) records = records.filter(r => r.employee === fPerson);
  if (fResult === 'empty') records = records.filter(r => !r.visitResult);
  else if (fResult === 'filled') records = records.filter(r => !!r.visitResult);
  else if (fResult) records = records.filter(r => (r.visitResult || '') === fResult);
  records.sort((a, b) => normContactTime(b.contactTime).localeCompare(normContactTime(a.contactTime)));
  const total = records.length;
  const pages = Math.max(1, Math.ceil(total / visitPageSize));
  if (visitCurrentPage > pages) visitCurrentPage = pages;
  if (visitCurrentPage < 1) visitCurrentPage = 1;
  const startIdx = (visitCurrentPage - 1) * visitPageSize;
  const pageRecords = records.slice(startIdx, startIdx + visitPageSize);
  const c = document.getElementById('visitResults');
  if (!total) {
    visitCurrentPage = 1;
    c.innerHTML = '<div class="empty-state"><div class="icon">📭</div>暂无拜访数据，请点击"上传CSV"按钮上传</div>';
    document.getElementById('visitSaveBar').style.display = 'none';
    return;
  }
  const vc = getVisitConfig();
  const resultOptions = vc.visitResults.map(r => {
    const col = getVisitResultColor(r);
    return `<option value="${r}" style="color:${col};font-weight:600">● ${r}</option>`;
  }).join('');
  // Color legend
  const legend = vc.visitResults.map(r => {
    const col = getVisitResultColor(r);
    return `<span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--gray-600)"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${col}"></span>${r}</span>`;
  }).join('<span style="color:var(--gray-300);margin:0 6px">|</span>');
  c.innerHTML = `<div style="margin-bottom:10px;padding:8px 12px;background:var(--gray-50);border-radius:6px;display:flex;align-items:center;gap:4px;flex-wrap:wrap">
    <span style="font-size:12px;font-weight:600;color:var(--gray-700);margin-right:4px">🎨 拜访结果颜色：</span>${legend}
  </div>
  <div class="card"><div class="table-wrap"><table style="font-size:12px">
    <thead><tr>
      <th style="width:34px;text-align:center"><input type="checkbox" id="visitSelectAll" onchange="toggleVisitSelectAll(this)"></th>
      <th>联系时间</th><th>客户</th><th>联系人</th><th>手机号</th><th>签到事件</th>
      <th>员工</th><th>部门</th><th>签到地址</th><th>备注</th>
      <th style="min-width:130px">拜访结果</th><th style="min-width:200px">卡点说明</th>
    </tr></thead>
    <tbody>
      ${pageRecords.map(r => {
        const vr = visitEditBuffer[r.id]?.visitResult !== undefined ? visitEditBuffer[r.id].visitResult : (r.visitResult || '');
        const bn = visitEditBuffer[r.id]?.blockerNote !== undefined ? visitEditBuffer[r.id].blockerNote : (r.blockerNote || '');
        const se = visitEditBuffer[r.id]?.signinEvent !== undefined ? visitEditBuffer[r.id].signinEvent : (r.signinEvent || '');
        const vrColor = getVisitResultColor(vr);
        const vrBg = getVisitResultBg(vr);
        const checked = selectedVisitIds.has(r.id) ? 'checked' : '';
        // 签到事件下拉选项（固定配置项；若当前值不在配置中，则追加该项避免丢失显示）
        const fixedEvents = getSigninEvents();
        let signinEventList = fixedEvents.slice();
        if (se && !signinEventList.includes(se)) signinEventList = signinEventList.concat([se]);
        const signinOpts = signinEventList.map(ev => `<option value="${ev.replace(/"/g,'&quot;')}" ${ev === se ? 'selected' : ''}>${ev}</option>`).join('');
        return `<tr data-id="${r.id}">
          <td style="text-align:center"><input type="checkbox" class="visit-row-cb" data-id="${r.id}" ${checked} onchange="onVisitSelect('${r.id}', this.checked)"></td>
          <td>${r.contactTime || ''}</td>
          <td>${r.customer || ''}</td>
          <td>${r.contactPerson || ''}</td>
          <td>${r.phone || ''}</td>
          <td><select class="form-control form-control-sm" onchange="onVisitEdit('${r.id}','signinEvent',this.value)" title="点击修改签到事件（选项来自表单配置-签到事件配置）"><option value="">未设置</option>${signinOpts}</select></td>
          <td>${r.employee || ''}</td>
          <td>${r.department || ''}</td>
          <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${(r.signinAddress || '').replace(/"/g,'&quot;')}">${r.signinAddress || ''}</td>
          <td class="remark-cell ${r.remark ? '' : 'empty'}" ${r.remark ? `onclick="showVisitRemarkModal('${r.id}')"` : ''}>${(r.remark || '').substring(0,50).replace(/\n/g,' ')}${(r.remark||'').length>50?'...':''}</td>
          <td style="border-left:4px solid ${vrColor || 'transparent'};background:${vrBg}">
            <select class="form-control form-control-sm" style="border-color:${vrColor};font-weight:${vr?'600':'400'};color:${vrColor || 'inherit'}" onchange="onVisitEdit('${r.id}','visitResult',this.value)">
            <option value="">未设置</option>
            ${resultOptions}
          </select></td>
          <td><input type="text" class="form-control form-control-sm" value="${bn.replace(/"/g,'&quot;').replace(/</g,'&lt;')}" onchange="onVisitEdit('${r.id}','blockerNote',this.value)" placeholder="输入卡点说明"></td>
        </tr>`;
      }).join('')}
    </tbody>
  </table></div></div>
  ${renderVisitPager(total, pages, visitCurrentPage)}`;
  // Restore select values（签到事件在第6列、拜访结果在第11列）
  pageRecords.forEach(r => {
    const vr = visitEditBuffer[r.id]?.visitResult !== undefined ? visitEditBuffer[r.id].visitResult : (r.visitResult || '');
    const se = visitEditBuffer[r.id]?.signinEvent !== undefined ? visitEditBuffer[r.id].signinEvent : (r.signinEvent || '');
    const row = c.querySelector(`tr[data-id="${r.id}"]`);
    if (row) {
      const vrTd = row.querySelector('td:nth-child(11)');
      const vrSel = vrTd ? vrTd.querySelector('select') : null;
      if (vrSel) vrSel.value = vr;
      const seSel = row.querySelector('td:nth-child(6) select');
      if (seSel) seSel.value = se;
    }
  });
  // Sync select-all checkbox state（仅当前页）
  const selAll = document.getElementById('visitSelectAll');
  if (selAll) {
    const allSelected = pageRecords.length > 0 && pageRecords.every(r => selectedVisitIds.has(r.id));
    selAll.checked = allSelected;
  }
  updateVisitBatchBar();
  updateVisitSaveBar();
}

function showVisitRemarkModal(recordId) {
  const r = cloudData.visitRecords.find(x => x.id === recordId);
  if (!r) return;
  const text = (r.remark || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  showModal('备注详情', `<div style="margin-bottom:12px;font-size:13px;color:var(--gray-600)">${r.contactTime || ''} · ${r.customer || ''} · ${r.employee || ''}</div><div class="remark-popup-content">${text || '<span style="color:var(--gray-400)">暂无备注</span>'}</div><div class="modal-footer"><button class="btn btn-primary" onclick="closeModal()">关闭</button></div>`, true);
}

// 拜访数据分页控件
function renderVisitPager(total, pages, cur) {
  const window = 2;
  const startP = Math.max(1, cur - window);
  const endP = Math.min(pages, cur + window);
  const nums = [];
  for (let i = startP; i <= endP; i++) nums.push(i);
  if (startP > 1) { if (startP > 2) nums.unshift('...'); nums.unshift(1); }
  if (endP < pages) { if (endP < pages - 1) nums.push('...'); nums.push(pages); }
  const btns = nums.map(n => {
    if (n === '...') return '<span style="padding:0 6px;color:var(--gray-400)">…</span>';
    const active = n === cur;
    return `<button class="btn btn-sm ${active ? 'btn-primary' : 'btn-outline'}" onclick="gotoVisitPage(${n})" ${active ? 'disabled' : ''}>${n}</button>`;
  }).join('');
  return `<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px;justify-content:space-between">
    <div style="font-size:13px;color:var(--gray-600)">共 ${total} 条，第 ${cur} / ${pages} 页</div>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <button class="btn btn-sm btn-outline" onclick="gotoVisitPage(1)" ${cur <= 1 ? 'disabled' : ''}>« 首页</button>
      <button class="btn btn-sm btn-outline" onclick="gotoVisitPage(${cur - 1})" ${cur <= 1 ? 'disabled' : ''}>‹ 上一页</button>
      ${btns}
      <button class="btn btn-sm btn-outline" onclick="gotoVisitPage(${cur + 1})" ${cur >= pages ? 'disabled' : ''}>下一页 ›</button>
      <button class="btn btn-sm btn-outline" onclick="gotoVisitPage(${pages})" ${cur >= pages ? 'disabled' : ''}>末页 »</button>
      <span style="display:inline-block;width:1px;height:20px;background:var(--gray-200);margin:0 4px"></span>
      <span style="font-size:13px;color:var(--gray-600)">跳至</span>
      <input type="number" id="visitJumpPage" min="1" max="${pages}" value="${cur}" class="form-control form-control-sm" style="width:64px" onkeydown="if(event.key==='Enter')gotoVisitPage(this.value)">
      <span style="font-size:13px;color:var(--gray-600)">页</span>
      <button class="btn btn-sm btn-outline" onclick="gotoVisitPage(document.getElementById('visitJumpPage')?.value)">跳转</button>
    </div>
  </div>`;
}
function gotoVisitPage(p) {
  const n = parseInt(p, 10);
  if (isNaN(n)) return;
  visitCurrentPage = n;
  renderVisitTable();
  const el = document.getElementById('visitResults');
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function onVisitPageSizeChange() {
  const sel = document.getElementById('visitPageSize');
  if (sel) visitPageSize = parseInt(sel.value, 10) || 30;
  try { localStorage.setItem('sop_visitPageSize', String(visitPageSize)); } catch(e) {}
  visitCurrentPage = 1;
  renderVisitTable();
}
function resetVisitPage() {
  visitCurrentPage = 1;
  renderVisitTable();
}

function onVisitEdit(recordId, field, value) {
  if (!visitEditBuffer[recordId]) visitEditBuffer[recordId] = {};
  visitEditBuffer[recordId][field] = value;
  // Update select cell color dynamically when visitResult changes
  if (field === 'visitResult') {
    const row = document.querySelector(`tr[data-id="${recordId}"]`);
    if (row) {
      const td = row.querySelector('td:nth-child(11)');
      const select = td?.querySelector('select');
      const color = getVisitResultColor(value);
      const bg = getVisitResultBg(value);
      if (td) { td.style.borderLeftColor = color || 'transparent'; td.style.background = bg; }
      if (select) { select.style.borderColor = color || ''; select.style.color = color || 'inherit'; select.style.fontWeight = value ? '600' : '400'; }
    }
  }

function parseVisitCSV(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const rows = [];
  let row = [];
  let field = '';
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i+1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else { field += c; }
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c === '\r') {}
      else field += c;
    }
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows;
}

async function handleVisitUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const alertEl = document.getElementById('visitAlert');
  if (alertEl) alertEl.innerHTML = '<div class="alert alert-info">正在解析CSV文件...</div>';
  try {
    const buffer = await file.arrayBuffer();
    let text;
    // Try UTF-8 first; if replacement chars found, fall back to GBK (common for Chinese Windows CSVs)
    text = new TextDecoder('utf-8').decode(buffer);
    if (text.includes('\uFFFD')) {
      text = new TextDecoder('gbk').decode(buffer);
    }
    const rows = parseVisitCSV(text);
    if (rows.length < 2) {
      if (alertEl) alertEl.innerHTML = '<div class="alert alert-warning">CSV文件没有数据行</div>';
      input.value = '';
      return;
    }
    const headers = rows[0].map(h => h.trim());
    const colMap = {};
    headers.forEach((h, i) => {
      if (h.includes('联系时间')) colMap.contactTime = i;
      else if (h.includes('客户') && !h.includes('单位')) colMap.customer = i;
      else if (h.includes('工作单位') || h.includes('联系人')) colMap.contactPerson = i;
      else if (h.includes('手机')) colMap.phone = i;
      else if (h.includes('签到事件')) colMap.signinEvent = i;
      else if (h.includes('签退时间')) colMap.signoutTime = i;
      else if (h.includes('时长')) colMap.duration = i;
      else if (h.includes('签退状态')) colMap.signoutStatus = i;
      else if (h.includes('员工')) colMap.employee = i;
      else if (h.includes('部门')) colMap.department = i;
      else if (h.includes('签到记录') || h.includes('签到地址')) colMap.signinAddress = i;
      else if (h.includes('备注')) colMap.remark = i;
      else if (h.includes('拜访结果')) colMap.visitResult = i;
      else if (h.includes('卡点') || h.includes('说明')) colMap.blockerNote = i;
    });
    const newRecords = [];
    let dupCount = 0;
    // 查重 key = 联系时间|客户|联系人|手机号|签到事件|员工|部门|签到地址|备注（不含拜访结果、卡点说明）
    const buildDupKey = (o) => [normContactTime(o.contactTime||''), o.customer||'', o.contactPerson||'', o.phone||'', o.signinEvent||'', o.employee||'', canonDept(o.department||''), o.signinAddress||'', o.remark||''].map(v => (v||'').trim()).join('|');
    // Keys already in DB — duplicates to be filtered out
    const existingKeys = new Set(cloudData.visitRecords.map(e => buildDupKey(e)));
    // Keys already added in this batch — avoid within-file duplicates too
    const batchKeys = new Set();
    for (let i = 1; i < rows.length; i++) {
      const r = rows[i];
      if (!r[colMap.contactTime] && !r[colMap.employee]) continue;
      const contactTime = normContactTime(r[colMap.contactTime] || '');
      const customer = r[colMap.customer] || '';
      const employee = r[colMap.employee] || '';
      const key = buildDupKey({
        contactTime: contactTime,
        customer: customer,
        contactPerson: r[colMap.contactPerson] || '',
        phone: r[colMap.phone] || '',
        signinEvent: r[colMap.signinEvent] || '',
        employee: employee,
        department: r[colMap.department] || '',
        signinAddress: r[colMap.signinAddress] || '',
        remark: r[colMap.remark] || ''
      });
      // Skip duplicates: already in DB or already in this batch → auto filter out
      if (existingKeys.has(key) || batchKeys.has(key)) {
        dupCount++;
        continue;
      }
      batchKeys.add(key);
      const record = {
        id: genId(),
        contactTime, customer,
        contactPerson: r[colMap.contactPerson] || '',
        phone: r[colMap.phone] || '',
        signinEvent: r[colMap.signinEvent] || '',
        signoutTime: r[colMap.signoutTime] || '',
        duration: r[colMap.duration] || '',
        signoutStatus: r[colMap.signoutStatus] || '',
        employee, department: canonDept(r[colMap.department] || ''),
          signinAddress: r[colMap.signinAddress] || '',
          remark: r[colMap.remark] || '',
          visitResult: (colMap.visitResult !== undefined && r[colMap.visitResult]) ? r[colMap.visitResult] : '',
          blockerNote: (colMap.blockerNote !== undefined && r[colMap.blockerNote]) ? r[colMap.blockerNote] : '',
        uploadedAt: new Date().toISOString(),
        uploadedBy: currentUser.name
      };
      newRecords.push(record);
    }
    let saved = 0;
    for (const rec of newRecords) {
      try {
        await apiCreate('visitRecords', rec);
        cloudData.visitRecords.push(rec);
        saved++;
      } catch(e) { console.warn('Failed to save visit record:', e); }
    }
    try { saveReportsCache(); } catch(e) {}
    if (alertEl) {
      let msg = '✅ 上传完成！新增 ' + saved + ' 条记录';
      if (dupCount > 0) msg += '，已自动过滤 ' + dupCount + ' 条重复记录';
      alertEl.innerHTML = '<div class="alert alert-success">' + msg + '</div>';
    }
    setTimeout(() => { const a = document.getElementById('visitAlert'); if (a) a.innerHTML = ''; }, 5000);
    renderVisitTable();
  } catch(e) {
    if (alertEl) alertEl.innerHTML = '<div class="alert alert-danger">❌ 上传失败: ' + e.message + '</div>';
  }
  input.value = '';
}

// ============ Management Weekly Report ============
let mgrReportEditId = null; // track editing state

function getWeekNumber(date) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
  const week1 = new Date(d.getFullYear(), 0, 4);
  return 1 + Math.round(((d - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}

function getRecentWeeks(count) {
  const weeks = [];
  const now = new Date();
  const day = now.getDay() || 7;
  const thisMonday = new Date(now);
  thisMonday.setDate(now.getDate() - day + 1);
  thisMonday.setHours(0, 0, 0, 0);
  for (let i = 0; i < count; i++) {
    const monday = new Date(thisMonday);
    monday.setDate(thisMonday.getDate() - i * 7);
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    const weekNum = getWeekNumber(monday);
    const year = monday.getFullYear();
    const fmt = (dt) => { const m = String(dt.getMonth()+1).padStart(2,'0'); const d = String(dt.getDate()).padStart(2,'0'); return `${m}/${d}`; };
    const fmtDate = (dt) => { const y = dt.getFullYear(); const m = String(dt.getMonth()+1).padStart(2,'0'); const d = String(dt.getDate()).padStart(2,'0'); return `${y}-${m}-${d}`; };
    weeks.push({
      weekStart: fmtDate(monday),
      weekEnd: fmtDate(sunday),
      label: `${year}年第${weekNum}周 (${fmt(monday)}-${fmt(sunday)})`
    });
  }
  return weeks;
}

function getVisitSummaryForWeek(weekStart, weekEnd, department) {
  const records = cloudData.visitRecords.filter(r => {
    const d = normContactTime(r.contactTime).split(' ')[0];
    return d >= weekStart && d <= weekEnd && normDeptKey(r.department || '未分组') === normDeptKey(department);
  });
  const vc = getVisitConfig();
  const allResults = vc.visitResults || [];
  const byResult = {};
  allResults.forEach(r => { byResult[r] = 0; });
  byResult['未标记'] = 0;
  records.forEach(r => {
    const vr = r.visitResult || '未标记';
    if (byResult[vr] === undefined) byResult[vr] = 0;
    byResult[vr]++;
  });
  return { total: records.length, byResult, records };
}

// 依据最新的拜访数据与配置，构建拜访结果快照（提交周报 / 重新生成共用）
function buildVisitSnapshot(summary) {
  const vc = getVisitConfig();
  const allResults = vc.visitResults || [];
  return {
    total: summary.total,
    details: [...allResults, '未标记'].filter(res => (summary.byResult[res] || 0) > 0).map(res => {
      const empMap = {};
      summary.records.forEach(rec => {
        const vr = rec.visitResult || '未标记';
        const emp = rec.employee || '未知';
        if (vr === res) empMap[emp] = (empMap[emp] || 0) + 1;
      });
      const employees = Object.keys(empMap).map(name => ({ name, count: empMap[name] }));
      return { result: res, count: summary.byResult[res] || employees.reduce((s, e) => s + e.count, 0), employees };
    })
  };
}

// 将拜访汇总快照格式化为「结果→销售人员」明细文本（details 优先，否则回退到计数快照）
function formatVisitSnapshotDetail(snap) {
  if (!snap) return '';
  if (Array.isArray(snap.details) && snap.details.length) {
    return snap.details.map(d => {
      const empStr = Array.isArray(d.employees) ? d.employees.map(e => {
        if (e && typeof e === 'object') return `${e.name}(${e.count})`;
        return String(e);
      }).join('、') : '';
      return `${d.result}：${d.count}人 [${empStr}]`;
    }).join('\n');
  }
  return Object.keys(snap).filter(k => k !== 'total' && snap[k] > 0).map(k => `${k}：${snap[k]}`).join('\n');
}

// 将快照渲染为卡片内美观的明细表格（已提交周报查看用）
function renderSnapshotCardHTML(snap) {
  if (!snap || !Array.isArray(snap.details) || !snap.details.length) return '';
  const total = snap.total || 0;
  const rows = snap.details.map(d => {
    const empStr = Array.isArray(d.employees) ? d.employees.map(e => {
      if (e && typeof e === 'object') return `${e.name}(${e.count})`;
      return String(e);
    }).join('、') : '';
    return `<div style="display:table-row">
      <div style="display:table-cell;white-space:nowrap;padding:3px 10px 3px 0;color:var(--gray-700);font-weight:500">${d.result}：</div>
      <div style="display:table-cell;white-space:nowrap;text-align:right;padding:3px 12px 3px 0;color:var(--gray-700);font-weight:600;min-width:46px">${d.count}人</div>
      <div style="display:table-cell;padding:3px 0;color:var(--gray-600);font-family:var(--font-sans);word-break:break-all">[${empStr}]</div>
    </div>`;
  }).join('');
  return `<div style="background:var(--gray-50);border-radius:6px;padding:10px 12px;margin-bottom:8px;font-size:12px">
    <div style="font-weight:600;color:var(--gray-700);margin-bottom:6px;font-size:13px">📊 拜访汇总（${total}次）</div>
    <div style="display:table;width:100%;line-height:1.6">${rows}</div>
  </div>`;
}

function updateMgrVisitSummary() {
  const weekVal = document.getElementById('mgrWeekSel')?.value || '';
  const dept = document.getElementById('mgrDeptSel')?.value || '';
  const container = document.getElementById('mgrVisitSummary');
  if (!container) return;
  if (!dept) {
    container.innerHTML = '<div style="padding:12px;background:var(--gray-50);border-radius:8px;color:var(--gray-500);font-size:13px;text-align:center">👆 请选择部门，将自动带出当周拜访结果汇总</div>';
    return;
  }
  const [weekStart, weekEnd, weekLabel] = weekVal.split('|');
  const summary = getVisitSummaryForWeek(weekStart, weekEnd, dept);
  const colors = ['#2563eb','#16a34a','#f59e0b','#dc2626','#7c3aed','#0891b2','#db2777','#4f46e5'];
  const vc = getVisitConfig();
  const allResults = vc.visitResults || [];

  // If there is no visit data for this week+dept, do NOT show the summary
  if (summary.total === 0) {
    container.innerHTML = '<div style="padding:12px;background:var(--gray-50);border-radius:8px;color:var(--gray-400);font-size:13px;text-align:center">📭 该部门当周暂无拜访数据，无需带出汇总</div>';
    return;
  }

  let cards = `<div style="text-align:center;padding:10px;background:var(--gray-50);border-radius:6px"><div style="font-size:20px;font-weight:700;color:var(--primary)">${summary.total}</div><div style="font-size:11px;color:var(--gray-500)">总拜访数</div></div>`;
  allResults.forEach((result, idx) => {
    const count = summary.byResult[result] || 0;
    const color = colors[idx % colors.length];
    cards += `<div style="text-align:center;padding:10px;background:var(--gray-50);border-radius:6px"><div style="font-size:20px;font-weight:700;color:${color}">${count}</div><div style="font-size:11px;color:var(--gray-500)">${result}</div></div>`;
  });
  const unmarked = summary.byResult['未标记'] || 0;
  cards += `<div style="text-align:center;padding:10px;background:var(--gray-50);border-radius:6px"><div style="font-size:20px;font-weight:700;color:var(--gray-400)">${unmarked}</div><div style="font-size:11px;color:var(--gray-500)">未标记</div></div>`;

  // 按「拜访结果」统计销售人员（记录每人次数）
  const resultMap = {};
  [...allResults, '未标记'].forEach(res => { if ((summary.byResult[res] || 0) > 0) resultMap[res] = {}; });
  summary.records.forEach(rec => {
    const vr = rec.visitResult || '未标记';
    if (!resultMap[vr]) resultMap[vr] = {};
    const emp = rec.employee || '未知';
    resultMap[vr][emp] = (resultMap[vr][emp] || 0) + 1;
  });
  const resultRows = Object.keys(resultMap).map(result => {
    const empMap = resultMap[result];
    const emps = Object.keys(empMap).map(name => ({ name, count: empMap[name] }));
    const cnt = summary.byResult[result] || emps.reduce((s, e) => s + e.count, 0);
    const ridx = allResults.indexOf(result);
    const color = ridx >= 0 ? colors[ridx % colors.length] : 'var(--gray-400)';
    const empStr = emps.map(e => `${e.name}(${e.count})`).join('、');
    return `<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};margin-right:6px"></span><strong>${result}</strong></td><td style="text-align:center">${cnt}</td><td style="font-size:12px;color:var(--gray-600)">${empStr}</td></tr>`;
  }).join('');

  container.innerHTML = `
    <div style="border:1px solid var(--gray-200);border-radius:8px;overflow:hidden">
      <div style="padding:10px 14px;background:var(--gray-50);border-bottom:1px solid var(--gray-200);font-size:13px;font-weight:600;color:var(--gray-700)">
        📊 ${dept} — ${weekLabel} 拜访结果汇总
      </div>
      <div style="padding:14px">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-bottom:12px">${cards}</div>
        ${resultRows ? `<div class="table-wrap"><table style="font-size:12px"><thead><tr><th>拜访结果</th><th style="width:60px;text-align:center">次数</th><th>销售人员</th></tr></thead><tbody>${resultRows}</tbody></table></div>` : '<div style="text-align:center;color:var(--gray-400);padding:8px;font-size:13px">该部门本周暂无拜访记录</div>'}
      </div>
    </div>
  `;
}

async function saveMgrReport(btn) {
  const weekVal = document.getElementById('mgrWeekSel').value;
  const dept = document.getElementById('mgrDeptSel').value;
  const content = document.getElementById('mgrContent').value.trim();
  if (!dept) { showToast('请选择部门', 'warning'); return; }
  if (!content) { showToast('请填写周报内容', 'warning'); return; }
  const [weekStart, weekEnd, weekLabel] = weekVal.split('|');
  // Get visit summary snapshot
  const summary = getVisitSummaryForWeek(weekStart, weekEnd, dept);
  // 按「拜访结果」归组的销售人员明细，随快照持久化，便于列表展示与导出
  // 注意：不要把结果名作为快照平铺 key（结果名可能含 "/" 等 Firebase 非法字符），统一用 details 数组
  const visitSnapshot = buildVisitSnapshot(summary);

  if (btn) { btn.disabled = true; btn.textContent = '⏳ 提交中...'; }

  try {
    if (mgrReportEditId) {
      // Update existing
      const existing = cloudData.mgrReports.find(r => r.id === mgrReportEditId);
      if (existing) {
        const updated = { ...existing, weekStart, weekEnd, weekLabel, department: dept, content, visitSnapshot, updatedAt: new Date().toISOString() };
        await apiUpdate('mgrReports', mgrReportEditId, updated);
        Object.assign(existing, updated);
      }
      mgrReportEditId = null;
      showToast('周报已更新！');
    } else {
      // Check for duplicate (same user, same week, same dept)
      const dup = cloudData.mgrReports.find(r => r.userId === currentUser.id && r.weekStart === weekStart && r.department === dept);
      if (dup) {
        if (!confirm('该周次和部门已有周报记录，是否覆盖更新？')) { if (btn) { btn.disabled = false; btn.textContent = '💾 提交周报'; } return; }
        const updated = { ...dup, weekEnd, weekLabel, content, visitSnapshot, updatedAt: new Date().toISOString() };
        await apiUpdate('mgrReports', dup.id, updated);
        Object.assign(dup, updated);
        showToast('周报已更新！');
      } else {
        const newReport = {
          id: 'mgr_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
          userId: currentUser.id,
          userName: currentUser.name,
          weekStart, weekEnd, weekLabel,
          department: dept,
          content,
          visitSnapshot,
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        };
        await apiCreate('mgrReports', newReport);
        cloudData.mgrReports.push(newReport);
        showToast('周报提交成功！');
      }
    }
    resetMgrForm();
    renderMgrReport();
  } catch(e) {
    showToast('提交失败：' + e.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = '💾 提交周报'; }
  }
}

function resetMgrForm() {
  mgrReportEditId = null;
  renderMgrReport();
}

function editMgrReport(id) {
  mgrReportEditId = id;
  renderMgrReport();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function deleteMgrReport(id) {
  if (!confirm('确认删除该周报？此操作不可撤销。')) return;
  try {
    await apiDelete('mgrReports', id);
    cloudData.mgrReports = cloudData.mgrReports.filter(r => r.id !== id);
    if (mgrReportEditId === id) { mgrReportEditId = null; }
    renderMgrReport();
    showToast('已删除');
  } catch(e) {
    showToast('删除失败：' + e.message, 'error');
  }
}

// 导出「管理周报」列表（按当前周次筛选结果）
function exportMgrReports() {
  const fw = document.getElementById('mgrReportWeekFilter')?.value || '';
  let list = cloudData.mgrReports.filter(r => r.userId === currentUser.id || hasPermission('editOthers'));
  if (fw) list = list.filter(r => r.weekStart === fw);
  if (!list.length) { showToast('没有可导出的周报', 'warning'); return; }
  const esc = v => { const s = String(v == null ? '' : v); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; };
  const headers = ['周次', '部门', '提交人', '总拜访数', '拜访结果明细', '周报内容', '创建时间', '更新时间'];
  const rows = list.map(r => {
    const snap = r.visitSnapshot || {};
    const snapStr = formatVisitSnapshotDetail(snap);
    return [
      r.weekLabel || (r.weekStart + ' ~ ' + r.weekEnd),
      r.department || '',
      r.userName || '未知',
      snap.total || 0,
      snapStr,
      (r.content || '').replace(/\n/g, ' '),
      (r.createdAt || '').replace('T', ' ').slice(0, 16),
      (r.updatedAt || '').replace('T', ' ').slice(0, 16)
    ];
  });
  const csv = '\uFEFF' + [headers.map(esc).join(','), ...rows.map(r => r.map(esc).join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '管理周报' + (fw ? '_' + fw : '_全部') + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('已导出 ' + list.length + ' 条周报');
}
