function getUniqueDepartments() {
  return [...new Set(cloudData.users.map(u => u.department).filter(d => d))].sort();
}

function getUniquePersons() {
  return [...new Set(cloudData.users.map(u => ({name:u.name, dept:u.department})))];
}

function getUniqueChannels(type) {
  const channels = getChannels(type);
  return channels.map(ch => ch.name);
}

function renderSubFilters() {
  const type = document.getElementById('sumType').value;
  const container = document.getElementById('sumSubFilters');
  if (!container) return;
  if (summaryTab === 'totals') { container.innerHTML = ''; return; }

  if (summaryTab === 'merge') {
    const depts = getUniqueDepartments();
    const allChannels = [...new Set([...getChannels('daily').map(ch => ch.name), ...getChannels('weekly').map(ch => ch.name)])];
    let h = '<div class="card" style="margin-bottom:16px"><div class="card-body"><div class="filter-bar">';
    h += `<div class="form-group"><label>筛选部门</label><select class="form-control" onchange="summaryFilters.dept=this.value;loadMergeSummary()"><option value="">全部部门</option>${depts.map(d => `<option value="${d}" ${summaryFilters.dept===d?'selected':''}>${d}</option>`).join('')}</select></div>`;
    h += `<div class="form-group"><label>筛选渠道</label><select class="form-control" onchange="summaryFilters.channel=this.value;loadMergeSummary()"><option value="">全部渠道</option>${allChannels.map(c => `<option value="${c}" ${summaryFilters.channel===c?'selected':''}>${c}</option>`).join('')}</select></div>`;
    h += `<div class="form-group"><label>&nbsp;</label><button class="btn btn-outline btn-sm" onclick="summaryFilters={dept:'',person:'',channel:''};loadMergeSummary()">🔄 重置筛选</button></div>`;
    h += '</div></div></div>';
    container.innerHTML = h;
    return;
  }

  const depts = getUniqueDepartments();
  const persons = getUniquePersons();
  const channels = getUniqueChannels(type);

  let html = '<div class="card" style="margin-bottom:16px"><div class="card-body"><div class="filter-bar">';

  if (summaryTab === 'byPerson') {
    // Filter by department and channel
    html += `<div class="form-group"><label>筛选部门</label><select class="form-control" onchange="summaryFilters.dept=this.value;loadSummary()"><option value="">全部部门</option>${depts.map(d => `<option value="${d}" ${summaryFilters.dept===d?'selected':''}>${d}</option>`).join('')}</select></div>`;
    html += `<div class="form-group"><label>筛选渠道</label><select class="form-control" onchange="summaryFilters.channel=this.value;loadSummary()"><option value="">全部渠道</option>${channels.map(c => `<option value="${c}" ${summaryFilters.channel===c?'selected':''}>${c}</option>`).join('')}</select></div>`;
  } else if (summaryTab === 'byDepartment') {
    // Filter by channel and person
    html += `<div class="form-group"><label>筛选渠道</label><select class="form-control" onchange="summaryFilters.channel=this.value;loadSummary()"><option value="">全部渠道</option>${channels.map(c => `<option value="${c}" ${summaryFilters.channel===c?'selected':''}>${c}</option>`).join('')}</select></div>`;
    html += `<div class="form-group"><label>筛选人员</label><select class="form-control" onchange="summaryFilters.person=this.value;loadSummary()"><option value="">全部人员</option>${persons.map(p => `<option value="${p.name}" ${summaryFilters.person===p.name?'selected':''}>${p.name}${p.dept?'('+p.dept+')':''}</option>`).join('')}</select></div>`;
  } else if (summaryTab === 'byChannel') {
    // Filter by department and person
    html += `<div class="form-group"><label>筛选部门</label><select class="form-control" onchange="summaryFilters.dept=this.value;loadSummary()"><option value="">全部部门</option>${depts.map(d => `<option value="${d}" ${summaryFilters.dept===d?'selected':''}>${d}</option>`).join('')}</select></div>`;
    html += `<div class="form-group"><label>筛选人员</label><select class="form-control" onchange="summaryFilters.person=this.value;loadSummary()"><option value="">全部人员</option>${persons.map(p => `<option value="${p.name}" ${summaryFilters.person===p.name?'selected':''}>${p.name}${p.dept?'('+p.dept+')':''}</option>`).join('')}</select></div>`;
  }
  html += `<div class="form-group"><label>&nbsp;</label><button class="btn btn-outline btn-sm" onclick="summaryFilters={dept:'',person:'',channel:''};loadSummary()">🔄 重置筛选</button></div>`;
  html += '</div></div></div>';
  container.innerHTML = html;
}

function loadSummary() {
  const type = document.getElementById('sumType').value;
  const s = document.getElementById('sumStart').value;
  const e = document.getElementById('sumEnd').value;
  let reports = type==='daily'?[...cloudData.dailyReports]:[...cloudData.weeklyReports];
  if (s) reports = reports.filter(r => (type==='daily'?r.reportDate:r.weekStart) >= s);
  if (e) reports = reports.filter(r => (type==='daily'?r.reportDate:r.weekStart) <= e);

  const byP={},byD={},byC={};
  // Initialize byC with all configured channels so new channels always appear
  getChannels(type).forEach(ch => {
    byC[ch.name] = {channel:ch.name, newLeads:0, effectiveContacts:0, abIntent:0, closedCustomers:0, dealAmount:0, targetAmount:0, count:0};
  });
  let t={newLeads:0,effectiveContacts:0,abIntent:0,closedCustomers:0,dealAmount:0,targetAmount:0};

  reports.forEach(r => {
    // Apply person filter (skip this person's reports)
    if (summaryFilters.person && r.name !== summaryFilters.person) return;
    // Apply department filter (skip this department's reports)
    if (summaryFilters.dept && r.department !== summaryFilters.dept) return;

    if(!byP[r.name])byP[r.name]={name:r.name,department:r.department,newLeads:0,effectiveContacts:0,abIntent:0,closedCustomers:0,dealAmount:0,targetAmount:0,count:0};
    if(!byD[r.department])byD[r.department]={department:r.department,newLeads:0,effectiveContacts:0,abIntent:0,closedCustomers:0,dealAmount:0,targetAmount:0,count:0};
    byP[r.name].count++;byD[r.department].count++;
    (r.channels||[]).forEach(ch => {
      // Apply channel filter (skip this channel)
      if (summaryFilters.channel && ch.channel !== summaryFilters.channel) return;

      const nl=parseFloat(ch.newLeads)||0,ec=parseFloat(ch.effectiveContacts)||0,ab=parseFloat(ch.abIntent)||0,cc=parseFloat(ch.closedCustomers)||0,da=parseFloat(ch.dealAmount)||0,ta=parseFloat(ch.targetAmount)||0;
      byP[r.name].newLeads+=nl;byP[r.name].effectiveContacts+=ec;byP[r.name].abIntent+=ab;byP[r.name].closedCustomers+=cc;byP[r.name].dealAmount+=da;byP[r.name].targetAmount+=ta;
      byD[r.department].newLeads+=nl;byD[r.department].effectiveContacts+=ec;byD[r.department].abIntent+=ab;byD[r.department].closedCustomers+=cc;byD[r.department].dealAmount+=da;byD[r.department].targetAmount+=ta;
      t.newLeads+=nl;t.effectiveContacts+=ec;t.abIntent+=ab;t.closedCustomers+=cc;t.dealAmount+=da;t.targetAmount+=ta;
      if(!byC[ch.channel])byC[ch.channel]={channel:ch.channel,newLeads:0,effectiveContacts:0,abIntent:0,closedCustomers:0,dealAmount:0,targetAmount:0,count:0};
      byC[ch.channel].count++;
      byC[ch.channel].newLeads+=nl;byC[ch.channel].effectiveContacts+=ec;byC[ch.channel].abIntent+=ab;byC[ch.channel].closedCustomers+=cc;byC[ch.channel].dealAmount+=da;byC[ch.channel].targetAmount+=ta;
    });
  });
  const cr=o=>{o.contactToAbRate=o.effectiveContacts>0?(o.abIntent/o.effectiveContacts*100).toFixed(1)+'%':'0%';o.completionRate=o.targetAmount>0?(o.dealAmount/o.targetAmount*100).toFixed(1)+'%':'0%'};
  Object.values(byP).forEach(cr);Object.values(byD).forEach(cr);Object.values(byC).forEach(cr);cr(t);
  summaryData = {byPerson:Object.values(byP),byDepartment:Object.values(byD),byChannel:Object.values(byC),totals:t,count:reports.length,reports:reports};
  renderSubFilters();
  renderSummaryTab();
}

function switchTab(tab){
  summaryTab=tab;
  const regularCard=document.getElementById('regularFilterCard');
  const mergeCard=document.getElementById('mergeFilterCard');
  if(tab==='merge'){
    if(regularCard)regularCard.style.display='none';
    if(mergeCard)mergeCard.style.display='';
  }else{
    if(regularCard)regularCard.style.display='';
    if(mergeCard)mergeCard.style.display='none';
  }
  // Clear filters not relevant to the new tab
  if (tab === 'byPerson') { summaryFilters.person = ''; }
  else if (tab === 'byDepartment') { summaryFilters.dept = ''; }
  else if (tab === 'byChannel') { summaryFilters.channel = ''; }
  document.querySelectorAll('.summary-tab').forEach(t=>t.classList.remove('active'));
  const tabEl = document.querySelector(`.summary-tab[data-t="${tab}"]`);
  if (tabEl) tabEl.classList.add('active');
  if(tab==='merge'){
    loadMergeSummary();
  }else{
    loadSummary();
  }
}

// ============ Merge Summary (日报+周报合并统计) ============
function loadMergeSummary() {
  const ds=document.getElementById('mergeDailyStart').value;
  const de=document.getElementById('mergeDailyEnd').value;
  const ws=document.getElementById('mergeWeeklyStart').value;
  const we=document.getElementById('mergeWeeklyEnd').value;
  let dailyReports=[...cloudData.dailyReports];
  if(ds)dailyReports=dailyReports.filter(r=>r.reportDate>=ds);
  if(de)dailyReports=dailyReports.filter(r=>r.reportDate<=de);
  let weeklyReports=[...cloudData.weeklyReports];
  if(ws)weeklyReports=weeklyReports.filter(r=>r.weekStart>=ws);
  if(we)weeklyReports=weeklyReports.filter(r=>r.weekStart<=we);
  if(summaryFilters.person){
    dailyReports=dailyReports.filter(r=>r.name===summaryFilters.person);
    weeklyReports=weeklyReports.filter(r=>r.name===summaryFilters.person);
  }
  if(summaryFilters.dept){
    dailyReports=dailyReports.filter(r=>r.department===summaryFilters.dept);
    weeklyReports=weeklyReports.filter(r=>r.department===summaryFilters.dept);
  }
  const deptChannels={};
  const deptSummary={};
  const processReports=(reports,source)=>{
    reports.forEach(r=>{
      const dept=r.department||'未分组';
      if(!deptChannels[dept])deptChannels[dept]={};
      if(!deptSummary[dept])deptSummary[dept]={newLeads:0,effectiveContacts:0,abIntent:0,closedCustomers:0,dealAmount:0,targetAmount:0,count:0,dailyCount:0,weeklyCount:0};
      deptSummary[dept].count++;
      if(source==='daily')deptSummary[dept].dailyCount++;else deptSummary[dept].weeklyCount++;
      (r.channels||[]).forEach(ch=>{
        if(summaryFilters.channel&&ch.channel!==summaryFilters.channel)return;
        const key=ch.channel+'|||'+source;
        if(!deptChannels[dept][key])deptChannels[dept][key]={channel:ch.channel,source:source,newLeads:0,effectiveContacts:0,abIntent:0,closedCustomers:0,dealAmount:0,targetAmount:0,count:0};
        const x=deptChannels[dept][key];
        const nl=parseFloat(ch.newLeads)||0,ec=parseFloat(ch.effectiveContacts)||0,ab=parseFloat(ch.abIntent)||0,cc=parseFloat(ch.closedCustomers)||0,da=parseFloat(ch.dealAmount)||0,ta=parseFloat(ch.targetAmount)||0;
        x.newLeads+=nl;x.effectiveContacts+=ec;x.abIntent+=ab;x.closedCustomers+=cc;x.dealAmount+=da;x.targetAmount+=ta;x.count++;
        deptSummary[dept].newLeads+=nl;deptSummary[dept].effectiveContacts+=ec;deptSummary[dept].abIntent+=ab;deptSummary[dept].closedCustomers+=cc;deptSummary[dept].dealAmount+=da;deptSummary[dept].targetAmount+=ta;
      });
    });
  };
  processReports(dailyReports,'daily');
  processReports(weeklyReports,'weekly');
  const cr=o=>{o.contactToAbRate=o.effectiveContacts>0?(o.abIntent/o.effectiveContacts*100).toFixed(2)+'%':'0%';o.completionRate=o.targetAmount>0?(o.dealAmount/o.targetAmount*100).toFixed(2)+'%':'0%'};
  Object.values(deptChannels).forEach(chMap=>Object.values(chMap).forEach(cr));
  Object.values(deptSummary).forEach(cr);
  mergeSummaryData={deptChannels,deptSummary,dailyCount:dailyReports.length,weeklyCount:weeklyReports.length,dailyRange:{start:ds,end:de},weeklyRange:{start:ws,end:we}};
  summaryData=mergeSummaryData;
  renderSubFilters();
  renderSummaryTab();
}

function exportMergeSummaryCSV() {
  if(!mergeSummaryData){alert('请先点击"合并统计"');return;}
  const esc=v=>{const s=String(v);return/[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s};
  const f=v=>v>0?v.toLocaleString():'0';
  const fm=v=>v>0?v.toLocaleString():'0';
  const{deptChannels,deptSummary,dailyCount,weeklyCount,dailyRange,weeklyRange}=mergeSummaryData;
  const channelOrder=[...new Set([...getChannels('daily').map(ch=>ch.name),...getChannels('weekly').map(ch=>ch.name)])];
  const rows=[];
  rows.push('# 日报周报合并统计');
  rows.push('# 日报时间: '+(dailyRange.start||'全部')+' 至 '+(dailyRange.end||'全部')+' ('+dailyCount+'条)');
  rows.push('# 周报时间: '+(weeklyRange.start||'全部')+' 至 '+(weeklyRange.end||'全部')+' ('+weeklyCount+'条)');
  rows.push('# 筛选部门: '+(summaryFilters.dept||'全部部门'));
  rows.push('# 筛选渠道: '+(summaryFilters.channel||'全部渠道'));
  rows.push('# 导出时间: '+new Date().toLocaleString('zh-CN'));
  const headers=['渠道','来源','报告数','新增线索','有效建联','AB意向','成交客户','成交金额','建联转AB率','目标金额','完成率'];
  Object.keys(deptChannels).sort().forEach(dept=>{
    const chMap=deptChannels[dept];
    const ds=deptSummary[dept]||{};
    const orderedRows=[];
    const seen=new Set();
    channelOrder.forEach(cn=>{
      const dk=cn+'|||daily',wk=cn+'|||weekly';
      if(chMap[dk]){seen.add(dk);orderedRows.push(chMap[dk]);}
      if(chMap[wk]){seen.add(wk);orderedRows.push(chMap[wk]);}
    });
    Object.values(chMap).forEach(c=>{const k=c.channel+'|||'+c.source;if(!seen.has(k))orderedRows.push(c);});
    rows.push('');
    rows.push(esc('【'+dept+'】（日报'+(ds.dailyCount||0)+'条 + 周报'+(ds.weeklyCount||0)+'条）'));
    rows.push(headers.map(esc).join(','));
    orderedRows.forEach(c=>{
      rows.push([c.channel,c.source==='daily'?'日报':'周报',c.count,f(c.newLeads),f(c.effectiveContacts),f(c.abIntent),f(c.closedCustomers),fm(c.dealAmount),c.contactToAbRate,fm(c.targetAmount),c.completionRate].map(esc).join(','));
    });
    rows.push(['小计','—',ds.count||0,f(ds.newLeads),f(ds.effectiveContacts),f(ds.abIntent),f(ds.closedCustomers),fm(ds.dealAmount),ds.contactToAbRate,fm(ds.targetAmount),ds.completionRate].map(esc).join(','));
  });
  const csv='\uFEFF'+rows.join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const nameParts=['合并统计'];
  if(dailyRange.start)nameParts.push('日报'+dailyRange.start+'至'+dailyRange.end);
  if(weeklyRange.start)nameParts.push('周报'+weeklyRange.start+'至'+weeklyRange.end);
  if(summaryFilters.dept)nameParts.push(summaryFilters.dept);
  if(summaryFilters.channel)nameParts.push(summaryFilters.channel);
  nameParts.push(new Date().toISOString().split('T')[0]);
  a.download=nameParts.join('_')+'.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ============ Summary Charts ============
let _summaryCharts = {};
let _chartJSPromise = null;
function loadChartJS() {
  if (typeof Chart !== 'undefined') return Promise.resolve();
  if (_chartJSPromise) return _chartJSPromise;
  _chartJSPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js';
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
  return _chartJSPromise;
}
function destroySummaryCharts() {
  Object.values(_summaryCharts).forEach(ch => { try { ch.destroy(); } catch(e){} });
  _summaryCharts = {};
}

async function renderSummaryCharts() {
  destroySummaryCharts();
  if (!summaryData) return;
  if (typeof Chart === 'undefined') {
    await loadChartJS();
  }
  if (typeof Chart === 'undefined') return;
  const type = document.getElementById('sumType') ? document.getElementById('sumType').value : 'daily';
  const isDaily = type === 'daily';
  const palette = ['#2563eb','#16a34a','#f59e0b','#dc2626','#7c3aed','#0891b2','#db2777','#4f46e5'];

  Chart.defaults.font.family = '-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Microsoft YaHei",sans-serif';
  Chart.defaults.font.size = 12;
  Chart.defaults.color = '#6b7280';

  if (summaryTab === 'totals') {
    // Chart 1: Channel comparison bar chart
    const chCanvas = document.getElementById('sumChartChannel');
    if (chCanvas) {
      const chData = summaryData.byChannel.filter(c => c.count > 0);
      if (chData.length > 0) {
        _summaryCharts.channel = new Chart(chCanvas, {
          type: 'bar',
          data: {
            labels: chData.map(c => c.channel),
            datasets: [
              {label:'新增线索', data:chData.map(c=>c.newLeads), backgroundColor:'#2563eb', borderRadius:4},
              {label:'有效建联', data:chData.map(c=>c.effectiveContacts), backgroundColor:'#16a34a', borderRadius:4},
              {label:'AB意向', data:chData.map(c=>c.abIntent), backgroundColor:'#f59e0b', borderRadius:4},
              {label:'成交客户', data:chData.map(c=>c.closedCustomers), backgroundColor:'#dc2626', borderRadius:4}
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 8 } } },
            scales: { x: { stacked: false, grid: { display: false } }, y: { beginAtZero: true, grid: { color: '#f3f4f6' } } }
          }
        });
      }
    }

    // Chart 2: Submission trend line chart
    const trendCanvas = document.getElementById('sumChartTrend');
    if (trendCanvas && summaryData.reports) {
      const dateMap = {};

        const d = isDaily ? r.reportDate : r.weekStart;

        dateMap[d] = (dateMap[d] || 0) + 1;
      });
      const sortedDates = Object.keys(dateMap).sort();
      if (sortedDates.length > 0) {
        _summaryCharts.trend = new Chart(trendCanvas, {
          type: 'line',
          data: {
            labels: sortedDates.map(d => d.substring(5)),
            datasets: [{
              label: isDaily ? '每日提交数' : '每周提交数',
              data: sortedDates.map(d => dateMap[d]),
              borderColor: '#2563eb',
              backgroundColor: 'rgba(37,99,235,0.1)',
              fill: true,
              tension: 0.3,
              pointRadius: 3,
              pointBackgroundColor: '#2563eb'
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { grid: { display: false } }, y: { beginAtZero: true, grid: { color: '#f3f4f6' }, ticks: { stepSize: 1 } } }
          }
        });
      }
    }
  } else {
    // Comparison chart for byPerson/byDepartment/byChannel tabs
    const cmpCanvas = document.getElementById('sumChartCompare');
    if (!cmpCanvas) return;
    let data, labelKey;
    if (summaryTab === 'byPerson') { data = summaryData.byPerson; labelKey = 'name'; }
    else if (summaryTab === 'byDepartment') { data = summaryData.byDepartment; labelKey = 'department'; }
    else { data = summaryData.byChannel; labelKey = 'channel'; }
    data = data.filter(d => d.count > 0);
    if (data.length === 0) return;
    const labels = data.map(d => d[labelKey] || d.name || d.department || d.channel);

    _summaryCharts.compare = new Chart(cmpCanvas, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [
          {label:'成交金额(元)', data:data.map(d=>d.dealAmount), backgroundColor:'#dc2626', borderRadius:4, yAxisID:'y'},

        }
      }
    });
  }
}

function exportSummaryCSV() {
  if (!summaryData) { alert('请先查询汇总数据'); return; }
  const type = document.getElementById('sumType').value;
  const s = document.getElementById('sumStart').value;
  const e = document.getElementById('sumEnd').value;
  const typeLabel = type === 'daily' ? '日报' : '周报';
  const f = v => v > 0 ? v.toLocaleString() : '0';
  const fm = v => v > 0 ? v.toLocaleString() : '0';
  // CSV 转义：值包含逗号/引号/换行时用双引号包裹，内部双引号转义为两个双引号
  const esc = v => {
    if (v === null || v === undefined) return '';
    const str = String(v);
    if (str.includes(',') || str.includes('"') || str.includes('\n') || str.includes('\r')) {
      return '"' + str.replace(/"/g, '""') + '"';
    }
    return str;
  };
  const rows = [];

  if (summaryTab === 'totals') {
    const t = summaryData.totals;
    rows.push(['指标','数值'].join(','));
    rows.push(['报告总数', summaryData.count].map(esc).join(','));
    rows.push(['新增精准线索', f(t.newLeads)].map(esc).join(','));
    rows.push(['有效建联数', f(t.effectiveContacts)].map(esc).join(','));
    rows.push(['AB意向数', f(t.abIntent)].map(esc).join(','));
    rows.push(['成交客户数', f(t.closedCustomers)].map(esc).join(','));
    rows.push(['成交金额', fm(t.dealAmount)].map(esc).join(','));
    rows.push(['建联转AB率', t.contactToAbRate].map(esc).join(','));
    rows.push(['目标金额', fm(t.targetAmount)].map(esc).join(','));
    rows.push(['完成率', t.completionRate].map(esc).join(','));
  } else if (summaryTab === 'byDepartment') {
    // 按部门→渠道分组导出：每个部门一个小节，列出该部门各渠道明细 + 小计
    const deptChannels = {};
    const deptSummary = {};
    summaryData.byDepartment.forEach(d => { deptSummary[d.department || '未分组'] = d; });
    const channelOrder = (summaryData.byChannel || []).map(c => c.channel);
    (summaryData.reports || []).forEach(r => {
      if (summaryFilters.person && r.name !== summaryFilters.person) return;
      if (summaryFilters.dept && r.department !== summaryFilters.dept) return;
      const dept = r.department || '未分组';
      if (!deptChannels[dept]) deptChannels[dept] = {};
      (r.channels || []).forEach(ch => {
        if (summaryFilters.channel && ch.channel !== summaryFilters.channel) return;
        const cn = ch.channel;
        if (!deptChannels[dept][cn]) deptChannels[dept][cn] = {channel:cn, newLeads:0, effectiveContacts:0, abIntent:0, closedCustomers:0, dealAmount:0, targetAmount:0, count:0};
        const x = deptChannels[dept][cn];
        x.newLeads += parseFloat(ch.newLeads) || 0;
        x.effectiveContacts += parseFloat(ch.effectiveContacts) || 0;
        x.abIntent += parseFloat(ch.abIntent) || 0;
        x.closedCustomers += parseFloat(ch.closedCustomers) || 0;
        x.dealAmount += parseFloat(ch.dealAmount) || 0;
        x.targetAmount += parseFloat(ch.targetAmount) || 0;
        x.count++;
      });
    });
    const cr = o => { o.contactToAbRate = o.effectiveContacts>0 ? (o.abIntent/o.effectiveContacts*100).toFixed(2)+'%' : '0%'; o.completionRate = o.targetAmount>0 ? (o.dealAmount/o.targetAmount*100).toFixed(2)+'%' : '0%'; };
    const chHeaders = ['渠道','报告数','新增线索','有效建联','AB意向','成交客户','成交金额','建联转AB率','目标金额','完成率'];
    Object.keys(deptChannels).sort().forEach(dept => {
      const chMap = deptChannels[dept];
      const ds = deptSummary[dept] || {};
      Object.values(chMap).forEach(cr);
      const seen = new Set();
      const orderedRows = [];
      channelOrder.forEach(cn => { if (chMap[cn]) { seen.add(cn); orderedRows.push(chMap[cn]); } });
      Object.values(chMap).forEach(c => { if (!seen.has(c.channel)) orderedRows.push(c); });
      rows.push('');
      rows.push(['【' + dept + '】（' + orderedRows.length + '个渠道）'].map(esc).join(','));
      rows.push(chHeaders.join(','));
      orderedRows.forEach(c => {
        rows.push([c.channel, c.count, f(c.newLeads), f(c.effectiveContacts), f(c.abIntent), f(c.closedCustomers), fm(c.dealAmount), c.contactToAbRate, fm(c.targetAmount), c.completionRate].map(esc).join(','));
      });
      rows.push(['小计', ds.count||0, f(ds.newLeads), f(ds.effectiveContacts), f(ds.abIntent), f(ds.closedCustomers), fm(ds.dealAmount), ds.contactToAbRate, fm(ds.targetAmount), ds.completionRate].map(esc).join(','));
    });
  } else {
    let data, titleCol, headers;
    if (summaryTab === 'byPerson') {
      data = summaryData.byPerson; titleCol = '姓名';
      headers = ['姓名','部门','报告数','新增线索','有效建联','AB意向','成交客户','成交金额','建联转AB率','目标金额','完成率'];
    } else {
      data = summaryData.byChannel; titleCol = '渠道';
      headers = ['渠道','报告数','新增线索','有效建联','AB意向','成交客户','成交金额','建联转AB率','目标金额','完成率'];
    }
    rows.push(headers.join(','));
    data.forEach(d => {
      const nm = d.name || d.department || d.channel;
      const sub = summaryTab === 'byPerson' ? (d.department || '') : '';
      const row = summaryTab === 'byPerson'
        ? [nm, sub, d.count||0, f(d.newLeads), f(d.effectiveContacts), f(d.abIntent), f(d.closedCustomers), fm(d.dealAmount), d.contactToAbRate, fm(d.targetAmount), d.completionRate]
        : [nm, d.count||0, f(d.newLeads), f(d.effectiveContacts), f(d.abIntent), f(d.closedCustomers), fm(d.dealAmount), d.contactToAbRate, fm(d.targetAmount), d.completionRate];
      rows.push(row.map(esc).join(','));
    });
  }

  // Add filter info at top
  const deptLabel = summaryFilters.dept || '全部部门';
  const personLabel = summaryFilters.person || '全部人员';
  const channelLabel = summaryFilters.channel || '全部渠道';
  const filterInfo = [
    '# ' + typeLabel + '汇总数据导出',
    '# 查询区间: ' + (s||'全部') + ' 至 ' + (e||'全部'),
    '# 汇总维度: ' + (summaryTab==='byPerson'?'按人员':summaryTab==='byDepartment'?'按部门':summaryTab==='byChannel'?'按渠道':'总计'),
    '# 筛选部门: ' + deptLabel,
    '# 筛选人员: ' + personLabel,
    '# 筛选渠道: ' + channelLabel,
    '# 导出时间: ' + new Date().toLocaleString('zh-CN'),
    ''
  ];
  const csv = '\uFEFF' + filterInfo.join('\n') + rows.join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const tabLabel = summaryTab==='byPerson'?'按人员':summaryTab==='byDepartment'?'按部门':summaryTab==='byChannel'?'按渠道':'总计';
  let nameParts = [typeLabel + '汇总_' + tabLabel];
  if (s || e) nameParts.push((s||'') + '至' + (e||''));
  if (summaryFilters.dept) nameParts.push(summaryFilters.dept);
  if (summaryFilters.person) nameParts.push(summaryFilters.person);
  if (summaryFilters.channel) nameParts.push(summaryFilters.channel);
  nameParts.push(new Date().toISOString().split('T')[0]);
  a.download = nameParts.join('_') + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ============ User Management (Admin) ============
function getDepartments() {
  return cloudData.departments && cloudData.departments.length > 0
    ? cloudData.departments
    : [...new Set(cloudData.users.map(u => u.department).filter(d => d))].sort();
}

// ===== 部门名归一化（修复 "KA二部" 与 "KA 二部" 空格不一致导致匹配失败）=====
// 比较时去掉所有空白；存储时尽量映射回主数据里的规范（带空格）部门名
function normDeptKey(d) { return (d || '').replace(/\s/g, ''); }
function getDeptCanonicalMap() {
  const map = {};
  getDepartments().forEach(d => { if (d) map[normDeptKey(d)] = d; });
  return map;
}
function canonDept(d) {
  if (!d) return d;
  const map = getDeptCanonicalMap();
  const key = normDeptKey(d);
  return map[key] || d;
}

function updateRolePermission(roleIdx, perm, checked) {
  const cfg = getRoleConfig();
  if (cfg.roles[roleIdx] && cfg.roles[roleIdx].key !== 'admin') {
    cfg.roles[roleIdx].permissions[perm] = checked;
  }
}

async function addUser(e) {
  e.preventDefault();
  const name = document.getElementById('newUserName').value.trim();
  const isBasic = document.getElementById('newUserIsBasic').checked;
  const hireDate = document.getElementById('newUserHireDate').value || '';
  const leaveDate = document.getElementById('newUserLeaveDate').value || '';
  if (!name) { alert('请输入姓名'); return false; }
  let department = document.getElementById('newUserDept').value;
  if (department === '__custom__') {
    department = document.getElementById('newUserDeptCustom').value.trim();
  }
  if (!department) { alert('请选择或输入部门'); return false; }
  let user;
  if (isBasic) {
    // 基础用户：无登录账号，仅用于数据统计
    user = {id:genId(),username:'',password:'',name,department,role:'member',active:true,isBasic:true,hireDate,leaveDate,createdAt:new Date().toISOString()};
  } else {
    const username = document.getElementById('newUserUsername').value.trim();
    const password = document.getElementById('newUserPassword').value;
    if (!username) { alert('请输入用户名'); return false; }
    if (!password) { alert('请输入密码'); return false; }
    const role = document.getElementById('newUserRole').value;
    if (cloudData.users.find(u => u.username === username)) { alert('用户名已存在'); return false; }
    const hp = await hashPassword(password);
    user = {id:genId(),username,password:hp,name,department,role,active:true,isBasic:false,hireDate,leaveDate,createdAt:new Date().toISOString()};
  }
  try { await apiCreate('users', user); cloudData.users.push(user); }
  catch(err) { showToast('创建失败: ' + err.message, 'error', 4000); return false; }
  // Auto-add new department to list if not exists
  if (!cloudData.departments.includes(department)) {
    cloudData.departments.push(department);
    cloudData.departments.sort();
    saveDepartments();
  }
  showToast('成员添加成功！', 'success');
  closeModal(); renderUserManagement();
  return false;
}

function handleImportFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'csv') {
    const reader = new FileReader();
    reader.onload = function(e) {
      let text = e.target.result;
      // Remove BOM
      if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
      document.getElementById('importTextArea').value = text.trim();
      document.getElementById('importAlert').innerHTML = '<div class="alert alert-success">✅ 文件已读取，请检查内容后点击"开始导入"</div>';
    };
    reader.readAsText(file, 'UTF-8');
  } else if (ext === 'xlsx' || ext === 'xls') {
    // Excel: use SheetJS if available, otherwise prompt to use CSV
    if (typeof XLSX === 'undefined') {
      // Dynamically load SheetJS
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
      script.onload = function() { parseExcelFile(file); };
      script.onerror = function() {
        document.getElementById('importAlert').innerHTML = '<div class="alert alert-danger">❌ Excel解析库加载失败，请将文件另存为CSV格式后重试</div>';
      };
      document.head.appendChild(script);
    } else {
      parseExcelFile(file);
    }
  } else {
    document.getElementById('importAlert').innerHTML = '<div class="alert alert-danger">❌ 不支持的文件格式，请使用CSV或Excel文件</div>';
  }
}

function parseExcelFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const csv = XLSX.utils.sheet_to_csv(ws, {FS:','});
      document.getElementById('importTextArea').value = csv.trim();
      document.getElementById('importAlert').innerHTML = '<div class="alert alert-success">✅ Excel文件已解析，请检查内容后点击"开始导入"</div>';
    } catch(err) {
      document.getElementById('importAlert').innerHTML = '<div class="alert alert-danger">❌ Excel解析失败: ' + err.message + '</div>';
    }
  };
  reader.readAsArrayBuffer(file);
}

async function doImportUsers() {
  const text = document.getElementById('importTextArea').value.trim();
  const alertEl = document.getElementById('importAlert');
  if (!text) { alertEl.innerHTML = '<div class="alert alert-danger">❌ 请粘贴数据或选择文件</div>'; return; }

  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length === 0) { alertEl.innerHTML = '<div class="alert alert-danger">❌ 没有有效数据</div>'; return; }

  // Parse lines
  const records = [];
  let skippedHeader = false;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    // Split by comma or tab
    const parts = line.split(/[,\t]/).map(p => p.trim().replace(/^"|"$/g, ''));
    // Skip header row
    if (i === 0 && (parts[0] === '账号' || parts[0].toLowerCase() === 'username' || parts[0] === '用户名')) {
      skippedHeader = true;
      continue;
    }
    if (parts.length < 3) { records.push({line:i+1, error:'列数不足（至少需要：账号,密码,姓名）'}); continue; }
    const username = parts[0];
    const password = parts[1];
    const name = parts[2];
    const department = parts[3] || '';
    if (!username) { records.push({line:i+1, error:'账号为空'}); continue; }
    if (!password) { records.push({line:i+1, error:'密码为空', username}); continue; }
    if (password.length < 6) { records.push({line:i+1, error:'密码不足6位', username}); continue; }
    if (!name) { records.push({line:i+1, error:'姓名为空', username}); continue; }
    records.push({line:i+1, username, password, name, department});
  }

  const validRecords = records.filter(r => !r.error);
  const errorRecords = records.filter(r => r.error);

  // Check duplicates within import and existing users
  const seenUsernames = new Set();
  const existingUsernames = new Set(cloudData.users.map(u => u.username));
  const toCreate = [];
  const skippedDup = [];
  validRecords.forEach(r => {
    if (existingUsernames.has(r.username) || seenUsernames.has(r.username)) {
      skippedDup.push(r);
    } else {
      seenUsernames.add(r.username);
      toCreate.push(r);
    }
  });

  if (toCreate.length === 0) {
    let msg = '❌ 没有可导入的有效记录';
    if (skippedDup.length) msg += `\n重复跳过：${skippedDup.length}条`;
    if (errorRecords.length) msg += `\n格式错误：${errorRecords.length}条`;
    alertEl.innerHTML = `<div class="alert alert-danger">${msg.replace(/\n/g,'<br>')}</div>`;
    return;
  }

  // Show progress
  alertEl.innerHTML = `<div class="alert alert-info">⏳ 正在导入 ${toCreate.length} 条记录...</div>`;

  // Batch create
  const results = {success: 0, failed: []};
  for (let i = 0; i < toCreate.length; i++) {
    const r = toCreate[i];
    try {
      const hp = await hashPassword(r.password);
      const user = {
        id: genId(), username: r.username, password: hp,
        name: r.name, department: r.department,
        role: 'member', active: true,
        createdAt: new Date().toISOString()
      };
      await apiCreate('users', user);
      cloudData.users.push(user);
      results.success++;
    } catch(err) {
      results.failed.push({line: r.line, username: r.username, error: err.message});
    }
  }

  // Auto-add any new departments from import
  let newDepts = [];
  toCreate.forEach(r => {
    if (r.department && !cloudData.departments.includes(r.department) && !newDepts.includes(r.department)) {
      newDepts.push(r.department);
    }
  });
  if (newDepts.length > 0) {
    cloudData.departments.push(...newDepts);
    cloudData.departments.sort();
    await saveDepartments();
  }

  // Show result
  let resultHtml = `<div class="alert alert-success">✅ 成功导入 ${results.success} 名成员</div>`;
  if (skippedDup.length > 0) {
    resultHtml += `<div class="alert alert-warning">⚠️ 重复跳过 ${skippedDup.length} 条：${skippedDup.map(r=>r.username).join(', ')}</div>`;
  }
  if (errorRecords.length > 0) {
    resultHtml += `<div class="alert alert-warning">⚠️ 格式错误跳过 ${errorRecords.length} 条：<br>${errorRecords.map(r=>`第${r.line}行: ${r.error}${r.username?'（'+r.username+'）':''}`).join('<br>')}</div>`;
  }
  if (results.failed.length > 0) {
    resultHtml += `<div class="alert alert-danger">❌ 导入失败 ${results.failed.length} 条：<br>${results.failed.map(r=>`第${r.line}行 ${r.username}: ${r.error}`).join('<br>')}</div>`;
  }
  resultHtml += `<div style="text-align:center;margin-top:16px"><button class="btn btn-primary" onclick="closeModal();renderUserManagement()">完成</button></div>`;
  alertEl.innerHTML = resultHtml;
}

function editUser(id) {
  const user = cloudData.users.find(u => u.id === id);
  if (!user) return;
  const depts = getDepartments();
  const userDept = user.department || '';
  const deptInList = depts.includes(userDept);
  const deptOptions = '<option value="">请选择部门</option>' +
    depts.map(d => `<option value="${d}" ${d===userDept?'selected':''}>${d}</option>`).join('') +
    (deptInList ? '' : `<option value="${userDept}" selected>${userDept}</option>`) +

async function updateUser(e, id) {
  e.preventDefault();
  const user = cloudData.users.find(u => u.id === id);
  if (!user) return false;
  user.name = document.getElementById('editName').value.trim();
  const isBasic = document.getElementById('editUserIsBasic')?.checked;
  let department = document.getElementById('editDept').value;
  if (department === '__custom__') {
    department = document.getElementById('editDeptCustom').value.trim();
  }
  if (!department) { alert('请选择或输入部门'); return false; }
  user.department = department;
  user.hireDate = document.getElementById('editHireDate').value || '';
  user.leaveDate = document.getElementById('editLeaveDate').value || '';
  if (user.username === 'admin') {
    // admin 账号不可改为基础用户，仅更新基础信息
  } else if (isBasic) {
    // 转为/保持基础用户：清空登录信息
    user.isBasic = true;
    user.username = '';
    user.password = '';
    user.role = 'member';
  } else {
    // 普通登录账号
    const username = document.getElementById('editUsername').value.trim();
    if (!username) { alert('请输入用户名（或勾选"基础用户"）'); return false; }
    if (cloudData.users.find(u => u.id !== id && u.username === username)) { alert('用户名已存在'); return false; }
    user.isBasic = false;
    user.username = username;
    user.role = document.getElementById('editRole').value;
    const newPwd = document.getElementById('editPassword').value;
    if (newPwd) { user.password = await hashPassword(newPwd); }
    else if (!user.password) { user.password = await hashPassword('123456'); }
  }
  // Auto-add new department to list if not exists
  if (!cloudData.departments.includes(department)) {
    cloudData.departments.push(department);
    cloudData.departments.sort();
    saveDepartments();
  }
  try { await apiUpdate('users', user.id, user); }
  catch(err) { showToast('保存失败: ' + err.message, 'error', 4000); return false; }
  showToast('用户信息已更新！', 'success');
  closeModal(); renderUserManagement();
  return false;
}

async function toggleUser(id, active) {
  const user = cloudData.users.find(u => u.id === id);
  if (!user) return;
  user.active = active;
  try { await apiUpdate('users', user.id, user); renderUserManagement(); showToast(`用户已${active?'启用':'禁用'}`, 'info'); }
  catch(err) { showToast('操作失败: ' + err.message, 'error', 4000); }
}

async function deleteUser(id) {
  const user = cloudData.users.find(u => u.id === id);
  if (!user) return;
  if (!confirm(`确定删除用户 ${user.name}（${user.username}）吗？此操作不可撤销。`)) return;
  try {
    await apiDelete('users', user.id);
    cloudData.users = cloudData.users.filter(u => u.id !== id);
    renderUserManagement();
    showToast(`用户 ${user.name} 已删除`, 'success');
  } catch(err) { showToast('删除失败: ' + err.message, 'error', 4000); }
}

// ===== 用户批量状态修改 =====
async function batchSetUserStatus(isOnboard) {
  if (!selectedUserIds.size) return;
  if (!confirm(`确定将选中的 ${selectedUserIds.size} 名用户标记为「${isOnboard ? '入职（在职）' : '离职'}」吗？`)) return;
  const today = new Date().toISOString().slice(0, 10);
  let done = 0;
  for (const id of [...selectedUserIds]) {
    const u = cloudData.users.find(x => x.id === id);
    if (!u) continue;
    if (isOnboard) { u.leaveDate = ''; u.active = true; }
    else { u.leaveDate = today; }
    try { await apiUpdate('users', u.id, u); done++; }
    catch (e) { showToast('更新失败: ' + e.message, 'error', 4000); }
  }
  selectedUserIds.clear();
  renderUserManagement();
  showToast(`已更新 ${done} 名用户为${isOnboard ? '入职（在职）' : '离职'}`, 'success');
}
function toggleUserSelect(id, checked) {
  if (checked) selectedUserIds.add(id); else selectedUserIds.delete(id);

function toggleAllUsers(box) {
  cloudData.users.filter(u => u.username !== 'admin').forEach(u => {

    ? `部门"${name}"下有 ${count} 名成员，删除部门后这些成员的部门将保留不变（但仍显示）。确定删除该部门选项吗？`

// ============ CSV Export ============
function exportCSV(type) {
  const s = document.getElementById('fStart')?.value || '';
  const e = document.getElementById('fEnd')?.value || '';
  const fDept = document.getElementById('fDept')?.value || '';
  const fPerson = document.getElementById('fPerson')?.value || '';
  let reports = type==='daily'?[...cloudData.dailyReports]:[...cloudData.weeklyReports];
  if (s) reports = reports.filter(r => (type==='daily'?r.reportDate:r.weekStart) >= s);
  if (e) reports = reports.filter(r => (type==='daily'?r.reportDate:r.weekStart) <= e);
  if (fDept) reports = reports.filter(r => r.department === fDept);
  if (fPerson) reports = reports.filter(r => r.name === fPerson);
  const headers = ['姓名','部门',type==='weekly'?'周开始':'日期',type==='weekly'?'周结束':'','渠道','参考标准','新增精准线索数','有效建联数','AB意向数','成交客户数','成交金额','建联转AB率','目标金额','完成率','问题/提升动作'];
  // CSV 转义：值含逗号/引号/换行时用双引号包裹
  const esc = v => {
    if (v === null || v === undefined) return '';
    const str = String(v);
    if (str.includes(',') || str.includes('"') || str.includes('\n') || str.includes('\r')) {
      return '"' + str.replace(/"/g, '""') + '"';
    }
    return str;
  };
  const rows = [headers.join(',')];
  reports.forEach(r => {
    (r.channels||[]).forEach(ch => {
      const ec=parseFloat(ch.effectiveContacts)||0,ab=parseFloat(ch.abIntent)||0,da=parseFloat(ch.dealAmount)||0,ta=parseFloat(ch.targetAmount)||0;
      const ctr=ch.effectiveContacts===''||ch.effectiveContacts==='/'?'/':(ec>0?(ab/ec*100).toFixed(1)+'%':'/');
      const cpr=ch.targetAmount===''||ch.targetAmount==='/'?'/':(ta>0?(da/ta*100).toFixed(1)+'%':'/');
      const df=type==='weekly'?r.weekStart:r.reportDate;
      const ef=type==='weekly'?r.weekEnd:'';
      rows.push([r.name,r.department,df,ef,ch.channel,ch.reference||'',ch.newLeads||'',ch.effectiveContacts||'',ch.abIntent||'',ch.closedCustomers||'',ch.dealAmount||'',ctr,ch.targetAmount||'',cpr,(ch.issues||'').replace(/,/g,'，').replace(/\n/g,' ')].map(esc).join(','));
    });
  });
  const csv = '\uFEFF' + rows.join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  let nameParts = [type==='weekly'?'周报':'日报' + '数据'];
  if (s || e) nameParts.push((s||'') + '至' + (e||''));
  if (fDept) nameParts.push(fDept);
  if (fPerson) nameParts.push(fPerson);
  nameParts.push(new Date().toISOString().split('T')[0]);
  a.download = nameParts.join('_') + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

          <select class="form-control" id="aiProvider" onchange="onAIProviderChange()">
            ${Object.entries(AI_PROVIDERS).map(([k,v])=>'<option value="'+k+'"'+(ai.provider===k?' selected':'')+'>'+v.label+' - '+v.desc+'</option>').join('')}
          </select>
        </div>
        <div class="form-group">
          <label>模型名称</label>
          <input type="text" class="form-control" id="aiModel" value="${ai.model}" placeholder="如 deepseek-chat">
        </div>
        <div class="form-group">
          <label>API地址</label>
          <input type="text" class="form-control" id="aiApiUrl" value="${ai.apiUrl}" placeholder="https://api.example.com/v1">
        </div>
        <div class="form-group">
          <label>API Key</label>
          <input type="password" class="form-control" id="aiApiKey" value="${ai.apiKey}" placeholder="sk-...">
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-top:8px">
        <button class="btn btn-primary" onclick="saveAIConfig()">💾 保存配置</button>
        <span style="font-size:12px;color:var(--gray-500)">${ai.apiKey ? '✅ 已配置API Key' : '⚠️ 尚未配置API Key'}</span>
      </div>
    </div>
  </div>`;

  // Assemble
  let content = tabsHtml;
  const hasAdminTabs = canBrand || canAI;
  if (!hasAdminTabs) {
    content += personalHtml;
  } else {
    content += `<div id="settingsPanelPersonal" style="${settingsTab==='personal'?'':'display:none'}">${personalHtml}</div>`;
    if (canBrand) content += `<div id="settingsPanelBrand" style="${settingsTab==='brand'?'':'display:none'}">${brandHtml}</div>`;
    if (canAI) content += `<div id="settingsPanelAI" style="${settingsTab==='ai'?'':'display:none'}">${aiHtml}</div>`;
  }

  body.innerHTML = content;
}

function handleLogoUpload(fileInput, inputId, previewId) {
  const file = fileInput.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) {
    alert('图片不能超过 2MB，请压缩后再上传');
    fileInput.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      // Crop to 2:1 aspect ratio (width:height), max width 256px
      const targetW = 256;
      const targetH = 128;
      const srcRatio = img.width / img.height;
      const dstRatio = targetW / targetH;
      let sx = 0, sy = 0, sw = img.width, sh = img.height;
      if (srcRatio > dstRatio) {
        // Source is wider, crop sides
        sw = img.height * dstRatio;
        sx = (img.width - sw) / 2;
      } else {
        // Source is taller, crop top/bottom
        sh = img.width / dstRatio;
        sy = (img.height - sh) / 2;
      }
      const canvas = document.createElement('canvas');
      canvas.width = targetW;
      canvas.height = targetH;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, targetW, targetH);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      document.getElementById(inputId).value = dataUrl;
      // Show preview
      const previewEl = document.getElementById(previewId);
      if (previewEl) {
        previewEl.innerHTML = '<div style="display:flex;align-items:center;gap:8px"><img src="' + dataUrl + '" style="width:80px;height:40px;border-radius:6px;object-fit:cover;border:1px solid var(--gray-200)"><span style="font-size:12px;color:var(--success)">✅ 图片已加载（2:1比例），点击"保存品牌配置"生效</span></div>';
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  fileInput.value = '';
}

function buildAIContext() {
  const userMap = {};
  cloudData.users.forEach(u => { userMap[u.id] = u; });
  const fc = cloudData.formConfig || DEFAULT_FORM_CONFIG;
  const fieldLabels = {};
  FIELD_DEFS.forEach(f => { fieldLabels[f.key] = f.label; });

  // Channel name maps
  const dChMap = {}, wChMap = {};
  (fc.daily || []).forEach(c => dChMap[c.id] = c.name);
  (fc.weekly || []).forEach(c => wChMap[c.id] = c.name);

  // Compile daily reports (channels is an array in Firebase)
  const dailyData = cloudData.dailyReports.map(r => {
    const u = userMap[r.userId] || {};
    const channels = {};
    (r.channels || []).forEach(ch => {
      const chName = ch.channel || '未知渠道';
      const fd = {};
      Object.entries(ch).forEach(([k, v]) => {
        if (k === 'channel' || k === 'reference') return;
        if (v !== '' && v !== null && v !== undefined) fd[fieldLabels[k] || k] = v;
      });
      if (Object.keys(fd).length > 0) channels[chName] = fd;
    });
    return { user: u.name || r.name || '未知', department: u.department || r.department || '', date: r.reportDate, channels };
  }).sort((a, b) => (a.date || '').localeCompare(b.date || ''));

  // Compile weekly reports (channels is an array in Firebase)
  const weeklyData = cloudData.weeklyReports.map(r => {
    const u = userMap[r.userId] || {};
    const channels = {};
    (r.channels || []).forEach(ch => {
      const chName = ch.channel || '未知渠道';
      const fd = {};
      Object.entries(ch).forEach(([k, v]) => {
        if (k === 'channel' || k === 'reference') return;
        if (v !== '' && v !== null && v !== undefined) fd[fieldLabels[k] || k] = v;
      });
      if (Object.keys(fd).length > 0) channels[chName] = fd;
    });
    return { user: u.name || r.name || '未知', department: u.department || r.department || '', weekStart: r.weekStart, weekEnd: r.weekEnd, channels };
  }).sort((a, b) => (a.weekStart || '').localeCompare(b.weekStart || ''));

  // Compile visit records (拜访数据)
  const visitData = (cloudData.visitRecords || []).map(r => ({
    contactTime: r.contactTime || '',
    employee: r.employee || '',
    department: r.department || '',
    customer: r.customer || '',
    contactPerson: r.contactPerson || '',
    phone: r.phone || '',
    signinEvent: r.signinEvent || '',
    signinAddress: r.signinAddress || '',
    visitResult: r.visitResult || '',
    blockerNote: r.blockerNote || '',
    remark: r.remark || ''
  })).sort((a, b) => (a.contactTime || '').localeCompare(b.contactTime || ''));

  // Visit data aggregations (让 AI 一眼拿到拜访关键指标，避免被前面的日报/周报数据淹没)
  const visitByResult = {}, visitByEvent = {}, visitByEmp = {}, visitByDept = {}, visitByMonth = {};
  visitData.forEach(v => {
    const res = v.visitResult || '未填写结果';
    visitByResult[res] = (visitByResult[res] || 0) + 1;
    const ev = v.signinEvent || '未填写事件';
    visitByEvent[ev] = (visitByEvent[ev] || 0) + 1;
    const emp = v.employee || '未知';
    visitByEmp[emp] = (visitByEmp[emp] || 0) + 1;
    const dep = v.department || '未知';
    visitByDept[dep] = (visitByDept[dep] || 0) + 1;
    const m = (v.contactTime || '').slice(0, 7);
    if (m) visitByMonth[m] = (visitByMonth[m] || 0) + 1;
  });
  const visitSummary = {
    total: visitData.length,
    byResult: visitByResult,
    bySigninEvent: visitByEvent,
    byEmployee: visitByEmp,
    byDepartment: visitByDept,
    byMonth: visitByMonth
  };

  // Compile sales records (业绩数据) — 排除 raw 原始整行，避免上下文臃肿
  const salesData = (cloudData.salesRecords || []).map(r => ({
    salesperson: r.salesperson || '',
    team: r.team || '',
    docDate: r.docDate || '',
    docMonth: r.docMonth || '',
    amount: toNum(r.amount),
    grossProfit: toNum(r.grossProfit),
    productName: r.productName || '',
    docNo: r.docNo || '',
    docType: r.docType || '',
    status: r.status || '',
    customer: r.customer || ''
  })).sort((a, b) => (a.docDate || '').localeCompare(b.docDate || ''));

  // Sales aggregations (让 AI 一眼拿到业绩关键指标)
  const salesBySalesperson = {}, salesByTeam = {}, salesByMonth = {}, salesByDocType = {};
  let salesTotalAmount = 0, salesTotalGross = 0;
  salesData.forEach(s => {
    const amt = toNum(s.amount), gp = toNum(s.grossProfit);
    salesTotalAmount += amt; salesTotalGross += gp;
    const sp = s.salesperson || '未知';
    if (!salesBySalesperson[sp]) salesBySalesperson[sp] = { amount: 0, grossProfit: 0, count: 0 };
    salesBySalesperson[sp].amount += amt; salesBySalesperson[sp].grossProfit += gp; salesBySalesperson[sp].count += 1;
    const tm = s.team || '未知团队';
    if (!salesByTeam[tm]) salesByTeam[tm] = { amount: 0, grossProfit: 0, count: 0 };
    salesByTeam[tm].amount += amt; salesByTeam[tm].grossProfit += gp; salesByTeam[tm].count += 1;
    const mo = s.docMonth || '未知月份';
    if (!salesByMonth[mo]) salesByMonth[mo] = { amount: 0, grossProfit: 0, count: 0 };
    salesByMonth[mo].amount += amt; salesByMonth[mo].grossProfit += gp; salesByMonth[mo].count += 1;
    const dt = s.docType || '未知类别';
    if (!salesByDocType[dt]) salesByDocType[dt] = 0;
    salesByDocType[dt] += 1;
  });
  const salesSummary = {
    total: salesData.length,
    totalAmount: Math.round(salesTotalAmount * 100) / 100,
    totalGrossProfit: Math.round(salesTotalGross * 100) / 100,
    bySalesperson: salesBySalesperson,
    byTeam: salesByTeam,
    byMonth: salesByMonth,
    byDocType: salesByDocType
  };

  // 客户汇总维度聚合（客户来源 / 客户画像 / 品类）—— 让 AI 能回答客户维度分析
  const custBySource = {}, custByProfile = {}, custByCategory = {};
  (cloudData.salesRecords || []).forEach(r => {
    const amt = toNum(r.amount);
    const src = (r.customerSource || '').trim();
    const prof = (r.customerProfile || '').trim();
    const cat = (r.category || '').trim();
    if (src) { if (!custBySource[src]) custBySource[src] = {count:0, amount:0}; custBySource[src].count++; custBySource[src].amount += amt; }
    if (prof) { if (!custByProfile[prof]) custByProfile[prof] = {count:0, amount:0}; custByProfile[prof].count++; custByProfile[prof].amount += amt; }
    if (cat) { if (!custByCategory[cat]) custByCategory[cat] = {count:0, amount:0}; custByCategory[cat].count++; custByCategory[cat].amount += amt; }
  });
  const customerSummary = {
    totalWithSource: Object.values(custBySource).reduce((s, o) => s + o.count, 0),
    totalWithProfile: Object.values(custByProfile).reduce((s, o) => s + o.count, 0),
    totalWithCategory: Object.values(custByCategory).reduce((s, o) => s + o.count, 0),
    bySource: custBySource,
    byProfile: custByProfile,
    byCategory: custByCategory,
    note: '客户来源/客户画像/品类来自「客户汇总数据」中手动维护的标签，未填写则不计入上述聚合'
  };

  // 管理周报（报表模块）—— 让 AI 能读取管理视角的周报与拜访汇总快照
  const mgrData = (cloudData.mgrReports || []).map(r => ({
    weekLabel: r.weekLabel || '',
    weekStart: r.weekStart || '',
    weekEnd: r.weekEnd || '',
    department: r.department || '',
    author: r.userName || (userMap[r.userId] && userMap[r.userId].name) || '',
    content: r.content || '',
    visitSnapshot: r.visitSnapshot ? { total: r.visitSnapshot.total || 0, details: r.visitSnapshot.details || [] } : null
  })).sort((a, b) => (a.weekStart || '').localeCompare(b.weekStart || ''));

  // ===== 新增模块数据（务必接入，确保 AI 助手可读取；后续任何新数据模块都应在此追加对应节点） =====
  // 团队月目标 & 团队人数（业绩统计·报表看板2/3）
  const teamTargets = fc.teamTargets || {};
  const teamHeadcount = fc.teamHeadcount || {};

  // 团队业绩统计汇总（目标 / 业绩 / 完成率 / 人数 / 人效）—— 供 AI 回答团队维度问题
  const teamPerfByTM = {};
  salesData.forEach(s => {
    const tm = s.team || '未知团队', mo = s.docMonth || '未知月份';
    if (!teamPerfByTM[tm]) teamPerfByTM[tm] = {};
    if (!teamPerfByTM[tm][mo]) teamPerfByTM[tm][mo] = { amount: 0, grossProfit: 0, count: 0 };
    teamPerfByTM[tm][mo].amount += toNum(s.amount);
    teamPerfByTM[tm][mo].grossProfit += toNum(s.grossProfit);
    teamPerfByTM[tm][mo].count += 1;
  });
  const teamPerformanceSummary = {};
  Object.keys(teamTargets).forEach(year => {
    Object.keys(teamTargets[year] || {}).forEach(tm => {
      if (!teamPerformanceSummary[tm]) teamPerformanceSummary[tm] = { byMonth: {} };
      Object.keys(teamTargets[year][tm] || {}).forEach(mo => {
        const target = toNum(teamTargets[year][tm][mo]);
        const perf = (teamPerfByTM[tm] && teamPerfByTM[tm][mo]) || { amount: 0, grossProfit: 0, count: 0 };
        const amt = Math.round(toNum(perf.amount) * 100) / 100;
        const hc = toNum((teamHeadcount[year] && teamHeadcount[year][tm] && teamHeadcount[year][tm][mo]) || 0);
        teamPerformanceSummary[tm].byMonth[mo] = {
          target: target,
          amount: amt,
          grossProfit: Math.round(toNum(perf.grossProfit) * 100) / 100,
          completionRate: target > 0 ? Math.round(amt / target * 1000) / 10 : null,
          headcount: hc,
          efficiency: hc > 0 ? Math.round(amt / hc * 100) / 100 : null
        };
      });
    });
  });

  // 销售绩效统计
  const perfCfg = fc.performanceConfig || {};
  const perfRecords = cloudData.performanceRecords || {};
  // 销售评级看板
  const gradeRecords = cloudData.gradeRecords || {};
  const gradeCfg = fc.gradeConfig || {};
  // M0 绩效 & 评级
  const m0PerfCfg = fc.m0PerformanceConfig || {};
  const m0PerfRecords = cloudData.m0PerformanceRecords || {};
  const m0Records = cloudData.m0Records || {};
  const m0Cfg = fc.m0Config || {};
  // 管理绩效统计（管理者角色）
  const mgrPerfCfg = fc.mgrPerformanceConfig || {};
  const mgrPerfRecords = cloudData.mgrPerformanceRecords || {};
  const mgrPerfBase = fc.mgrPerformanceBase;

  const activeUsers = cloudData.users.filter(u => u.active);
  const context = {
    systemDate: new Date().toLocaleDateString('zh-CN'),
    overview: {
      totalUsers: activeUsers.length,
      departments: cloudData.departments,
      dailyReportCount: cloudData.dailyReports.length,
      weeklyReportCount: cloudData.weeklyReports.length,
      dailyDateRange: dailyData.length > 0 ? {earliest: dailyData[0].date, latest: dailyData[dailyData.length-1].date} : null,
      weeklyDateRange: weeklyData.length > 0 ? {earliest: weeklyData[0].weekStart, latest: weeklyData[weeklyData.length-1].weekStart} : null,
      visitRecordCount: visitData.length,
      visitDateRange: visitData.length > 0 ? {earliest: visitData[0].contactTime, latest: visitData[visitData.length-1].contactTime} : null,
      salesRecordCount: salesData.length,
      salesDateRange: salesData.length > 0 ? {earliest: salesData[0].docDate, latest: salesData[salesData.length-1].docDate} : null,
      teamCount: Object.keys(teamTargets).length > 0 ? Object.keys(Object.values(teamTargets)[0]).length : 0,
      gradeRecordCount: Object.keys(gradeRecords).length,
      m0RecordCount: Object.keys(m0Records).length,
      performanceRecordCount: Object.keys(perfRecords).length,
      m0PerformanceRecordCount: Object.keys(m0PerfRecords).length,
      mgrPerformanceRecordCount: Object.keys(mgrPerfRecords).length
    },
    users: activeUsers.map(u => ({name: u.name, department: u.department, role: u.role})),
    dailyChannels: (fc.daily || []).map(c => ({name: c.name, reference: c.reference})),
    weeklyChannels: (fc.weekly || []).map(c => ({name: c.name, reference: c.reference})),
    dailyReports: dailyData,
    weeklyReports: weeklyData,
    visitRecords: visitData,
    visitSummary: visitSummary,
    visitResultOptions: (cloudData.visitConfig && cloudData.visitConfig.visitResults) || [],
    signinEventOptions: (cloudData.formConfig && cloudData.formConfig.signinEvents) || [],
    salesRecords: salesData,
    salesSummary: salesSummary,
    salesTeamOptions: SALES_KA_TEAMS,
    mgrReports: mgrData,
    customerSummary: customerSummary,
    teamTargets: teamTargets,
    teamHeadcount: teamHeadcount,
    teamPerformanceSummary: teamPerformanceSummary,
    gradeRecords: gradeRecords,
    gradeConfig: gradeCfg,
    performanceConfig: perfCfg,
    performanceRecords: perfRecords,
    m0PerformanceConfig: m0PerfCfg,
    m0PerformanceRecords: m0PerfRecords,
    m0Records: m0Records,
    m0Config: m0Cfg,
    mgrPerformanceConfig: mgrPerfCfg,
    mgrPerformanceRecords: mgrPerfRecords,
    mgrPerformanceBase: mgrPerfBase
  };
  return JSON.stringify(context, null, 2);
}

async function callAI(messages) {
  const config = getAIConfig();
  if (!config.apiKey) throw new Error('尚未配置API Key，请先在上方"AI模型配置"中设置');
  const url = config.apiUrl.replace(/\/+$/, '') + '/chat/completions';
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + config.apiKey
    },
    body: JSON.stringify({
      model: config.model,
      messages: messages,
      max_tokens: 4096,
      temperature: 0.7,
      stream: false
    })
  });
  if (!res.ok) {
    let errText = '';
    try { errText = await res.text(); } catch(e) {}
    if (res.status === 401) throw new Error('API Key无效或已过期，请检查配置');
    if (res.status === 429) throw new Error('API调用频率超限，请稍后再试');
    throw new Error('API错误(' + res.status + '): ' + errText.substring(0, 300));
  }
  const data = await res.json();
  if (!data.choices || !data.choices[0]) throw new Error('AI返回数据格式异常');
  return data.choices[0].message.content;
}

function escapeAIHTML(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderAIMarkdown(text) {
  let html = escapeAIHTML(text);
  // Code blocks
  html = html.replace(/```([\s\S]*?)```/g, (m, c) => '<pre style="background:var(--gray-100);padding:10px;border-radius:6px;overflow-x:auto;font-size:12px;margin:8px 0"><code>' + c.trim() + '</code></pre>');
  // Tables
  html = html.replace(/((?:^\|.+\|$\n?)+)/gm, (m, table) => {
    const lines = table.trim().split('\n');
    if (lines.length < 2) return m;
    const parseRow = (line) => line.split('|').map(c => c.trim()).filter(c => c !== '');
    // Check if second line is separator
    let header = parseRow(lines[0]);
    let bodyLines = lines.slice(1);
    if (lines[1] && /^\|[\s:-]+\|/.test(lines[1])) bodyLines = lines.slice(2);
    let result = '<div class="ai-table-wrap"><div class="ai-table-toolbar"><span class="ai-table-label">📊 表格数据</span><button class="btn btn-outline btn-sm" onclick="downloadAITable(this,\'csv\')">📥 CSV</button><button class="btn btn-outline btn-sm" onclick="downloadAITable(this,\'xlsx\')">📥 Excel</button></div><table><thead><tr>' + header.map(h => '<th>' + h + '</th>').join('') + '</tr></thead><tbody>';
    bodyLines.forEach(line => {
      const cells = parseRow(line);
      result += '<tr>' + cells.map(c => '<td>' + c + '</td>').join('') + '</tr>';
    });
    result += '</tbody></table></div>';
    return result;
  });
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Line breaks
  html = html.replace(/\n/g, '<br>');
  return html;
}

function downloadAITable(btn, format) {
  const wrap = btn.closest('.ai-table-wrap');
  if (!wrap) return;
  const table = wrap.querySelector('table');
  if (!table) return;
  // Parse table data
  const headers = [];
  table.querySelectorAll('thead th').forEach(th => headers.push(th.textContent.trim()));
  const rows = [];
  table.querySelectorAll('tbody tr').forEach(tr => {
    const row = [];
    tr.querySelectorAll('td').forEach(td => row.push(td.textContent.trim()));
    rows.push(row);
  });
  const ts = new Date().toISOString().split('T')[0];
  if (format === 'csv') {
    const lines = [headers.join(',')];
    rows.forEach(row => {
      lines.push(row.map(c => {
        if (c.includes(',') || c.includes('"') || c.includes('\n')) return '"' + c.replace(/"/g, '""') + '"';
        return c;
      }).join(','));
    });
    const blob = new Blob(['\uFEFF' + lines.join('\n')], {type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'AI表格_' + ts + '.csv'; a.click();
    URL.revokeObjectURL(url);
  } else if (format === 'xlsx') {
    if (window.XLSX) {
      const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'AI表格');
      XLSX.writeFile(wb, 'AI表格_' + ts + '.xlsx');
    } else {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
      s.onload = () => {
        const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'AI表格');
        XLSX.writeFile(wb, 'AI表格_' + ts + '.xlsx');
      };
      document.head.appendChild(s);
    }
  }
}

// 可走文本通道的附件后缀（直接读取为文本）；xlsx/xls 走表格解析
const AI_TEXT_EXT = ['txt','csv','tsv','json','md','log','yaml','yml','xml','sql','text','html','htm','js','py','css'];
// 暂无法直接读取的二进制格式（不让其垃圾文本污染上下文，给出提示）
const AI_UNREADABLE_EXT = ['pdf','doc','docx','ppt','pptx','zip','rar','7z','exe','bin'];

// 把文件解析为可喂给 AI 的文本（图片除外）。xlsx/xls 用 SheetJS 解析为多 sheet 的 CSV 文本。
function readFileAsAttachment(file) {
  return new Promise((resolve) => {
    const lower = (file.name || '').toLowerCase();
    const isXls = /\.(xlsx|xls)$/.test(lower);
    if (isXls) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          if (typeof XLSX === 'undefined') {
            // 动态加载 SheetJS
            const s = document.createElement('script');
            s.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
            s.onload = () => { try { resolve(parseXlsToText(new Uint8Array(e.target.result))); } catch(err) { resolve(''); } };
            s.onerror = () => resolve('');
            document.head.appendChild(s);
          } else {
            resolve(parseXlsToText(new Uint8Array(e.target.result)));
          }
        } catch(err) { resolve(''); }
      };
      reader.onerror = () => resolve('');
      reader.readAsArrayBuffer(file);
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result || '');
    reader.onerror = () => resolve('');
    reader.readAsText(file);
  });
}
function parseXlsToText(buf) {
  const wb = XLSX.read(buf, { type: 'array', cellDates: true });
  return wb.SheetNames.map(sn => {
    const ws = wb.Sheets[sn];
    const csv = XLSX.utils.sheet_to_csv(ws, { FS: ',', RS: '\n' });
    return '=== Sheet: ' + sn + ' ===\n' + csv;
  }).join('\n\n');
}

function handleAIFileUpload(event) {
  const files = event.target.files;
  if (!files || files.length === 0) return;
  Array.from(files).forEach(file => {
    const lower = (file.name || '').toLowerCase();
    const ext = (lower.split('.').pop() || '').toLowerCase();
    // 图片 → 视觉通道（base64）
    if (file.type.startsWith('image/')) {
      if (file.size > 10 * 1024 * 1024) {
        appendAIMessage('system', '⚠️ 图片 "' + file.name + '" 超过10MB，请压缩后上传');
        return;
      }
      const reader = new FileReader();
      reader.onload = function(e) {
        aiPendingImages.push(e.target.result);
        renderAIImagePreviews();
      };
      reader.readAsDataURL(file);
      return;
    }
    // 暂不可直接读取的二进制格式 → 提示，但仍列出文件名
    if (AI_UNREADABLE_EXT.includes(ext)) {
      aiPendingFiles.push({ name: file.name, text: '[该文件格式（' + ext + '）AI 暂不支持直接读取，请另存为 CSV / TXT / XLSX 后上传]' });
      renderAIFilePreviews();
      return;
    }
    // 文本 / 表格 → 解析为文本通道内容
    if (file.size > 2 * 1024 * 1024) {
      appendAIMessage('system', '⚠️ 文件 "' + file.name + '" 超过2MB，可能超出模型上下文，请精简后上传');
    }
    readFileAsAttachment(file).then(text => {
      let t = String(text || '');
      if (t.length > 60000) {
        t = t.slice(0, 60000) + '\n…(内容过长已截断，仅保留前 60000 字符)';
      }
      aiPendingFiles.push({ name: file.name, text: t });
      renderAIFilePreviews();
    });
  });
  event.target.value = '';
}

function removeAIImage(index) {
  aiPendingImages.splice(index, 1);
  renderAIImagePreviews();
}

function removeAIFile(index) {
  aiPendingFiles.splice(index, 1);

}

function renderAIImagePreviews() {
  const container = document.getElementById('aiInputImages');

    container.style.display = 'none';
    container.innerHTML = '';

    '<div class="ai-image-thumb"><img src="' + img + '"><div class="remove" onclick="removeAIImage(' + i + ')">✕</div></div>'
  ).join('');

function renderAIFilePreviews() {
  const container = document.getElementById('aiInputFiles');
  if (!container) return;
  if (aiPendingFiles.length === 0) {
    container.style.display = 'none';
    container.innerHTML = '';
    return;
  }
  container.style.display = 'flex';
  container.innerHTML = aiPendingFiles.map((f, i) =>

  ).join('');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function sendAIMessage() {
  if (aiChatLoading) return;
  const input = document.getElementById('aiChatInput');
  if (!input) return;
  const text = input.value.trim();
  const images = [...aiPendingImages];
  const files = [...aiPendingFiles];
  if (!text && images.length === 0 && files.length === 0) return;
  const cfg = getAIConfig();
  if (!cfg.apiKey) {
    appendAIMessage('system', '⚠️ 请先在上方"AI模型配置"中设置API Key');
    return;
  }

  // 组装文件附件文本（图片走视觉通道，文档/表格走文本通道）
  const fileBlocks = files.map(f => '【附件：' + f.name + '】\n' + f.text).join('\n\n');
  const userLabel = text || (images.length ? '(图片)' : '(附件)');

  // Show user message (with images & files if any)
  appendAIMessage('user', userLabel, images, files.map(f => f.name));
  input.value = '';
  aiPendingImages = [];
  aiPendingFiles = [];
  renderAIImagePreviews();
  renderAIFilePreviews();

  // Show typing indicator
  const msgArea = document.getElementById('aiChatMessages');
  const typingDiv = document.createElement('div');
  typingDiv.className = 'ai-msg typing';
  typingDiv.id = 'aiTypingIndicator';
  typingDiv.textContent = '🤔 AI正在分析数据...';
  msgArea.appendChild(typingDiv);
  msgArea.scrollTop = msgArea.scrollHeight;

  aiChatLoading = true;
  const sendBtn = document.querySelector('.ai-chat-input-bar .ai-send-btn');
  if (sendBtn) { sendBtn.disabled = true; sendBtn.dataset.original = '1'; }

  try {
    // Build messages: system (fresh data) + history + new user message
    const systemMsg = {role: 'system', content: buildAISystemMessage()};
    const historyMsgs = aiChatHistory.map(m => ({role: m.role, content: m.content}));
    // Build user message (支持图片视觉通道 + 文件文本通道)
    const combinedText = (text ? text + '\n' : '') + (fileBlocks ? '\n' + fileBlocks : '');
    let userMsg;
    if (images.length > 0) {
      const content = [{type: 'text', text: combinedText || '请分析这些图片与附件'}];
      images.forEach(img => content.push({type: 'image_url', image_url: {url: img}}));
      userMsg = {role: 'user', content: content};
    } else {
      userMsg = {role: 'user', content: combinedText || '(附件)'};
    }
    const allMsgs = [systemMsg, ...historyMsgs, userMsg];

    const response = await callAI(allMsgs);

    // Remove typing indicator
    const ti = document.getElementById('aiTypingIndicator');
    if (ti) ti.remove();

    // Show AI response
    appendAIMessage('assistant', response);

    // Save to history (text only for context; 文件仅记名称避免撑爆 token)
    aiChatHistory.push({role: 'user', content: userLabel});
    aiChatHistory.push({role: 'assistant', content: response});

    // Keep history to last 20 messages to avoid token overflow
    if (aiChatHistory.length > 20) aiChatHistory = aiChatHistory.slice(-20);
  } catch(err) {
    const ti = document.getElementById('aiTypingIndicator');
    if (ti) ti.remove();
    let errMsg = err.message || '未知错误';
    if (errMsg.includes('Failed to fetch') || errMsg.includes('NetworkError')) {
      errMsg = '网络请求失败，可能是CORS跨域限制或网络不通。请尝试：\n1. 检查API地址是否正确\n2. 确认该API支持浏览器跨域访问（CORS）\n3. 如使用OpenAI，需确保网络能访问api.openai.com';
    }
    if (errMsg.includes('image') || errMsg.includes('vision') || errMsg.includes('multimodal')) {
      errMsg += '\n\n💡 提示：当前模型可能不支持图片识别，请在"设置→AI模型配置"中切换支持视觉的模型（如 gpt-4o、qwen-vl-plus 等）';
    }
    appendAIMessage('system', '❌ ' + errMsg);
  } finally {
    aiChatLoading = false;
    if (sendBtn) { sendBtn.disabled = false; sendBtn.textContent = '📤 发送'; }
  }
}

async function changePwd(e) {
  e.preventDefault();
  const o=document.getElementById('oldPwd').value,n=document.getElementById('newPwd').value,c=document.getElementById('confirmPwd').value;
  const a=document.getElementById('settingsAlert');
  if(n!==c){a.innerHTML='<div class="alert alert-danger">❌ 两次输入的新密码不一致</div>';return false}
  if(n.length<6){a.innerHTML='<div class="alert alert-danger">❌ 密码至少6位</div>';return false}
  const ho=await hashPassword(o);
  const user=cloudData.users.find(u=>u.id===currentUser.id);
  if(!user||user.password!==ho){a.innerHTML='<div class="alert alert-danger">❌ 原密码错误</div>';return false}
  user.password=await hashPassword(n);
  try { await apiUpdate('users', user.id, user); } catch(e) { showToast('保存失败: ' + e.message, 'error', 4000); a.innerHTML='<div class="alert alert-danger">❌ 保存失败: '+e.message+'</div>'; return false; }
  showToast('密码修改成功！', 'success');
  a.innerHTML='';
  document.getElementById('oldPwd').value='';document.getElementById('newPwd').value='';document.getElementById('confirmPwd').value='';
  return false;
}

// 下载评级标准配置 Excel 模板
function downloadGradeTemplate() {
  try {
    const aoa = [
      ['级别名称', '升级业绩', '降级业绩'],
      ['初级销售', 0, 0],
      ['中级销售', 300000, 200000],
      ['高级销售', 600000, 400000]
    ];
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '评级标准模板');
    XLSX.writeFile(wb, '评级标准配置模板.xlsx');
  } catch (e) { alert('下载模板失败：' + (e.message || e)); }
}

// 从 Excel/CSV 导入评级标准配置
function importGradeConfig(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function (e) {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
      if (!rows.length) { alert('文件中没有数据行'); input.value = ''; return; }
      // 列名模糊匹配
      const headers = Object.keys(rows[0]);
      const pick = function () {
        const keys = Array.prototype.slice.call(arguments);
        for (let h of headers) {
          const s = String(h || '').trim().toLowerCase();
          if (keys.some(k => s.indexOf(k) >= 0)) return h;
        }
        return null;
      };
      const mk = {
        name: pick('级别名称', '级别', '等级', 'name', '名称'),
        promote: pick('升级业绩', '升级', '升入', 'promote'),
        demote: pick('降级业绩', '降级', '保底', 'demote')
      };
      if (!mk.name && !mk.promote) {
        alert('未识别到列。模板列应为：级别名称、升级业绩、降级业绩');
        input.value = ''; return;
      }
      const list = [];
      rows.forEach(function (r) {
        const name = mk.name ? String(r[mk.name] || '').trim() : '';
        if (!name) return;
        const promote = mk.promote ? (parseFloat(String(r[mk.promote]).replace(/,/g, '')) || 0) : 0;
        const demote = mk.demote ? (parseFloat(String(r[mk.demote]).replace(/,/g, '')) || 0) : 0;
        list.push({ name: name, promote: promote, demote: demote });
      });
      if (!list.length) { alert('没有有效的级别数据（级别名称为空）'); input.value = ''; return; }
      if (!confirm('成功识别 ' + list.length + ' 个级别，确定导入并覆盖当前评级标准配置吗？')) { input.value = ''; return; }
      cloudData.formConfig.gradeConfig = list;
      renderConfigContent();
      // 内联保存（不依赖 saveFormConfig 的 event.target）
      fetch(FB_BASE + '/formConfig.json', {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(cloudData.formConfig)
      }).then(function () {
        showToast('评级配置已导入并保存', 'success');
      }).catch(function (err) {
        showToast('保存失败: ' + err.message, 'error', 4000);
      });
    } catch (err) {
      alert('导入失败：' + (err.message || err));
    }
    input.value = '';
  };
  reader.readAsArrayBuffer(file);
}

async function saveFormConfig() {
  const alertEl = document.getElementById('configAlert');
  const btn = event?.target;
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 保存中...'; }
  try {
    await fetch(FB_BASE + '/formConfig.json', {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(cloudData.formConfig)
    });
    // Also save visit config
    await fetch(FB_BASE + '/visitConfig.json', {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(cloudData.visitConfig || DEFAULT_VISIT_CONFIG)
    });
    showToast('配置已保存并生效！', 'success');
    syncOpenReports();
    if (alertEl) alertEl.innerHTML = '';
  } catch(e) {
    showToast('保存失败: ' + e.message, 'error', 4000);
    if (alertEl) alertEl.innerHTML = `<div class="alert alert-danger">❌ 保存失败: ${e.message}</div>`;
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '💾 保存配置'; }
  }
}
