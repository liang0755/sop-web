function renderVisitTable() {
  const s = document.getElementById('visitFStart')?.value || '';
  const e = document.getElementById('visitFEnd')?.value || '';
  const fDept = document.getElementById('visitFDept')?.value || '';
  const fPerson = document.getElementById('visitFPerson')?.value || '';
  const fResult = document.getElementById('visitFResult')?.value || '';
  // 同步每页条数（来自筛选栏下拉）
  const psSel = document.getElementById('visitPageSize');
  if (psSel) visitPageSize = parseInt(psSel.value, 10) || 30;
  let records = [...cloudData.visitRecords];
  if (s) records = records.filter(r => normContactTime(r.contactTime).split(' ')[0] >= s);
  if (e) records = records.filter(r => normContactTime(r.contactTime).split(' ')[0] <= e);
  if (fDept) records = records.filter(r => normDeptKey(r.department) === normDeptKey(fDept));
  if (fPerson) records = records.filter(r => r.employee === fPerson);
  if (fResult === 'empty') records = records.filter(r => !r.visitResult);
  else if (fResult === 'filled') records = records.filter(r => !!r.visitResult);
  else if (fResult) records = records.filter(r => (r.visitResult || '') === fResult);
  records.sort((a, b) => normContactTime(b.contactTime).localeCompare(normContactTime(a.contactTime)));
  const total = records.length;
  const pages = Math.max(1, Math.ceil(total / visitPageSize));
  if (visitCurrentPage > pages) visitCurrentPage = pages;
  if (visitCurrentPage < 1) visitCurrentPage = 1;
  const startIdx = (visitCurrentPage - 1) * visitPageSize;
  const pageRecords = records.slice(startIdx, startIdx + visitPageSize);
  const c = document.getElementById('visitResults');
  if (!total) {
    visitCurrentPage = 1;
    c.innerHTML = '<div class="empty-state"><div class="icon">📭</div>暂无拜访数据，请点击"上传CSV"按钮上传</div>';
    document.getElementById('visitSaveBar').style.display = 'none';
    return;
  }
  const vc = getVisitConfig();
  const resultOptions = vc.visitResults.map(r => {
    const col = getVisitResultColor(r);
    return `<option value="${r}" style="color:${col};font-weight:600">● ${r}</option>`;
  }).join('');
  // Color legend
  const legend = vc.visitResults.map(r => {
    const col = getVisitResultColor(r);
    return `<span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--gray-600)"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${col}"></span>${r}</span>`;
  }).join('<span style="color:var(--gray-300);margin:0 6px">|</span>');
  c.innerHTML = `<div style="margin-bottom:10px;padding:8px 12px;background:var(--gray-50);border-radius:6px;display:flex;align-items:center;gap:4px;flex-wrap:wrap">
    <span style="font-size:12px;font-weight:600;color:var(--gray-700);margin-right:4px">🎨 拜访结果颜色：</span>${legend}
  </div>
  <div class="card"><div class="table-wrap"><table style="font-size:12px">
    <thead><tr>
      <th style="width:34px;text-align:center"><input type="checkbox" id="visitSelectAll" onchange="toggleVisitSelectAll(this)"></th>
      <th>联系时间</th><th>客户</th><th>联系人</th><th>手机号</th><th>签到事件</th>
      <th>员工</th><th>部门</th><th>签到地址</th><th>备注</th>
      <th style="min-width:130px">拜访结果</th><th style="min-width:200px">卡点说明</th>
    </tr></thead>
    <tbody>
      ${pageRecords.map(r => {
        const vr = visitEditBuffer[r.id]?.visitResult !== undefined ? visitEditBuffer[r.id].visitResult : (r.visitResult || '');
        const bn = visitEditBuffer[r.id]?.blockerNote !== undefined ? visitEditBuffer[r.id].blockerNote : (r.blockerNote || '');
        const se = visitEditBuffer[r.id]?.signinEvent !== undefined ? visitEditBuffer[r.id].signinEvent : (r.signinEvent || '');
        const vrColor = getVisitResultColor(vr);
        const vrBg = getVisitResultBg(vr);
        const checked = selectedVisitIds.has(r.id) ? 'checked' : '';
        // 签到事件下拉选项（固定配置项；若当前值不在配置中，则追加该项避免丢失显示）
        const fixedEvents = getSigninEvents();
        let signinEventList = fixedEvents.slice();
        if (se && !signinEventList.includes(se)) signinEventList = signinEventList.concat([se]);
        const signinOpts = signinEventList.map(ev => `<option value="${ev.replace(/"/g,'&quot;')}" ${ev === se ? 'selected' : ''}>${ev}</option>`).join('');
        return `<tr data-id="${r.id}">
          <td style="text-align:center"><input type="checkbox" class="visit-row-cb" data-id="${r.id}" ${checked} onchange="onVisitSelect('${r.id}', this.checked)"></td>
          <td>${r.contactTime || ''}</td>
          <td>${r.customer || ''}</td>

          <td><select class="form-control form-control-sm" onchange="onVisitEdit('${r.id}','signinEvent',this.value)" title="点击修改签到事件（选项来自表单配置-签到事件配置）"><option value="">未设置</option>${signinOpts}</select></td>
          <td>${r.employee || ''}</td>
          <td>${r.department || ''}</td>

        </tr>`;
      }).join('')}
    </tbody>
  </table></div></div>
  ${renderVisitPager(total, pages, visitCurrentPage)}`;
  // Restore select values（签到事件在第6列、拜访结果在第11列）
  pageRecords.forEach(r => {
    const vr = visitEditBuffer[r.id]?.visitResult !== undefined ? visitEditBuffer[r.id].visitResult : (r.visitResult || '');
    const se = visitEditBuffer[r.id]?.signinEvent !== undefined ? visitEditBuffer[r.id].signinEvent : (r.signinEvent || '');
    const row = c.querySelector(`tr[data-id="${r.id}"]`);
    if (row) {
      const vrTd = row.querySelector('td:nth-child(11)');
      const vrSel = vrTd ? vrTd.querySelector('select') : null;
      if (vrSel) vrSel.value = vr;
      const seSel = row.querySelector('td:nth-child(6) select');
      if (seSel) seSel.value = se;
    }
  });
  // Sync select-all checkbox state（仅当前页）
  const selAll = document.getElementById('visitSelectAll');
  if (selAll) {
    const allSelected = pageRecords.length > 0 && pageRecords.every(r => selectedVisitIds.has(r.id));
    selAll.checked = allSelected;
  }
  updateVisitBatchBar();
  updateVisitSaveBar();
}

function showVisitRemarkModal(recordId) {
  const r = cloudData.visitRecords.find(x => x.id === recordId);

// 拜访数据分页控件
function renderVisitPager(total, pages, cur) {
  const window = 2;
  const startP = Math.max(1, cur - window);
  const endP = Math.min(pages, cur + window);
  const nums = [];
  for (let i = startP; i <= endP; i++) nums.push(i);
  if (startP > 1) { if (startP > 2) nums.unshift('...'); nums.unshift(1); }
  if (endP < pages) { if (endP < pages - 1) nums.push('...'); nums.push(pages); }
  const btns = nums.map(n => {
    if (n === '...') return '<span style="padding:0 6px;color:var(--gray-400)">…</span>';
    const active = n === cur;
    return `<button class="btn btn-sm ${active ? 'btn-primary' : 'btn-outline'}" onclick="gotoVisitPage(${n})" ${active ? 'disabled' : ''}>${n}</button>`;
  }).join('');
  return `<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px;justify-content:space-between">
    <div style="font-size:13px;color:var(--gray-600)">共 ${total} 条，第 ${cur} / ${pages} 页</div>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <button class="btn btn-sm btn-outline" onclick="gotoVisitPage(1)" ${cur <= 1 ? 'disabled' : ''}>« 首页</button>
      <button class="btn btn-sm btn-outline" onclick="gotoVisitPage(${cur - 1})" ${cur <= 1 ? 'disabled' : ''}>‹ 上一页</button>
      ${btns}
      <button class="btn btn-sm btn-outline" onclick="gotoVisitPage(${cur + 1})" ${cur >= pages ? 'disabled' : ''}>下一页 ›</button>
      <button class="btn btn-sm btn-outline" onclick="gotoVisitPage(${pages})" ${cur >= pages ? 'disabled' : ''}>末页 »</button>
      <span style="display:inline-block;width:1px;height:20px;background:var(--gray-200);margin:0 4px"></span>
      <span style="font-size:13px;color:var(--gray-600)">跳至</span>
      <input type="number" id="visitJumpPage" min="1" max="${pages}" value="${cur}" class="form-control form-control-sm" style="width:64px" onkeydown="if(event.key==='Enter')gotoVisitPage(this.value)">
      <span style="font-size:13px;color:var(--gray-600)">页</span>
      <button class="btn btn-sm btn-outline" onclick="gotoVisitPage(document.getElementById('visitJumpPage')?.value)">跳转</button>
    </div>
  </div>`;
}

function parseVisitCSV(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const rows = [];
  let row = [];
  let field = '';
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i+1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else { field += c; }
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c === '\r') {}
      else field += c;
    }
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows;
}

// 拜访数据·查重 key（与导入查重逻辑一致）：联系时间(到分钟)+客户+联系人+手机号+签到事件+员工+部门+签到地址+备注，空白归一
function buildVisitDupKey(o) {
  const _normCell = v => String(v == null ? '' : v).replace(/\s+/g, ' ').trim();
  const _normTimeMin = s => { const t = normContactTime(s || ''); return t ? t.slice(0, 16) : ''; };
  return [_normTimeMin(o.contactTime), _normCell(o.customer), _normCell(o.contactPerson), _normCell(o.phone), _normCell(o.signinEvent), _normCell(o.employee), canonDept(o.department||''), _normCell(o.signinAddress), _normCell(o.remark)].join('|');
}

// 拜访数据·按相同 key 清理重复：每组相同 key 仅保留第一条，删除其余（先弹窗确认，逐条删除并同步内存）
async function cleanupVisitDuplicates() {
  if (!hasPermission('visitData')) { showToast('无权限执行清理', 'warning'); return; }
  // 清理前确保内存中的拜访数据是最新的（避免登录后未刷新/缓存为空而漏清）
  if ((cloudData.visitRecords || []).length === 0) {
    await ensureVisitDataLoaded();
  }
  const records = cloudData.visitRecords || [];
  if (!records.length) { showToast('没有可清理的拜访数据', 'warning'); return; }
  const seen = new Map();      // key -> first record (保留)
  const dupIds = [];
  for (const r of records) {
    const key = buildVisitDupKey(r);
    if (!key) continue;
    if (seen.has(key)) dupIds.push(r.id);
    else seen.set(key, r);
  }
  if (!dupIds.length) {
    const alertEl0 = document.getElementById('visitAlert');
    if (alertEl0) alertEl0.innerHTML = '<div class="alert alert-success">✅ 未检测到重复拜访数据</div>';
    showToast('未检测到重复记录 👍', 'success'); return;
  }
  if (!confirm('即将删除 ' + dupIds.length + ' 条重复拜访数据（每组相同 key 仅保留第一条）。此操作不可撤销，确认继续？')) return;
  const btn = document.getElementById('visitCleanupBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 清理中...'; }
  let ok = 0, fail = 0;
  for (const id of dupIds) {
    try { await apiDelete('visitRecords', id); ok++; }
    catch (e) { fail++; console.error('删除拜访记录失败', id, e); }
  }
  // 本地同步移除，避免下次查重仍把它们算作"已有"
  cloudData.visitRecords = records.filter(r => !dupIds.includes(r.id));
  if (btn) { btn.disabled = false; btn.textContent = '🧹 清理重复'; }
  const alertEl = document.getElementById('visitAlert');
  if (alertEl) alertEl.innerHTML = '<div class="alert alert-success">✅ 已清理 ' + ok + ' 条重复拜访数据' + (fail ? '，' + fail + ' 条删除失败' : '') + '</div>';
  renderVisitTable();
  showToast('清理完成：删除 ' + ok + ' 条' + (fail ? '，失败 ' + fail + ' 条' : ''));
}

async function handleVisitUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const alertEl = document.getElementById('visitAlert');
  if (alertEl) alertEl.innerHTML = '<div class="alert alert-info">正在解析CSV文件...</div>';
  try {
    const buffer = await file.arrayBuffer();
    let text;
    // Try UTF-8 first; if replacement chars found, fall back to GBK (common for Chinese Windows CSVs)
    text = new TextDecoder('utf-8').decode(buffer);
    if (text.includes('\uFFFD')) {
      text = new TextDecoder('gbk').decode(buffer);
    }
    const rows = parseVisitCSV(text);
    if (rows.length < 2) {
      if (alertEl) alertEl.innerHTML = '<div class="alert alert-warning">CSV文件没有数据行</div>';
      input.value = '';
      return;
    }
    const headers = rows[0].map(h => h.trim());
    const colMap = {};
    headers.forEach((h, i) => {
      if (h.includes('联系时间')) colMap.contactTime = i;
      else if (h.includes('客户') && !h.includes('单位')) colMap.customer = i;
      else if (h.includes('工作单位') || h.includes('联系人')) colMap.contactPerson = i;
      else if (h.includes('手机')) colMap.phone = i;
      else if (h.includes('签到事件')) colMap.signinEvent = i;
      else if (h.includes('签退时间')) colMap.signoutTime = i;
      else if (h.includes('时长')) colMap.duration = i;
      else if (h.includes('签退状态')) colMap.signoutStatus = i;
      else if (h.includes('员工')) colMap.employee = i;
      else if (h.includes('部门')) colMap.department = i;
      else if (h.includes('签到记录') || h.includes('签到地址')) colMap.signinAddress = i;
      else if (h.includes('备注')) colMap.remark = i;
      else if (h.includes('拜访结果')) colMap.visitResult = i;
      else if (h.includes('卡点') || h.includes('说明')) colMap.blockerNote = i;
    });
    // 查重前确保内存中的拜访数据是最新的（避免登录后未刷新 / 缓存为空导致 existingKeys 为空而漏查重）
    await ensureVisitDataLoaded();
    const newRecords = [];
    let dupCount = 0;
    // 查重 key = 联系时间(精确到分钟,忽略秒差) | 客户 | 联系人 | 手机号 | 签到事件 | 员工 | 部门 | 签到地址 | 备注（不含拜访结果、卡点说明）
    // ① 时间统一到「YYYY-MM-DD HH:MM」，避免「10:00:00」与「10:00」因秒数差异被判为不同；
    // ② 各字段折叠多余空白并 trim，避免首尾/中间空格差异导致漏查重。
    const _normCell = v => String(v == null ? '' : v).replace(/\s+/g, ' ').trim();
    const _normTimeMin = s => { const t = normContactTime(s || ''); return t ? t.slice(0, 16) : ''; };
    const buildDupKey = (o) => [_normTimeMin(o.contactTime), _normCell(o.customer), _normCell(o.contactPerson), _normCell(o.phone), _normCell(o.signinEvent), _normCell(o.employee), canonDept(o.department||''), _normCell(o.signinAddress), _normCell(o.remark)].join('|');
    // Keys already in DB — duplicates to be filtered out
    const existingKeys = new Set(cloudData.visitRecords.map(e => buildDupKey(e)));
    // Keys already added in this batch — avoid within-file duplicates too
    const batchKeys = new Set();
    for (let i = 1; i < rows.length; i++) {
      const r = rows[i];
      if (!r[colMap.contactTime] && !r[colMap.employee]) continue;
      const contactTime = normContactTime(r[colMap.contactTime] || '');
      const customer = r[colMap.customer] || '';
      const employee = r[colMap.employee] || '';
      const key = buildDupKey({
        contactTime: contactTime,
        customer: customer,
        contactPerson: r[colMap.contactPerson] || '',
        phone: r[colMap.phone] || '',
        signinEvent: r[colMap.signinEvent] || '',
        employee: employee,
        department: r[colMap.department] || '',
        signinAddress: r[colMap.signinAddress] || '',
        remark: r[colMap.remark] || ''
      });
      // Skip duplicates: already in DB or already in this batch → auto filter out
      if (existingKeys.has(key) || batchKeys.has(key)) {
        dupCount++;
        continue;
      }
      batchKeys.add(key);
      const record = {
        id: genId(),
        contactTime, customer,
        contactPerson: r[colMap.contactPerson] || '',
        phone: r[colMap.phone] || '',
        signinEvent: r[colMap.signinEvent] || '',
        signoutTime: r[colMap.signoutTime] || '',
        duration: r[colMap.duration] || '',
        signoutStatus: r[colMap.signoutStatus] || '',
        employee, department: canonDept(r[colMap.department] || ''),
          signinAddress: r[colMap.signinAddress] || '',
          remark: r[colMap.remark] || '',
          visitResult: (colMap.visitResult !== undefined && r[colMap.visitResult]) ? r[colMap.visitResult] : '',
          blockerNote: (colMap.blockerNote !== undefined && r[colMap.blockerNote]) ? r[colMap.blockerNote] : '',
        uploadedAt: new Date().toISOString(),
        uploadedBy: currentUser.name
      };
      newRecords.push(record);
    }
    let saved = 0;
    for (const rec of newRecords) {
      try {
        await apiCreate('visitRecords', rec);
        cloudData.visitRecords.push(rec);
        saved++;
      } catch(e) { console.warn('Failed to save visit record:', e); }
    }
    try { saveReportsCache(); } catch(e) {}
    if (alertEl) {
      let msg = '✅ 上传完成！新增 ' + saved + ' 条记录';
      if (dupCount > 0) msg += '，已自动过滤 ' + dupCount + ' 条重复记录';
      alertEl.innerHTML = '<div class="alert alert-success">' + msg + '</div>';
    }
    setTimeout(() => { const a = document.getElementById('visitAlert'); if (a) a.innerHTML = ''; }, 5000);
    renderVisitTable();
  } catch(e) {
    if (alertEl) alertEl.innerHTML = '<div class="alert alert-danger">❌ 上传失败: ' + e.message + '</div>';
  }
  input.value = '';
}

// ============ Management Weekly Report ============
let mgrReportEditId = null; // track editing state

function getWeekNumber(date) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
  const week1 = new Date(d.getFullYear(), 0, 4);
  return 1 + Math.round(((d - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}

function getRecentWeeks(count) {
  const weeks = [];
  const now = new Date();
  const day = now.getDay() || 7;
  const thisMonday = new Date(now);
  thisMonday.setDate(now.getDate() - day + 1);
  thisMonday.setHours(0, 0, 0, 0);
  for (let i = 0; i < count; i++) {
    const monday = new Date(thisMonday);
    monday.setDate(thisMonday.getDate() - i * 7);
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    const weekNum = getWeekNumber(monday);
    const year = monday.getFullYear();
    const fmt = (dt) => { const m = String(dt.getMonth()+1).padStart(2,'0'); const d = String(dt.getDate()).padStart(2,'0'); return `${m}/${d}`; };
    const fmtDate = (dt) => { const y = dt.getFullYear(); const m = String(dt.getMonth()+1).padStart(2,'0'); const d = String(dt.getDate()).padStart(2,'0'); return `${y}-${m}-${d}`; };
    weeks.push({
      weekStart: fmtDate(monday),
      weekEnd: fmtDate(sunday),
      label: `${year}年第${weekNum}周 (${fmt(monday)}-${fmt(sunday)})`
    });
  }
  return weeks;
}

function getVisitSummaryForWeek(weekStart, weekEnd, department) {
  const records = cloudData.visitRecords.filter(r => {
    const d = normContactTime(r.contactTime).split(' ')[0];
    return d >= weekStart && d <= weekEnd && normDeptKey(r.department || '未分组') === normDeptKey(department);
  });
  const vc = getVisitConfig();
  const allResults = vc.visitResults || [];
  const byResult = {};
  allResults.forEach(r => { byResult[r] = 0; });
  byResult['未标记'] = 0;
  records.forEach(r => {
    const vr = r.visitResult || '未标记';
    if (byResult[vr] === undefined) byResult[vr] = 0;
    byResult[vr]++;
  });
  return { total: records.length, byResult, records };
}

// 依据最新的拜访数据与配置，构建拜访结果快照（提交周报 / 重新生成共用）
function buildVisitSnapshot(summary) {
  const vc = getVisitConfig();
  const allResults = vc.visitResults || [];
  return {
    total: summary.total,
    details: [...allResults, '未标记'].filter(res => (summary.byResult[res] || 0) > 0).map(res => {
      const empMap = {};
      summary.records.forEach(rec => {
        const vr = rec.visitResult || '未标记';
        const emp = rec.employee || '未知';
        if (vr === res) empMap[emp] = (empMap[emp] || 0) + 1;
      });
      const employees = Object.keys(empMap).map(name => ({ name, count: empMap[name] }));
      return { result: res, count: summary.byResult[res] || employees.reduce((s, e) => s + e.count, 0), employees };
    })
  };
}

// 已提交周报：依据当前最新拜访数据 + 拜访结果配置，重新生成快照（实时同步）
async function regenerateMgrSnapshot(id) {
  const rep = cloudData.mgrReports.find(r => r.id === id);

  try {
    const summary = getVisitSummaryForWeek(rep.weekStart, rep.weekEnd, rep.department);
    const visitSnapshot = buildVisitSnapshot(summary);

}

// 将拜访汇总快照格式化为「结果→销售人员」明细文本（details 优先，否则回退到计数快照）
function formatVisitSnapshotDetail(snap) {
  if (!snap) return '';
  if (Array.isArray(snap.details) && snap.details.length) {
    return snap.details.map(d => {
      const empStr = Array.isArray(d.employees) ? d.employees.map(e => {
        if (e && typeof e === 'object') return `${e.name}(${e.count})`;
        return String(e);
      }).join('、') : '';
      return `${d.result}：${d.count}人 [${empStr}]`;
    }).join('\n');
  }
  return Object.keys(snap).filter(k => k !== 'total' && snap[k] > 0).map(k => `${k}：${snap[k]}`).join('\n');
}

// 将快照渲染为卡片内美观的明细表格（已提交周报查看用）

function updateMgrVisitSummary() {
  const weekVal = document.getElementById('mgrWeekSel')?.value || '';
  const dept = document.getElementById('mgrDeptSel')?.value || '';
  const container = document.getElementById('mgrVisitSummary');
  if (!container) return;
  if (!dept) {
    container.innerHTML = '<div style="padding:12px;background:var(--gray-50);border-radius:8px;color:var(--gray-500);font-size:13px;text-align:center">👆 请选择部门，将自动带出当周拜访结果汇总</div>';
    return;
  }
  const [weekStart, weekEnd, weekLabel] = weekVal.split('|');
  const summary = getVisitSummaryForWeek(weekStart, weekEnd, dept);
  const colors = ['#2563eb','#16a34a','#f59e0b','#dc2626','#7c3aed','#0891b2','#db2777','#4f46e5'];
  const vc = getVisitConfig();
  const allResults = vc.visitResults || [];

  // If there is no visit data for this week+dept, do NOT show the summary
  if (summary.total === 0) {
    container.innerHTML = '<div style="padding:12px;background:var(--gray-50);border-radius:8px;color:var(--gray-400);font-size:13px;text-align:center">📭 该部门当周暂无拜访数据，无需带出汇总</div>';
    return;
  }

  let cards = `<div style="text-align:center;padding:10px;background:var(--gray-50);border-radius:6px"><div style="font-size:20px;font-weight:700;color:var(--primary)">${summary.total}</div><div style="font-size:11px;color:var(--gray-500)">总拜访数</div></div>`;
  allResults.forEach((result, idx) => {
    const count = summary.byResult[result] || 0;
    const color = colors[idx % colors.length];
    cards += `<div style="text-align:center;padding:10px;background:var(--gray-50);border-radius:6px"><div style="font-size:20px;font-weight:700;color:${color}">${count}</div><div style="font-size:11px;color:var(--gray-500)">${result}</div></div>`;
  });
  const unmarked = summary.byResult['未标记'] || 0;
  cards += `<div style="text-align:center;padding:10px;background:var(--gray-50);border-radius:6px"><div style="font-size:20px;font-weight:700;color:var(--gray-400)">${unmarked}</div><div style="font-size:11px;color:var(--gray-500)">未标记</div></div>`;

  // 按「拜访结果」统计销售人员（记录每人次数）
  const resultMap = {};
  [...allResults, '未标记'].forEach(res => { if ((summary.byResult[res] || 0) > 0) resultMap[res] = {}; });
  summary.records.forEach(rec => {
    const vr = rec.visitResult || '未标记';
    if (!resultMap[vr]) resultMap[vr] = {};
    const emp = rec.employee || '未知';
    resultMap[vr][emp] = (resultMap[vr][emp] || 0) + 1;
  });
  const resultRows = Object.keys(resultMap).map(result => {
    const empMap = resultMap[result];
    const emps = Object.keys(empMap).map(name => ({ name, count: empMap[name] }));
    const cnt = summary.byResult[result] || emps.reduce((s, e) => s + e.count, 0);
    const ridx = allResults.indexOf(result);
    const color = ridx >= 0 ? colors[ridx % colors.length] : 'var(--gray-400)';
    const empStr = emps.map(e => `${e.name}(${e.count})`).join('、');
    return `<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};margin-right:6px"></span><strong>${result}</strong></td><td style="text-align:center">${cnt}</td><td style="font-size:12px;color:var(--gray-600)">${empStr}</td></tr>`;
  }).join('');

  container.innerHTML = `
    <div style="border:1px solid var(--gray-200);border-radius:8px;overflow:hidden">
      <div style="padding:10px 14px;background:var(--gray-50);border-bottom:1px solid var(--gray-200);font-size:13px;font-weight:600;color:var(--gray-700)">
        📊 ${dept} — ${weekLabel} 拜访结果汇总
      </div>
      <div style="padding:14px">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-bottom:12px">${cards}</div>
        ${resultRows ? `<div class="table-wrap"><table style="font-size:12px"><thead><tr><th>拜访结果</th><th style="width:60px;text-align:center">次数</th><th>销售人员</th></tr></thead><tbody>${resultRows}</tbody></table></div>` : '<div style="text-align:center;color:var(--gray-400);padding:8px;font-size:13px">该部门本周暂无拜访记录</div>'}
      </div>
    </div>
  `;
}

async function saveMgrReport(btn) {
  const weekVal = document.getElementById('mgrWeekSel').value;
  const dept = document.getElementById('mgrDeptSel').value;
  const content = document.getElementById('mgrContent').value.trim();
  if (!dept) { showToast('请选择部门', 'warning'); return; }
  if (!content) { showToast('请填写周报内容', 'warning'); return; }
  const [weekStart, weekEnd, weekLabel] = weekVal.split('|');
  // Get visit summary snapshot
  const summary = getVisitSummaryForWeek(weekStart, weekEnd, dept);
  // 按「拜访结果」归组的销售人员明细，随快照持久化，便于列表展示与导出
  // 注意：不要把结果名作为快照平铺 key（结果名可能含 "/" 等 Firebase 非法字符），统一用 details 数组
  const visitSnapshot = buildVisitSnapshot(summary);

  if (btn) { btn.disabled = true; btn.textContent = '⏳ 提交中...'; }

  try {
    if (mgrReportEditId) {
      // Update existing
      const existing = cloudData.mgrReports.find(r => r.id === mgrReportEditId);
      if (existing) {
        const updated = { ...existing, weekStart, weekEnd, weekLabel, department: dept, content, visitSnapshot, updatedAt: new Date().toISOString() };
        await apiUpdate('mgrReports', mgrReportEditId, updated);
        Object.assign(existing, updated);
      }
      mgrReportEditId = null;
      showToast('周报已更新！');
    } else {
      // Check for duplicate (same user, same week, same dept)
      const dup = cloudData.mgrReports.find(r => r.userId === currentUser.id && r.weekStart === weekStart && r.department === dept);
      if (dup) {
        if (!confirm('该周次和部门已有周报记录，是否覆盖更新？')) { if (btn) { btn.disabled = false; btn.textContent = '💾 提交周报'; } return; }
        const updated = { ...dup, weekEnd, weekLabel, content, visitSnapshot, updatedAt: new Date().toISOString() };
        await apiUpdate('mgrReports', dup.id, updated);
        Object.assign(dup, updated);
        showToast('周报已更新！');
      } else {
        const newReport = {
          id: 'mgr_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
          userId: currentUser.id,
          userName: currentUser.name,
          weekStart, weekEnd, weekLabel,
          department: dept,
          content,
          visitSnapshot,
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        };
        await apiCreate('mgrReports', newReport);
        cloudData.mgrReports.push(newReport);
        showToast('周报提交成功！');
      }
    }
    resetMgrForm();
    renderMgrReport();
  } catch(e) {
    showToast('提交失败：' + e.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = '💾 提交周报'; }
  }
}

function renderMgrReportList() {
  const container = document.getElementById('mgrReportList');
  if (!container) return;
  const fm = document.getElementById('mgrReportMonthFilter')?.value || '';
  const checkedWeeks = [...document.querySelectorAll('#mgrWeekCheckList .mgr-week-cb:checked')].map(cb => cb.value);
  const myReports = cloudData.mgrReports.filter(r => r.userId === currentUser.id || hasPermission('editOthers'));
  const weekLabelMap = {};
  myReports.forEach(r => { if (r.weekStart) weekLabelMap[r.weekStart] = r.weekLabel || (r.weekStart + ' ~ ' + r.weekEnd); });
  let allWeeks = Object.keys(weekLabelMap).sort().reverse();
  let weeksToShow = allWeeks;
  if (fm) weeksToShow = weeksToShow.filter(ws => ws.slice(0,7) === fm);
  if (checkedWeeks.length) weeksToShow = weeksToShow.filter(ws => checkedWeeks.includes(ws));
  const filtered = myReports.filter(r => weeksToShow.includes(r.weekStart));
  if (!weeksToShow.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📭</div>暂无管理周报记录</div>';
    return;
  }

  // 部门列集合：取自全部已加载的周报（不去周次筛选），保证列布局稳定；按首次出现顺序
  const allDepts = [];
  const _dseen = new Set();
  myReports.forEach(r => {
    const d = (r.department || '').trim();
    if (d && !_dseen.has(d)) { _dseen.add(d); allDepts.push(d); }
  });
  if (!allDepts.length) {
    filtered.forEach(r => {
      const d = (r.department || '').trim();
      if (d && !_dseen.has(d)) { _dseen.add(d); allDepts.push(d); }
    });
  }
  if (!allDepts.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📭</div>所选周次暂无部门数据</div>';
    return;
  }

  // 排版：每周一行（周标签做行头），行内按部门横排；缺失部门显示空占位卡
  const _renderCard = (r) => {
    const snap = r.visitSnapshot || {};
    const snapCard = renderSnapshotCardHTML(snap);
    const canEdit = r.userId === currentUser.id || hasPermission('editOthers');
    const canDelete = r.userId === currentUser.id || hasPermission('deleteOthers');
    return `<div class="mgr-report-card" style="flex:1 1 0;min-width:280px">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:6px;margin-bottom:8px">
        <span style="background:var(--gray-100);padding:2px 10px;border-radius:10px;font-size:12px;color:var(--gray-600)">${r.department}</span>
        <span style="font-size:12px;color:var(--gray-500)">${r.userName || '未知'}</span>
        <div style="display:flex;gap:4px">
          ${canEdit ? `<button class="btn btn-xs btn-outline" onclick="editMgrReport('${r.id}')" title="编辑">✏️</button>` : ''}
          ${canEdit ? `<button class="btn btn-xs btn-outline" onclick="regenerateMgrSnapshot('${r.id}')" title="重算快照">🔄</button>` : ''}
          ${canDelete ? `<button class="btn btn-xs btn-outline" style="color:var(--danger)" onclick="deleteMgrReport('${r.id}')" title="删除">🗑️</button>` : ''}
        </div>
      </div>
      <div class="mgr-report-col snapshot">${snapCard}</div>
      <div class="mgr-report-col content" style="margin-top:8px">${(r.content || '').replace(/</g,'&lt;')}</div>
      <div style="margin-top:8px;font-size:11px;color:var(--gray-400)">${r.createdAt ? '创建：' + r.createdAt.replace('T',' ').slice(0,16) : ''}${r.updatedAt && r.updatedAt !== r.createdAt ? ' · 更新：' + r.updatedAt.replace('T',' ').slice(0,16) : ''}</div>
    </div>`;
  };
  const _renderEmpty = (dept) => {
    return `<div class="mgr-report-card empty" style="flex:1 1 0;min-width:280px;border-style:dashed;background:var(--gray-50);display:flex;flex-direction:column">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:6px;margin-bottom:8px">
        <span style="background:var(--gray-100);padding:2px 10px;border-radius:10px;font-size:12px;color:var(--gray-600)">${dept}</span>
      </div>
      <div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--gray-400);font-size:13px;padding:30px 8px">📭 本周未提交</div>
    </div>`;
  };

  container.innerHTML = `<div class="mgr-report-list-rows">
    ${weeksToShow.map(ws => {
      const wkReports = filtered.filter(r => r.weekStart === ws);
      const wkByDept = {};
      wkReports.forEach(r => { if (r.department) wkByDept[r.department] = r; });
      const label = weekLabelMap[ws] || ws;
      return `<div class="mgr-report-week-row" style="margin-bottom:24px">
        <div class="mgr-report-week-label" style="font-weight:600;font-size:14px;color:var(--gray-700);border-bottom:2px solid var(--primary);padding-bottom:6px;margin-bottom:12px">📅 ${label}</div>
        <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:stretch">
          ${allDepts.map(dept => wkByDept[dept] ? _renderCard(wkByDept[dept]) : _renderEmpty(dept)).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// 导出「管理周报」列表（按当前月份+周次多选筛选结果）
function exportMgrReports() {
  const fm = document.getElementById('mgrReportMonthFilter')?.value || '';
  const checkedWeeks = [...document.querySelectorAll('#mgrWeekCheckList .mgr-week-cb:checked')].map(cb => cb.value);
  const myReports = cloudData.mgrReports.filter(r => r.userId === currentUser.id || hasPermission('editOthers'));
  let allWeeks = [...new Set(myReports.map(r => r.weekStart).filter(Boolean))].sort().reverse();
  let weeksToShow = allWeeks;
  if (fm) weeksToShow = weeksToShow.filter(ws => ws.slice(0,7) === fm);
  if (checkedWeeks.length) weeksToShow = weeksToShow.filter(ws => checkedWeeks.includes(ws));
  const list = myReports.filter(r => weeksToShow.includes(r.weekStart));
  if (!list.length) { showToast('没有可导出的周报', 'warning'); return; }
  const _tag = (fm ? fm : '全部') + (checkedWeeks.length ? '_' + checkedWeeks.length + '周' : '');
  const doExport = () => {
    const headers = ['周次', '部门', '提交人', '总拜访数', '拜访结果明细', '周报内容', '创建时间', '更新时间'];
    const aoa = [headers];
    list.forEach(r => {
      const snap = r.visitSnapshot || {};
      const snapStr = formatVisitSnapshotDetail(snap);
      aoa.push([
        r.weekLabel || (r.weekStart + ' ~ ' + r.weekEnd),
        r.department || '',
        r.userName || '未知',
        snap.total || 0,
        snapStr,
        (r.content || ''),
        (r.createdAt || '').replace('T', ' ').slice(0, 16),
        (r.updatedAt || '').replace('T', ' ').slice(0, 16)
      ]);
    });
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    // 「周报内容」列（第 6 列，索引 5）设置自动换行 + 顶对齐
    const contentCol = 5;
    const range = XLSX.utils.decode_range(ws['!ref']);
    for (let R = range.s.r; R <= range.e.r; R++) {
      const addr = XLSX.utils.encode_cell({ r: R, c: contentCol });
      if (!ws[addr]) ws[addr] = { t: 's', v: '' };
      ws[addr].s = ws[addr].s || {};
      ws[addr].s.alignment = Object.assign(ws[addr].s.alignment || {}, { wrapText: true, vertical: 'top' });
    }
    // 设置列宽（周报内容列较宽，便于换行阅读）
    ws['!cols'] = [
      { wch: 18 }, { wch: 12 }, { wch: 10 }, { wch: 10 }, { wch: 32 }, { wch: 60 }, { wch: 18 }, { wch: 18 }
    ];
    // 表头加粗
    for (let C = range.s.c; C <= range.e.c; C++) {
      const addr = XLSX.utils.encode_cell({ r: range.s.r, c: C });
      if (ws[addr]) ws[addr].s = Object.assign(ws[addr].s || {}, { font: { bold: true }, alignment: { vertical: 'center' } });
    }
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '管理周报');
    XLSX.writeFile(wb, '管理周报_' + _tag + '.xlsx');
    showToast('已导出 ' + list.length + ' 条周报');
  };
  if (typeof XLSX === 'undefined') {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
    s.onload = doExport;
    s.onerror = () => showToast('表格组件加载失败，请重试', 'error');
    document.body.appendChild(s);
  } else {
    doExport();
  }
}

function switchVisitStatsTab(tab, el) {
  visitStatsTab = tab;
  document.querySelectorAll('.visit-stats-tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  loadVisitStats();
}

function setVisitDateRange(type, btn) {
  const now = new Date();
  let start, end;
  const todayStr = localYMD(now);
  if (type === 'yesterday') {
    const y = new Date(now); y.setDate(y.getDate() - 1);
    start = end = localYMD(y);
  } else if (type === 'thisWeek') {
    const day = now.getDay() || 7;
    const monday = new Date(now); monday.setDate(monday.getDate() - day + 1);
    start = localYMD(monday); end = todayStr;
  } else if (type === 'lastWeek') {
    const day = now.getDay() || 7;
    const monday = new Date(now); monday.setDate(monday.getDate() - day + 1 - 7);
    const sunday = new Date(monday); sunday.setDate(sunday.getDate() + 6);
    start = localYMD(monday); end = localYMD(sunday);
  } else if (type === 'thisMonth') {
    start = localYMD(new Date(now.getFullYear(), now.getMonth(), 1)); end = todayStr;
  } else if (type === 'thisYear') {
    start = localYMD(new Date(now.getFullYear(), 0, 1)); end = todayStr;
  }
  if (start) document.getElementById('visitStatsStart').value = start;
  if (end) document.getElementById('visitStatsEnd').value = end;
  if (btn) {
    document.querySelectorAll('#visitDateBtns button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  loadVisitStats();
}

function loadVisitStats() {
  const s = document.getElementById('visitStatsStart')?.value || '';
  const e = document.getElementById('visitStatsEnd')?.value || '';
  let records = cloudData.visitRecords.filter(r => {
    const d = normContactTime(r.contactTime).split(' ')[0];
    return (!s || d >= s) && (!e || d <= e);
  });
  const c = document.getElementById('visitStatsResults');
  if (!records.length) {
    c.innerHTML = '<div class="empty-state"><div class="icon">📭</div>暂无拜访数据</div>';
    return;
  }
  const vc = getVisitConfig();
  const allResults = vc.visitResults || [];
  const totalVisits = records.length;
  const totalResulted = records.filter(r => r.visitResult).length;
  const colors = ['#2563eb','#16a34a','#f59e0b','#dc2626','#7c3aed','#0891b2','#db2777','#4f46e5'];
  // ===== 全部汇总 =====
  let summaryCards = `<div style="text-align:center;padding:14px;background:var(--gray-50);border-radius:8px"><div style="font-size:24px;font-weight:700;color:var(--primary)">${totalVisits}</div><div style="font-size:12px;color:var(--gray-500)">总拜访数</div></div>`;
  summaryCards += `<div style="text-align:center;padding:14px;background:var(--gray-50);border-radius:8px"><div style="font-size:24px;font-weight:700;color:var(--success)">${totalResulted}</div><div style="font-size:12px;color:var(--gray-500)">已标记结果</div></div>`;
  allResults.forEach((result, idx) => {
    const count = records.filter(r => r.visitResult === result).length;
    const pct = totalVisits > 0 ? (count / totalVisits * 100).toFixed(1) : '0';
    const color = colors[idx % colors.length];
    summaryCards += `<div style="text-align:center;padding:14px;background:var(--gray-50);border-radius:8px"><div style="font-size:24px;font-weight:700;color:${color}">${count}</div><div style="font-size:12px;color:var(--gray-500)">${result} (${pct}%)</div></div>`;
  });
  const unmarked = totalVisits - totalResulted;
  summaryCards += `<div style="text-align:center;padding:14px;background:var(--gray-50);border-radius:8px"><div style="font-size:24px;font-weight:700;color:var(--gray-400)">${unmarked}</div><div style="font-size:12px;color:var(--gray-500)">未标记</div></div>`;
  let summaryHtml = `<div class="card" style="margin-bottom:16px"><div class="card-header"><h4>📋 全部汇总（${s || '全部'} 至 ${e || '全部'}）</h4></div><div class="card-body"><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px">${summaryCards}</div></div></div>`;
  // ===== 按部门→拜访结果分组（矩阵表：行=拜访结果，列=部门，最后一列=汇总） =====
  const deptGroups = {};
  records.forEach(r => {
    const dept = canonDept(r.department || '未分组');
    if (!deptGroups[dept]) deptGroups[dept] = [];
    deptGroups[dept].push(r);
  });
  const depts = Object.keys(deptGroups).sort();
  const resultLabels = [...allResults, '未标记'];
  const countMap = {};
  resultLabels.forEach(res => { countMap[res] = {}; depts.forEach(dept => { countMap[res][dept] = 0; }); });
  records.forEach(r => {
    const dept = canonDept(r.department || '未分组');
    const res = r.visitResult || '未标记';
    if (countMap[res] && countMap[res][dept] !== undefined) countMap[res][dept]++;
  });
  const deptTotals = {};
  depts.forEach(dept => { deptTotals[dept] = deptGroups[dept].length; });
  const resultTotals = {};
  resultLabels.forEach(res => {
    resultTotals[res] = depts.reduce((sum, dept) => sum + countMap[res][dept], 0);
  });
  const grandTotal = records.length;
  const dColors = ['#2563eb','#16a34a','#f59e0b','#dc2626','#7c3aed','#0891b2','#db2777','#4f46e5'];
  // 矩阵表主体
  const matrixRows = resultLabels.filter(res => resultTotals[res] > 0).map(res => {
    const kColor = res === '未标记' ? 'var(--gray-400)' : (colors[allResults.indexOf(res) % colors.length] || 'var(--primary)');
    const deptCells = depts.map((dept, idx) => {
      const val = countMap[res][dept];
      const color = dColors[idx % dColors.length];
      return `<td style="text-align:center;${val ? 'font-weight:600;color:' + color : 'color:var(--gray-300)'}">${val || '-'}</td>`;
    }).join('');
    return `<tr>
      <td style="min-width:140px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${kColor};margin-right:6px"></span><strong>${res}</strong></td>
      ${deptCells}
      <td style="text-align:center;font-weight:700;background:var(--gray-50)">${resultTotals[res]}</td>
    </tr>`;
  }).join('');
  const totalRow = `<tr style="font-weight:700;background:var(--gray-100);border-top:2px solid var(--gray-300)">
    <td>汇总</td>
    ${depts.map(dept => `<td style="text-align:center">${deptTotals[dept]}</td>`).join('')}
    <td style="text-align:center;background:var(--primary-light);color:var(--primary)">${grandTotal}</td>
  </tr>`;
  const groupHtml = `<div class="card" style="margin-bottom:16px;overflow:hidden">
    <div class="card-header" style="background:var(--gray-50)">
      <h4 style="font-size:15px;margin:0">🏢 各团队拜访卡点汇总</h4>
    </div>
    <div class="card-body" style="padding:16px">
      <div class="table-wrap">
        <table style="font-size:13px;min-width:${220 + depts.length * 110}px">
          <thead>
            <tr>
              <th style="min-width:140px">拜访结果</th>
              ${depts.map(dept => `<th style="text-align:center;min-width:110px">${dept}</th>`).join('')}
              <th style="text-align:center;min-width:80px">汇总</th>
            </tr>
          </thead>
          <tbody>
            ${matrixRows}
            ${totalRow}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
  if (visitStatsTab === 'person') {
    c.innerHTML = renderPersonVisitStats(records, s, e);
  } else if (visitStatsTab === 'teamType') {
    c.innerHTML = renderTeamTypeVisitStats(records, s, e);
  } else {
    // 捕获导出数据（拜访结果 × 部门矩阵）
    const tcHeaders = ['拜访结果', ...depts, '汇总'];
    const tcRows = [];
    resultLabels.filter(res => resultTotals[res] > 0).forEach(res => {
      tcRows.push([res, ...depts.map(dept => countMap[res][dept]), resultTotals[res]]);
    });
    tcRows.push(['汇总', ...depts.map(dept => deptTotals[dept]), grandTotal]);
    window.__teamCardExport = { s, e, headers: tcHeaders, rows: tcRows };
    const exportBar = `<div style="text-align:right;margin-bottom:12px"><button class="btn btn-sm btn-outline" onclick="exportTeamCardCsv()">⬇️ 导出筛选结果</button></div>`;
    c.innerHTML = exportBar + summaryHtml + groupHtml;
  }
}

// ===== 拜访统计导出工具 =====
function escCsv(v){ v = v==null ? '' : String(v); return /[",\n\r]/.test(v) ? '"' + v.replace(/"/g,'""') + '"' : v; }
function downloadCsv(filename, headers, rows){
  const csv = '﻿' + [headers, ...rows].map(r => r.map(escCsv).join(',')).join('\r\n');
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast('已导出：' + filename, 'success');
}
function visitExportFilename(tabLabel, tableLabel, s, e){
  const cond = (s && e) ? (s + '至' + e) : '全部区间';
  return '拜访统计_' + tabLabel + '_' + tableLabel + '_' + cond + '.csv';
}
function exportVisitTable(mode, kind){

  const tabLabel = mode === 'person' ? '个人拜访类型统计' : '团队拜访类型统计';

}
function exportTeamCardCsv(){

  if (!d) { showToast('请先渲染团队拜访卡点统计再导出', 'warning'); return; }

}

function computeSigninEvents() {
  const categories = getSigninCategories();
  const evSet = new Set();
  categories.forEach(cat => (cat.events || []).forEach(ev => { if (ev && ev.trim()) evSet.add(ev.trim()); }));
  cloudData.visitRecords.forEach(r => { const ev = (r.signinEvent || '').trim(); if (ev) evSet.add(ev); });
  const catOrder = {}; categories.forEach((c, i) => { catOrder[c.name] = i; });
  const eventToCat = {};
  categories.forEach(cat => (cat.events || []).forEach(ev => { if (ev) eventToCat[ev.trim()] = cat.name; }));
  const all = [...evSet];
  return all.slice().sort((a, b) => {
    const ca = catOrder[eventToCat[a]] !== undefined ? catOrder[eventToCat[a]] : 999;
    const cb = catOrder[eventToCat[b]] !== undefined ? catOrder[eventToCat[b]] : 999;
    if (ca !== cb) return ca - cb;
    return a.localeCompare(b, 'zh');
  });
}

// 个人 / 团队 拜访类型统计入口（复用同一渲染核心）
function renderPersonVisitStats(records, s, e) { return renderGroupedVisitStats(records, s, e, 'person'); }
function renderTeamTypeVisitStats(records, s, e) { return renderGroupedVisitStats(records, s, e, 'team'); }

// 拜访类型统计通用渲染：mode='person' 按人员分组；mode='team' 按团队/部门分组
// 表格形式 —— 主体竖排（行）、签到事件横排（列），同结构再出一张按归类的汇总表
// 两张表各自维护独立的排序状态（visitTableSort[mode+'_events'] / [mode+'_cats']）
function renderGroupedVisitStats(records, s, e, mode) {
  const isTeam = mode === 'team';
  const unitLabel = isTeam ? '团队 / 部门' : '人员 / 部门';
  const unitName = isTeam ? '团队' : '人员';
  const categories = getSigninCategories();
  const catColorMap = { '自拓演示': '#16a34a', '线索演示': '#2563eb', '其他': '#f59e0b', '未归类': '#9ca3af' };
  const eventToCat = {};
  categories.forEach(cat => (cat.events || []).forEach(ev => { if (ev) eventToCat[ev.trim()] = cat.name; }));
  // 事件列（按归类默认排序，列顺序固定；排序针对行）
  const events = computeSigninEvents();
  // 按 人员 / 团队 分组
  const byEmp = {};
  records.forEach(r => {
    const emp = isTeam ? canonDept(r.department || '未分组') : (r.employee || '未知');
    if (!byEmp[emp]) byEmp[emp] = { records: [], dept: isTeam ? '' : (r.department || '') };
    byEmp[emp].records.push(r);
  });
  const emps = Object.keys(byEmp).sort();
  if (!emps.length) return '<div class="empty-state"><div class="icon">📭</div>暂无拜访数据</div>';

  // ===== 矩阵：员工 × 签到事件 =====
  const matrix = {};
  emps.forEach(emp => {
    const m = {}; events.forEach(ev => m[ev] = 0);
    byEmp[emp].records.forEach(r => { const ev = (r.signinEvent || '').trim(); if (ev && m[ev] !== undefined) m[ev]++; });
    matrix[emp] = m;
  });
  const colTotals = {}; events.forEach(ev => colTotals[ev] = 0);
  const rowTotals = {};
  emps.forEach(emp => {
    let t = 0; events.forEach(ev => { t += matrix[emp][ev]; colTotals[ev] += matrix[emp][ev]; });
    rowTotals[emp] = t;
  });
  const grandTotal = emps.reduce((acc, emp) => acc + rowTotals[emp], 0);

  // ===== 矩阵：员工 × 归类 =====
  const usedCats = new Set();
  emps.forEach(emp => byEmp[emp].records.forEach(r => {
    const ev = (r.signinEvent || '').trim();
    const cat = ev ? (eventToCat[ev] || '未归类') : '未归类';
    usedCats.add(cat);
  }));
  const catNames = [...new Set([...categories.map(c => c.name), ...usedCats])];
  const catMatrix = {};
  emps.forEach(emp => {
    const m = {}; catNames.forEach(c => m[c] = 0);
    byEmp[emp].records.forEach(r => {
      const ev = (r.signinEvent || '').trim();
      const cat = ev ? (eventToCat[ev] || '未归类') : '未归类';
      m[cat] = (m[cat] || 0) + 1;
    });
    catMatrix[emp] = m;
  });
  const catTotals = {}; catNames.forEach(c => catTotals[c] = 0);
  const catRowTotals = {};
  emps.forEach(emp => {
    let t = 0; catNames.forEach(c => { t += catMatrix[emp][c] || 0; catTotals[c] += catMatrix[emp][c] || 0; });
    catRowTotals[emp] = t;
  });
  const catGrand = emps.reduce((a, emp) => a + catRowTotals[emp], 0);

  // ===== 各自独立的排序状态 =====
  const st1 = visitTableSort[mode + '_events'] || { key:'__total__', dir:'desc' };
  const st2 = visitTableSort[mode + '_cats'] || { key:'__total__', dir:'desc' };
  const sortVal1 = (emp) => { if (st1.key === '__total__') return rowTotals[emp] || 0; return matrix[emp][st1.key] || 0; };
  const sortVal2 = (emp) => { if (st2.key === '__total__') return catRowTotals[emp] || 0; return catMatrix[emp][st2.key] || 0; };
  const display1 = [...emps].sort((a, b) => st1.dir === 'desc' ? (sortVal1(b) - sortVal1(a)) : (sortVal1(a) - sortVal1(b)));
  const display2 = [...emps].sort((a, b) => st2.dir === 'desc' ? (sortVal2(b) - sortVal2(a)) : (sortVal2(a) - sortVal2(b)));

  // ===== 表1：按签到事件（主体竖排 × 事件横排）=====
  const thCells = events.map(ev => {
    const cat = eventToCat[ev];
    const color = cat ? (catColorMap[cat] || '#6366f1') : '#6366f1';
    const evJson = JSON.stringify(ev);
    const active = st1.key === ev;
    return `<th style="text-align:center;white-space:nowrap;font-size:12px;padding:8px 10px">
      <div>${ev}</div>
      <div style="font-size:10px;color:${color};font-weight:400;margin-bottom:2px">${cat || '—'}</div>
      <div style="display:flex;justify-content:center;gap:2px">
        <button onclick='setVisitSort("${mode}","events",${evJson},"asc")' title="按此列升序" style="border:1px solid #e5e7eb;background:#fff;border-radius:4px;cursor:pointer;font-size:10px;line-height:1.4;padding:1px 5px;color:${active && st1.dir === 'asc' ? '#16a34a' : '#6b7280'}">▲</button>
        <button onclick='setVisitSort("${mode}","events",${evJson},"desc")' title="按此列降序" style="border:1px solid #e5e7eb;background:#fff;border-radius:4px;cursor:pointer;font-size:10px;line-height:1.4;padding:1px 5px;color:${active && st1.dir === 'desc' ? '#dc2626' : '#6b7280'}">▼</button>
      </div>
    </th>`;
  }).join('');
  const bodyRows1 = display1.map(emp => {
    const cells = events.map(ev => `<td style="text-align:center;padding:6px 8px">${matrix[emp][ev] || ''}</td>`).join('');
    const label = byEmp[emp].dept ? `${emp}<br><span style="font-size:11px;color:var(--gray-500);font-weight:400">${byEmp[emp].dept}</span>` : emp;
    return `<tr>
      <td style="white-space:nowrap;font-weight:600;padding:8px 10px">${label}</td>
      ${cells}
      <td style="text-align:center;font-weight:700;background:var(--gray-50);padding:6px 8px">${rowTotals[emp]}</td>
    </tr>`;
  }).join('');
  const totalRow1 = `<tr style="font-weight:700;background:var(--gray-50)">
    <td style="padding:8px 10px">合计</td>
    ${events.map(ev => `<td style="text-align:center;padding:6px 8px">${colTotals[ev]}</td>`).join('')}
    <td style="text-align:center;padding:6px 8px">${grandTotal}</td>
  </tr>`;
  const table1 = `<div class="card" style="margin-bottom:20px;overflow:hidden">
    <div class="card-header" style="padding:12px 16px;background:var(--gray-50);display:flex;align-items:center;justify-content:space-between;gap:10px">
      <h4 style="margin:0;font-size:15px">📌 按签到事件统计（${unitName}竖排 × 事件横排）</h4>
      <button class="btn btn-sm btn-outline" onclick="exportVisitTable('${mode}','events')">⬇️ 导出</button>
    </div>
    <div class="card-body" style="padding:16px">
      <div class="table-wrap"><table style="font-size:13px;min-width:100%;border-collapse:collapse">
        <thead><tr style="background:var(--gray-50)">
          <th style="text-align:left;padding:8px 10px">${unitLabel}</th>${thCells}<th style="text-align:center;white-space:nowrap;padding:8px 10px">合计
            <div style="display:flex;justify-content:center;gap:2px;margin-top:2px">
              <button onclick='setVisitSort("${mode}","events","__total__","asc")' title="按合计升序" style="border:1px solid #e5e7eb;background:#fff;border-radius:4px;cursor:pointer;font-size:10px;line-height:1.4;padding:1px 5px;color:${st1.key==='__total__'&&st1.dir==='asc'?'#16a34a':'#6b7280'}">▲</button>
              <button onclick='setVisitSort("${mode}","events","__total__","desc")' title="按合计降序" style="border:1px solid #e5e7eb;background:#fff;border-radius:4px;cursor:pointer;font-size:10px;line-height:1.4;padding:1px 5px;color:${st1.key==='__total__'&&st1.dir==='desc'?'#dc2626':'#6b7280'}">▼</button>
            </div>
          </th>
        </tr></thead>
        <tbody>${bodyRows1}${totalRow1}</tbody>
      </table></div>
    </div></div>`;

  // ===== 表2：按归类（主体竖排 × 归类横排）=====
  const catTh = catNames.map(c => {
    const cJson = JSON.stringify(c);
    const active = st2.key === c;
    return `<th style="text-align:center;white-space:nowrap;padding:8px 10px;color:${catColorMap[c] || '#6366f1'}">${c}
      <div style="display:flex;justify-content:center;gap:2px;margin-top:2px">
        <button onclick='setVisitSort("${mode}","cats",${cJson},"asc")' title="按此列升序" style="border:1px solid #e5e7eb;background:#fff;border-radius:4px;cursor:pointer;font-size:10px;line-height:1.4;padding:1px 5px;color:${active && st2.dir === 'asc' ? '#16a34a' : '#6b7280'}">▲</button>
        <button onclick='setVisitSort("${mode}","cats",${cJson},"desc")' title="按此列降序" style="border:1px solid #e5e7eb;background:#fff;border-radius:4px;cursor:pointer;font-size:10px;line-height:1.4;padding:1px 5px;color:${active && st2.dir === 'desc' ? '#dc2626' : '#6b7280'}">▼</button>
      </div>
    </th>`;
  }).join('');
  const catBody2 = display2.map(emp => {
    const cells = catNames.map(c => {
      const v = catMatrix[emp][c] || 0;
      const color = catColorMap[c] || '#6366f1';
      return `<td style="text-align:center;padding:6px 8px${v ? ';color:' + color + ';font-weight:600' : ''}">${v || ''}</td>`;
    }).join('');
    return `<tr>
      <td style="white-space:nowrap;font-weight:600;padding:8px 10px">${emp}</td>
      ${cells}
      <td style="text-align:center;font-weight:700;background:var(--gray-50);padding:6px 8px">${catRowTotals[emp]}</td>
    </tr>`;
  }).join('');
  const catTotalRow2 = `<tr style="font-weight:700;background:var(--gray-50)">
    <td style="padding:8px 10px">合计</td>
    ${catNames.map(c => `<td style="text-align:center;padding:6px 8px">${catTotals[c]}</td>`).join('')}
    <td style="text-align:center;padding:6px 8px">${catGrand}</td>
  </tr>`;
  const table2 = `<div class="card" style="margin-bottom:20px;overflow:hidden">
    <div class="card-header" style="padding:12px 16px;background:var(--gray-50);display:flex;align-items:center;justify-content:space-between;gap:10px">
      <h4 style="margin:0;font-size:15px">🗂️ 签到事件归类汇总（${unitName}竖排 × 归类横排）</h4>
      <button class="btn btn-sm btn-outline" onclick="exportVisitTable('${mode}','cats')">⬇️ 导出</button>
    </div>
    <div class="card-body" style="padding:16px">
      <div class="table-wrap"><table style="font-size:13px;min-width:100%;border-collapse:collapse">
        <thead><tr style="background:var(--gray-50)">
          <th style="text-align:left;padding:8px 10px">${unitName}</th>${catTh}<th style="text-align:center;white-space:nowrap;padding:8px 10px">合计
            <div style="display:flex;justify-content:center;gap:2px;margin-top:2px">
              <button onclick='setVisitSort("${mode}","cats","__total__","asc")' title="按合计升序" style="border:1px solid #e5e7eb;background:#fff;border-radius:4px;cursor:pointer;font-size:10px;line-height:1.4;padding:1px 5px;color:${st2.key==='__total__'&&st2.dir==='asc'?'#16a34a':'#6b7280'}">▲</button>
              <button onclick='setVisitSort("${mode}","cats","__total__","desc")' title="按合计降序" style="border:1px solid #e5e7eb;background:#fff;border-radius:4px;cursor:pointer;font-size:10px;line-height:1.4;padding:1px 5px;color:${st2.key==='__total__'&&st2.dir==='desc'?'#dc2626':'#6b7280'}">▼</button>
            </div>
          </th>
        </tr></thead>
        <tbody>${catBody2}${catTotalRow2}</tbody>
      </table></div>
    </div></div>`;

  // 捕获导出数据（含当前筛选区间 + 当前排序后的行顺序）
  window.__visitExport = {
    mode, s, e,
    events: {
      label: '按签到事件',
      headers: [unitLabel, ...events, '合计'],
      rows: display1.map(emp => [ byEmp[emp].dept ? `${emp}（${byEmp[emp].dept}）` : emp, ...events.map(ev => matrix[emp][ev] || ''), rowTotals[emp] ])
    },
    cats: {
      label: '按归类汇总',
      headers: [unitName, ...catNames, '合计'],
      rows: display2.map(emp => [ emp, ...catNames.map(c => catMatrix[emp][c] || ''), catRowTotals[emp] ])
    }
  };

  const introTitle = isTeam ? `团队拜访类型统计（按团队/部门，共 ${emps.length} 个）` : `个人拜访类型统计（按人员，共 ${emps.length} 人）`;
  const intro = `<div style="font-size:13px;color:var(--gray-500);margin-bottom:12px">${introTitle} · ${s || '全部'} 至 ${e || '全部'}<span style="margin-left:8px;color:var(--gray-400)">提示：点击事件列 / 归类列 / 合计列的 ▲▼，可按该列数值对${unitName}行升/降序排列（两张表独立排序，自动保存，当前排序列高亮）</span></div>`;
  return intro + table1 + table2;
}

// ============ Utils ============
// 本地时区日期 YYYY-MM-DD（修复 GMT+8 凌晨用 toISOString() 得到 UTC 日期差一天的问题）
function localYMD(d){ d = d || new Date(); const off = d.getTimezoneOffset()*60000; return new Date(d.getTime()-off).toISOString().split('T')[0]; }
// 快捷日期范围：用于拜访数据筛选栏（今天/昨天/本周/上周/本月/上月/今年），以周一为周起始
function getQuickDateRange(type){
  const now = new Date();
  const today = localYMD(now);
  const ymd = (d) => localYMD(d);
  if (type === 'today') return { start: today, end: today };
  if (type === 'yesterday') { const d = new Date(now.getTime()-86400000); const y = ymd(d); return { start: y, end: y }; }
  const year = now.getFullYear();
  const month = now.getMonth();
  if (type === 'thisMonth') { const start = ymd(new Date(year, month, 1)); const end = ymd(new Date(year, month+1, 0)); return { start, end }; }
  if (type === 'lastMonth') { const start = ymd(new Date(year, month-1, 1)); const end = ymd(new Date(year, month, 0)); return { start, end }; }
  if (type === 'thisYear') { const start = ymd(new Date(year, 0, 1)); const end = ymd(new Date(year, 11, 31)); return { start, end }; }
  const day = now.getDay(); // 0=Sun,1=Mon,...,6=Sat
  const mondayOffset = day === 0 ? -6 : 1 - day;
  const monday = new Date(year, month, now.getDate() + mondayOffset);
  if (type === 'thisWeek') { const sunday = new Date(monday.getTime()+6*86400000); return { start: ymd(monday), end: ymd(sunday) }; }
  if (type === 'lastWeek') { const lastMonday = new Date(monday.getTime()-7*86400000); const lastSunday = new Date(monday.getTime()-1*86400000); return { start: ymd(lastMonday), end: ymd(lastSunday) }; }
  return { start: '', end: '' };
}
function applyVisitQuickDateFilter(sel){
  const type = sel?.value;
  if (!type) return;
  const range = getQuickDateRange(type);
  const startInput = document.getElementById('visitFStart');
  const endInput = document.getElementById('visitFEnd');
  if (startInput) startInput.value = range.start;
  if (endInput) endInput.value = range.end;
  resetVisitPage();
}
// 联系时间规范化：把 CSV 的 `2026/07/10 15:56` / `2026.07.10` / `2026年07月10日` 等统一成 `2026-07-10 15:56`
// 解决斜杠格式导致日期筛选/排序/统计判断错误的问题（部分 CSV 直接以斜杠导出）
function normContactTime(s){
  if(!s) return '';
  const parts=String(s).trim().split(/[\sT]/);
  let datePart=parts[0]||'';
  const timePart=parts[1]||'';
  // 先把中文/斜杠/点/混合分隔统一成 -（如 2026/07/10 或 2026年07月10日 或 2026.7.2）
  datePart=datePart.replace(/[^\d]/g,'-').replace(/-+/g,'-').replace(/^-+|-+$/g,'');
  // 按年/月/日拆分并补零：年 4 位，月/日 2 位
  const dp = datePart.split('-').filter(Boolean).map((v,i) => v.padStart(i===0?4:2,'0'));
  if(dp.length>=3) datePart = `${dp[0]}-${dp[1]}-${dp[2]}`;
  return (datePart+(timePart?' '+timePart:'')).trim();
}
function getWeekStart(){const n=new Date(),d=n.getDay()||7;const m=new Date(n);m.setDate(n.getDate()-d+1);return localYMD(m)}
function getWeekEnd(s){if(!s)return'';const d=new Date(s);d.setDate(d.getDate()+6);return localYMD(d)}
function getLastWeekStart(){const n=new Date(),d=n.getDay()||7;const m=new Date(n);m.setDate(n.getDate()-d-6);return localYMD(m)}

// Group missing users by department and render compact HTML
function renderMissingGrouped(missingUsers) {
  if (!missingUsers || missingUsers.length === 0) return '';
  // Group by department
  const groups = {};
  missingUsers.forEach(u => {
    const dept = u.department || '未分组';
    if (!groups[dept]) groups[dept] = [];
    groups[dept].push(u.name);
  });
  // Sort departments alphabetically
  const sortedDepts = Object.keys(groups).sort();
  return sortedDepts.map(dept => {
    const names = groups[dept];
    return `<div class="missing-group" style="margin-bottom:10px;display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap">
      <span style="font-weight:700;font-size:13px;color:var(--gray-700);background:var(--gray-100);padding:4px 10px;border-radius:6px;white-space:nowrap;flex-shrink:0">📍 ${dept}</span>
      <div class="missing-names" style="display:flex;flex-wrap:wrap;gap:6px">
        ${names.map(n => `<span class="missing-name" style="font-size:13px;font-weight:600;color:var(--danger);background:var(--danger-light);border:1px solid #fecaca;padding:3px 10px;border-radius:14px;white-space:nowrap">⚠️ ${n}</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}

  const countdownEl = document.getElementById('loadingCountdown');
  const stepEl = document.getElementById('loadingStepText');
  loadingTimer = setInterval(() => {
    const elapsed = (Date.now() - startTime) / 1000;
    const progress = Math.min(90, (elapsed / estSeconds) * 90);
    if (progressEl) progressEl.style.width = progress.toFixed(1) + '%';
    const step = LOADING_STEPS.filter(s => progress >= s.at).pop();
    if (step && stepEl) stepEl.textContent = step.text;
    const remaining = Math.max(0, Math.ceil(estSeconds - elapsed));
    if (countdownEl) countdownEl.textContent = remaining > 0 ? '预计还需 ' + remaining + ' 秒' : '即将完成...';
  }, 100);
}

function finishLoadingCountdown() {
  if (loadingTimer) { clearInterval(loadingTimer); loadingTimer = null; }
  const progressEl = document.getElementById('loadingProgress');
  const countdownEl = document.getElementById('loadingCountdown');
  const stepEl = document.getElementById('loadingStepText');
  if (progressEl) progressEl.style.width = '100%';
  if (stepEl) stepEl.textContent = '加载完成！';
  if (countdownEl) countdownEl.textContent = '';
}

async function importSalesFile(file) {
  if (typeof XLSX === 'undefined') { showToast('表格解析库未加载，请刷新页面后重试', 'error', 4000); return; }
  try {
    showImportOverlay('正在解析表格…');
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array', cellDates: true });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
    if (!rows.length) { showToast('文件无数据', 'error'); return; }
    const headers = Object.keys(rows[0]);
    if (!headers.includes('销售员所属门店')) {
      showToast('表头校验失败：缺少必需列「销售员所属门店」', 'error', 5000);
      return;
    }
    const get = (r, name) => (r[name] == null ? '' : r[name]);
    // 查重 key = 商品名称(A列) + '|' + 单据编号(W列)；仅当「商品名称」与「单据编号」两者都相同才判定为重复并过滤（避免同一单据多商品行被误删）
    const _dupKey = e => ((e.productName || '') + '|' + (e.docNo || '')).trim();
    const existingKeys = new Set(cloudData.salesRecords.map(_dupKey).filter(Boolean));
    const batchKeys = new Set();
    let total = rows.length, kept = 0, filtered = 0, dup = 0;
    const corrected = { 'KA 一部（江浙沪区域）': 0, 'KA 二部（广东区域）': 0, 'KA 三部（全国区域）': 0 };
    const toAdd = [];
    for (const r of rows) {
      const storeRaw = String(get(r, '销售员所属门店') || '').trim();
      if (!storeRaw.startsWith('KA-')) { filtered++; continue; }
      const team = SALES_STORE_CORRECTION[storeRaw] || storeRaw;
      corrected[team] = (corrected[team] || 0) + 1;
      const docNo = String(get(r, '单据编号') || '').trim();
      const productName = String(get(r, '商品名称') || '').trim();
      const key = productName + '|' + docNo;
      if (existingKeys.has(key) || batchKeys.has(key)) { dup++; continue; }
      batchKeys.add(key);
      const docDate = String(get(r, '单据日期') || '');
      const rec = {
        id: genId(),
        salesperson: String(get(r, '销售员') || '').trim(),
        storeRaw: storeRaw,
        team: team,
        docDate: docDate,
        docMonth: salesMonthOf(docDate),
        amount: toNum(get(r, '折后金额')),
        grossProfit: toNum(get(r, '毛利润')),
        productName: String(get(r, '商品名称') || '').trim(),
        docNo: docNo,
        docType: String(get(r, '单据类别') || '').trim(),
        status: String(get(r, '状态') || '').trim(),
        customer: String(get(r, '客户') || '').trim(),
        // 客户来源/品类/客户画像：不允许自动填充，留空由用户在「客户汇总数据」手动选择配置项
        customerSource: '',
        category: '',
        customerProfile: '',
        raw: r,
        createdAt: new Date().toISOString()
      };
      toAdd.push(rec);
      kept++;
    }
    if (toAdd.length) {
      for (let i = 0; i < toAdd.length; i++) {
        await apiCreate('salesRecords', toAdd[i]);
        updateImportOverlay('正在写入业绩数据…', `第 ${i + 1} / ${toAdd.length} 条`);
      }
      cloudData.salesRecords = cloudData.salesRecords.concat(toAdd);
      saveReportsCache();
    }
    hideImportOverlay();
    salesDetailPage = 1;
    showModal('导入完成', `<div class="import-note">
      <div>📄 文件共 <b>${total}</b> 行</div>
      <div>🔽 过滤非 KA 部门整行：<span class="no">${filtered}</span> 行</div>
      <div>✅ 保留 KA 部门：<span class="ok">${kept}</span> 行</div>
      <div>⚠️ 跳过重复：<span class="no">${dup}</span> 行</div>
      <div>🔄 门店校正：一部 ×${corrected['KA 一部（江浙沪区域）'] || 0} / 二部 ×${corrected['KA 二部（广东区域）'] || 0} / 三部 ×${corrected['KA 三部（全国区域）'] || 0}</div>
    </div><div class="modal-footer"><button class="btn btn-primary" onclick="closeModal()">确定</button></div>`);
    renderSalesDetail();
  } catch (e) {
    hideImportOverlay();
    showToast('导入失败：' + e.message, 'error', 5000);
  }
}

async function saveSalesRecord(e, id) {
  e.preventDefault();
  const docDate = document.getElementById('sDocDate').value;
  const team = document.getElementById('sTeam').value;
  const rec = {
    salesperson: document.getElementById('sSalesperson').value.trim(),
    storeRaw: team,
    team: team,
    docDate: docDate,
    docMonth: salesMonthOf(docDate),
    amount: toNum(document.getElementById('sAmount').value),
    grossProfit: toNum(document.getElementById('sGross').value),
    productName: document.getElementById('sProduct').value.trim(),
    docNo: document.getElementById('sDocNo').value.trim(),
    docType: document.getElementById('sDocType').value.trim(),
    status: document.getElementById('sStatus').value.trim(),
    customer: document.getElementById('sCustomer').value.trim()
  };
  try {
    if (id) {
      rec.id = id;
      await apiUpdate('salesRecords', id, rec);
      const i = cloudData.salesRecords.findIndex(x => x.id === id);
      if (i >= 0) cloudData.salesRecords[i] = { ...cloudData.salesRecords[i], ...rec };
    } else {
      rec.id = genId();
      rec.createdAt = new Date().toISOString();
      await apiCreate('salesRecords', rec);
      cloudData.salesRecords.push(rec);
    }
    saveReportsCache();
    closeModal();
    renderSalesDetail();
    showToast('保存成功', 'success');
  } catch (err) { showToast('保存失败: ' + err.message, 'error'); }
  return false;
}

async function deleteSalesRecord(id) {
  if (!confirm('确定删除该业绩记录？')) return;
  try {
    await apiDelete('salesRecords', id);
    cloudData.salesRecords = cloudData.salesRecords.filter(x => x.id !== id);
    saveReportsCache();
    renderSalesDetail();
    showToast('已删除', 'success');
  } catch (e) { showToast('删除失败: ' + e.message, 'error'); }
}

async function renderSalesDetail() {

  const meaningful = cloudData.salesRecords.filter(r => !isBlankSalesRecord(r));
  const blankCount = cloudData.salesRecords.length - meaningful.length;
  // 筛选
  const base = meaningful.filter(r => {
    const d = (r.docDate || '');
    if (f.start && d && d < f.start) return false;
    if (f.end && d && d > f.end) return false;
    if (f.team && (r.team || '') !== f.team) return false;
    if (f.salesperson && (r.salesperson || '') !== f.salesperson) return false;
    if (f.customer) { const c = (r.customer || '').toLowerCase(); if (!c.includes(f.customer.toLowerCase())) return false; }

  const all = base.slice().sort((a, b) => (b.docDate || '').localeCompare(a.docDate || ''));

    return map[cn] || 99;
  };
  const allYears = Object.keys(byYear).sort((a, b) => b.localeCompare(a));

async function cleanupBlankSalesRecords() {
  const blanks = cloudData.salesRecords.filter(r => isBlankSalesRecord(r) && r.id);
  if (!blanks.length) { showToast('没有可清理的空白记录', 'success'); return; }
  if (!confirm(`确定删除 ${blanks.length} 条空白记录吗？这些记录没有销售员、团队、日期、客户、单据编号且金额为 0，删除后不可恢复。`)) return;
  let ok = 0, fail = 0;
  for (let i = 0; i < blanks.length; i++) {
    const r = blanks[i];
    try {
      await apiDelete('salesRecords', r.id);
      ok++;
    } catch (e) { fail++; }
    if (i % 50 === 49) showToast(`正在清理空白记录… ${i + 1} / ${blanks.length}`, 'info');
  }
  cloudData.salesRecords = cloudData.salesRecords.filter(r => !isBlankSalesRecord(r));
  saveReportsCache();
  renderSalesDetail();
  showToast(`清理完成：成功 ${ok} 条${fail ? '，失败 ' + fail + ' 条' : ''}`, fail ? 'warning' : 'success');
}

    <div class="modal-footer"><button type="button" class="btn btn-outline" onclick="closeModal()">取消</button><button type="submit" class="btn btn-primary">应用到 ${ids.length} 条</button></div>
  </form>`);
}
async function submitBatchEditSales(e) {
  e.preventDefault();
  const ids = [...selectedSalesIds];
  if (!ids.length) { showToast('请先勾选记录', 'warning'); return false; }
  const patch = {};
  const sp = document.getElementById('bSalesperson').value.trim();
  const tm = document.getElementById('bTeam').value;
  const dd = document.getElementById('bDocDate').value;
  const am = document.getElementById('bAmount').value;
  const gp = document.getElementById('bGross').value;
  const dt = document.getElementById('bDocType').value.trim();
  const st = document.getElementById('bStatus').value.trim();
  const cu = document.getElementById('bCustomer').value.trim();
  if (sp) patch.salesperson = sp;
  if (tm) { patch.team = tm; patch.storeRaw = tm; }
  if (dd) { patch.docDate = dd; patch.docMonth = salesMonthOf(dd); }
  if (am !== '') patch.amount = toNum(am);
  if (gp !== '') patch.grossProfit = toNum(gp);
  if (dt) patch.docType = dt;
  if (st) patch.status = st;
  if (cu) patch.customer = cu;
  if (!Object.keys(patch).length) { showToast('没有填写任何要修改的字段', 'warning'); return false; }
  showToast('正在批量更新 ' + ids.length + ' 条...', 'info');
  try {
    for (const id of ids) {
      const rec = cloudData.salesRecords.find(r => r.id === id);
      if (!rec) continue;
      await apiUpdate('salesRecords', id, patch);
      Object.assign(rec, patch);
    }
    saveReportsCache();
    closeModal();
    clearSalesSelection();
    renderSalesDetail();
    showToast('已批量更新 ' + ids.length + ' 条', 'success');
  } catch (err) { showToast('批量更新失败: ' + err.message, 'error'); }
  return false;
}
async function batchDeleteSales() {
  const ids = [...selectedSalesIds];
  if (!ids.length) { showToast('请先勾选记录', 'warning'); return; }
  if (!confirm('确认删除选中的 ' + ids.length + ' 条业绩记录？此操作不可撤销。')) return;
  try {
    for (const id of ids) { try { await apiDelete('salesRecords', id); } catch (e) { console.warn('Delete failed:', id, e.message); } }
    cloudData.salesRecords = cloudData.salesRecords.filter(r => !selectedSalesIds.has(r.id));
    selectedSalesIds.clear();
    saveReportsCache();
    renderSalesDetail();
    showToast('已删除 ' + ids.length + ' 条', 'success');
  } catch (e) { showToast('删除失败: ' + e.message, 'error'); }
}

function aggregateSourceSummary(year) {
  const filtered = cloudData.salesRecords.filter(r => (r.docMonth || '').startsWith(year));
  // 第一步：按客户汇总数据维度聚合（年月 × 销售员 × 客户）
  const groups = {};
  filtered.forEach(r => {
    const key = (r.docMonth || '') + '|' + (r.salesperson || '') + '|' + (r.customer || '');
    if (!groups[key]) groups[key] = { docMonth: r.docMonth || '', customer: r.customer || '', customerSource: r.customerSource || '', amount: 0 };
    const g = groups[key];
    g.amount += toNum(r.amount);
    if (!g.customerSource && r.customerSource) g.customerSource = r.customerSource;
  });
  // 第二步：按客户来源 + 月份聚合（单数=去重客户数）
  // 只认可表单配置中的来源选项；非配置值（如导入残留的"生意通/销货宝"）归入「(未设置)」
  const cfgSrc = (cloudData.formConfig && cloudData.formConfig.customerTags && cloudData.formConfig.customerTags.customerSource) || [];
  const srcMap = {};
  Object.values(groups).forEach(g => {
    let src = g.customerSource || '(未设置)';
    if (src !== '(未设置)' && !cfgSrc.includes(src)) src = '(未设置)';
    const mm = g.docMonth.slice(5);
    if (!srcMap[src]) srcMap[src] = {};
    if (!srcMap[src][mm]) srcMap[src][mm] = { countSet: new Set(), amount: 0 };
    srcMap[src][mm].countSet.add(g.customer);
    srcMap[src][mm].amount += g.amount;
  });
  return srcMap;
}

function csTagColorStyle(val, opts) {

  const i = opts.indexOf(val);
  const palette = [
    ['#E3F2FD', '#0D47A1'], ['#E8F5E9', '#1B5E20'], ['#FFF3E0', '#E65100'],
    ['#FCE4EC', '#880E4F'], ['#F3E5F5', '#4A148C'], ['#E0F7FA', '#006064'],
    ['#FFF9C4', '#F57F17'], ['#EDE7F6', '#311B92'], ['#FFEBEE', '#B71C1C'],
    ['#E8EAF6', '#1A237E'], ['#F1F8E9', '#33691E'], ['#FBE9E7', '#BF360C']
  ];
  const c = palette[((i % palette.length) + palette.length) % palette.length];
  return `background:${c[0]};color:${c[1]};border-color:${c[0]};font-weight:600`;
}
