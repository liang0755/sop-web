async function callAI(messages) {
  const config = getAIConfig();
  if (!config.apiKey) throw new Error('尚未配置API Key，请先在上方"AI模型配置"中设置');
  const url = config.apiUrl.replace(/\/+$/, '') + '/chat/completions';
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + config.apiKey
    },
    body: JSON.stringify({
      model: config.model,
      messages: messages,
      max_tokens: 4096,
      temperature: 0.7,
      stream: false
    })
  });
  if (!res.ok) {
    let errText = '';
    try { errText = await res.text(); } catch(e) {}
    if (res.status === 401) throw new Error('API Key无效或已过期，请检查配置');
    if (res.status === 429) throw new Error('API调用频率超限，请稍后再试');
    throw new Error('API错误(' + res.status + '): ' + errText.substring(0, 300));
  }
  const data = await res.json();
  if (!data.choices || !data.choices[0]) throw new Error('AI返回数据格式异常');
  return data.choices[0].message.content;
}

function escapeAIHTML(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderAIMarkdown(text) {
  let html = escapeAIHTML(text);
  // Code blocks
  html = html.replace(/```([\s\S]*?)```/g, (m, c) => '<pre style="background:var(--gray-100);padding:10px;border-radius:6px;overflow-x:auto;font-size:12px;margin:8px 0"><code>' + c.trim() + '</code></pre>');
  // Tables
  html = html.replace(/((?:^\|.+\|$\n?)+)/gm, (m, table) => {
    const lines = table.trim().split('\n');
    if (lines.length < 2) return m;
    const parseRow = (line) => line.split('|').map(c => c.trim()).filter(c => c !== '');
    // Check if second line is separator
    let header = parseRow(lines[0]);
    let bodyLines = lines.slice(1);
    if (lines[1] && /^\|[\s:-]+\|/.test(lines[1])) bodyLines = lines.slice(2);
    let result = '<table><thead><tr>' + header.map(h => '<th>' + h + '</th>').join('') + '</tr></thead><tbody>';
    bodyLines.forEach(line => {
      const cells = parseRow(line);
      result += '<tr>' + cells.map(c => '<td>' + c + '</td>').join('') + '</tr>';
    });
    result += '</tbody></table>';
    return result;
  });
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Line breaks
  html = html.replace(/\n/g, '<br>');
  return html;
}

  input.value = '';

  // Show typing indicator
  const msgArea = document.getElementById('aiChatMessages');
  const typingDiv = document.createElement('div');
  typingDiv.className = 'ai-msg typing';
  typingDiv.id = 'aiTypingIndicator';
  typingDiv.textContent = '🤔 AI正在分析数据...';
  msgArea.appendChild(typingDiv);
  msgArea.scrollTop = msgArea.scrollHeight;

  aiChatLoading = true;
  const sendBtn = document.querySelector('.ai-chat-input .btn');
  if (sendBtn) { sendBtn.disabled = true; sendBtn.textContent = '⏳ 分析中...'; }

  try {
    // Build messages: system (fresh data) + history + new user message
    const systemMsg = {role: 'system', content: buildAISystemMessage()};
    const historyMsgs = aiChatHistory.map(m => ({role: m.role, content: m.content}));
    const userMsg = {role: 'user', content: text};
    const allMsgs = [systemMsg, ...historyMsgs, userMsg];

    const response = await callAI(allMsgs);

    // Remove typing indicator
    const ti = document.getElementById('aiTypingIndicator');
    if (ti) ti.remove();

    // Show AI response
    appendAIMessage('assistant', response);

    // Save to history
    aiChatHistory.push({role: 'user', content: text});
    aiChatHistory.push({role: 'assistant', content: response});

    // Keep history to last 20 messages to avoid token overflow
    if (aiChatHistory.length > 20) aiChatHistory = aiChatHistory.slice(-20);
  } catch(err) {
    const ti = document.getElementById('aiTypingIndicator');
    if (ti) ti.remove();
    let errMsg = err.message || '未知错误';
    if (errMsg.includes('Failed to fetch') || errMsg.includes('NetworkError')) {
      errMsg = '网络请求失败，可能是CORS跨域限制或网络不通。请尝试：\n1. 检查API地址是否正确\n2. 确认该API支持浏览器跨域访问（CORS）\n3. 如使用OpenAI，需确保网络能访问api.openai.com';
    }
    appendAIMessage('system', '❌ ' + errMsg);
  } finally {
    aiChatLoading = false;
    if (sendBtn) { sendBtn.disabled = false; sendBtn.textContent = '📤 发送'; }
  }
}

function clearAIChat() {
  aiChatHistory = [];
  initAIChat();
}

async function changePwd(e) {
  e.preventDefault();
  const o=document.getElementById('oldPwd').value,n=document.getElementById('newPwd').value,c=document.getElementById('confirmPwd').value;
  const a=document.getElementById('settingsAlert');
  if(n!==c){a.innerHTML='<div class="alert alert-danger">❌ 两次输入的新密码不一致</div>';return false}
  if(n.length<6){a.innerHTML='<div class="alert alert-danger">❌ 密码至少6位</div>';return false}
  const ho=await hashPassword(o);
  const user=cloudData.users.find(u=>u.id===currentUser.id);
  if(!user||user.password!==ho){a.innerHTML='<div class="alert alert-danger">❌ 原密码错误</div>';return false}
  user.password=await hashPassword(n);
  try { await apiUpdate('users', user.id, user); } catch(e) { showToast('保存失败: ' + e.message, 'error', 4000); a.innerHTML='<div class="alert alert-danger">❌ 保存失败: '+e.message+'</div>'; return false; }
  showToast('密码修改成功！', 'success');
  a.innerHTML='';
  document.getElementById('oldPwd').value='';document.getElementById('newPwd').value='';document.getElementById('confirmPwd').value='';
  return false;
}

// ============ Form Config (Admin) ============
let configTab = 'daily';

function renderFormConfig() {
  if (currentUser.role !== 'admin') {
    document.getElementById('contentBody').innerHTML = '<div class="alert alert-danger">⚠️ 仅管理员可访问此页面</div>';
    return;
  }
  const body = document.getElementById('contentBody');
  body.innerHTML = `
    <div id="configAlert"></div>
    <div class="summary-tabs" style="margin-bottom:20px">
      <div class="summary-tab ${configTab==='daily'?'active':''}" onclick="switchConfigTab('daily')">日报配置</div>
      <div class="summary-tab ${configTab==='weekly'?'active':''}" onclick="switchConfigTab('weekly')">周报配置</div>
    </div>
    <div id="configContent"></div>
    <div style="margin-top:12px;font-size:12px;color:var(--gray-500)">
      💡 配置保存后立即生效，所有成员填写表单时将使用新配置。已有报告数据不受影响。
    </div>
    <div style="height:70px"></div>
    <div class="sticky-submit-bar">
      <button class="btn btn-outline" onclick="resetFormConfig()">↩️ 恢复默认</button>
      <button class="btn btn-primary" onclick="saveFormConfig()">💾 保存配置</button>

function switchConfigTab(tab) {
  configTab = tab;
  document.querySelectorAll('.summary-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderConfigContent();
}

function renderConfigContent() {
  const channels = getChannels(configTab);
  const c = document.getElementById('configContent');
  c.innerHTML = channels.map((ch, idx) => {
    const fieldRows = FIELD_DEFS.map(fd => {
      const rule = getFieldRule(ch, fd.key);
      const isComputed = fd.type === 'computed';
      const hintVal = rule.hint || '';
      return `<tr${rule.hidden?' style="opacity:.5"':''}>
        <td style="font-size:13px">${fd.label}${isComputed?' <span class="badge badge-gray" style="font-size:10px">自动计算</span>':''}</td>
        <td><input type="text" class="form-control form-control-sm" value="${hintVal.replace(/"/g,'&quot;')}" onchange="updateFieldRule('${idx}','${fd.key}','hint',this.value)" placeholder="选填，如：统计当日新增的精准线索" style="width:100%;font-size:12px;padding:4px 8px" ${rule.hidden?'disabled':''}></td>
        <td style="text-align:center">
          <input type="checkbox" ${rule.required?'checked':''} onchange="updateFieldRule('${idx}','${fd.key}','required',this.checked)" ${(isComputed||rule.hidden)?'disabled title="'+(rule.hidden?'隐藏字段无需填写':'计算字段无需填写')+'"':''}>
        </td>
        <td style="text-align:center">
          <input type="checkbox" ${rule.disabled?'checked':''} onchange="updateFieldRule('${idx}','${fd.key}','disabled',this.checked)" ${(isComputed||rule.hidden)?'disabled title="'+(rule.hidden?'隐藏字段不可禁用':'计算字段不可禁用')+'"':''}>
        </td>
        <td style="text-align:center">
          <input type="checkbox" ${rule.hidden?'checked':''} onchange="updateFieldRule('${idx}','${fd.key}','hidden',this.checked);renderConfigContent()" title="勾选后在填写/编辑表单中隐藏此字段">
        </td>
      </tr>`;
    }).join('');
    return `<div class="channel-card" style="margin-bottom:16px">
      <div class="channel-card-header">
        <div class="ch-name">📌 渠道 ${idx+1}</div>
        <button class="btn btn-danger btn-sm" onclick="deleteConfigChannel('${idx}')">🗑 删除渠道</button>
      </div>
      <div class="card-body" style="padding:16px 18px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px">
          <div class="form-group" style="margin-bottom:0">
            <label>渠道名称</label>
            <input type="text" class="form-control" value="${ch.name||''}" onchange="updateConfigChannel('${idx}','name',this.value)" placeholder="如：地推/市场陌拜等">
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label>参考标准</label>
            <input type="text" class="form-control" value="${ch.reference||''}" onchange="updateConfigChannel('${idx}','reference',this.value)" placeholder="如：覆盖X家，加微信xx">
          </div>
        </div>
        <div class="table-wrap"><table style="font-size:13px">
          <thead><tr><th>字段名称</th><th style="min-width:200px">填写说明（提示）</th><th style="text-align:center;width:50px">必填</th><th style="text-align:center;width:50px">禁用</th><th style="text-align:center;width:50px">隐藏</th></tr></thead>
          <tbody>${fieldRows}</tbody>
        </table></div>
      </div>
    </div>`;
  }).join('') + `
    <button class="btn btn-outline" style="width:100%;padding:14px;border:2px dashed var(--gray-300);color:var(--gray-500)" onclick="addConfigChannel()">➕ 添加新渠道</button>
  `;
}

function updateConfigChannel(idx, field, value) {
  const channels = cloudData.formConfig[configTab];
  if (channels[idx]) channels[idx][field] = value;
}

function updateFieldRule(chIdx, fieldKey, ruleType, value) {
  const channels = cloudData.formConfig[configTab];
  const ch = channels[chIdx];
  if (!ch) return;
  if (!ch.fieldRules) ch.fieldRules = {};
  if (!ch.fieldRules[fieldKey]) ch.fieldRules[fieldKey] = {required:false, disabled:false, hint:'', hidden:false};
  ch.fieldRules[fieldKey][ruleType] = value;
}

function addConfigChannel() {
  const newCh = {id: genId(), name: '新渠道', reference: '', fieldRules: {}};
  cloudData.formConfig[configTab].push(newCh);
  renderConfigContent();
}

function deleteConfigChannel(idx) {
  if (!confirm('确定删除此渠道吗？已有报告中该渠道的数据不会被删除。')) return;
  cloudData.formConfig[configTab].splice(idx, 1);
  renderConfigContent();
}

async function saveFormConfig() {
  const alertEl = document.getElementById('configAlert');
  const btn = event?.target;
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 保存中...'; }
  try {
    await fetch(FB_BASE + '/formConfig.json', {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(cloudData.formConfig)
    });
    showToast('配置已保存并生效！', 'success');
    if (alertEl) alertEl.innerHTML = '';
  } catch(e) {
    showToast('保存失败: ' + e.message, 'error', 4000);
    if (alertEl) alertEl.innerHTML = `<div class="alert alert-danger">❌ 保存失败: ${e.message}</div>`;
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '💾 保存配置'; }
  }
}

function resetFormConfig() {
  if (!confirm('确定恢复默认配置吗？当前修改将丢失（需点击保存才会写入云端）。')) return;
  cloudData.formConfig = JSON.parse(JSON.stringify(DEFAULT_FORM_CONFIG));
  renderConfigContent();
}

function showToast(msg, type='success', duration=2500) {
  const container = document.getElementById('toastContainer');
  if (!container) return;
  const icons = {success:'✅', error:'❌', info:'ℹ️', warning:'⚠️'};
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.innerHTML = `<span>${icons[type]||'✅'}</span><span>${msg}</span>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('hiding');
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

// ============ Loading Progress ============
let loadingTimer = null;
const LOADING_STEPS = [
  { text: '正在连接服务器...', at: 0 },
  { text: '正在加载用户数据...', at: 20 },
  { text: '正在加载表单配置...', at: 40 },
  { text: '正在加载品牌配置...', at: 60 },
  { text: '正在加载系统数据...', at: 75 },
  { text: '即将完成...', at: 90 }
];

function startLoadingCountdown(estSeconds) {
  if (loadingTimer) { clearInterval(loadingTimer); loadingTimer = null; }
  const startTime = Date.now();
  const progressEl = document.getElementById('loadingProgress');
  const countdownEl = document.getElementById('loadingCountdown');
  const stepEl = document.getElementById('loadingStepText');
  loadingTimer = setInterval(() => {
    const elapsed = (Date.now() - startTime) / 1000;
    const progress = Math.min(90, (elapsed / estSeconds) * 90);
    if (progressEl) progressEl.style.width = progress.toFixed(1) + '%';
    const step = LOADING_STEPS.filter(s => progress >= s.at).pop();
    if (step && stepEl) stepEl.textContent = step.text;
    const remaining = Math.max(0, Math.ceil(estSeconds - elapsed));
    if (countdownEl) countdownEl.textContent = remaining > 0 ? '预计还需 ' + remaining + ' 秒' : '即将完成...';
  }, 100);
}

function finishLoadingCountdown() {
  if (loadingTimer) { clearInterval(loadingTimer); loadingTimer = null; }
  const progressEl = document.getElementById('loadingProgress');
  const countdownEl = document.getElementById('loadingCountdown');
  const stepEl = document.getElementById('loadingStepText');
  if (progressEl) progressEl.style.width = '100%';
  if (stepEl) stepEl.textContent = '加载完成！';
  if (countdownEl) countdownEl.textContent = '';
}

// ============ Init ============
(async function init() {
  // Start loading countdown
  startLoadingCountdown(4);
  // Phase 1: Load only core data (users, formConfig, brandConfig) — fast, enough for login
  await loadCoreData();
  finishLoadingCountdown();
  applyBrandConfig();
  // Show login form immediately
  const loadingEl = document.getElementById('loginLoading');
  if (loadingEl) loadingEl.style.display = 'none';
  const formBox = document.getElementById('loginFormBox');
  if (formBox) formBox.style.display = '';
  // Phase 2: Start loading report data in background (non-blocking)
  loadReportData();
  // Check for saved session (auto-login)
  const saved = localStorage.getItem(SESSION_KEY);
  if (saved) {
    currentUser = JSON.parse(saved);
    const user = cloudData.users.find(u => u.id === currentUser.id && u.active);
    if (user) {
      currentUser = {id:user.id,username:user.username,name:user.name,department:user.department,role:user.role};
      localStorage.setItem(SESSION_KEY, JSON.stringify(currentUser));
      // Wait for report data before showing dashboard
      if (!reportsLoaded) {
        // Show loading screen with countdown while reports load
        if (loadingEl) {
          loadingEl.innerHTML = '<div style="font-size:36px;margin-bottom:14px;animation:spin 1.5s linear infinite;display:inline-block">⏳</div><div id="loadingStepText" style="font-size:15px;font-weight:600;margin-bottom:16px;color:#fff">正在加载报表数据...</div><div style="width:260px;height:6px;background:rgba(255,255,255,.15);border-radius:3px;margin:0 auto 10px;overflow:hidden"><div id="loadingProgress" style="width:0%;height:100%;background:linear-gradient(90deg,#3b82f6,#06b6d4);border-radius:3px;transition:width .3s ease"></div></div><div id="loadingCountdown" style="font-size:12px;color:rgba(255,255,255,.55)">正在准备...</div>';
          loadingEl.style.display = '';
          startLoadingCountdown(3);
        }
        if (formBox) formBox.style.display = 'none';
        let waited = 0;
        while (!reportsLoaded && waited < 10000) { await new Promise(r => setTimeout(r, 200)); waited += 200; }
        finishLoadingCountdown();
        if (loadingEl) loadingEl.style.display = 'none';
        if (formBox) formBox.style.display = '';
      }
      document.getElementById('loginView').classList.add('hidden');
      document.getElementById('appLayout').classList.remove('hidden');
      document.getElementById('sidebarName').textContent = currentUser.name;
      document.getElementById('sidebarDept').textContent = currentUser.department;
      document.getElementById('sidebarAvatar').textContent = currentUser.name.charAt(0);
      document.getElementById('userWelcome').textContent = `👋 欢迎，${currentUser.name}`;
      // Show/hide admin-only nav items
      const navMgmt = document.getElementById('navUserMgmt');
      if (navMgmt) navMgmt.style.display = currentUser.role === 'admin' ? '' : 'none';
      const navFC = document.getElementById('navFormConfig');
      if (navFC) navFC.style.display = currentUser.role === 'admin' ? '' : 'none';
      const navAI = document.getElementById('navAIChat');
      if (navAI) navAI.style.display = currentUser.role === 'admin' ? '' : 'none';
      navTo('dashboard');
      return;
    }
  }
  document.getElementById('loginView').classList.remove('hidden');
})();
