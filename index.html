<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>团队SOP数据管理系统</title>
<link rel="preconnect" href="https://sopka-8270e-default-rtdb.firebaseio.com">
<link rel="preload" as="image" href="login-bg.jpg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#2563eb;--primary-dark:#1d4ed8;--primary-light:#dbeafe;--success:#16a34a;--success-light:#dcfce7;--warning:#f59e0b;--warning-light:#fef3c7;--danger:#dc2626;--danger-light:#fee2e2;--gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;--gray-400:#9ca3af;--gray-500:#6b7280;--gray-600:#4b5563;--gray-700:#374151;--gray-800:#1f2937;--gray-900:#111827;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.1);--shadow-lg:0 10px 25px rgba(0,0,0,.1)}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Microsoft YaHei",sans-serif;background:var(--gray-100);color:var(--gray-800);font-size:14px;line-height:1.6}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:url('login-bg.jpg') center/cover no-repeat fixed;position:relative}
.login-wrap::before{content:"";position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.35);z-index:0}
.login-wrap > *{position:relative;z-index:1}
.login-card{background:rgba(15,23,42,.78);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:40px;width:400px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.4);color:#fff}
.login-card h1{text-align:center;font-size:22px;margin-bottom:6px;color:#fff}
.login-card .subtitle{text-align:center;color:rgba(255,255,255,.7);font-size:13px;margin-bottom:30px}
.login-card .logo{width:120px;height:60px;margin:0 auto 16px;background:linear-gradient(135deg,#3b82f6,#06b6d4);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;box-shadow:0 8px 20px rgba(59,130,246,.4);overflow:hidden}
.login-card .logo img{width:100%;height:100%;object-fit:cover;border-radius:12px}
.app-layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--gray-900);color:#fff;flex-shrink:0;display:flex;flex-direction:column}
.sidebar-header{padding:20px;text-align:center;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-header .logo-icon{font-size:28px;margin-bottom:6px;display:flex;align-items:center;justify-content:center}
.sidebar-header .logo-icon img{width:80px;height:40px;border-radius:8px;object-fit:cover}
.sidebar-header h2{font-size:16px;font-weight:600}
.sidebar-header p{font-size:11px;color:var(--gray-400);margin-top:2px}
.sidebar-refresh{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.1);text-align:center}
.sidebar-refresh-btn{width:100%;padding:8px 12px;border:1px solid rgba(255,255,255,.2);border-radius:8px;background:rgba(255,255,255,.06);color:#e5e7eb;font-size:13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.sidebar-refresh-btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.35)}
.sidebar-refresh-btn:active{transform:scale(.97)}
.sidebar-refresh-btn.loading{opacity:.6;pointer-events:none}
.sidebar-refresh-time{display:block;margin-top:6px;font-size:10px;color:var(--gray-500)}
.nav-menu{flex:1;padding:12px 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;color:var(--gray-300);cursor:pointer;font-size:14px;border-left:3px solid transparent;transition:all .2s}
.nav-item:hover{background:rgba(255,255,255,.05);color:#fff}
.nav-item.active{background:rgba(37,99,235,.15);color:#fff;border-left-color:var(--primary)}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.nav-section-title{padding:16px 20px 6px;font-size:11px;color:var(--gray-500);text-transform:uppercase;letter-spacing:1px}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1)}
.sidebar-footer .user-info{display:flex;align-items:center;gap:10px}
.sidebar-footer .avatar{width:36px;height:36px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:#fff}
.sidebar-footer .user-name{font-size:13px;font-weight:500}
.sidebar-footer .user-dept{font-size:11px;color:var(--gray-400)}
.main-content{flex:1;overflow-y:auto}
.top-bar{background:#fff;padding:14px 28px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between}
.top-bar h3{font-size:17px;font-weight:600}
.content-body{padding:24px 28px}
.btn{padding:8px 18px;border:none;border-radius:var(--radius);cursor:pointer;font-size:14px;font-weight:500;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:#fff;border:1px solid var(--gray-300);color:var(--gray-700)}.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-lg{padding:12px 28px;font-size:15px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--gray-700);margin-bottom:6px}
.form-group label .req{color:var(--danger)}
.login-card .form-group label{color:rgba(255,255,255,.85)}
.form-control{width:100%;padding:9px 14px;border:1px solid var(--gray-300);border-radius:var(--radius);font-size:14px;background:#fff;color:var(--gray-800)}
.form-control:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.form-control:disabled{background:var(--gray-100);color:var(--gray-500)}
textarea.form-control{resize:vertical;min-height:60px}
select.form-control{cursor:pointer}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.card-header{padding:16px 20px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between}
.card-header h4{font-size:15px;font-weight:600}
.card-body{padding:20px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--gray-50);padding:11px 14px;text-align:left;font-weight:600;color:var(--gray-700);border-bottom:2px solid var(--gray-200);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--gray-100);color:var(--gray-700)}
tr:hover td{background:var(--gray-50)}
.table-wrap{overflow-x:auto}
.badge{padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600;display:inline-block}
.badge-success{background:var(--success-light);color:var(--success)}
.badge-warning{background:var(--warning-light);color:var(--warning)}
.badge-danger{background:var(--danger-light);color:var(--danger)}
.badge-gray{background:var(--gray-100);color:var(--gray-500)}
.alert{padding:12px 16px;border-radius:var(--radius);margin-bottom:16px;font-size:13px;display:flex;align-items:center;gap:8px}
.alert-success{background:var(--success-light);color:var(--success);border:1px solid #86efac}
.alert-danger{background:var(--danger-light);color:var(--danger);border:1px solid #fca5a5}
.alert-info{background:var(--primary-light);color:var(--primary);border:1px solid #93c5fd}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.stat-card .stat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:12px}
.stat-card .stat-value{font-size:28px;font-weight:700}
.stat-card .stat-label{font-size:12px;color:var(--gray-500);margin-top:4px}
.entry-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-bottom:24px}
.entry-card{background:#fff;border-radius:12px;padding:32px;box-shadow:var(--shadow);cursor:pointer;transition:all .3s;text-align:center;border:2px solid transparent}
.entry-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.entry-card .entry-icon{width:64px;height:64px;border-radius:16px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff}
.entry-card.daily .entry-icon{background:linear-gradient(135deg,#3b82f6,#2563eb)}
.entry-card.weekly .entry-icon{background:linear-gradient(135deg,#8b5cf6,#7c3aed)}
.entry-card h4{font-size:18px;font-weight:600;margin-bottom:6px}
.entry-card p{font-size:13px;color:var(--gray-500)}
.channel-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.channel-card-header{padding:12px 18px;background:var(--gray-50);border-bottom:1px solid var(--gray-200)}
.channel-card-header .ch-name{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ch-ref-box{display:flex;align-items:flex-start;gap:6px;background:var(--primary-light);border-radius:6px;padding:6px 10px;font-size:12px}
.ch-ref-label{color:var(--primary-dark);font-weight:600;white-space:nowrap}
.ch-ref-text{color:var(--gray-700)}
/* Accordion channel cards */
.channel-card.collapsible .channel-card-header{cursor:pointer;user-select:none;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.channel-card.collapsible .ch-header-left{flex:1;min-width:0}
.channel-card.collapsible .ch-toggle-arrow{transition:transform .2s ease;font-size:14px;color:var(--gray-500);flex-shrink:0}
.channel-card.collapsed .ch-toggle-arrow{transform:rotate(-90deg)}
.channel-card.collapsed .channel-form-grid{display:none}
.channel-card.collapsed .ch-ref-box{display:none}
.ch-filled-badge{font-size:11px;background:var(--success-light);color:var(--success);padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap}
.ch-filled-badge.empty{background:var(--gray-100);color:var(--gray-400)}
/* Channel quick-jump chips */
.channel-chips{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:4px 0 12px;flex-wrap:nowrap}
.channel-chip{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;background:var(--gray-100);color:var(--gray-600);border:1px solid var(--gray-200);cursor:pointer;transition:all .15s;white-space:nowrap}
.channel-chip:hover,.channel-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.channel-chip .chip-count{font-size:10px;opacity:.7;margin-left:4px}
/* Floating submit bar — always visible at bottom of viewport */
.sticky-submit-bar{position:fixed;bottom:0;left:220px;right:0;background:#fff;border-top:1px solid var(--gray-200);padding:12px 16px;box-shadow:0 -2px 12px rgba(0,0,0,.1);z-index:100;display:flex;gap:12px;justify-content:center}
.sticky-submit-bar .btn{flex:0 1 auto;min-width:120px;max-width:200px}
.channel-form-grid{display:grid;grid-template-columns:repeat(8,minmax(0,1fr));gap:10px;padding:16px 18px}
.channel-form-grid .full-width{grid-column:1/-1}
.channel-form-grid label{font-size:12px;color:var(--gray-600);margin-bottom:4px;display:block;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.channel-form-grid .field-hint{font-size:11px;color:#e74c3c;margin-bottom:4px;line-height:1.3;white-space:normal;word-break:break-all;font-weight:500}
.channel-form-grid input,.channel-form-grid textarea{width:100%;padding:6px 8px;border:1px solid var(--gray-300);border-radius:6px;font-size:13px;min-width:0}
.channel-form-grid input:focus,.channel-form-grid textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(37,99,235,.1)}
.channel-form-grid input:disabled{background:var(--gray-100);color:var(--gray-400)}
.channel-form-grid .computed-field{font-size:13px;padding:6px 8px;background:#f0f5ff;border-radius:6px;color:var(--primary);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.computed-field{background:var(--primary-light);padding:7px 10px;border-radius:6px;font-size:13px;color:var(--primary);font-weight:600}
.filter-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:flex-end}
.filter-bar .form-group{margin-bottom:0;min-width:140px}
.filter-bar .form-group label{font-size:12px}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#fff;border-radius:12px;padding:28px;width:460px;max-width:90vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal.modal-wide{width:1000px;max-width:95vw}
.modal h3{font-size:18px;margin-bottom:20px}
.modal .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:10px;align-items:center;pointer-events:none}
.toast{display:flex;align-items:center;gap:10px;padding:14px 24px;border-radius:10px;font-size:14px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.15);animation:toastIn .3s ease;pointer-events:auto;max-width:90vw}
.toast.success{background:#10b981;color:#fff}
.toast.error{background:#ef4444;color:#fff}
.toast.info{background:#3b82f6;color:#fff}
.toast.warning{background:#f59e0b;color:#fff}
@keyframes toastIn{from{transform:translateY(-30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes toastOut{from{transform:translateY(0);opacity:1}to{transform:translateY(-30px);opacity:0}}
.toast.hiding{animation:toastOut .3s ease forwards}
.summary-tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid var(--gray-200)}
.summary-tab{padding:10px 20px;cursor:pointer;font-size:14px;font-weight:500;color:var(--gray-500);border-bottom:2px solid transparent;margin-bottom:-2px}
.summary-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.summary-tab:hover{color:var(--primary)}
.empty-state{text-align:center;padding:60px 20px;color:var(--gray-400)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.hidden{display:none!important}
.share-url-box{background:var(--gray-50);border:1px solid var(--gray-300);border-radius:var(--radius);padding:12px;margin:16px 0}
.share-url-box textarea{width:100%;border:none;background:none;font-size:12px;color:var(--gray-600);resize:none;outline:none}
/* ============ Settings Tabs ============ */
.settings-tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:2px solid var(--gray-200);overflow-x:auto;-webkit-overflow-scrolling:touch}
.settings-tab{padding:12px 24px;cursor:pointer;font-size:14px;font-weight:500;color:var(--gray-500);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s}
.settings-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.settings-tab:hover{color:var(--primary)}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.settings-grid .card{margin-bottom:0}
.settings-info-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--gray-100)}
.settings-info-row:last-child{border-bottom:none}
.settings-info-row .label{width:90px;color:var(--gray-500);font-size:13px;flex-shrink:0}
.settings-info-row .value{font-size:14px;font-weight:500}
.settings-brand-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:16px}
.settings-brand-section{background:var(--gray-50);border-radius:var(--radius);padding:16px}
.settings-brand-section h5{font-size:13px;font-weight:600;color:var(--gray-700);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--gray-200)}
.collapsible-header{cursor:pointer;user-select:none;display:flex;justify-content:space-between;align-items:center}
.collapsible-header .toggle-arrow{transition:transform .2s;font-size:14px;color:var(--gray-400)}
.collapsible-header.collapsed .toggle-arrow{transform:rotate(-90deg)}
.collapsible-body{transition:max-height .3s ease,opacity .2s ease,padding .3s ease;overflow:hidden;max-height:600px}
.collapsible-body.collapsed{max-height:0;opacity:0;padding-top:0;padding-bottom:0}
.ai-config-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.ai-config-grid .full-row{grid-column:1/-1}
@media(max-width:768px){
  .settings-grid{grid-template-columns:1fr}
  .settings-brand-row{grid-template-columns:1fr}
  .ai-config-grid{grid-template-columns:1fr}
}
/* ============ AI Chat ============ */
.ai-chat-wrap{display:flex;flex-direction:column;height:560px;border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden;background:var(--gray-50)}
.ai-chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.ai-msg{max-width:85%;padding:12px 16px;border-radius:12px;font-size:13px;line-height:1.7;word-break:break-word;white-space:pre-wrap}
.ai-msg.user{align-self:flex-end;background:var(--primary);color:#fff;border-bottom-right-radius:4px}
.ai-msg.assistant{align-self:flex-start;background:#fff;border:1px solid var(--gray-200);border-bottom-left-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.ai-msg.assistant table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px}
.ai-msg.assistant th{background:var(--gray-100);padding:6px 10px;text-align:left;border:1px solid var(--gray-200)}
.ai-msg.assistant td{padding:6px 10px;border:1px solid var(--gray-200)}
.ai-msg.assistant code{background:var(--gray-100);padding:2px 6px;border-radius:4px;font-size:12px}
.ai-msg.assistant strong{font-weight:600}
.ai-msg.system{align-self:center;background:var(--warning-light);color:var(--warning);font-size:12px;text-align:center;max-width:100%}
.ai-msg.typing{align-self:flex-start;background:#fff;border:1px solid var(--gray-200);color:var(--gray-400);font-style:italic}
.ai-chat-input{display:flex;gap:8px;padding:12px;border-top:1px solid var(--gray-200);background:#fff}
.ai-chat-input textarea{flex:1;resize:none;border:1px solid var(--gray-300);border-radius:var(--radius);padding:10px 14px;font-size:13px;font-family:inherit;max-height:120px;min-height:44px}
.ai-chat-input textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.ai-chat-input .btn{align-self:flex-end;white-space:nowrap}
.ai-provider-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;background:var(--primary-light);color:var(--primary)}
.ai-suggestion-chips{display:flex;gap:8px;flex-wrap:wrap;padding:0 16px 12px}
.ai-suggestion-chip{padding:6px 12px;border-radius:16px;font-size:12px;background:#fff;border:1px solid var(--gray-300);color:var(--gray-600);cursor:pointer;transition:all .15s}
.ai-suggestion-chip:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
/* ============ Mobile Navigation ============ */
.mobile-menu-btn{display:none;position:fixed;top:12px;left:12px;z-index:1001;background:var(--gray-900);color:#fff;border:none;border-radius:8px;width:40px;height:40px;font-size:20px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.sidebar-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:998;opacity:0;transition:opacity .3s}
.sidebar-overlay.show{display:block;opacity:1}

@media(max-width:768px){
  /* Sidebar becomes a slide-out drawer */
  .sidebar{position:fixed;top:0;left:0;height:100vh;width:240px;z-index:999;transform:translateX(-100%);transition:transform .3s ease;display:flex;flex-direction:column}
  .sidebar.open{transform:translateX(0)}
  .mobile-menu-btn{display:flex}
  .app-layout{display:block}
  .main-content{width:100%;min-height:100vh}

  /* Top bar adjusts for hamburger */
  .top-bar{padding:12px 16px 12px 60px;position:sticky;top:0;z-index:997}
  .top-bar h3{font-size:15px}
  .top-bar #userWelcome{display:none}

  /* Content padding */
  .content-body{padding:14px 12px}

  /* Entry cards: 2 columns, compact */
  .entry-grid{grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
  .entry-card{padding:16px 12px}
  .entry-card .entry-icon{width:40px;height:40px;font-size:22px;margin-bottom:8px;border-radius:12px}
  .entry-card h4{font-size:14px}
  .entry-card p{font-size:11px}

  /* Stat grid: 3 columns on mobile, compact */
  .stat-grid{grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
  .stat-card{padding:10px 8px}
  .stat-card .stat-value{font-size:18px}
  .stat-card .stat-icon{width:32px;height:32px;font-size:16px;margin-bottom:6px;border-radius:8px}
  .stat-card .stat-label{font-size:10px}

  /* Dashboard kanban & form config grids */
  [style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr!important}

  /* Filter bar stacks vertically */
  .filter-bar{flex-direction:column;gap:8px;align-items:stretch}
  .filter-bar .form-group{min-width:100%}

<script>
// ============ Cloud Data Layer (Firebase Realtime Database) ============
const FB_BASE = 'https://sopka-8270e-default-rtdb.firebaseio.com/sop';
const SESSION_KEY = 'sop_session';
let cloudData = {users:[], dailyReports:[], weeklyReports:[], formConfig:null, brandConfig:null, departments:[], aiConfig:null};
let currentUser = null;
let isCloudAvailable = false;
let dataLoaded = false;
let reportsLoaded = false;

async function hashPassword(pwd) {
  const enc = new TextEncoder();
  const buf = await crypto.subtle.digest('SHA-256', enc.encode(pwd));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function genId(){return Date.now().toString(36)+Math.random().toString(36).substr(2,9)}

// Phase 1: Load core data (users, formConfig, brandConfig) — small, fast, enough for login
async function loadCoreData() {
  try {
    const [uRes, fRes, bRes, dRes, aRes] = await Promise.all([
      fetch(FB_BASE + '/users.json'),
      fetch(FB_BASE + '/formConfig.json'),
      fetch(FB_BASE + '/brandConfig.json'),
      fetch(FB_BASE + '/departments.json'),
      fetch(FB_BASE + '/aiConfig.json')
    ]);
    cloudData.users = uRes.ok ? Object.values(await uRes.json() || {}) : [];
    const fcData = fRes.ok ? await fRes.json() : null;
    cloudData.formConfig = fcData || JSON.parse(JSON.stringify(DEFAULT_FORM_CONFIG));
    if (!fcData) {
      try { await fetch(FB_BASE + '/formConfig.json', {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(cloudData.formConfig)}); } catch(e) {}
    }
    const bcData = bRes.ok ? await bRes.json() : null;
    cloudData.brandConfig = bcData || JSON.parse(JSON.stringify(DEFAULT_BRAND_CONFIG));
    if (!bcData) {
      try { await fetch(FB_BASE + '/brandConfig.json', {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(cloudData.brandConfig)}); } catch(e) {}
    }
    // Load departments; if not configured, auto-extract from existing users
    const deptData = dRes.ok ? await dRes.json() : null;
    if (deptData && Array.isArray(deptData)) {
      cloudData.departments = deptData;
    } else if (deptData && typeof deptData === 'object') {
      cloudData.departments = Object.values(deptData);
    } else {
      cloudData.departments = [...new Set(cloudData.users.map(u => u.department).filter(d => d))].sort();
      if (cloudData.departments.length > 0) {
        try { await fetch(FB_BASE + '/departments.json', {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(cloudData.departments)}); } catch(e) {}
      }
    }
    // Load AI config
    const aiData = aRes.ok ? await aRes.json() : null;
    cloudData.aiConfig = aiData || JSON.parse(JSON.stringify(DEFAULT_AI_CONFIG));
    isCloudAvailable = true;
  } catch(e) {
    console.warn('Core data fetch failed:', e.message);
    isCloudAvailable = false;
    cloudData.formConfig = JSON.parse(JSON.stringify(DEFAULT_FORM_CONFIG));
    cloudData.brandConfig = JSON.parse(JSON.stringify(DEFAULT_BRAND_CONFIG));
    cloudData.departments = [...new Set(cloudData.users.map(u => u.department).filter(d => d))].sort();
    cloudData.aiConfig = JSON.parse(JSON.stringify(DEFAULT_AI_CONFIG));
  }
  // Ensure admin exists
  if (!cloudData.users.find(u => u.username === 'admin')) {
    const adminPwd = await hashPassword('admin123');
    const admin = {id:'admin_001',username:'admin',password:adminPwd,name:'管理员',department:'管理部',role:'admin',active:true,createdAt:new Date().toISOString()};
    if (isCloudAvailable) { try { await apiCreate('users', admin); } catch(e) {} }
    cloudData.users.push(admin);
  }
  dataLoaded = true;
}

// Phase 2: Load report data (dailyReports, weeklyReports) — larger, needed after login
async function loadReportData() {
  if (reportsLoaded) return;
  try {
    const [dRes, wRes] = await Promise.all([
      fetch(FB_BASE + '/dailyReports.json'),
      fetch(FB_BASE + '/weeklyReports.json')
    ]);
    cloudData.dailyReports = dRes.ok ? Object.values(await dRes.json() || {}) : [];
    cloudData.weeklyReports = wRes.ok ? Object.values(await wRes.json() || {}) : [];
  } catch(e) {
    console.warn('Report data fetch failed:', e.message);
  }
  reportsLoaded = true;
}

// Full load (for refresh scenarios — always re-fetches everything)
async function loadCloudData() {
  dataLoaded = false;
  reportsLoaded = false;
  await loadCoreData();
  await loadReportData();
  return cloudData;
}

async function apiCreate(collection, data) {
  const res = await fetch(FB_BASE + '/' + collection + '/' + data.id + '.json', {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error('API create failed: ' + res.status);
  return data.id;
}

async function apiUpdate(collection, id, data) {
  const res = await fetch(FB_BASE + '/' + collection + '/' + id + '.json', {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error('API update failed: ' + res.status);
}

async function apiDelete(collection, id) {
  const res = await fetch(FB_BASE + '/' + collection + '/' + id + '.json', {
    method:'DELETE'
  });
  if (!res.ok) throw new Error('API delete failed: ' + res.status);
}

// ============ Auth ============
function showRegister(){document.getElementById('loginFormBox').classList.add('hidden');document.getElementById('registerFormBox').classList.remove('hidden');document.getElementById('loginAlert').innerHTML=''}
function showLogin(){document.getElementById('registerFormBox').classList.add('hidden');document.getElementById('loginFormBox').classList.remove('hidden');document.getElementById('loginAlert').innerHTML=''}

async function doLogin(e) {
  e.preventDefault();
  const alertEl = document.getElementById('loginAlert');
  const u = document.getElementById('loginUsername').value.trim();
  const p = document.getElementById('loginPassword').value;
  const btn = e.target.querySelector('button[type="submit"]');
  if (btn) { btn.disabled = true; btn.textContent = '登录中...'; }
  // Wait for cloud data to finish loading before attempting login
  if (!dataLoaded) {
    alertEl.innerHTML = '<div class="alert alert-info">⏳ 系统正在加载中，请稍候片刻...</div>';
    let waited = 0;
    while (!dataLoaded && waited < 10000) { await new Promise(r => setTimeout(r, 300)); waited += 300; }
    if (!dataLoaded) { alertEl.innerHTML = '<div class="alert alert-danger">❌ 数据加载超时，请检查网络后重试</div>'; if (btn) { btn.disabled = false; btn.textContent = '登 录'; } return false; }
    alertEl.innerHTML = '';
  }
  const hp = await hashPassword(p);
  const user = cloudData.users.find(x => x.username === u && x.password === hp && x.active);
  if (!user) { alertEl.innerHTML = '<div class="alert alert-danger">❌ 用户名或密码错误</div>'; if (btn) { btn.disabled = false; btn.textContent = '登 录'; } return false; }
  currentUser = {id:user.id, username:user.username, name:user.name, department:user.department, role:user.role};
  localStorage.setItem(SESSION_KEY, JSON.stringify(currentUser));
  await showApp();
  return false;
}

async function doRegister(e) {
  e.preventDefault();
  const u = document.getElementById('regUsername').value.trim();
  const n = document.getElementById('regName').value.trim();
  const d = document.getElementById('regDept').value.trim();
  const p = document.getElementById('regPassword').value;
  if (p.length < 6) { document.getElementById('loginAlert').innerHTML = '<div class="alert alert-danger">❌ 密码至少6位</div>'; return false; }
  if (cloudData.users.find(x => x.username === u)) { document.getElementById('loginAlert').innerHTML = '<div class="alert alert-danger">❌ 用户名已存在</div>'; return false; }
  const hp = await hashPassword(p);
  const user = {id:genId(),username:u,password:hp,name:n,department:d,role:'member',active:true,createdAt:new Date().toISOString()};
  try {
    await apiCreate('users', user);
    cloudData.users.push(user);
  } catch(e) { document.getElementById('loginAlert').innerHTML = '<div class="alert alert-danger">❌ 注册失败: ' + e.message + '</div>'; return false; }
  document.getElementById('loginAlert').innerHTML = '<div class="alert alert-success">✅ 注册成功，请登录</div>';
  showLogin();
  document.getElementById('loginUsername').value = u;
  return false;
}

function doLogout() {
  currentUser = null;
  localStorage.removeItem(SESSION_KEY);
  document.getElementById('loginView').classList.remove('hidden');
  document.getElementById('appLayout').classList.add('hidden');
}

async function showApp() {
  // If report data not loaded yet, show loading and wait
  if (!reportsLoaded) {
    const loadingEl = document.getElementById('loginLoading');
    const formBox = document.getElementById('loginFormBox');
    if (loadingEl) {
      loadingEl.innerHTML = '<div style="font-size:36px;margin-bottom:14px;animation:spin 1.5s linear infinite;display:inline-block">⏳</div><div id="loadingStepText" style="font-size:15px;font-weight:600;margin-bottom:16px;color:#fff">正在加载报表数据...</div><div style="width:260px;height:6px;background:rgba(255,255,255,.15);border-radius:3px;margin:0 auto 10px;overflow:hidden"><div id="loadingProgress" style="width:0%;height:100%;background:linear-gradient(90deg,#3b82f6,#06b6d4);border-radius:3px;transition:width .3s ease"></div></div><div id="loadingCountdown" style="font-size:12px;color:rgba(255,255,255,.55)">正在准备...</div>';
      loadingEl.style.display = '';
      startLoadingCountdown(3);
    }
    if (formBox) formBox.style.display = 'none';
    let waited = 0;
    while (!reportsLoaded && waited < 10000) { await new Promise(r => setTimeout(r, 200)); waited += 200; }
    finishLoadingCountdown();
    if (loadingEl) loadingEl.style.display = 'none';
    if (formBox) formBox.style.display = '';
  }
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('appLayout').classList.remove('hidden');
  document.getElementById('sidebarName').textContent = currentUser.name;
  document.getElementById('sidebarDept').textContent = currentUser.department;
  document.getElementById('sidebarAvatar').textContent = currentUser.name.charAt(0);
  document.getElementById('userWelcome').textContent = `👋 欢迎，${currentUser.name}`;
  lastRefreshTime = Date.now();
  updateSidebarRefreshTime();
  // Show/hide admin-only nav items
  const navMgmt = document.getElementById('navUserMgmt');
  if (navMgmt) navMgmt.style.display = currentUser.role === 'admin' ? '' : 'none';
  const navFC = document.getElementById('navFormConfig');
  if (navFC) navFC.style.display = currentUser.role === 'admin' ? '' : 'none';
  const navAI = document.getElementById('navAIChat');
  if (navAI) navAI.style.display = currentUser.role === 'admin' ? '' : 'none';
  navTo('dashboard');
}

// ============ Navigation ============
let lastRefreshTime = Date.now();
const REFRESH_INTERVAL = 60000; // 60s minimum between background refreshes
let bgRefreshInFlight = false;

function navTo(page) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.nav-item[data-page="${page}"]`)?.classList.add('active');
  const titles = {dashboard:'首页',dailyForm:'日报填写',weeklyForm:'周报填写',dailyData:'日报数据',weeklyData:'周报数据',summary:'团队汇总',userManagement:'用户管理',formConfig:'表单配置',aiChat:'AI助手',settings:'设置'};
  document.getElementById('pageTitle').textContent = titles[page] || '';
  ({dashboard:renderDashboard,dailyForm:()=>renderReportForm('daily'),weeklyForm:()=>renderReportForm('weekly'),dailyData:()=>renderDataView('daily'),weeklyData:()=>renderDataView('weekly'),summary:renderSummary,userManagement:renderUserManagement,formConfig:renderFormConfig,aiChat:renderAIChat,settings:renderSettings}[page]||(()=>{}))();
  closeSidebar();
  // Background refresh: silently fetch latest data (non-blocking, only for read-only pages)
  silentRefresh(page);
}

// Silently fetch latest report data in background; only re-render if data count changed
async function silentRefresh(page) {
  if (bgRefreshInFlight) return;
  if (Date.now() - lastRefreshTime < REFRESH_INTERVAL) return;
  // Only background-refresh read-only pages (not forms with user input)
  if (!['dashboard','dailyData','weeklyData','summary'].includes(page)) return;
  bgRefreshInFlight = true;
  lastRefreshTime = Date.now();
  updateSidebarRefreshTime();
  try {
    const [dRes, wRes] = await Promise.all([
      fetch(FB_BASE + '/dailyReports.json'),
      fetch(FB_BASE + '/weeklyReports.json')
    ]);
    const newDaily = dRes.ok ? Object.values(await dRes.json() || {}) : [];
    const newWeekly = wRes.ok ? Object.values(await wRes.json() || {}) : [];
    // Only update + re-render if data count changed (new records added by others)
    if (newDaily.length !== cloudData.dailyReports.length || newWeekly.length !== cloudData.weeklyReports.length) {
      cloudData.dailyReports = newDaily;
      cloudData.weeklyReports = newWeekly;
      const activePage = document.querySelector('.nav-item.active')?.dataset.page;
      if (activePage === page) {
        ({dashboard:renderDashboard,dailyData:()=>renderDataView('daily'),weeklyData:()=>renderDataView('weekly'),summary:renderSummary}[page]||(()=>{}))();
      }
    }
  } catch(e) { /* silent fail */ }
  bgRefreshInFlight = false;
}

// ============ Mobile Sidebar Toggle ============
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebarOverlay');
  sb.classList.toggle('open');
  ov.classList.toggle('show');
}
function closeSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebarOverlay');
  sb.classList.remove('open');
  ov.classList.remove('show');
}

// ============ Brand Config ============
const DEFAULT_BRAND_CONFIG = {
  sidebarLogo: '📊',
  sidebarTitle: 'SOP数据管理',
  sidebarSubtitle: 'Team SOP System',

// ============ Draft Auto-Save ============
function draftKey(type) {
  return 'sop_draft_' + type + '_' + (currentUser ? currentUser.id : 'anon');
}

let draftSaveTimer = null;

function collectDraftData(type) {
  const channels = getChannels(type);
  const dateEl = document.getElementById('reportDate');
  const remarkEl = document.getElementById('reportRemark');
  const channelData = channels.map((ch, idx) => {
    const g = document.querySelector(`.channel-form-grid[data-idx="${idx}"]`);
    if (!g) return null;
    const d = {channel: ch.name};
    FIELD_DEFS.forEach(fd => {
      if (fd.type === 'computed') return;
      const el = g.querySelector(`[data-field="${fd.key}"]`);
      if (el && !el.disabled) d[fd.key] = el.value;
    });
    return d;
  }).filter(Boolean);
  return {
    date: dateEl ? dateEl.value : '',
    remark: remarkEl ? remarkEl.value : '',
    channels: channelData,
    savedAt: new Date().toISOString()
  };
}

function saveDraft(type) {
  try {
    const data = collectDraftData(type);
    // Only save if there's actual content
    const hasContent = data.date || data.remark || data.channels.some(ch =>
      Object.values(ch).some(v => v && v.toString().trim() && v !== ch.channel)
    );
    if (!hasContent) return;
    localStorage.setItem(draftKey(type), JSON.stringify(data));
  } catch(e) { /* localStorage may be full, silent fail */ }
}

function attachDraftListeners(type) {
  const inputs = document.querySelectorAll('#channelForms input, #channelForms textarea, #reportDate, #reportRemark');
  inputs.forEach(el => {
    el.addEventListener('input', () => {
      if (draftSaveTimer) clearTimeout(draftSaveTimer);
      draftSaveTimer = setTimeout(() => saveDraft(type), 800);
    });
    el.addEventListener('change', () => {
      if (draftSaveTimer) clearTimeout(draftSaveTimer);
      draftSaveTimer = setTimeout(() => saveDraft(type), 800);
    });
  });
}

function restoreDraft(type) {
  let raw;
  try { raw = localStorage.getItem(draftKey(type)); } catch(e) { return; }
  if (!raw) return;
  let draft;
  try { draft = JSON.parse(raw); } catch(e) { return; }
  // Check if draft is from today (daily) or this week (weekly)
  const isDaily = type === 'daily';
  const today = new Date().toISOString().split('T')[0];
  const ws = getWeekStart();
  const expectedDate = isDaily ? today : ws;
  if (draft.date !== expectedDate) return; // Stale draft for a different date
  // Check if there's actual content worth restoring
  const hasContent = draft.remark || (draft.channels && draft.channels.some(ch =>
    Object.entries(ch).some(([k,v]) => k !== 'channel' && v && v.toString().trim())
  ));
  if (!hasContent) return;

  // Show restore banner
  const alertEl = document.getElementById('formAlert');
  if (alertEl) {
    const savedTime = new Date(draft.savedAt);
    const timeStr = savedTime.getHours().toString().padStart(2,'0') + ':' + savedTime.getMinutes().toString().padStart(2,'0');
    alertEl.innerHTML = `<div class="alert alert-warning" style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
      <span>📝 检测到 ${timeStr} 的未提交草稿，是否恢复？</span>
      <span style="display:flex;gap:8px;flex-shrink:0">
        <button class="btn btn-primary btn-sm" onclick="doRestoreDraft('${type}')">恢复草稿</button>
        <button class="btn btn-outline btn-sm" onclick="doDiscardDraft('${type}')">丢弃</button>
      </span>
    </div>`;
  }
  // Store draft for restore button
  window._pendingDraft = {type, draft};
}

function doRestoreDraft(type) {
  const {draft} = window._pendingDraft || {};
  if (!draft) return;
  // Restore date and remark
  if (draft.date) { const d = document.getElementById('reportDate'); if (d) d.value = draft.date; }
  if (draft.remark) { const r = document.getElementById('reportRemark'); if (r) r.value = draft.remark; }
  // Restore channel data
  const channels = getChannels(type);
  if (draft.channels) {
    draft.channels.forEach(chData => {
      const idx = channels.findIndex(ch => ch.name === chData.channel);
      if (idx < 0) return;
      const g = document.querySelector(`.channel-form-grid[data-idx="${idx}"]`);
      if (!g) return;
      Object.entries(chData).forEach(([k, v]) => {
        if (k === 'channel') return;
        const el = g.querySelector(`[data-field="${k}"]`);
        if (el && !el.disabled) el.value = v;
      });
      updateChannelBadge(idx);
      // Recalculate computed fields
      const firstInput = g.querySelector('input[data-field]');
      if (firstInput) calcRates(firstInput);
    });
  }
  // Clear the banner
  const alertEl = document.getElementById('formAlert');
  if (alertEl) alertEl.innerHTML = '<div class="alert alert-success">✅ 草稿已恢复</div>';
  setTimeout(() => { if (alertEl) alertEl.innerHTML = ''; }, 3000);
  window._pendingDraft = null;
}

function doDiscardDraft(type) {
  try { localStorage.removeItem(draftKey(type)); } catch(e) {}
  const alertEl = document.getElementById('formAlert');
  if (alertEl) alertEl.innerHTML = '';
  window._pendingDraft = null;
}

function clearDraft(type) {
  try { localStorage.removeItem(draftKey(type)); } catch(e) {}
}

  // Update chip active state
  document.querySelectorAll('.channel-chip').forEach(c => c.classList.remove('active'));
  const chip = document.querySelector(`[data-chip-idx="${idx}"]`);
  if (chip && !card.classList.contains('collapsed')) chip.classList.add('active');

}

function collapseAllChannels() {
  document.querySelectorAll('.channel-card.collapsible').forEach(c => c.classList.add('collapsed'));
  document.querySelectorAll('.channel-chip').forEach(c => c.classList.remove('active'));
}

function jumpToChannel(idx) {
  const card = document.getElementById('chCard' + idx);
  if (!card) return;
  // Expand if collapsed
  card.classList.remove('collapsed');
  // Scroll into view
  const topBarHeight = 56;
  const rect = card.getBoundingClientRect();
  const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
  window.scrollTo({top: scrollTop + rect.top - topBarHeight - 10, behavior: 'smooth'});
  // Highlight chip
  document.querySelectorAll('.channel-chip').forEach(c => c.classList.remove('active'));
  const chip = document.querySelector(`[data-chip-idx="${idx}"]`);
  if (chip) chip.classList.add('active');
}

function updateChannelBadge(idx) {
  const g = document.querySelector(`.channel-form-grid[data-idx="${idx}"]`);
  if (!g) return;
  const inputs = g.querySelectorAll('input[data-field], textarea[data-field]');
  let total = 0, filled = 0;
  inputs.forEach(inp => {
    if (inp.disabled) return;
    total++;
    if (inp.value.trim()) filled++;
  });
  const badge = document.getElementById('chBadge' + idx);
  if (badge) {
    badge.textContent = filled + '/' + total;
    badge.classList.toggle('empty', filled === 0);
  }
  const chipCount = document.getElementById('chipCount' + idx);
  if (chipCount) {
    chipCount.textContent = filled > 0 ? '(' + filled + ')' : '';
  }
}

function onWeekStartChange() {
  const input = document.getElementById('reportDate');
  const val = input.value;
  if (!val) return;
  const d = new Date(val);
  const day = d.getDay(); // 0=Sun, 1=Mon ... 6=Sat
  if (day !== 1) {
    // Auto-correct to the Monday of that week
    const offset = day === 0 ? -6 : 1 - day;
    d.setDate(d.getDate() + offset);
    const corrected = d.toISOString().split('T')[0];
    input.value = corrected;
    alert('周报起始日已自动调整为本周周一：' + corrected);
  }
  document.getElementById('reportWeekEnd').value = getWeekEnd(input.value);
}

function updateWeekEnd() {
  const s = document.getElementById('reportDate').value;
  document.getElementById('reportWeekEnd').value = getWeekEnd(s);
}

function onEditWeekStartChange() {
  const input = document.getElementById('editDate');
  const val = input.value;
  if (!val) return;
  const d = new Date(val);
  const day = d.getDay();
  if (day !== 1) {
    const offset = day === 0 ? -6 : 1 - day;
    d.setDate(d.getDate() + offset);
    const corrected = d.toISOString().split('T')[0];
    input.value = corrected;
    alert('周报起始日已自动调整为本周周一：' + corrected);
  }
  const we = document.getElementById('editWeekEnd');
  if (we) we.value = getWeekEnd(input.value);
}

function calcRates(input) {
  const g = input.closest('.channel-form-grid');
  const ec = parseFloat(g.querySelector('[data-field="effectiveContacts"]')?.value) || 0;
  const ab = parseFloat(g.querySelector('[data-field="abIntent"]')?.value) || 0;
  const da = parseFloat(g.querySelector('[data-field="dealAmount"]')?.value) || 0;
  const ta = parseFloat(g.querySelector('[data-field="targetAmount"]')?.value) || 0;
  const cr = g.querySelector('[data-field="contactToAbRate"]');
  const cp = g.querySelector('[data-field="completionRate"]');
  if (cr && !cr.style.color.includes('999')) cr.textContent = ec > 0 ? (ab/ec*100).toFixed(1)+'%' : '0%';
  if (cp && !cp.style.color.includes('999')) cp.textContent = ta > 0 ? (da/ta*100).toFixed(1)+'%' : '0%';
}

async function submitReport(type) {
  const isDaily = type === 'daily';
  const dateVal = document.getElementById('reportDate').value;
  if (!dateVal) { alert('请选择日期'); return; }
  if (!isDaily) {
    const wd = new Date(dateVal).getDay();
    if (wd !== 1) { alert('周报起始日必须是周一，请重新选择'); return; }
  }
  const channels = getChannels(type);
  // Validate required fields
  const missingFields = [];
  channels.forEach((ch, idx) => {
    const g = document.querySelector(`.channel-form-grid[data-idx="${idx}"]`);
    FIELD_DEFS.forEach(fd => {
      const rule = getFieldRule(ch, fd.key);
      if (rule.required && !rule.disabled && fd.type !== 'computed') {
        const el = g.querySelector(`[data-field="${fd.key}"]`);
        if (!el || !el.value.trim()) {
          missingFields.push(`「${ch.name}」- ${fd.label}`);
        }
      }
    });
  });
  if (missingFields.length > 0) {
    // Auto-expand the first channel with missing required fields
    const firstMissingIdx = channels.findIndex((ch, idx) => {
      const g = document.querySelector(`.channel-form-grid[data-idx="${idx}"]`);
      return FIELD_DEFS.some(fd => {
        const rule = getFieldRule(ch, fd.key);
        if (rule.required && !rule.disabled && fd.type !== 'computed') {
          const el = g.querySelector(`[data-field="${fd.key}"]`);
          return !el || !el.value.trim();
        }
        return false;
      });
    });
    if (firstMissingIdx >= 0) {
      const card = document.getElementById('chCard' + firstMissingIdx);
      if (card) { card.classList.remove('collapsed'); jumpToChannel(firstMissingIdx); }
    }
    document.getElementById('formAlert').innerHTML = `<div class="alert alert-danger">❌ 以下必填项未填写：<br>${missingFields.join('<br>')}</div>`;
    document.getElementById('formAlert').scrollIntoView({behavior:'smooth'});
    return;
  }
  document.getElementById('formAlert').innerHTML = '';
  // Check that at least one field has content (prevent empty submission)
  let hasContent = false;
  channels.forEach((ch, idx) => {
    const g = document.querySelector(`.channel-form-grid[data-idx="${idx}"]`);
    FIELD_DEFS.forEach(fd => {
      if (fd.type === 'computed') return;
      const el = g.querySelector(`[data-field="${fd.key}"]`);
      if (el && !el.disabled && el.value.trim()) hasContent = true;
    });
  });
  const remarkEl = document.getElementById('reportRemark');
  if (remarkEl && remarkEl.value.trim()) hasContent = true;
  if (!hasContent) {
    document.getElementById('formAlert').innerHTML = '<div class="alert alert-danger">❌ 请至少填写一项内容后再提交，不允许提交空报告</div>';
    document.getElementById('formAlert').scrollIntoView({behavior:'smooth'});
    showToast('请至少填写一项内容后再提交', 'warning', 3000);
    return;
  }
  const submitBtns = document.querySelectorAll('.sticky-submit-bar .btn-primary');
  submitBtns.forEach(b => { b.disabled = true; b.dataset.original = b.textContent; b.textContent = '⏳ 提交中...'; });
  const channelData = channels.map((ch, idx) => {
    const g = document.querySelector(`.channel-form-grid[data-idx="${idx}"]`);
    const d = {channel: ch.name, reference: ch.reference};
    FIELD_DEFS.forEach(fd => {
      if (fd.type === 'computed') return;
      const el = g.querySelector(`[data-field="${fd.key}"]`);
      d[fd.key] = el && !el.disabled ? el.value : '';
    });
    return d;
  });
  const report = {
    id: genId(), userId: currentUser.id, username: currentUser.username,
    name: currentUser.name, department: currentUser.department,
    channels: channelData, remark: document.getElementById('reportRemark').value,
    createdAt: new Date().toISOString()
  };
  if (isDaily) { report.reportDate = dateVal; }
  else { report.weekStart = dateVal; report.weekEnd = document.getElementById('reportWeekEnd').value; }
  try {
    await apiCreate(isDaily ? 'dailyReports' : 'weeklyReports', report);
    if (isDaily) cloudData.dailyReports.push(report); else cloudData.weeklyReports.push(report);
  } catch(e) {
    submitBtns.forEach(b => { b.disabled = false; b.textContent = b.dataset.original || '✓ 提交'; });
    showToast('保存到云端失败: ' + e.message, 'error', 4000);
    showModal('提交失败 ❌', `<div class="alert alert-danger">❌ 保存到云端失败: ${e.message}<br>请稍后重试或联系管理员</div>
      <div style="text-align:center;margin-top:16px"><button class="btn btn-outline" onclick="closeModal()">关闭</button></div>`);
    return;
  }

  // Clear draft on successful submit
  clearDraft(type);

  showToast(`${isDaily?'日报':'周报'}提交成功！`, 'success');
  showModal('提交成功 ✅', `<div class="alert alert-success">✅ ${isDaily?'日报':'周报'}已保存到云端！数据已实时同步。</div>
    <div style="text-align:center;margin-top:16px">
      <button class="btn btn-outline" onclick="closeModal();navTo('${isDaily?'dailyData':'weeklyData'}')">查看数据</button>
      <button class="btn btn-primary" onclick="closeModal();navTo('dashboard')">返回首页</button>
    </div>`);
}

          const ec=parseFloat(ch.effectiveContacts)||0,ab=parseFloat(ch.abIntent)||0,da=parseFloat(ch.dealAmount)||0,ta=parseFloat(ch.targetAmount)||0;

// ============ Edit / Delete Report ============
function editReport(type, reportId) {
  const reports = type === 'daily' ? cloudData.dailyReports : cloudData.weeklyReports;
  const r = reports.find(x => x.id === reportId);
  if (!r) return;
  const canEdit = currentUser.role === 'admin' || r.userId === currentUser.id;
  if (!canEdit) { alert('无权编辑此报告'); return; }
  const isDaily = type === 'daily';
  const channels = r.channels || [];
  const dl = isDaily ? r.reportDate : `${r.weekStart} ~ ${r.weekEnd}`;

  const channelForms = channels.map((ch, idx) => {
    return `<div class="channel-card">
      <div class="channel-card-header">
        <div class="ch-name"><span class="badge ${isDaily?'badge-success':'badge-warning'}">${isDaily?'日':'周'}</span> ${ch.channel}</div>
        ${ch.reference ? `<div class="ch-ref-box"><span class="ch-ref-label">📋 参考标准</span><span class="ch-ref-text">${ch.reference}</span></div>` : ''}
      </div>
      <div class="channel-form-grid" data-edit-idx="${idx}">
        ${FIELD_DEFS.map(fd => {
          const val = ch[fd.key] || '';
          const cfgCh = getChannels(isDaily?'daily':'weekly').find(c => c.name === ch.channel);
          const rule = cfgCh ? getFieldRule(cfgCh, fd.key) : {};
          if (rule.hidden) return '';
          const hintHtml = rule.hint ? `<div class="field-hint">💡 ${rule.hint}</div>` : '';
          if (fd.type === 'computed') {
            const ec=parseFloat(ch.effectiveContacts)||0, ab=parseFloat(ch.abIntent)||0, da=parseFloat(ch.dealAmount)||0, ta=parseFloat(ch.targetAmount)||0;
            const cv = fd.key === 'contactToAbRate' ? (ec>0?(ab/ec*100).toFixed(1)+'%':'0%') : (ta>0?(da/ta*100).toFixed(1)+'%':'0%');
            const dis = val === '/' || val === '';
            return `<div><label>${fd.label}</label>${hintHtml}<div class="computed-field" data-field="${fd.key}">${dis?'/':cv}</div></div>`;
          }
          if (fd.type === 'textarea') {
            const ph = rule.hint || '遇到的问题及改进措施...';
            return `<div class="full-width"><label>${fd.label}</label>${hintHtml}<textarea data-field="${fd.key}" rows="2" placeholder="${ph}">${val}</textarea></div>`;
          }
          const extraOnInput = ['effectiveContacts','abIntent','dealAmount','targetAmount'].includes(fd.key) ? ' oninput="calcRates(this)"' : '';
          const dis = val === '/';
          return `<div><label>${fd.label}</label>${hintHtml}<input type="number" min="0" ${fd.key==='dealAmount'||fd.key==='targetAmount'?'step="0.01"':''} data-field="${fd.key}" value="${dis?'':val}" placeholder="0" ${dis?'disabled':''}${extraOnInput}></div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  showModal(`编辑${isDaily?'日报':'周报'} - ${r.name} (${dl})`, `
    <div id="editAlert"></div>
    <div class="card" style="margin-bottom:16px"><div class="card-body">
      <div class="filter-bar">
        <div class="form-group"><label>${isDaily?'填写日期':'周报起始日（周一）'}</label><input type="date" class="form-control" id="editDate" value="${isDaily?r.reportDate:r.weekStart}" ${isDaily?'':'onchange="onEditWeekStartChange()"'}></div>
        ${!isDaily?`<div class="form-group"><label>周报结束日</label><input type="date" class="form-control" id="editWeekEnd" value="${r.weekEnd}" readonly></div>`:''}
        <div class="form-group" style="flex:1;min-width:200px"><label>备注</label><input type="text" class="form-control" id="editRemark" value="${r.remark||''}"></div>
      </div>
    </div></div>
    ${channelForms}
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEditedReport('${type}','${reportId}')">💾 保存修改</button>
    </div>
  `, true);
}

async function saveEditedReport(type, reportId) {
  const reports = type === 'daily' ? cloudData.dailyReports : cloudData.weeklyReports;
  const r = reports.find(x => x.id === reportId);
  if (!r) return;
  const isDaily = type === 'daily';
  const alertEl = document.getElementById('editAlert');

  const dateVal = document.getElementById('editDate').value;
  if (!dateVal) { alertEl.innerHTML = '<div class="alert alert-danger">❌ 请选择日期</div>'; return; }

  const channels = (r.channels || []).map((ch, idx) => {
    const g = document.querySelector(`.channel-form-grid[data-edit-idx="${idx}"]`);
    const d = {channel: ch.channel, reference: ch.reference};
    FIELD_DEFS.forEach(fd => {
      if (fd.type === 'computed') return;
      const el = g.querySelector(`[data-field="${fd.key}"]`);
      d[fd.key] = el && !el.disabled ? el.value : '/';
    });
    return d;
  });

  const updates = {
    channels,
    remark: document.getElementById('editRemark').value,
    updatedAt: new Date().toISOString()
  };
  if (isDaily) { updates.reportDate = dateVal; }
  else { updates.weekStart = dateVal; updates.weekEnd = document.getElementById('editWeekEnd').value; }

  try {
    await apiUpdate(type === 'daily' ? 'dailyReports' : 'weeklyReports', reportId, updates);
    Object.assign(r, updates);
    closeModal();
    loadDataView(type);
    showToast('修改已保存到云端！', 'success');
  } catch(e) {
    showToast('保存失败: ' + e.message, 'error', 4000);
    alertEl.innerHTML = `<div class="alert alert-danger">❌ 保存失败: ${e.message}</div>`;
  }
}

async function deleteReport(type, reportId) {
  const reports = type === 'daily' ? cloudData.dailyReports : cloudData.weeklyReports;
  const r = reports.find(x => x.id === reportId);
  if (!r) return;
  const canDelete = currentUser.role === 'admin' || r.userId === currentUser.id;
  if (!canDelete) { alert('无权删除此报告'); return; }
  if (!confirm(`确定删除 ${r.name} 的这条${type==='daily'?'日报':'周报'}吗？此操作不可撤销。`)) return;

  try {
    await apiDelete(type === 'daily' ? 'dailyReports' : 'weeklyReports', reportId);
    const idx = reports.findIndex(x => x.id === reportId);
    if (idx > -1) reports.splice(idx, 1);
    loadDataView(type);
    showToast(`${type==='daily'?'日报':'周报'}已删除`, 'success');
  } catch(e) {
    showToast('删除失败: ' + e.message, 'error', 4000);
  }
}

  html += `<div class="form-group"><label>&nbsp;</label><button class="btn btn-outline btn-sm" onclick="summaryFilters={dept:'',person:'',channel:''};loadSummary()">🔄 重置筛选</button></div>`;

function loadSummary() {
  const type = document.getElementById('sumType').value;
  const s = document.getElementById('sumStart').value;
  const e = document.getElementById('sumEnd').value;
  let reports = type==='daily'?[...cloudData.dailyReports]:[...cloudData.weeklyReports];
  if (s) reports = reports.filter(r => (type==='daily'?r.reportDate:r.weekStart) >= s);
  if (e) reports = reports.filter(r => (type==='daily'?r.reportDate:r.weekStart) <= e);

  const byP={},byD={},byC={};
  // Initialize byC with all configured channels so new channels always appear
  getChannels(type).forEach(ch => {
    byC[ch.name] = {channel:ch.name, newLeads:0, effectiveContacts:0, abIntent:0, closedCustomers:0, dealAmount:0, targetAmount:0, count:0};
  });
  let t={newLeads:0,effectiveContacts:0,abIntent:0,closedCustomers:0,dealAmount:0,targetAmount:0};

  reports.forEach(r => {
    // Apply person filter (skip this person's reports)
    if (summaryFilters.person && r.name !== summaryFilters.person) return;
    // Apply department filter (skip this department's reports)
    if (summaryFilters.dept && r.department !== summaryFilters.dept) return;

    if(!byP[r.name])byP[r.name]={name:r.name,department:r.department,newLeads:0,effectiveContacts:0,abIntent:0,closedCustomers:0,dealAmount:0,targetAmount:0,count:0};
    if(!byD[r.department])byD[r.department]={department:r.department,newLeads:0,effectiveContacts:0,abIntent:0,closedCustomers:0,dealAmount:0,targetAmount:0,count:0};
    byP[r.name].count++;byD[r.department].count++;
    (r.channels||[]).forEach(ch => {
      // Apply channel filter (skip this channel)
      if (summaryFilters.channel && ch.channel !== summaryFilters.channel) return;

      const nl=parseFloat(ch.newLeads)||0,ec=parseFloat(ch.effectiveContacts)||0,ab=parseFloat(ch.abIntent)||0,cc=parseFloat(ch.closedCustomers)||0,da=parseFloat(ch.dealAmount)||0,ta=parseFloat(ch.targetAmount)||0;
      byP[r.name].newLeads+=nl;byP[r.name].effectiveContacts+=ec;byP[r.name].abIntent+=ab;byP[r.name].closedCustomers+=cc;byP[r.name].dealAmount+=da;byP[r.name].targetAmount+=ta;
      byD[r.department].newLeads+=nl;byD[r.department].effectiveContacts+=ec;byD[r.department].abIntent+=ab;byD[r.department].closedCustomers+=cc;byD[r.department].dealAmount+=da;byD[r.department].targetAmount+=ta;
      t.newLeads+=nl;t.effectiveContacts+=ec;t.abIntent+=ab;t.closedCustomers+=cc;t.dealAmount+=da;t.targetAmount+=ta;
      if(!byC[ch.channel])byC[ch.channel]={channel:ch.channel,newLeads:0,effectiveContacts:0,abIntent:0,closedCustomers:0,dealAmount:0,targetAmount:0,count:0};
      byC[ch.channel].count++;
      byC[ch.channel].newLeads+=nl;byC[ch.channel].effectiveContacts+=ec;byC[ch.channel].abIntent+=ab;byC[ch.channel].closedCustomers+=cc;byC[ch.channel].dealAmount+=da;byC[ch.channel].targetAmount+=ta;
    });
  });
  const cr=o=>{o.contactToAbRate=o.effectiveContacts>0?(o.abIntent/o.effectiveContacts*100).toFixed(1)+'%':'0%';o.completionRate=o.targetAmount>0?(o.dealAmount/o.targetAmount*100).toFixed(1)+'%':'0%'};
  Object.values(byP).forEach(cr);Object.values(byD).forEach(cr);Object.values(byC).forEach(cr);cr(t);
  summaryData = {byPerson:Object.values(byP),byDepartment:Object.values(byD),byChannel:Object.values(byC),totals:t,count:reports.length,reports:reports};
  renderSubFilters();
  renderSummaryTab();
}

function switchTab(tab){
  summaryTab=tab;
  // Clear filters not relevant to the new tab
  if (tab === 'byPerson') { summaryFilters.person = ''; }
  else if (tab === 'byDepartment') { summaryFilters.dept = ''; }
  else if (tab === 'byChannel') { summaryFilters.channel = ''; }
  document.querySelectorAll('.summary-tab').forEach(t=>t.classList.remove('active'));
  const tabEl = document.querySelector(`.summary-tab[data-t="${tab}"]`);
  if (tabEl) tabEl.classList.add('active');
  loadSummary();
}

let _summaryCharts = {};
function destroySummaryCharts() {
  Object.values(_summaryCharts).forEach(ch => { try { ch.destroy(); } catch(e){} });
  _summaryCharts = {};
}

function renderSummaryCharts() {
  destroySummaryCharts();
  if (!summaryData || typeof Chart === 'undefined') return;
  const type = document.getElementById('sumType') ? document.getElementById('sumType').value : 'daily';
  const isDaily = type === 'daily';
  const palette = ['#2563eb','#16a34a','#f59e0b','#dc2626','#7c3aed','#0891b2','#db2777','#4f46e5'];

  Chart.defaults.font.family = '-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Microsoft YaHei",sans-serif';
  Chart.defaults.font.size = 12;
  Chart.defaults.color = '#6b7280';

  if (summaryTab === 'totals') {
    // Chart 1: Channel comparison bar chart
    const chCanvas = document.getElementById('sumChartChannel');
    if (chCanvas) {
      const chData = summaryData.byChannel.filter(c => c.count > 0);
      if (chData.length > 0) {
        _summaryCharts.channel = new Chart(chCanvas, {
          type: 'bar',
          data: {
            labels: chData.map(c => c.channel),
            datasets: [
              {label:'新增线索', data:chData.map(c=>c.newLeads), backgroundColor:'#2563eb', borderRadius:4},
              {label:'有效建联', data:chData.map(c=>c.effectiveContacts), backgroundColor:'#16a34a', borderRadius:4},
              {label:'AB意向', data:chData.map(c=>c.abIntent), backgroundColor:'#f59e0b', borderRadius:4},
              {label:'成交客户', data:chData.map(c=>c.closedCustomers), backgroundColor:'#dc2626', borderRadius:4}
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 8 } } },
            scales: { x: { stacked: false, grid: { display: false } }, y: { beginAtZero: true, grid: { color: '#f3f4f6' } } }
          }
        });
      }
    }

    // Chart 2: Submission trend line chart
    const trendCanvas = document.getElementById('sumChartTrend');
    if (trendCanvas && summaryData.reports) {
      const dateMap = {};
      summaryData.reports.forEach(r => {
        const d = isDaily ? r.reportDate : r.weekStart;
        if (!d) return;
        dateMap[d] = (dateMap[d] || 0) + 1;
      });
      const sortedDates = Object.keys(dateMap).sort();
      if (sortedDates.length > 0) {
        _summaryCharts.trend = new Chart(trendCanvas, {
          type: 'line',
          data: {
            labels: sortedDates.map(d => d.substring(5)),
            datasets: [{
              label: isDaily ? '每日提交数' : '每周提交数',
              data: sortedDates.map(d => dateMap[d]),
              borderColor: '#2563eb',
              backgroundColor: 'rgba(37,99,235,0.1)',
              fill: true,
              tension: 0.3,
              pointRadius: 3,
              pointBackgroundColor: '#2563eb'
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { grid: { display: false } }, y: { beginAtZero: true, grid: { color: '#f3f4f6' }, ticks: { stepSize: 1 } } }
          }
        });
      }
    }
  } else {
    // Comparison chart for byPerson/byDepartment/byChannel tabs
    const cmpCanvas = document.getElementById('sumChartCompare');
    if (!cmpCanvas) return;
    let data, labelKey;
    if (summaryTab === 'byPerson') { data = summaryData.byPerson; labelKey = 'name'; }
    else if (summaryTab === 'byDepartment') { data = summaryData.byDepartment; labelKey = 'department'; }
    else { data = summaryData.byChannel; labelKey = 'channel'; }
    data = data.filter(d => d.count > 0);
    if (data.length === 0) return;
    const labels = data.map(d => d[labelKey] || d.name || d.department || d.channel);

    _summaryCharts.compare = new Chart(cmpCanvas, {
      type: 'bar',

function exportSummaryCSV() {
  if (!summaryData) { alert('请先查询汇总数据'); return; }
  const type = document.getElementById('sumType').value;
  const s = document.getElementById('sumStart').value;
  const e = document.getElementById('sumEnd').value;
  const typeLabel = type === 'daily' ? '日报' : '周报';
  const f = v => v > 0 ? v.toLocaleString() : '0';
  const fm = v => v > 0 ? v.toLocaleString() : '0';
  const rows = [];

  if (summaryTab === 'totals') {
    const t = summaryData.totals;
    rows.push('指标,数值');
    rows.push('报告总数,' + summaryData.count);
    rows.push('新增精准线索,' + f(t.newLeads));
    rows.push('有效建联数,' + f(t.effectiveContacts));
    rows.push('AB意向数,' + f(t.abIntent));
    rows.push('成交客户数,' + f(t.closedCustomers));
    rows.push('成交金额,' + fm(t.dealAmount));
    rows.push('建联转AB率,' + t.contactToAbRate);
    rows.push('目标金额,' + fm(t.targetAmount));
    rows.push('完成率,' + t.completionRate);
  } else {
    let data, titleCol, headers;
    if (summaryTab === 'byPerson') {
      data = summaryData.byPerson; titleCol = '姓名';
      headers = ['姓名','部门','报告数','新增线索','有效建联','AB意向','成交客户','成交金额','建联转AB率','目标金额','完成率'];
    } else if (summaryTab === 'byDepartment') {
      data = summaryData.byDepartment; titleCol = '部门';
      headers = ['部门','报告数','新增线索','有效建联','AB意向','成交客户','成交金额','建联转AB率','目标金额','完成率'];
    } else {
      data = summaryData.byChannel; titleCol = '渠道';
      headers = ['渠道','报告数','新增线索','有效建联','AB意向','成交客户','成交金额','建联转AB率','目标金额','完成率'];
    }
    rows.push(headers.join(','));
    data.forEach(d => {
      const nm = d.name || d.department || d.channel;
      const sub = summaryTab === 'byPerson' ? (d.department || '') : '';
      const row = summaryTab === 'byPerson'
        ? [nm, sub, d.count||0, f(d.newLeads), f(d.effectiveContacts), f(d.abIntent), f(d.closedCustomers), fm(d.dealAmount), d.contactToAbRate, fm(d.targetAmount), d.completionRate]
        : [nm, d.count||0, f(d.newLeads), f(d.effectiveContacts), f(d.abIntent), f(d.closedCustomers), fm(d.dealAmount), d.contactToAbRate, fm(d.targetAmount), d.completionRate];
      rows.push(row.join(','));
    });
  }

  // Add filter info at top
  const filterInfo = [
    '# ' + typeLabel + '汇总数据导出',
    '# 查询区间: ' + (s||'全部') + ' 至 ' + (e||'全部'),
    '# 汇总维度: ' + (summaryTab==='byPerson'?'按人员':summaryTab==='byDepartment'?'按部门':summaryTab==='byChannel'?'按渠道':'总计'),
    '# 导出时间: ' + new Date().toLocaleString('zh-CN'),
    ''
  ];
  const csv = '\uFEFF' + filterInfo.join('\n') + rows.join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = typeLabel + '汇总_' + (summaryTab==='byPerson'?'按人员':summaryTab==='byDepartment'?'按部门':summaryTab==='byChannel'?'按渠道':'总计') + '_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function handleImportFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'csv') {
    const reader = new FileReader();
    reader.onload = function(e) {
      let text = e.target.result;
      // Remove BOM
      if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
      document.getElementById('importTextArea').value = text.trim();
      document.getElementById('importAlert').innerHTML = '<div class="alert alert-success">✅ 文件已读取，请检查内容后点击"开始导入"</div>';
    };
    reader.readAsText(file, 'UTF-8');
  } else if (ext === 'xlsx' || ext === 'xls') {
    // Excel: use SheetJS if available, otherwise prompt to use CSV
    if (typeof XLSX === 'undefined') {
      // Dynamically load SheetJS
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
      script.onload = function() { parseExcelFile(file); };
      script.onerror = function() {
        document.getElementById('importAlert').innerHTML = '<div class="alert alert-danger">❌ Excel解析库加载失败，请将文件另存为CSV格式后重试</div>';
      };
      document.head.appendChild(script);
    } else {
      parseExcelFile(file);
    }
  } else {
    document.getElementById('importAlert').innerHTML = '<div class="alert alert-danger">❌ 不支持的文件格式，请使用CSV或Excel文件</div>';
  }
}

function parseExcelFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const csv = XLSX.utils.sheet_to_csv(ws, {FS:','});
      document.getElementById('importTextArea').value = csv.trim();
      document.getElementById('importAlert').innerHTML = '<div class="alert alert-success">✅ Excel文件已解析，请检查内容后点击"开始导入"</div>';
    } catch(err) {
      document.getElementById('importAlert').innerHTML = '<div class="alert alert-danger">❌ Excel解析失败: ' + err.message + '</div>';
    }
  };
  reader.readAsArrayBuffer(file);
}

async function doImportUsers() {
  const text = document.getElementById('importTextArea').value.trim();
  const alertEl = document.getElementById('importAlert');
  if (!text) { alertEl.innerHTML = '<div class="alert alert-danger">❌ 请粘贴数据或选择文件</div>'; return; }

  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length === 0) { alertEl.innerHTML = '<div class="alert alert-danger">❌ 没有有效数据</div>'; return; }

  // Parse lines
  const records = [];
  let skippedHeader = false;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    // Split by comma or tab
    const parts = line.split(/[,\t]/).map(p => p.trim().replace(/^"|"$/g, ''));
    // Skip header row
    if (i === 0 && (parts[0] === '账号' || parts[0].toLowerCase() === 'username' || parts[0] === '用户名')) {
      skippedHeader = true;
      continue;
    }
    if (parts.length < 3) { records.push({line:i+1, error:'列数不足（至少需要：账号,密码,姓名）'}); continue; }
    const username = parts[0];
    const password = parts[1];
    const name = parts[2];
    const department = parts[3] || '';
    if (!username) { records.push({line:i+1, error:'账号为空'}); continue; }
    if (!password) { records.push({line:i+1, error:'密码为空', username}); continue; }
    if (password.length < 6) { records.push({line:i+1, error:'密码不足6位', username}); continue; }
    if (!name) { records.push({line:i+1, error:'姓名为空', username}); continue; }
    records.push({line:i+1, username, password, name, department});
  }

  const validRecords = records.filter(r => !r.error);
  const errorRecords = records.filter(r => r.error);

  // Check duplicates within import and existing users
  const seenUsernames = new Set();
  const existingUsernames = new Set(cloudData.users.map(u => u.username));
  const toCreate = [];
  const skippedDup = [];
  validRecords.forEach(r => {
    if (existingUsernames.has(r.username) || seenUsernames.has(r.username)) {
      skippedDup.push(r);
    } else {
      seenUsernames.add(r.username);
      toCreate.push(r);
    }
  });

  if (toCreate.length === 0) {
    let msg = '❌ 没有可导入的有效记录';
    if (skippedDup.length) msg += `\n重复跳过：${skippedDup.length}条`;
    if (errorRecords.length) msg += `\n格式错误：${errorRecords.length}条`;
    alertEl.innerHTML = `<div class="alert alert-danger">${msg.replace(/\n/g,'<br>')}</div>`;
    return;
  }

  // Show progress
  alertEl.innerHTML = `<div class="alert alert-info">⏳ 正在导入 ${toCreate.length} 条记录...</div>`;

  // Batch create
  const results = {success: 0, failed: []};
  for (let i = 0; i < toCreate.length; i++) {
    const r = toCreate[i];
    try {
      const hp = await hashPassword(r.password);
      const user = {
        id: genId(), username: r.username, password: hp,
        name: r.name, department: r.department,
        role: 'member', active: true,
        createdAt: new Date().toISOString()
      };
      await apiCreate('users', user);
      cloudData.users.push(user);
      results.success++;
    } catch(err) {
      results.failed.push({line: r.line, username: r.username, error: err.message});
    }
  }

  // Auto-add any new departments from import
  let newDepts = [];
  toCreate.forEach(r => {
    if (r.department && !cloudData.departments.includes(r.department) && !newDepts.includes(r.department)) {
      newDepts.push(r.department);
    }
  });
  if (newDepts.length > 0) {
    cloudData.departments.push(...newDepts);
    cloudData.departments.sort();
    await saveDepartments();
  }

  // Show result
  let resultHtml = `<div class="alert alert-success">✅ 成功导入 ${results.success} 名成员</div>`;
  if (skippedDup.length > 0) {
    resultHtml += `<div class="alert alert-warning">⚠️ 重复跳过 ${skippedDup.length} 条：${skippedDup.map(r=>r.username).join(', ')}</div>`;
  }
  if (errorRecords.length > 0) {
    resultHtml += `<div class="alert alert-warning">⚠️ 格式错误跳过 ${errorRecords.length} 条：<br>${errorRecords.map(r=>`第${r.line}行: ${r.error}${r.username?'（'+r.username+'）':''}`).join('<br>')}</div>`;
  }
  if (results.failed.length > 0) {
    resultHtml += `<div class="alert alert-danger">❌ 导入失败 ${results.failed.length} 条：<br>${results.failed.map(r=>`第${r.line}行 ${r.username}: ${r.error}`).join('<br>')}</div>`;
  }
  resultHtml += `<div style="text-align:center;margin-top:16px"><button class="btn btn-primary" onclick="closeModal();renderUserManagement()">完成</button></div>`;
  alertEl.innerHTML = resultHtml;
}

// ============ CSV Export ============
function exportCSV(type) {
  const s = document.getElementById('fStart')?.value || '';
  const e = document.getElementById('fEnd')?.value || '';
  const fDept = document.getElementById('fDept')?.value || '';
  const fPerson = document.getElementById('fPerson')?.value || '';
  let reports = type==='daily'?[...cloudData.dailyReports]:[...cloudData.weeklyReports];
  if (s) reports = reports.filter(r => (type==='daily'?r.reportDate:r.weekStart) >= s);
  if (e) reports = reports.filter(r => (type==='daily'?r.reportDate:r.weekStart) <= e);
  if (fDept) reports = reports.filter(r => r.department === fDept);
  if (fPerson) reports = reports.filter(r => r.name === fPerson);
  const headers = ['姓名','部门',type==='weekly'?'周开始':'日期',type==='weekly'?'周结束':'','渠道','参考标准','新增精准线索数','有效建联数','AB意向数','成交客户数','成交金额','建联转AB率','目标金额','完成率','问题/提升动作'];
  const rows = [headers.join(',')];
  reports.forEach(r => {
    (r.channels||[]).forEach(ch => {
      const ec=parseFloat(ch.effectiveContacts)||0,ab=parseFloat(ch.abIntent)||0,da=parseFloat(ch.dealAmount)||0,ta=parseFloat(ch.targetAmount)||0;
      const ctr=ch.effectiveContacts===''||ch.effectiveContacts==='/'?'/':(ec>0?(ab/ec*100).toFixed(1)+'%':'/');
      const cpr=ch.targetAmount===''||ch.targetAmount==='/'?'/':(ta>0?(da/ta*100).toFixed(1)+'%':'/');
      const df=type==='weekly'?r.weekStart:r.reportDate;
      const ef=type==='weekly'?r.weekEnd:'';
      rows.push([r.name,r.department,df,ef,ch.channel,ch.reference||'',ch.newLeads||'',ch.effectiveContacts||'',ch.abIntent||'',ch.closedCustomers||'',ch.dealAmount||'',ctr,ch.targetAmount||'',cpr,(ch.issues||'').replace(/,/g,'，').replace(/\n/g,' ')].join(','));
    });
  });
  const csv = '\uFEFF' + rows.join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${type==='weekly'?'周报':'日报'}数据_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function handleLogoUpload(fileInput, inputId, previewId) {
  const file = fileInput.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) {
    alert('图片不能超过 2MB，请压缩后再上传');
    fileInput.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      // Crop to 2:1 aspect ratio (width:height), max width 256px
      const targetW = 256;
      const targetH = 128;
      const srcRatio = img.width / img.height;
      const dstRatio = targetW / targetH;
      let sx = 0, sy = 0, sw = img.width, sh = img.height;
      if (srcRatio > dstRatio) {
        // Source is wider, crop sides
        sw = img.height * dstRatio;
        sx = (img.width - sw) / 2;
      } else {
        // Source is taller, crop top/bottom
        sh = img.width / dstRatio;
        sy = (img.height - sh) / 2;
      }
      const canvas = document.createElement('canvas');
      canvas.width = targetW;
      canvas.height = targetH;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, targetW, targetH);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      document.getElementById(inputId).value = dataUrl;
      // Show preview
      const previewEl = document.getElementById(previewId);
      if (previewEl) {
        previewEl.innerHTML = '<div style="display:flex;align-items:center;gap:8px"><img src="' + dataUrl + '" style="width:80px;height:40px;border-radius:6px;object-fit:cover;border:1px solid var(--gray-200)"><span style="font-size:12px;color:var(--success)">✅ 图片已加载（2:1比例），点击"保存品牌配置"生效</span></div>';
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  fileInput.value = '';
}

function buildAIContext() {
  const userMap = {};
  cloudData.users.forEach(u => { userMap[u.id] = u; });
  const fc = cloudData.formConfig || DEFAULT_FORM_CONFIG;
  const fieldLabels = {};
  FIELD_DEFS.forEach(f => { fieldLabels[f.key] = f.label; });

  // Channel name maps
  const dChMap = {}, wChMap = {};
  (fc.daily || []).forEach(c => dChMap[c.id] = c.name);
  (fc.weekly || []).forEach(c => wChMap[c.id] = c.name);

  // Compile daily reports
  const dailyData = cloudData.dailyReports.map(r => {
    const u = userMap[r.userId] || {};
    const channels = {};
    Object.entries(r.data || {}).forEach(([chId, fields]) => {
      const chName = dChMap[chId] || chId;
      const fd = {};
      Object.entries(fields).forEach(([k, v]) => {
        if (v !== '' && v !== null && v !== undefined) fd[fieldLabels[k] || k] = v;
      });
      if (Object.keys(fd).length > 0) channels[chName] = fd;
    });
    return { user: u.name || '未知', department: u.department || '', date: r.date, channels };
  }).sort((a, b) => (a.date || '').localeCompare(b.date || ''));

  // Compile weekly reports
  const weeklyData = cloudData.weeklyReports.map(r => {
    const u = userMap[r.userId] || {};
    const channels = {};
    Object.entries(r.data || {}).forEach(([chId, fields]) => {
      const chName = wChMap[chId] || chId;
      const fd = {};
      Object.entries(fields).forEach(([k, v]) => {
        if (v !== '' && v !== null && v !== undefined) fd[fieldLabels[k] || k] = v;
      });
      if (Object.keys(fd).length > 0) channels[chName] = fd;
    });
    return { user: u.name || '未知', department: u.department || '', weekStart: r.weekStart, channels };
  }).sort((a, b) => (a.weekStart || '').localeCompare(b.weekStart || ''));

  const activeUsers = cloudData.users.filter(u => u.active);
  const context = {
    systemDate: new Date().toLocaleDateString('zh-CN'),
    overview: {
      totalUsers: activeUsers.length,
      departments: cloudData.departments,
      dailyReportCount: cloudData.dailyReports.length,
      weeklyReportCount: cloudData.weeklyReports.length,
      dailyDateRange: dailyData.length > 0 ? {earliest: dailyData[0].date, latest: dailyData[dailyData.length-1].date} : null,
      weeklyDateRange: weeklyData.length > 0 ? {earliest: weeklyData[0].weekStart, latest: weeklyData[weeklyData.length-1].weekStart} : null
    },
    users: activeUsers.map(u => ({name: u.name, department: u.department, role: u.role})),
    dailyChannels: (fc.daily || []).map(c => ({name: c.name, reference: c.reference})),
    weeklyChannels: (fc.weekly || []).map(c => ({name: c.name, reference: c.reference})),
    dailyReports: dailyData,
    weeklyReports: weeklyData
  };
  return JSON.stringify(context, null, 2);
}
